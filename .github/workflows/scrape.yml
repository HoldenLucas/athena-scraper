name: scrape

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1" # weekly, Monday 06:00 UTC

permissions:
  contents: write # commit output/ back
  pages: write # deploy the Redoc site
  id-token: write # required by deploy-pages

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: false # no lockfile; PEP 723 inline deps

      - name: Install Playwright browser + system deps
        run: uv run --with playwright playwright install --with-deps chromium

      - name: Run scraper # scrape + merge + build docs/ (openapi.yaml + index.html)
        run: uv run main.py

      - name: Commit output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --staged --quiet || git commit -m "update specs [skip ci]"
          git push

      # docs/ was just regenerated by main.py, so the uploaded site always
      # matches output/ -- nothing committed that can drift.
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: scrape
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
