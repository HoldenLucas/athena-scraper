name: scrape

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1" # weekly, Monday 06:00 UTC

permissions:
  contents: write # needed to commit output/ back

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: false # no lockfile; PEP 723 inline deps

      - name: Install Playwright browser + system deps
        run: uv run --with playwright playwright install --with-deps chromium

      - name: Run scraper
        run: uv run main.py

      - name: Commit output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --staged --quiet || git commit -m "update specs [skip ci]"
          git push
