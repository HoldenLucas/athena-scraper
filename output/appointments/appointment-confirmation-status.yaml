openapi: 3.0.0
info:
  description: Welcome to the API developer portal which gives third parties access
    to our APIs and sandbox to develop integrated solutions that will enhance the
    value and functionality offered by athenaOne®.
  title: athena API collection
  version: '0.1'
components:
  securitySchemes:
    api_auth_preview:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://api.preview.platform.athenahealth.com/oauth2/v1/token
          scopes:
            athena/service/Athenanet.MDP.*: API Preview
    api_auth:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://api.platform.athenahealth.com/oauth2/v1/token
          scopes:
            athena/service/Athenanet.MDP.*: API Production
    bearer_auth:
      type: http
      scheme: bearer
servers:
- url: https://api.preview.platform.athenahealth.com
  description: Preview
- url: https://api.platform.athenahealth.com
  description: Production
paths:
  /v1/{practiceid}/appointments/{appointmentid}/confirmationstatus:
    get:
      summary: Get appointment confirmation status
      description: Retrieve the confirmation status of a specific appointment
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: appointmentid
        schema:
          type: integer
        required: true
        description: appointmentid
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  confirmationname:
                    description: Description of appointment confirmation status.
                    type: string
                  shortname:
                    description: If defined then the status is a positive confirmation.
                    type: string
                type: object
          description: Success
      operationId: getPracticeidAppointmentsAppointmentidConfirmationstatus
      x-scopes: []
      tags:
      - Appointments
      - Appointment Confirmation Status
    put:
      summary: Update appointment confirmation status
      description: Update the confirmation status of a specific appointment
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: appointmentid
        schema:
          type: integer
        required: true
        description: appointmentid
      - in: header
        name: Content-Type
        schema:
          type: string
        required: true
        description: Content type of the payload
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  success:
                    description: Whether the operation was successful.
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                type: object
          description: Success
      operationId: putPracticeidAppointmentsAppointmentidConfirmationstatus
      x-scopes: []
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
              - appointmentconfirmationid
              properties:
                appointmentconfirmationid:
                  type: integer
                  description: The appointment's confirmation status.
        required: true
      tags:
      - Appointments
      - Appointment Confirmation Status
  /v1/{practiceid}/reference/appointmentconfirmationstatus:
    get:
      summary: Get list of appointment confirmation statuses
      description: Retrieve the types of confirmation statuses configured in the system
        to put on the appointment
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: query
        name: limit
        schema:
          type: integer
        required: false
        description: Number of entries to return (default 1000, max 10000)Please note
          that this endpoint has a different default and max than normal.
      - in: query
        name: offset
        schema:
          type: integer
        required: false
        description: Starting point of entries; 0-indexed
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  name:
                    description: Appointment Confirmation Status.
                    type: string
                  statusid:
                    description: Status Id
                    type: integer
                type: object
          description: Success
      operationId: getPracticeidReferenceAppointmentconfirmationstatus
      x-scopes: []
      tags:
      - Appointments
      - Appointment Confirmation Status
metadata: []
security:
- api_auth_preview:
  - athena/service/Athenanet.MDP.*
  api_auth:
  - athena/service/Athenanet.MDP.*
  bearer_auth: []
