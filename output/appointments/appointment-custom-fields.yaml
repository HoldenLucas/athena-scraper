openapi: 3.0.0
info:
  description: Welcome to the API developer portal which gives third parties access
    to our APIs and sandbox to develop integrated solutions that will enhance the
    value and functionality offered by athenaOne®.
  title: athena API collection
  version: '0.1'
components:
  securitySchemes:
    api_auth_preview:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://api.preview.platform.athenahealth.com/oauth2/v1/token
          scopes:
            athena/service/Athenanet.MDP.*: API Preview
    api_auth:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://api.platform.athenahealth.com/oauth2/v1/token
          scopes:
            athena/service/Athenanet.MDP.*: API Production
    bearer_auth:
      type: http
      scheme: bearer
servers:
- url: https://api.preview.platform.athenahealth.com
  description: Preview
- url: https://api.platform.athenahealth.com
  description: Production
paths:
  /v1/{practiceid}/appointments/{appointmentid}/customfields:
    put:
      summary: Update appointment-level custom fields
      description: Modify the customfield data for a specific appointment
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: appointmentid
        schema:
          type: integer
        required: true
        description: appointmentid
      - in: header
        name: Content-Type
        schema:
          type: string
        required: true
        description: Content type of the payload
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  disallowedcount:
                    description: The number of fields not updated because the field
                      is not allowed to be updated.
                    type: integer
                  success:
                    description: Indicates that this call was successful.
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                  updatedcount:
                    description: The number of fields updated.
                    type: integer
                type: object
          description: Success
      operationId: putPracticeidAppointmentsAppointmentidCustomfields
      x-scopes: []
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
              - customfields
              properties:
                customfields:
                  type: array
                  description: A JSON representation of any updates to custom fields.
                    The contents of this should match the custom fields output with
                    /appointments/customfields of course, any updates. Validation
                    should happen based on the structure given in the /customfields/
                    call; this means that the values submitted in a select list should
                    be a proper option ID, that number fields are restricted to numbers,
                    and date fields restricted to dates (mm/dd/yyyy).
        required: true
      tags:
      - Appointments
      - Appointment Custom Fields
  /v1/{practiceid}/appointments/customfields:
    get:
      summary: Get the list of appointment custom fields
      description: Retrieve the list of customfields configured in the system
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: query
        name: limit
        schema:
          type: integer
        required: false
        description: Number of entries to return (default 1000, max 10000)Please note
          that this endpoint has a different default and max than normal.
      - in: query
        name: offset
        schema:
          type: integer
        required: false
        description: Starting point of entries; 0-indexed
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  casesensitiveyn:
                    description: Is this field case sensitive?
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                  copyonappointmentreschedyn:
                    description: Decides whether we copy data when we reschedule an
                      appointment.
                    type: string
                  customfieldid:
                    description: The custom field ID.
                    type: integer
                  disallowupdateyn:
                    description: Can this field be updated?
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                  length:
                    description: Maximum length of this field.
                    type: integer
                  name:
                    description: The name of this custom field.
                    type: string
                  ordering:
                    description: The ordering in which this field is displayed.
                    type: integer
                  searchableyn:
                    description: If true will allow it to be searchable from the search
                      box in the main page.
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                  selectlist:
                    description: An array of options, each one containing selectid
                      and a selectvalue.
                    items:
                      properties:
                        optionid:
                          description: The ID that is used to identify this option.
                          type: integer
                        optionvalue:
                          description: The value to be displayed.
                          type: string
                        ordering:
                          description: The ordering in which this field is displayed.
                          type: integer
                      type: object
                    type: array
                  selectyn:
                    description: Is this field a select list (and thus should have
                      a "selectlist" as well).
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                  type:
                    description: One of "TEXT", "DATE", "NUMBER", or "REFERRINGPROVIDER".
                    type: string
                type: object
          description: Success
      operationId: getPracticeidAppointmentsCustomfields
      x-scopes: []
      tags:
      - Appointments
      - Appointment Custom Fields
metadata: []
security:
- api_auth_preview:
  - athena/service/Athenanet.MDP.*
  api_auth:
  - athena/service/Athenanet.MDP.*
  bearer_auth: []
