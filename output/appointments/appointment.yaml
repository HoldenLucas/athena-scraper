                        calltime:
                          type: string
                          description: Date and time of the call attempt.
                        messagetype:
                          type: string
                          description: The type of message that was attempted.
                        messageresultid:
                          type: string
                          description: Id of the message attempt.
                    description: Detailed ReminderCall information made for this appointment.
                  appointmentcopay:
                    type: string
                    description: 'Detailed information about the copay for this appointment.  Gives
                      more detail than the COPAY field.  Note: this information is
                      not yet available in all practices, we are rolling this out
                      slowly.'
                  appointmentnotes:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          description: The id of the appointment note.
                        text:
                          type: string
                          description: The note associated with the appointment.
                        displayonschedule:
                          enum:
                          - ''
                          - false
                          - true
                          type: string
                          description: Whether the note should be displayed on the
                            schedule.
                    description: An array of appointment notes for this appointment.
                  cancelreasonname:
                    type: string
                    description: If the appointment was cancelled, the name (local
                      to the practice) for the cancel reason.
                  checkoutdatetime:
                    type: string
                    description: The time (mm/dd/yyyy hh24:mi:ss) that the appointment
                      was checked out.
                  stopexamdatetime:
                    type: string
                    description: The time (mm/dd/yyyy hh24:mi:ss) that the exam was
                      completed.
                  appointmentstatus:
                    type: string
                    description: The athenaNet appointment status. There are several
                      possible statuses.  x=cancelled. f=filled. (It can include appointments
                      where were never checked in, even if the appointment date is
                      in the past. It is up to a practice to cancel appointments as
                      a no show when appropriate to do so.)  o=open. 2=checked in.
                      3=checked out. 4=charge entered (i.e. a past appointment).
                  appointmenttypeid:
                    type: string
                    description: This is the ID for the appointment type.   Note that
                      this may <strong>not</strong> be the same as the booked appointment
                      because of "generic" slots.
                  cancelleddatetime:
                    type: string
                    description: The time (mm/dd/yyyy hh24:mi:ss; Eastern time) that
                      this appointment was cancelled (if cancelled)
                  patientlocationid:
                    type: string
                    description: The location of the patient. See /patientlocation
                      for practice list. Only present for appointments with Clinicals
                      that have been checked in.
                  scheduleddatetime:
                    type: string
                    description: The time (mm/dd/yyyy hh24:mi:ss; Eastern time) that
                      this appointment was scheduled.
                  appointmentmessage:
                    type: string
                    description: The message to the patient that is associated with
                      the appointment.
                  cancelreasonnoshow:
                    type: string
                    description: If the appointment was cancelled, if the cancel reason
                      is marked as a no show reason.
                  stopintakedatetime:
                    type: string
