  /v1/{practiceid}/appointments/booked/multiple:
    get:
      summary: Get list of booked appointments by passing multiple appointmentids
      description: Retrieve  Booked Appointments by passing multiple appointmentids
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: query
        name: showpatientinstructions
        schema:
          type: boolean
        required: false
        description: Show indicator to include the patient instructions.
      - in: query
        name: appointmentids
        schema:
          type: array
          items:
            type: integer
        required: true
        description: The athenaNet appointment ID. Multiple appointment IDs (either
          as a comma delimited list or multiple POSTed values) are allowed.  Maximum
          number of input Appointment IDs are limited due to performance constraints.
      - in: query
        name: showremindercalldetail
        schema:
          type: boolean
        required: false
        description: "\n\t\t\t\t\tInclude all remindercall related results, if available,\
          \ associated with an appointment."
      - in: query
        name: showpatientdetail
        schema:
          type: boolean
        required: false
        description: Include patient information for each patient associated with
          an appointment.
      - in: query
        name: confidentialitycode
        schema:
          type: array
          items:
            type: string
        required: false
        description: 'A comma separated list of confidentiality codes to filter patients
          by. If not set defaults to include all confidentiality codes. Supported
          codes: ''N'' and ''R''.'
      - in: query
        name: showexpectedprocedurecodes
        schema:
          type: boolean
        required: false
        description: Show the expetcted procedurecodes.
      - in: query
        name: showclaimdetail
        schema:
          type: boolean
        required: false
        description: Include claim information, if available, associated with an appointment.
      - in: query
        name: showinsurance
        schema:
          type: boolean
        required: false
        description: "\n\t\t\t\t\tInclude patient insurance information. Shows insurance\
          \ packages for the appointment if any are selected, and all patient packages\
          \ otherwise."
      - in: query
        name: showcopay
        schema:
          type: boolean
        required: false
        description: By default, the expected co-pay is returned. For performance
          purposes, you can set this to false and copay will not be populated.
      - in: query
        name: showcancelled
        schema:
          type: boolean
        required: false
        description: Include appointments that have been cancelled.
      - in: query
        name: limit
        schema:
          type: integer
        required: false
        description: Number of entries to return (default 1000, max 10000)Please note
          that this endpoint has a different default and max than normal.
      - in: query
        name: offset
        schema:
          type: integer
        required: false
        description: Starting point of entries; 0-indexed
