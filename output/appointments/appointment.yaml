        required: true
        description: Content type of the payload
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  status:
                    description: The status of this appointment after the operation
                      (generally "x").
                    type: string
                type: object
          description: Success
      operationId: putPracticeidAppointmentsAppointmentidCancel
      x-scopes: []
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
              - patientid
              properties:
                patientid:
                  type: integer
                  description: The athenaNet patient ID.
                nopatientcase:
                  type: boolean
                  description: By default, we create a patient case upon booking an
