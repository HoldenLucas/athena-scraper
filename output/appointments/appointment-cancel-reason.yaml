openapi: 3.0.0
info:
  description: Welcome to the API developer portal which gives third parties access
    to our APIs and sandbox to develop integrated solutions that will enhance the
    value and functionality offered by athenaOne®.
  title: athena API collection
  version: '0.1'
components:
  securitySchemes:
    api_auth_preview:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://api.preview.platform.athenahealth.com/oauth2/v1/token
          scopes:
            athena/service/Athenanet.MDP.*: API Preview
    api_auth:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://api.platform.athenahealth.com/oauth2/v1/token
          scopes:
            athena/service/Athenanet.MDP.*: API Production
    bearer_auth:
      type: http
      scheme: bearer
servers:
- url: https://api.preview.platform.athenahealth.com
  description: Preview
- url: https://api.platform.athenahealth.com
  description: Production
paths:
  /v1/{practiceid}/appointmentcancelreasons:
    get:
      summary: Get list of appointment cancellation reasons
      description: Retrieves the list of reasons for cancelling a scheduled appointment
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: query
        name: slotavailable
        schema:
          type: boolean
        required: false
        description: Only return values with slotavailable matching this boolean.
      - in: query
        name: limit
        schema:
          type: integer
        required: false
        description: Number of entries to return (default 100, max 5000)Please note
          that this endpoint has a different default than normal.
      - in: query
        name: offset
        schema:
          type: integer
        required: false
        description: Starting point of entries; 0-indexed
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  appointmentcancelreasonid:
                    description: The cancel reason ID.
                    type: integer
                  name:
                    description: The reason for cancellation.
                    type: string
                  noshow:
                    description: The patient was a no-show.
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                  patientrescheduled:
                    description: The patient rescheduled this appointment.
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                  providerunavailable:
                    description: The provider is unavailable for this appointment.
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                  slotavailable:
                    description: If true, using this cancel reason will create a new
                      appointment slot at the same time as the original appointment.
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                type: object
          description: Success
      operationId: getPracticeidAppointmentcancelreasons
      x-scopes: []
      tags:
      - Appointments
      - Appointment Cancel Reasons
metadata: []
security:
- api_auth_preview:
  - athena/service/Athenanet.MDP.*
  api_auth:
  - athena/service/Athenanet.MDP.*
  bearer_auth: []
