                  waitlistid:
                    type: integer
                    description: The wait list ID, used in other calls.
                  dayofweekids:
                    type: integer
                    description: A list of day of week IDs that are desired by the
                      patient, with 1 being Sunday, and 7 being Saturday.
                  departmentid:
                    type: integer
                    description: The department ID of the desired department.  This
                      can be blank if any department is acceptable.
                  appointmentid:
                    type: integer
                    description: The booked appointment ID of the appointment that
                      this wait list entry would replace.
                  appointmenttypeid:
                    type: integer
                    description: The appointment type ID of the desired appointment.
          description: Success
      operationId: getPracticeidAppointmentsWaitlistWaitlistid
      x-scopes: []
      tags:
      - Appointments
      - Appointment Wait List
    put:
      summary: Update a wait list entry.
      description: Generic success/error response
      parameters:
      - in: path
        name: waitlistid
        schema:
          type: integer
        required: true
        description: waitlistid
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: header
        name: Content-Type
        schema:
          type: string
        required: true
        description: Content type of the payload
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errormessage:
                    description: If the operation failed, this will contain any error
                      messages.
                    type: string
                  success:
                    description: Whether the operation was successful.
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                type: object
          description: Success
      operationId: putPracticeidAppointmentsWaitlistWaitlistid
      x-scopes: []
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                note:
                  type: string
                  description: Practice-facing note about why the wait list entry
                    exists.
                hourto:
                  type: integer
                  description: The hour (24 hour clock) before which an appointment
                    is desired by a patient.  Inclusive.
                hourfrom:
                  type: integer
                  description: The hour (24 hour clock) after which an appointment
                    is desired by a patient.  Inclusive.
                priority:
                  enum:
                  - ''
                  - LOW
                  - NORMAL
                  - HIGH
                  type: string
                  description: One of "LOW", "NORMAL", or "HIGH", indicating the priorty
                    of this wait list entry.
                providerid:
                  type: integer
                  description: The provider ID of the desired provider.  This can
                    be blank if any provider is acceptable.
                dayofweekids:
                  type: array
                  items:
                    type: integer
                  description: A list (JSON array) of day of week IDs that are desired
                    by the patient, with 1 being Sunday, and 7 being Saturday.
                departmentid:
                  type: integer
                  description: The department ID of the desired department.  This
                    can be blank if any department is acceptable.
                appointmentid:
                  type: integer
                  description: The booked appointment ID of the appointment that this
                    wait list entry would replace.
                appointmenttypeid:
                  type: integer
                  description: The appointment type ID of the desired appointment.
                allowanydepartment:
                  type: boolean
                  description: While a department is required when creating a wait
                    list entry, this flag indicates that any department is accpetable
                    for an appointment.
        required: true
      tags:
      - Appointments
      - Appointment Wait List
    delete:
      summary: Remove an entry from the wait list.
      description: Generic success/error response
      parameters:
      - in: path
        name: waitlistid
        schema:
          type: integer
        required: true
        description: waitlistid
      - in: path
        name: practiceid
        schema:
          type: integer
