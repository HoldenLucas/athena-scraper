openapi: 3.0.0
info:
  description: Welcome to the API developer portal which gives third parties access
    to our APIs and sandbox to develop integrated solutions that will enhance the
    value and functionality offered by athenaOne®.
  title: athena API collection
  version: '0.1'
components:
  securitySchemes:
    api_auth_preview:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://api.preview.platform.athenahealth.com/oauth2/v1/token
          scopes:
            athena/service/Athenanet.MDP.*: API Preview
    api_auth:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://api.platform.athenahealth.com/oauth2/v1/token
          scopes:
            athena/service/Athenanet.MDP.*: API Production
    bearer_auth:
      type: http
      scheme: bearer
servers:
- url: https://api.preview.platform.athenahealth.com
  description: Preview
- url: https://api.platform.athenahealth.com
  description: Production
paths:
  /v1/{practiceid}/appointments/appointmenttypedropdown/mapping:
    get:
      summary: Get list of schedulable appointment metadata
      description: Retrieve the types of appointments configured in the system
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: query
        name: appointmenttypeid
        schema:
          type: integer
        required: false
        description: ID of the Appointment.
      - in: query
        name: departmentid
        schema:
          type: integer
        required: false
        description: Id of the Department.
      - in: query
        name: providerid
        schema:
          type: integer
        required: false
        description: ID of the Provider.
      - in: query
        name: showenabledonly
        schema:
          type: boolean
        required: false
        description: By default we show all appointmenttypes available to provider/department
          combination Setting this flag to true and giving either provider, appointmenttypeid,
          departmentid, or any combination will show whats actually configured in
          the appointmenttypes drop down table for the given parameters.
      - in: query
        name: limit
        schema:
          type: integer
        required: false
        description: Number of entries to return (default 1000, max 10000)Please note
          that this endpoint has a different default and max than normal.
      - in: query
        name: offset
        schema:
          type: integer
        required: false
        description: Starting point of entries; 0-indexed
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  appointmenttypeid:
                    description: ID of the AppointmentType.
                    type: integer
                  appointmenttypename:
                    description: NAme of the AppointmentType
                    type: string
                  departmentid:
                    description: ID of the Department
                    type: integer
                  departmentname:
                    description: Name of the Department.
                    type: string
                  providerid:
                    description: Id of the Provider.
                    type: integer
                  providername:
                    description: Name of the Provider
                    type: string
                type: object
          description: Success
      operationId: getPracticeidAppointmentsAppointmenttypedropdownMapping
      x-scopes: []
      tags:
      - Appointments
      - Appointment Types
metadata: []
security:
- api_auth_preview:
  - athena/service/Athenanet.MDP.*
  api_auth:
  - athena/service/Athenanet.MDP.*
  bearer_auth: []
