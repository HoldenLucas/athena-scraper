openapi: 3.0.0
info:
  description: Welcome to the API developer portal which gives third parties access
    to our APIs and sandbox to develop integrated solutions that will enhance the
    value and functionality offered by athenaOne®.
  title: athena API collection
  version: '0.1'
components:
  securitySchemes:
    api_auth_preview:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://api.preview.platform.athenahealth.com/oauth2/v1/token
          scopes:
            athena/service/Athenanet.MDP.*: API Preview
    api_auth:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://api.platform.athenahealth.com/oauth2/v1/token
          scopes:
            athena/service/Athenanet.MDP.*: API Production
    bearer_auth:
      type: http
      scheme: bearer
servers:
- url: https://api.preview.platform.athenahealth.com
  description: Preview
- url: https://api.platform.athenahealth.com
  description: Production
paths:
  /v1/{practiceid}/documents/imagingresult/{imagingresultid}/actions:
    post:
      summary: Add imaging result document action note
      description: Creates an action note for a specific imaging results document
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: imagingresultid
        schema:
          type: integer
        required: true
        description: imagingresultid
      - in: header
        name: Content-Type
        schema:
          type: string
        required: true
        description: Content type of the payload
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errormessage:
                    description: If there was an error with this call and SUCCESS
                      is set to false, this field may provide additional information.
                    type: string
                  newdocumentid:
                    description: The document ID of newly created document as a result
                      of action of Deny-New Prescription To Follow (DNTF).
                    type: string
                  success:
                    description: Returns true if the update was a success.
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                  versiontoken:
                    description: A token representing the current state of this document.
                      Will only be set if VERSIONTOKEN was originally sent to the
                      endpoint.
                    type: string
                type: object
          description: Success
      operationId: postPracticeidDocumentsImagingresultImagingresultidActions
      x-scopes: []
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
              - actionnote
              properties:
                actionnote:
                  type: string
                  description: The new action note to add to the document.
        required: true
      tags:
      - Forms and Documents
      - Update Document Actions
    get:
      summary: Get imaging result document's action note
      description: Retrieves action note information of a specific imaging results
        document
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: imagingresultid
        schema:
          type: integer
        required: true
        description: imagingresultid
      - in: query
        name: limit
        schema:
          type: integer
        required: false
        description: Number of entries to return (default 1500, max 5000)
      - in: query
        name: offset
        schema:
          type: integer
        required: false
        description: Starting point of entries; 0-indexed
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  actionnote:
                    description: The action notes that are attached to the document.
                    type: string
                  assignedto:
                    description: This field will describe who was assigned this document
                      during this document action.
                    type: string
                  createdby:
                    description: The username of the person that created this document
                      action.
                    type: string
                  createddatetime:
                    description: The datetime this action note was created.
                    type: string
                  patientid:
                    description: The patient ID this document is tied to.
                    type: integer
                  priority:
                    description: Priority given for this document action.
                    type: integer
                  status:
                    description: Status given for this document action.
                    type: string
                type: object
          description: Success
      operationId: getPracticeidDocumentsImagingresultImagingresultidActions
      x-scopes: []
      tags:
      - Forms and Documents
      - Update Document Actions
  /v1/{practiceid}/patients/{patientid}/documents/imagingresult:
    post:
      summary: Add imaging result document to patient's chart
      description: Creates a imaging results document record for a specific patient
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: patientid
        schema:
          type: integer
        required: true
        description: patientid
      - in: header
        name: Content-Type
        schema:
          type: string
        required: true
        description: Content type of the payload
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                    description: Returns true/false if the operation was successful.
                  errormessage:
                    type: string
                    description: If the operation failed, this will contain an error
                      message.
                  imagingresultid:
                    type: integer
                    description: The document ID of the new or modified document.
          description: Success
      operationId: postPracticeidPatientsPatientidDocumentsImagingresult
      x-scopes: []
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              required:
              - departmentid
              properties:
                entityid:
                  type: string
                  description: Identifier of entity creating the document. entitytype
                    is required while passing entityid.
                priority:
                  enum:
                  - ''
                  - 1
                  - 2
                  type: string
                  description: Priority of this result.  1 is high; 2 is normal.
                autoclose:
                  type: boolean
                  description: Documents will, normally, automatically appear in the
                    clinical inbox for providers to review. In some cases, you might
                    want to force the document to skip the clinical inbox, and go
                    directly to the patient chart with a "closed" status. For that
                    case, set this to true.
                ssotarget:
                  type: string
                  description: URL that you want to use as your target when doing
                    SSO with an external link. Note that this requires special setup
                    before this will work.
                entitytype:
                  enum:
                  - ''
                  - PROVIDER
                  - PATIENT
                  - OTHERS
                  type: string
                  description: Type of entity creating the document. entityid is required
                    while passing entitytype.
                facilityid:
                  type: integer
                  description: The ID of the facility or clinical provider who received
                    the order.
                providerid:
                  type: integer
                  description: The ID of the ordering provider.
                accessionid:
                  type: string
                  description: A unique identifier given to a document to track it
                    over time.
                patientnote:
                  type: string
                  description: This is a note specifically for the patient to view
                    or action on. Updating this will append to any previous notes.
                departmentid:
                  type: integer
                  description: The athenaNet department ID associated with the uploaded
                    document.
                documentdata:
                  type: string
                  description: Text data stored with document
                internalnote:
                  type: string
                  description: An internal note for the provider or staff. Updating
                    this will append to any previous notes and has a limit of 4000
                    characters.
                reportstatus:
                  enum:
                  - ''
                  - final
                  - partial
                  - pending
                  - preliminary
                  - complete
                  - incomplete
                  - Final
                  - Partial
                  - Pending
                  - Preliminary
                  - Complete
                  - Incomplete
                  type: string
                  description: The status of the report, it will be converted to lowercase
                    on save.
                resultstatus:
                  enum:
                  - ''
                  - Final
                  - Partial
                  - Pending
                  - Preliminary
                  - Corrected
                  - Cancelled
                  type: string
                  description: The status of the result.
                tietoorderid:
                  type: integer
                  description: Tie the result document to this order.
                attachmenttype:
                  enum:
                  - ''
                  - BMP
                  - GIF
                  - JPG
                  - JPEG
                  - PDF
                  - PNG
                  - TIF
                  - TIFF
                  type: string
                  default: PDF
                  description: The file type of attachment.
                documenttypeid:
                  type: integer
                  description: A specific document type identifier.
                interpretation:
                  type: string
                  description: The practice entered interpretation of this result.
                    Updating this will append to any previous values.
                includefilelink:
                  type: boolean
                  description: If true, attempt to attach a file link to the document.
                observationdate:
                  type: string
                  description: The date an observation was made (mm/dd/yyyy).
                observationtime:
                  type: string
                  description: The time an observation was made (hh24:mi).  24 hour
                    time.
                originalfilename:
                  type: string
                  description: The original file name of this document without the
                    file extension. Filename should not exceed 200 characters.
                attachmentcontents:
                  type: string
                  description: "The file contents that will be attached to this document.\
                    \ File must be Base64 encoded. \n\t\tPlease note encrypted PDFs\
                    \ are not supported with document upload APIs."
                relevantclinicalinfo:
                  type: string
                  description: Any other clinically relevant data that you want to
                    add.
                internalaccessionidentifier:
                  type: string
                  description: A unique identifier given to a document to track it
                    over time.
        required: true
      tags:
      - Forms and Documents
      - Document List By Class
    get:
      summary: Get list of patient's imaging result documents
      description: Retrieves a list of imaging results document information of a specific
        patient
      parameters:
      - description: practiceid
        in: path
        name: practiceid
        required: true
        schema:
          type: integer
      - description: patientid
        in: path
        name: patientid
        required: true
        schema:
          type: integer
      - description: The athenaNet department id.
        in: query
        name: departmentid
        required: true
        schema:
          type: integer
      - description: When "true" is passed we will return filetype, filesize and originalfilename
          if applicable
        in: query
        name: showmetadata
        required: false
        schema:
          type: boolean
      - description: If true, interpretation template added to the document is also
          returned.
        in: query
        name: showtemplate
        required: false
        schema:
          type: boolean
      - description: Show only documents attached to this encounter.
        in: query
        name: encounterid
        required: false
        schema:
          type: integer
      - description: If true, clinicalresultid will be returned.
        in: query
        name: showclinicalresultid
        required: false
        schema:
          type: boolean
      - description: The status of the task to filter document results.
        in: query
        name: status
        required: false
        schema:
          enum:
          - ADMINISTER
          - CLOSED
          - DATAENTRY
          - DELETED
          - DISPENSE
          - FOLLOWUP
          - HOLD
          - NOTIFY
          - PEND
          - PENDING
          - PENDINGLABEL
          - PERFORM
          - REVIEW
          - SCHEDULE
          - SCHEDULED
          - SUBMIT
          - SUBMITTED
          type: string
          x-enumDescriptions:
          - ADMINISTER
          - CLOSED
          - DATAENTRY
          - DELETED
          - DISPENSE
          - FOLLOWUP
          - HOLD
          - NOTIFY
          - PEND
          - PENDING
          - PENDINGLABEL
          - PERFORM
          - REVIEW
          - SCHEDULE
          - SCHEDULED
          - SUBMIT
          - SUBMITTED
      - description: If true, only documents published to the portal at the time of
          this call are returned.
        in: query
        name: showportalonly
        required: false
        schema:
          type: boolean
      - description: The document subclass to filter document results.
        in: query
        name: documentsubclass
        required: false
        schema:
          type: string
      - description: By default, deleted documents are not listed.  Set to list these.
        in: query
        name: showdeleted
        required: false
        schema:
          type: boolean
      - description: If true, entityid and entitytype will be returned. entityid will
          be populated in createduser attribute.
        in: query
        name: getentityinfo
        required: false
        schema:
          type: boolean
      - description: Number of entries to return (default 1500, max 5000)
        in: query
        name: limit
        required: false
        schema:
          type: integer
      - description: Starting point of entries; 0-indexed
        in: query
        name: offset
        required: false
        schema:
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  appointmentid:
                    description: The appointment ID for this document
                    type: integer
                  assignedto:
                    description: Person the document is assigned to
                    type: string
                  clinicalresultid:
                    description: The clinical result ID associated with this imaging
                      result. Only returned when showclinicalresultid parameter is
                      true.
                    type: number
                  createddate:
                    description: Date the document was created. Please use createddatetime
                      instead.
                    type: string
                  createddatetime:
                    description: Date/Time (ISO 8601) the document was created
                    type: string
                  createduser:
                    description: The user who created this document.
                    type: string
                  deleteddatetime:
                    description: Date/time (ISO 8601) the document was deleted
                    type: string
                  departmentid:
                    description: Department for the document
                    type: string
                  documentclass:
                    description: Class of document
                    type: string
                  documentdata:
                    description: Text data associated with this document.
                    type: string
                  documentdescription:
                    description: Description of the document type
                    type: string
                  documentroute:
                    description: Explains method by which the document was entered
                      into the AthenaNet (INTERFACE (digital), FAX, etc.)
                    type: string
                  documentsource:
                    description: Explains where this document originated.
                    enum:
                    - ''
                    - PATIENT
                    - CAREGIVER
                    - PARTNER
                    - PHARMACY
                    - LAB
                    - PCP
                    - SPECIALIST
                    - STAFF
                    - HOSPITAL
                    - OTHER
                    - PORTAL
                    - Live Operator
                    type: string
                  documentsubclass:
                    description: Specific type of document
                    type: string
                  documenttypeid:
                    description: The ID of the description for this document
                    type: integer
                  encounterid:
                    description: Encounter ID
                    type: string
                  entitytype:
                    description: Type of entity creating the document. Possible values
                      are PROVIDER, PATIENT and OTHERS.
                    type: string
                  externalaccessionid:
                    description: The external accession ID for this document. Format
                      depends on the system the ID belongs to.
                    type: string
                  externalnote:
                    description: 'DEPRECATED: This field has been deprecated and is
                      now returned as ''patientnote''.'
                    type: string
                  facilityid:
                    description: The ID of the clinical provider associated with this
                      clinical document. Clinical providers are a master list of providers
                      throughout the country.  These include providers as well as
                      radiology centers, labs and pharmacies.
                    type: integer
                  fileextension:
                    description: The file extension of this document.
                    type: string
                  filesize:
                    description: The file size of this document.
                    type: number
                  imagingresultid:
                    description: The primary key for imaging result class of documents
                    type: integer
                  internalaccessionid:
                    description: The internal accession ID for this document. Format
                      depends on the system the ID belongs to.
                    type: string
                  internalnote:
                    description: The 'Internal Note' attached to this document
                    type: string
                  interpretation:
                    description: The practice entered interpretation of this result.
                    type: string
                  interpretationtemplate:
                    description: The interpretation template added to the imaging
                      result.
                    properties:
                      interpretationtemplatename:
                        description: The name of the interpretation template.
                        type: string
                      interpretationtemplatenote:
                        description: The interpretation note.
                        type: string
                      paragraphs:
                        description: The paragraphs in the template.
                        items:
                          properties:
                            paragraphname:
                              description: The name of the interpretation paragraph.
                              type: string
                            sentences:
                              description: The sentences in the paragraph.
                              items:
                                properties:
                                  findings:
                                    description: The findings in the sentence
                                    items:
                                      properties:
                                        findingname:
                                          description: The name of the finding.
                                          type: string
                                        findingnote:
                                          description: The note for the finding selected.
                                          type: string
                                        findingtype:
                                          description: Describes the finding - either
                                            NORMAL, ABNORMAL, or NEUTRAL.
                                          type: string
                                        freetext:
                                          description: Freetext that could be associated
                                            with this finding.
                                          type: string
                                        selectedoptions:
                                          description: The option in the finding that
                                            was selected by the user.
                                          items:
                                            type: string
                                          type: array
                                      type: object
                                    type: array
                                  sentencename:
                                    description: The name of the sentence in the paragraph.
                                    type: string
                                  sentencenote:
                                    description: The note that goes along with this
                                      sentence.
                                    type: string
                                type: object
                              type: array
                          type: object
                        type: array
                    type: object
                  lastmodifieddatetime:
                    description: Date/time (ISO 8601) the document was last modified
                    type: string
                  lastmodifieduser:
                    description: The user who last modified this document.
                    type: string
                  loinc:
                    description: Laboratory code that identifies the overall result.
                    type: string
                  observationdatetime:
                    description: Date/time (ISO 8601) the observation was taken
                    type: string
                  ordergenusname:
                    description: The category name of the clinical order.
                    type: string
                  ordertype:
                    description: Order type group name
                    type: string
                  originalfilename:
                    description: The original file name of this document.
                    type: string
                  patientid:
                    description: The athenaNet patient ID.
                    type: integer
                  patientnote:
                    description: External note for the patient.
                    type: string
                  portalpublisheddatetime:
                    description: The date the document was published to the portal
                      in format (yyyy-mm-ddThh:mm:ss).
                    type: string
                  priority:
                    description: Document priority, when available. 1 is high, 2 is
                      normal. Some labs use other numbers or characters that are lab-specific.
                    type: string
                  providerid:
                    description: Provider ID for this document
                    type: integer
                  receivedfacilityordercode:
                    description: The code as received from the facility via HL7 in
                      OBR.4.
                    properties:
                      code:
                        description: The code received in OBR.4.1.
                        type: string
                      description:
                        description: The description of the code received in OBR.4.2.
                        type: string
                    type: object
                  resultstatus:
                    description: RESULTSTATUS status of the result.
                    type: string
                  status:
                    description: Status of the document
                    type: string
                  subject:
                    description: Subject of the document
                    type: string
                  tietoorderid:
                    description: Order ID of the order this document is tied to, if
                      any
                    type: integer
                type: object
          description: Success
      operationId: getPracticeidPatientsPatientidDocumentsImagingresult
      x-scopes: []
      tags:
      - Forms and Documents
      - Document List By Class
  /v1/{practiceid}/patients/{patientid}/documents/imagingresult/{imagingresultid}:
    get:
      summary: Get patient's imaging result document
      description: Retrieves a specific imaging results document information
      parameters:
      - description: practiceid
        in: path
        name: practiceid
        required: true
        schema:
          type: integer
      - description: patientid
        in: path
        name: patientid
        required: true
        schema:
          type: integer
      - description: imagingresultid
        in: path
        name: imagingresultid
        required: true
        schema:
          type: integer
      - description: If true, clinicalresultid is returned.
        in: query
        name: showclinicalresultid
        required: false
        schema:
          type: boolean
      - description: If true, pacs links related to the document will be returned.
        in: query
        name: includepacslink
        required: false
        schema:
          type: boolean
      - description: If true, interpretation template added to the document is also
          returned.
        in: query
        name: showtemplate
        required: false
        schema:
          type: boolean
      - description: If true, entityid and entitytype will be returned. entityid will
          be populated in createduser attribute.
        in: query
        name: getentityinfo
        required: false
        schema:
          type: boolean
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  actionnote:
                    description: The most recent action note for a document
                    type: string
                  alarmdays:
                    description: The number days until a document will go into followup
                      after being sent to the portal.
                    type: string
                  assignedto:
                    description: The user to whom this imaging result document is
                      currently assigned.
                    type: string
                  clinicalresultid:
                    description: The clinical result ID associated with this imaging
                      result. Only returned when showclinicalresultid parameter is
                      true.
                    type: number
                  createddate:
                    description: The date this imaging result document was created.
                    type: string
                  createddatetime:
                    description: The date/time this imaging result document was created.
                    type: string
                  createduser:
                    description: The user who created this imaging result document.
                    type: string
                  departmentid:
                    description: The department ID associated with this imaging result
                      document.
                    type: integer
                  description:
                    description: A description of the imaging result document (e.g.
                      "imaging result").
                    type: string
                  diagnosislist:
                    description: The diagnoses of the tied order.
                    items:
                      properties:
                        diagnosiscode:
                          properties:
                            code:
                              type: string
                            codeset:
                              type: string
                            description:
                              type: string
                          type: object
                        imodiagnosislist:
                          description: List of IMO codes and data for this diagnosis
                            This API attribute is being rolled out and will be Generally
                            Available on or before TBD
                          items:
                            properties:
                              icdcodes:
                                description: List of relevant ICD codes for this IMO
                                  code
                                items:
                                  properties:
                                    code:
                                      description: ICD code for this diagnosis
                                      type: string
                                    codeset:
                                      description: Codeset for this code (ICD9 or
                                        ICD10)
                                      type: string
                                    description:
                                      description: Brief description for this code
                                      type: string
                                  type: object
                                type: array
                              id:
                                description: The athena id of the imo diagnosis
                                type: integer
                              imocode:
                                description: IMO code details for this diagnosis
                                properties:
                                  code:
                                    description: The IMO code for this diagnosis
                                    type: string
                                  codeset:
                                    description: Codeset for this code (IMO)
                                    type: string
                                  description:
                                    description: The provider facing description for
                                      this IMO code
                                    type: string
                                  laterality:
                                    description: The laterality for this IMO code
                                    type: string
                                  needsrefinement:
                                    description: Whether or not the IMO term supports
                                      further refinement
                                    enum:
                                    - ''
                                    - false
                                    - true
                                    type: string
                                type: object
                              patientfacingdescription:
                                description: The patient facing description for this
                                  IMO code
                                type: string
                              providerfacingdescription:
                                description: The provider facing description for this
                                  IMO code
                                type: string
                              snomedcodes:
                                description: List of relevant SNOMED codes for this
                                  IMO code
                                items:
                                  properties:
                                    code:
                                      description: SNOMED code for this diagnosis
                                      type: string
                                    codeset:
                                      description: Codeset for this code (SNOMED)
                                      type: string
                                    description:
                                      description: Brief description for this code
                                      type: string
                                  type: object
                                type: array
                            type: object
                          type: array
                        snomedicdcodes:
                          items:
                            properties:
                              code:
                                type: string
                              codeset:
                                type: string
                              description:
                                type: string
                              unstrippeddiagnosiscode:
                                type: string
                            type: object
                          type: array
                      type: object
                    type: array
                  documentdata:
                    description: Text data for this document.  Typically because there
                      are no attachments.
                    type: string
                  documentsource:
                    description: Explains where this document originated (e.g. IMAGING
                      RESULT, PORTAL, etc.)
                    type: string
                  documenttypeid:
                    description: The ID of the description for this document
                    type: string
                  entitytype:
                    description: Type of entity creating the document. Possible values
                      are PROVIDER, PATIENT and OTHERS.
                    type: string
                  externalaccessionid:
                    description: The external accession identifier for this record.  Format
                      depends on the system the ID is from.
                    type: string
                  facilityid:
                    description: The ID of the facility which performed the imaging
                      order
                    type: string
                  findings:
                    description: The narrative findings for this imaging result.
                    type: string
                  imagingresultid:
                    description: The ID of the imaging result document.
                    type: string
                  indication:
                    description: The clinical indication for this imaging result.
                    type: string
                  internalaccessionid:
                    description: The internal accession identifier for this record.  Format
                      depends on the system the ID is from.
                    type: string
                  internalnote:
                    description: The "body" of the imaging result document.
                    type: string
                  interpretation:
                    description: The interpretation of this result
                    type: string
                  interpretationapproved:
                    description: Whether the interpretation has been approved.
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                  interpretationapprovedby:
                    description: The signer that approved the interpretation.
                    type: string
                  interpretationapprovedtimestamp:
                    description: The timestamp that the interpretation was approved
                      on.
                    type: string
                  interpretationtemplate:
                    description: The interpretation template added to the imaging
                      result.
                    properties:
                      interpretationtemplatename:
                        description: The name of the interpretation template.
                        type: string
                      interpretationtemplatenote:
                        description: The interpretation note.
                        type: string
                      paragraphs:
                        description: The paragraphs in the template.
                        items:
                          properties:
                            paragraphname:
                              description: The name of the interpretation paragraph.
                              type: string
                            sentences:
                              description: The sentences in the paragraph.
                              items:
                                properties:
                                  findings:
                                    description: The findings in the sentence
                                    items:
                                      properties:
                                        findingname:
