  /v1/{practiceid}/patients/{patientid}/documents/patientcase/{patientcaseid}/assign:
    put:
      summary: Reassign patient case document
      description: Reassigns a specific patient case document
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: patientid
        schema:
          type: integer
        required: true
        description: patientid
      - in: path
        name: patientcaseid
        schema:
          type: integer
        required: true
        description: patientcaseid
      - in: header
        name: Content-Type
        schema:
          type: string
        required: true
        description: Content type of the payload
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  assignedto:
                    description: String denoting the entity that the patientcase has
                      been assigned to.
                    type: string
                  success:
                    description: Boolean to denote success or failure.
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                type: object
          description: Success
      operationId: putPracticeidPatientsPatientidDocumentsPatientcasePatientcaseidAssign
      x-scopes: []
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
              - username
              properties:
                username:
                  type: string
                  description: AthenNet user to whom the case is being reassigned
                    to.This parameter is case-sensitive.
        required: true
      tags:
      - Forms and Documents
      - Patient case details
