openapi: 3.0.0
info:
  description: Welcome to the API developer portal which gives third parties access
    to our APIs and sandbox to develop integrated solutions that will enhance the
    value and functionality offered by athenaOne®.
  title: athena API collection
  version: '0.1'
components:
  securitySchemes:
    api_auth_preview:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://api.preview.platform.athenahealth.com/oauth2/v1/token
          scopes:
            athena/service/Athenanet.MDP.*: API Preview
    api_auth:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://api.platform.athenahealth.com/oauth2/v1/token
          scopes:
            athena/service/Athenanet.MDP.*: API Production
    bearer_auth:
      type: http
      scheme: bearer
servers:
- url: https://api.preview.platform.athenahealth.com
  description: Preview
- url: https://api.platform.athenahealth.com
  description: Production
paths:
  /v1/{practiceid}/documents/patientcase/{patientcaseid}/actions:
    get:
      summary: Get action note for given patient case
      description: Retrieves action note information of a specific patient case document
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: patientcaseid
        schema:
          type: integer
        required: true
        description: patientcaseid
      - in: query
        name: limit
        schema:
          type: integer
        required: false
        description: Number of entries to return (default 1500, max 5000)
      - in: query
        name: offset
        schema:
          type: integer
        required: false
        description: Starting point of entries; 0-indexed
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  actionnote:
                    description: The action notes that are attached to the document.
                    type: string
                  assignedto:
                    description: This field will describe who was assigned this document
                      during this document action.
                    type: string
                  createdby:
                    description: The username of the person that created this document
                      action.
                    type: string
                  createddatetime:
                    description: The datetime this action note was created.
                    type: string
                  patientid:
                    description: The patient ID this document is tied to.
                    type: integer
                  priority:
                    description: Priority given for this document action.
                    type: integer
                  status:
                    description: Status given for this document action.
                    type: string
                type: object
          description: Success
      operationId: getPracticeidDocumentsPatientcasePatientcaseidActions
      x-scopes: []
      tags:
      - Forms and Documents
      - Update Document Actions
    post:
      summary: This is used to update an action note on a specific document of a type
        indicated by the URI.
      description: Returns a success message pertaining to the update.
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: patientcaseid
        schema:
          type: integer
        required: true
        description: patientcaseid
      - in: header
        name: Content-Type
        schema:
          type: string
        required: true
        description: Content type of the payload
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errormessage:
                    description: If there was an error with this call and SUCCESS
                      is set to false, this field may provide additional information.
                    type: string
                  newdocumentid:
                    description: The document ID of newly created document as a result
                      of action of Deny-New Prescription To Follow (DNTF).
                    type: string
                  success:
                    description: Returns true if the update was a success.
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                  versiontoken:
                    description: A token representing the current state of this document.
                      Will only be set if VERSIONTOKEN was originally sent to the
                      endpoint.
                    type: string
                type: object
          description: Success
      operationId: postPracticeidDocumentsPatientcasePatientcaseidActions
      x-scopes: []
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
              - actionnote
              properties:
                actionnote:
                  type: string
                  description: The new action note to add to the document.
        required: true
      tags:
      - Forms and Documents
      - Update Document Actions
  /v1/{practiceid}/patients/{patientid}/documents/patientcase:
    get:
      summary: Get list of patient case documents for a patient
      description: Retrieves a list of patientcase document information for a specific
        patient
      parameters:
      - description: practiceid
        in: path
        name: practiceid
        required: true
        schema:
          type: integer
      - description: patientid
        in: path
        name: patientid
        required: true
        schema:
          type: integer
      - description: The status of the task to filter document results.
        in: query
        name: status
        required: false
        schema:
          enum:
          - ADMINISTER
          - CLOSED
          - DATAENTRY
          - DELETED
          - DISPENSE
          - FOLLOWUP
          - HOLD
          - NOTIFY
          - PEND
          - PENDING
          - PENDINGLABEL
          - PERFORM
          - REVIEW
          - SCHEDULE
          - SCHEDULED
          - SUBMIT
          - SUBMITTED
          type: string
          x-enumDescriptions:
          - ADMINISTER
          - CLOSED
          - DATAENTRY
          - DELETED
          - DISPENSE
          - FOLLOWUP
          - HOLD
          - NOTIFY
          - PEND
          - PENDING
          - PENDINGLABEL
          - PERFORM
          - REVIEW
          - SCHEDULE
          - SCHEDULED
          - SUBMIT
          - SUBMITTED
      - description: The athenaNet department id.
        in: query
        name: departmentid
        required: true
        schema:
          type: integer
      - description: The document subclass to filter document results.
        in: query
        name: documentsubclass
        required: false
        schema:
          type: string
      - description: By default, deleted documents are not listed.  Set to list these.
        in: query
        name: showdeleted
        required: false
        schema:
          type: boolean
      - description: Show only documents attached to this encounter.
        in: query
        name: encounterid
        required: false
        schema:
          type: integer
      - description: Number of entries to return (default 1500, max 5000)
        in: query
        name: limit
        required: false
        schema:
          type: integer
      - description: Starting point of entries; 0-indexed
        in: query
        name: offset
        required: false
        schema:
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    description: Status of the document
                  subject:
                    type: string
                    description: Subject of the document
                  priority:
                    type: string
                    description: Document priority, when available. 1 is high, 2 is
                      normal. Some labs use other numbers or characters that are lab-specific.
                  patientid:
                    type: integer
                    description: The athenaNet patient ID.
                  assignedto:
                    type: string
                    description: Person the document is assigned to
                  facilityid:
                    type: integer
                    description: The ID of the clinical provider associated with this
                      clinical document. Clinical providers are a master list of providers
                      throughout the country.  These include providers as well as
                      radiology centers, labs and pharmacies.
                  providerid:
                    type: integer
                    description: Provider ID for this document
                  createddate:
                    type: string
                    description: Date the document was created. Please use createddatetime
                      instead.
                  createduser:
                    type: string
                    description: The user who created this document.
                  description:
                    type: string
                    description: Description of the document type
                  encounterid:
                    type: string
                    description: Encounter ID
                  departmentid:
                    type: string
                    description: Department for the document
                  externalnote:
                    type: string
                    description: External note for the patient.
                  internalnote:
                    type: string
                    description: The 'Internal Note' attached to this document
                  tietoorderid:
                    type: integer
                    description: Order ID of the order this document is tied to, if
                      any
                  appointmentid:
                    type: integer
                    description: The appointment ID for this document
                  documentclass:
                    type: string
                    description: Class of document
                  documentroute:
                    type: string
                    description: Explains method by which the document was entered
                      into the AthenaNet (INTERFACE (digital), FAX, etc.)
                  patientcaseid:
                    type: string
                    description: The patient case id
                  documentsource:
                    enum:
                    - ''
                    - PATIENT
                    - CAREGIVER
                    - PARTNER
                    - PHARMACY
                    - LAB
                    - PCP
                    - SPECIALIST
                    - STAFF
                    - HOSPITAL
                    - OTHER
                    - PORTAL
                    - Live Operator
                    type: string
                    description: Explains where this document originated.
                  documenttypeid:
                    type: integer
                    description: A specific document type identifier.
                  phonemessageid:
                    type: integer
                    description: The primary key for phone message documents
                  createddatetime:
                    type: string
                    description: Date/Time (ISO 8601) the document was created
                  deleteddatetime:
                    type: string
                    description: Date/time (ISO 8601) the document was deleted
                  createddocuments:
                    type: array
                    items:
                      type: object
                      properties:
                        documentid:
                          type: string
                          description: The document id.
                        documentclass:
                          type: string
                          description: The document class.
                    description: Documents created by a patient case.
                  documentsubclass:
                    type: string
                    description: Specific type of document
                  lastmodifieddate:
                    type: string
                    description: 'DEPRECATED:  The last modified date.  The information
                      can now be found in the field entitled lastmodifieddatetime'
                  lastmodifieduser:
                    type: string
                    description: The user who last modified this document.
                  clinicalproviderid:
                    type: integer
                    description: 'DEPRECATED:  The clinical provider ID.  The information
                      can now be found in the field entitled ''facilityid'''
                  documentdescription:
                    type: string
                    description: 'DEPRECATED:  The document description.  The information
                      can now be found in the field entitled ''description'''
                  externalaccessionid:
                    type: string
                    description: The external accession ID for this document. Format
                      depends on the system the ID belongs to.
                  internalaccessionid:
                    type: string
                    description: The internal accession ID for this document. Format
                      depends on the system the ID belongs to.
                  observationdatetime:
                    type: string
                    description: Date/time the observation was taken
                  lastmodifieddatetime:
                    type: string
                    description: Date/time (ISO 8601) the document was last modified
                  patientcaseattachments:
                    type: array
                    items:
                      type: string
                    description: List of patient case attachment URLs for this patient
                      case document
          description: Success
      operationId: getPracticeidPatientsPatientidDocumentsPatientcase
      x-scopes: []
      tags:
      - Forms and Documents
      - Document List By Class
    post:
      summary: Add patient case document for a patient
      description: Creates a patient case document record of a specific patient
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: patientid
        schema:
          type: integer
        required: true
        description: patientid
      - in: header
        name: Content-Type
        schema:
          type: string
        required: true
        description: Content type of the payload
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                    description: Returns true/false if the operation was successful.
                  errormessage:
                    type: string
                    description: If the operation failed, this will contain an error
                      message.
                  patientcaseid:
                    type: integer
                    description: The document ID of the new or modified document.
          description: Success
      operationId: postPracticeidPatientsPatientidDocumentsPatientcase
      x-scopes: []
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
              - departmentid
              - providerid
              - documentsubclass
              - documentsource
              properties:
                subject:
                  type: string
                  description: The subject of this patient case.
                priority:
                  enum:
                  - ''
                  - 1
                  - 2
                  type: string
                  description: Priority of this result.  1 is high; 2 is normal.
                autoclose:
                  type: boolean
                  description: Documents will, normally, automatically appear in the
                    clinical inbox for providers to review. In some cases, you might
                    want to force the document to skip the clinical inbox, and go
                    directly to the patient chart with a "closed" status. For that
                    case, set this to true.
                providerid:
                  type: integer
                  description: The ID of the ordering provider.
                callbackname:
                  type: string
                  description: The name of the person to call (if other than patient).
                departmentid:
                  type: integer
                  description: The athenaNet department ID associated with the uploaded
                    document.
                internalnote:
                  type: string
                  description: An internal note for the provider or staff. Updating
                    this will append to any previous notes and has a limit of 4000
                    characters.
                outboundonly:
                  type: boolean
                  description: True/false flag indicating the patient case requires
                    an outbound phone call and is not a response to an inbound call.
                callbacknumber:
                  type: string
                  description: The phone number to use to call back the patient (mutually
                    exclusive with callbacknumbertype).
                documentsource:
                  enum:
                  - PATIENT
                  - CAREGIVER
                  - PARTNER
                  - PHARMACY
                  - LAB
                  - PCP
                  - SPECIALIST
                  - STAFF
                  - HOSPITAL
                  - OTHER
                  - PORTAL
                  - Live Operator
                  type: string
                  description: Explains where this document originated.
                documentsubclass:
                  enum:
                  - PATIENTCASE
                  - ADMINISTRATIVE
                  - BILLING
                  - CLINICALQUESTION
                  - ELECTRONICMEDICALRECORDS
                  - MEDICALRECORDS
                  - MEDICATION
                  - NEWRX
                  - OTHER
                  - PATIENTNOSHOW
                  - REFERRAL
                  - REFILL
                  type: string
                  description: Subclasses for PATIENTCASE documents
                callbacknumbertype:
                  enum:
                  - ''
                  - home
                  - work
                  - mobile
                  - emergency contact
                  - guarantor
                  type: string
                  description: The phone number type to use to call back the patient
                    (mutually exclusive with callbacknumber).
                clinicalproviderid:
                  type: integer
                  description: The ID of the external provider/lab/pharmacy associated
                    the document.
        required: true
      tags:
      - Forms and Documents
      - Document List By Class
