          type: string
          x-enumDescriptions:
          - Encounter
          - Document
        required: false
        description: The document class to filter, all others will be excluded
      - in: query
        name: inboxcategory
        schema:
          enum:
          - ADMIN
          - APPOINTMENTREQUEST
          - CLINICALDOCUMENT
          - CLINICALENCOUNTERVISIT
          - CLINICALRESULT
          - COORDINATORTASK
          - FOLLOWUP
          - ORDER
          - PATIENTCASE
          - UNKNOWN
          type: string
          x-enumDescriptions:
          - 'ADMIN: Admin Tasks / Phone Messages'
          - 'APPOINTMENTREQUEST: Appointment Requests'
          - 'CLINICALDOCUMENT: Clinical Documents'
          - 'CLINICALENCOUNTERVISIT: Encounters'
          - 'CLINICALRESULT: Lab Results / Lab Images / Lab Interpretations'
          - 'COORDINATORTASK: Coordinator Tasks'
          - 'FOLLOWUP: Tasks That Need Follow Up'
          - 'ORDER: Orders / RXs / Auths'
          - 'PATIENTCASE: Patient Cases'
          - 'UNKNOWN: Unknown Documents'
        required: false
        description: The inbox category/bucket to filter, all others will be excluded.
      - in: query
        name: limit
        schema:
          type: integer
        required: false
        description: Number of entries to return (default 1000, max 10000)Please note
          that this endpoint has a different default and max than normal.
      - in: query
        name: offset
        schema:
          type: integer
        required: false
        description: Starting point of entries; 0-indexed
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  createddate:
                    description: Date when this task was created
                    type: string
                  departmentid:
                    description: The department ID associated with this task, typically
                      just the department from the encounter or department.
                    type: integer
                  description:
                    description: Task description
                    type: string
                  documentclass:
                    description: Document class, for further classification within
                      the given inbox category bucket
                    type: string
                  documentsubclass:
                    description: Document subclass, for further classification within
                      the document class.
                    type: string
                  inboxcategory:
                    description: Category for this task
                    type: string
                  patientid:
                    description: The ID of the patient that this task is for. Please
                      note that not all tasks will have associated patients.
                    type: integer
                  priority:
                    description: Task priority
                    type: string
                  resultcategory:
                    description: The uppercase result category (e.g. "NORMAL", "ABNORMAL"
                      , "UNKNOWN", etc.)
                    type: string
                  status:
                    description: Status that the task is currently in
                    type: string
                  subtype:
                    description: Subtype of this Task
                    type: string
                  subtypeid:
                    description: AthenaNet ID of the Subtype - i.e. if this is an
                      encounter, then encounter ID
                    type: string
                  taskid:
                    description: AthenaNet ID for the given task
                    type: integer
                type: object
          description: Success
      operationId: getPracticeidStaffStaffusernameInbox
      x-scopes: []
      tags:
      - Forms and Documents
      - Provider Inbox
  /v1/{practiceid}/configuration/inbox/staff:
    get:
      summary: Get list of users whom tasks can be assigned for given department
      description: Retrieves a list of users in a department who can be assigned the
        inbox tasks
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: query
        name: departmentid
        schema:
          type: integer
        required: false
        description: The athenaNet department id.
      - in: query
        name: limit
        schema:
          type: integer
        required: false
        description: Number of entries to return (default 1000, max 10000)Please note
          that this endpoint has a different default and max than normal.
      - in: query
        name: offset
        schema:
          type: integer
        required: false
        description: Starting point of entries; 0-indexed
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  staffname:
                    description: Name of the user/bucket
                    type: string
                type: object
          description: Success
      operationId: getPracticeidConfigurationInboxStaff
      x-scopes: []
      tags:
      - Forms and Documents
      - Provider Inbox
metadata: []
security:
- api_auth_preview:
  - athena/service/Athenanet.MDP.*
  api_auth:
