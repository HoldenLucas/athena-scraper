openapi: 3.0.0
info:
  description: Welcome to the API developer portal which gives third parties access
    to our APIs and sandbox to develop integrated solutions that will enhance the
    value and functionality offered by athenaOne®.
  title: athena API collection
  version: '0.1'
components:
  securitySchemes:
    api_auth_preview:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://api.preview.platform.athenahealth.com/oauth2/v1/token
          scopes:
            athena/service/Athenanet.MDP.*: API Preview
    api_auth:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://api.platform.athenahealth.com/oauth2/v1/token
          scopes:
            athena/service/Athenanet.MDP.*: API Production
    bearer_auth:
      type: http
      scheme: bearer
servers:
- url: https://api.preview.platform.athenahealth.com
  description: Preview
- url: https://api.platform.athenahealth.com
  description: Production
paths:
  /v1/{practiceid}/providers/{providerid}/inbox:
    get:
      summary: Get list of tasks assigned to given provider
      description: Retrieves a list of tasks assigned to a given provider
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: providerid
        schema:
          type: integer
        required: true
        description: providerid
      - in: query
        name: departmentid
        schema:
          type: integer
        required: false
        description: The athenaNet department ID for the patient associated tasks.
          If department ID is passed in then patient ID is also required.
      - in: query
        name: patientid
        schema:
          type: integer
        required: false
        description: An athenaNet patient ID. If specified will only retrieve tasks
          associated with this patient ID. If patient ID is passed in then department
          ID is also required.
      - in: query
        name: sortorder
        schema:
          enum:
          - ASC
          - DESC
          type: string
          x-enumDescriptions:
          - 'ASC: Ascending'
          - 'DESC: Descending'
        required: false
        description: Order in which the result will be sorted according to created
          date
      - in: query
        name: status
        schema:
          type: string
        required: false
        description: Status to filter, all others will be excluded
      - in: query
        name: priority
        schema:
          enum:
          - NORMAL
          - URGENT
          - CURRENT
          type: string
          x-enumDescriptions:
          - NORMAL
          - URGENT
          - CURRENT
        required: false
        description: Priority to filter, all others will be excluded
      - in: query
        name: subtype
        schema:
          enum:
          - Encounter
          - Document
          type: string
          x-enumDescriptions:
          - Encounter
          - Document
        required: false
        description: The document class to filter, all others will be excluded
      - in: query
        name: inboxcategory
        schema:
          enum:
          - ADMIN
          - APPOINTMENTREQUEST
          - CLINICALDOCUMENT
          - CLINICALENCOUNTERVISIT
          - CLINICALRESULT
          - COORDINATORTASK
          - FOLLOWUP
          - ORDER
          - PATIENTCASE
          - UNKNOWN
          type: string
          x-enumDescriptions:
          - 'ADMIN: Admin Tasks / Phone Messages'
          - 'APPOINTMENTREQUEST: Appointment Requests'
          - 'CLINICALDOCUMENT: Clinical Documents'
          - 'CLINICALENCOUNTERVISIT: Encounters'
          - 'CLINICALRESULT: Lab Results / Lab Images / Lab Interpretations'
          - 'COORDINATORTASK: Coordinator Tasks'
          - 'FOLLOWUP: Tasks That Need Follow Up'
          - 'ORDER: Orders / RXs / Auths'
          - 'PATIENTCASE: Patient Cases'
          - 'UNKNOWN: Unknown Documents'
        required: false
        description: The inbox category/bucket to filter, all others will be excluded.
      - in: query
        name: limit
        schema:
          type: integer
        required: false
        description: Number of entries to return (default 1000, max 10000)Please note
          that this endpoint has a different default and max than normal.
      - in: query
        name: offset
        schema:
          type: integer
        required: false
        description: Starting point of entries; 0-indexed
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  createddate:
                    description: Date when this task was created
                    type: string
                  departmentid:
                    description: The department ID associated with this task, typically
                      just the department from the encounter or department.
                    type: integer
                  description:
                    description: Task description
                    type: string
                  documentclass:
                    description: Document class, for further classification within
                      the given inbox category bucket
                    type: string
                  documentsubclass:
                    description: Document subclass, for further classification within
                      the document class.
                    type: string
                  inboxcategory:
                    description: Category for this task
                    type: string
                  patientid:
                    description: The ID of the patient that this task is for. Please
                      note that not all tasks will have associated patients.
                    type: integer
                  priority:
                    description: Task priority
                    type: string
                  resultcategory:
                    description: The uppercase result category (e.g. "NORMAL", "ABNORMAL"
                      , "UNKNOWN", etc.)
                    type: string
                  status:
                    description: Status that the task is currently in
                    type: string
                  subtype:
                    description: Subtype of this Task
                    type: string
                  subtypeid:
                    description: AthenaNet ID of the Subtype - i.e. if this is an
                      encounter, then encounter ID
                    type: string
                  taskid:
                    description: AthenaNet ID for the given task
                    type: integer
                type: object
          description: Success
      operationId: getPracticeidProvidersProvideridInbox
      x-scopes: []
      tags:
      - Forms and Documents
      - Provider Inbox
  /v1/{practiceid}/providers/{providerid}/inbox/counts:
    get:
      summary: Get count of tasks assigned to given provider
      description: Retrieves the count of tasks along with the inbox categories assigned
        to the provider
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: providerid
        schema:
          type: integer
        required: true
        description: providerid
      - in: query
        name: departmentid
        schema:
          type: integer
        required: false
        description: The athenaNet department ID for the patient associated tasks.
          If department ID is passed in then patient ID is also required.
      - in: query
        name: patientid
        schema:
          type: integer
        required: false
        description: An athenaNet patient ID. If specified will only retrieve tasks
          associated with this patient ID. If patient ID is passed in then department
          ID is also required.
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  abnormalcount:
                    description: The number of abnormal tasks (generally results).
                    type: string
                  count:
                    description: The total number of tasks
                    type: string
                  criticalcount:
                    description: The number of tasks that are critical.
                    type: string
                  inboxcategory:
                    description: The category of tasks for this entry.
                    type: string
                  patientid:
                    description: The patient ID this document is tied to.
                    type: string
                type: object
          description: Success
      operationId: getPracticeidProvidersProvideridInboxCounts
      x-scopes: []
      tags:
      - Forms and Documents
      - Provider Inbox
