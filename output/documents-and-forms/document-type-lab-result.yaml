openapi: 3.0.0
info:
  description: Welcome to the API developer portal which gives third parties access
    to our APIs and sandbox to develop integrated solutions that will enhance the
    value and functionality offered by athenaOne®.
  title: athena API collection
  version: '0.1'
components:
  securitySchemes:
    api_auth_preview:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://api.preview.platform.athenahealth.com/oauth2/v1/token
          scopes:
            athena/service/Athenanet.MDP.*: API Preview
    api_auth:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://api.platform.athenahealth.com/oauth2/v1/token
          scopes:
            athena/service/Athenanet.MDP.*: API Production
    bearer_auth:
      type: http
      scheme: bearer
servers:
- url: https://api.preview.platform.athenahealth.com
  description: Preview
- url: https://api.platform.athenahealth.com
  description: Production
paths:
  /v1/{practiceid}/documents/labresult/{labresultid}/actions:
    get:
      summary: Get lab result document's action note
      description: Retrieves action note information of a specific lab document
      parameters:
      - in: path
        name: labresultid
        schema:
          type: integer
        required: true
        description: labresultid
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: query
        name: limit
        schema:
          type: integer
        required: false
        description: Number of entries to return (default 1500, max 5000)
      - in: query
        name: offset
        schema:
          type: integer
        required: false
        description: Starting point of entries; 0-indexed
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  actionnote:
                    description: The action notes that are attached to the document.
                    type: string
                  assignedto:
                    description: This field will describe who was assigned this document
                      during this document action.
                    type: string
                  createdby:
                    description: The username of the person that created this document
                      action.
                    type: string
                  createddatetime:
                    description: The datetime this action note was created.
                    type: string
                  patientid:
                    description: The patient ID this document is tied to.
                    type: integer
                  priority:
                    description: Priority given for this document action.
                    type: integer
                  status:
                    description: Status given for this document action.
                    type: string
                type: object
          description: Success
      operationId: getPracticeidDocumentsLabresultLabresultidActions
      x-scopes: []
      tags:
      - Forms and Documents
      - Update Document Actions
    post:
      summary: Add lab result document action note
      description: Creates an action note for a specific Lab Result document
      parameters:
      - in: path
        name: labresultid
        schema:
          type: integer
        required: true
        description: labresultid
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: header
        name: Content-Type
        schema:
          type: string
        required: true
        description: Content type of the payload
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errormessage:
                    description: If there was an error with this call and SUCCESS
                      is set to false, this field may provide additional information.
                    type: string
                  newdocumentid:
                    description: The document ID of newly created document as a result
                      of action of Deny-New Prescription To Follow (DNTF).
                    type: string
                  success:
                    description: Returns true if the update was a success.
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                  versiontoken:
                    description: A token representing the current state of this document.
                      Will only be set if VERSIONTOKEN was originally sent to the
                      endpoint.
                    type: string
                type: object
          description: Success
      operationId: postPracticeidDocumentsLabresultLabresultidActions
      x-scopes: []
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
              - actionnote
              properties:
                actionnote:
                  type: string
                  description: The new action note to add to the document.
        required: true
      tags:
      - Forms and Documents
      - Update Document Actions
  /v1/{practiceid}/patients/{patientid}/documents/interpretation:
    get:
      summary: Get patient's interpretation document
      description: Retrieves an interpretation document record of a specific patient
      parameters:
      - description: practiceid
        in: path
        name: practiceid
        required: true
        schema:
          type: integer
      - description: patientid
        in: path
        name: patientid
        required: true
        schema:
          type: integer
      - description: The status of the task to filter document results.
        in: query
        name: status
        required: false
        schema:
          enum:
          - ADMINISTER
          - CLOSED
          - DATAENTRY
          - DELETED
          - DISPENSE
          - FOLLOWUP
          - HOLD
          - NOTIFY
          - PEND
          - PENDING
          - PENDINGLABEL
          - PERFORM
          - REVIEW
          - SCHEDULE
          - SCHEDULED
          - SUBMIT
          - SUBMITTED
          type: string
          x-enumDescriptions:
          - ADMINISTER
          - CLOSED
          - DATAENTRY
          - DELETED
          - DISPENSE
          - FOLLOWUP
          - HOLD
          - NOTIFY
          - PEND
          - PENDING
          - PENDINGLABEL
          - PERFORM
          - REVIEW
          - SCHEDULE
          - SCHEDULED
          - SUBMIT
          - SUBMITTED
      - description: The athenaNet department id.
        in: query
        name: departmentid
        required: true
        schema:
          type: integer
      - description: The document subclass to filter document results.
        in: query
        name: documentsubclass
        required: false
        schema:
          type: string
      - description: By default, deleted documents are not listed.  Set to list these.
        in: query
        name: showdeleted
        required: false
        schema:
          type: boolean
      - description: Show only documents attached to this encounter.
        in: query
        name: encounterid
        required: false
        schema:
          type: integer
      - description: Number of entries to return (default 1500, max 5000)
        in: query
        name: limit
        required: false
        schema:
          type: integer
      - description: Starting point of entries; 0-indexed
        in: query
        name: offset
        required: false
        schema:
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    description: Status of the document
                  subject:
                    type: string
                    description: Subject of the document
                  priority:
                    type: string
                    description: Document priority, when available. 1 is high, 2 is
                      normal. Some labs use other numbers or characters that are lab-specific.
                  patientid:
                    type: integer
                    description: The athenaNet patient ID.
                  assignedto:
                    type: string
                    description: Person the document is assigned to
                  providerid:
                    type: integer
                    description: Provider ID for this document
                  createddate:
                    type: string
                    description: Date the document was created. Please use createddatetime
                      instead.
                  encounterid:
                    type: string
                    description: Encounter ID
                  departmentid:
                    type: string
                    description: Department for the document
                  documenttype:
                    type: string
                    description: The description for this document
                  externalnote:
                    type: string
                    description: External note for the patient.
                  internalnote:
                    type: string
                    description: The 'Internal Note' attached to this document
                  receivernote:
                    type: string
                    description: The external note sent to the receiving facility
                  tietoorderid:
                    type: integer
                    description: Order ID of the order this document is tied to, if
                      any
                  appointmentid:
                    type: integer
                    description: The appointment ID for this document
                  documentclass:
                    type: string
                    description: Class of document
                  documentroute:
                    type: string
                    description: Explains method by which the document was entered
                      into the AthenaNet (INTERFACE (digital), FAX, etc.)
                  documentsource:
                    enum:
                    - ''
                    - PATIENT
                    - CAREGIVER
                    - PARTNER
                    - PHARMACY
                    - LAB
                    - PCP
                    - SPECIALIST
                    - STAFF
                    - HOSPITAL
                    - OTHER
                    - PORTAL
                    - Live Operator
                    type: string
                    description: Explains where this document originated.
                  documenttypeid:
                    type: integer
                    description: The ID of the description for this document
                  createddatetime:
                    type: string
                    description: Date/Time (ISO 8601) the document was created
                  deleteddatetime:
                    type: string
                    description: Date/time (ISO 8601) the document was deleted
                  documentsubclass:
                    type: string
                    description: Specific type of document
                  interpretationid:
                    type: number
                    description: The primary key for interpretation class of documents.
                  lastmodifieduser:
                    type: string
                    description: The user who last modified this document.
                  clinicalproviderid:
                    type: integer
                    description: The ID of the clinical provider associated with this
                      clinical document. Clinical providers are a master list of providers
                      throughout the country.  These include providers as well as
                      radiology centers, labs and pharmacies.
                  documentdescription:
                    type: string
                    description: Description of the document type
                  externalaccessionid:
                    type: string
                    description: The external accession ID for this document. Format
                      depends on the system the ID belongs to.
                  internalaccessionid:
                    type: string
                    description: The internal accession ID for this document. Format
                      depends on the system the ID belongs to.
                  observationdatetime:
                    type: string
                    description: Date/time (ISO 8601) the observation was taken
                  lastmodifieddatetime:
                    type: string
                    description: Date/time (ISO 8601) the document was last modified
          description: Success
      operationId: getPracticeidPatientsPatientidDocumentsInterpretation
      x-scopes: []
      tags:
      - Forms and Documents
      - Document List By Class
  /v1/{practiceid}/patients/{patientid}/documents/labresult:
    get:
      summary: Get list of patient's lab result documents
      description: Retrieves a list of lab result document information of a specific
        patient
      parameters:
      - description: practiceid
        in: path
        name: practiceid
        required: true
        schema:
          type: integer
      - description: patientid
        in: path
        name: patientid
        required: true
        schema:
          type: integer
      - description: The athenaNet department id.
        in: query
        name: departmentid
        required: true
        schema:
          type: integer
      - description: When "true" is passed we will return filetype, filesize and originalfilename
          if applicable
        in: query
        name: showmetadata
        required: false
        schema:
          type: boolean
      - description: If true, interpretation template added to the document is also
          returned.
        in: query
        name: showtemplate
        required: false
        schema:
          type: boolean
      - description: Show only documents attached to this encounter.
        in: query
        name: encounterid
        required: false
        schema:
          type: integer
      - description: If true, codified data consisting of ordercodes are returned.
        in: query
        name: showresultcodifieddata
        required: false
        schema:
          type: boolean
      - description: If true, clinicalresultid is returned.
        in: query
        name: showclinicalresultid
        required: false
        schema:
          type: boolean
      - description: The status of the task to filter document results.
        in: query
        name: status
        required: false
        schema:
          enum:
          - ADMINISTER
          - CLOSED
          - DATAENTRY
          - DELETED
          - DISPENSE
          - FOLLOWUP
          - HOLD
          - NOTIFY
          - PEND
          - PENDING
          - PENDINGLABEL
          - PERFORM
          - REVIEW
          - SCHEDULE
          - SCHEDULED
          - SUBMIT
          - SUBMITTED
          type: string
          x-enumDescriptions:
          - ADMINISTER
          - CLOSED
          - DATAENTRY
          - DELETED
          - DISPENSE
          - FOLLOWUP
          - HOLD
          - NOTIFY
          - PEND
          - PENDING
          - PENDINGLABEL
          - PERFORM
          - REVIEW
          - SCHEDULE
          - SCHEDULED
          - SUBMIT
          - SUBMITTED
      - description: If true, only documents published to the portal at the time of
          this call are returned.
        in: query
        name: showportalonly
        required: false
        schema:
          type: boolean
      - description: The document subclass to filter document results.
        in: query
        name: documentsubclass
        required: false
        schema:
          type: string
      - description: By default, deleted documents are not listed.  Set to list these.
        in: query
        name: showdeleted
        required: false
        schema:
          type: boolean
      - description: If true, entityid and entitytype will be returned. entityid will
          be populated in createduser attribute.
        in: query
        name: getentityinfo
        required: false
        schema:
          type: boolean
      - description: Number of entries to return (default 1500, max 5000)
        in: query
        name: limit
        required: false
        schema:
          type: integer
      - description: Starting point of entries; 0-indexed
        in: query
        name: offset
        required: false
        schema:
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  appointmentid:
                    description: The appointment ID for this document
                    type: integer
                  assignedto:
                    description: Person the document is assigned to
                    type: string
                  clinicalresultid:
                    description: The clinical result ID associated with this lab result.
                      Only returned when showclinicalresultid parameter is true.
                    type: number
                  createddate:
                    description: Date the document was created. Please use createddatetime
                      instead.
                    type: string
                  createddatetime:
                    description: Date/Time (ISO 8601) the document was created
                    type: string
                  createduser:
                    description: The user who created this document.
                    type: string
                  deleteddatetime:
                    description: Date/time (ISO 8601) the document was deleted
                    type: string
                  departmentid:
                    description: Department for the document
                    type: string
                  description:
                    description: Description of the document type
                    type: string
                  documentclass:
                    description: Class of document
                    type: string
                  documentroute:
                    description: Explains method by which the document was entered
                      into the AthenaNet (INTERFACE (digital), FAX, etc.)
                    type: string
                  documentsource:
                    description: Explains where this document originated.
                    enum:
                    - ''
                    - PATIENT
                    - CAREGIVER
                    - PARTNER
                    - PHARMACY
                    - LAB
                    - PCP
                    - SPECIALIST
                    - STAFF
                    - HOSPITAL
                    - OTHER
                    - PORTAL
                    - Live Operator
                    type: string
                  documentsubclass:
                    description: Specific type of document
                    type: string
                  documenttypeid:
                    description: The ID of the description for this document
                    type: integer
                  encounterdate:
                    description: Date of the encounter associated with this document
                    type: string
                  encounterid:
                    description: Encounter ID
                    type: string
                  entitytype:
                    description: Type of entity creating the document. Possible values
                      are PROVIDER, PATIENT and OTHERS.
                    type: string
                  externalaccessionid:
                    description: The external accession ID for this document. Format
                      depends on the system the ID belongs to.
                    type: string
                  externalnoteonly:
                    description: External note for the patient.
                    type: string
                  facilityid:
                    description: The ID of the clinical provider associated with this
                      clinical document. Clinical providers are a master list of providers
                      throughout the country.  These include providers as well as
                      radiology centers, labs and pharmacies.
                    type: integer
                  fileextension:
                    description: The file extension of this document.
                    type: string
                  filesize:
                    description: The file size of this document.
                    type: number
                  internalaccessionid:
                    description: The internal accession ID for this document. Format
                      depends on the system the ID belongs to.
                    type: string
                  internalnote:
                    description: The 'Internal Note' attached to this document
                    type: string
                  interpretation:
                    description: The practice entered interpretation of this result.
                    type: string
                  interpretationtemplate:
                    description: The interpretation template added to the imaging
                      result.
                    properties:
                      interpretationtemplatename:
                        description: The name of the interpretation template.
                        type: string
                      interpretationtemplatenote:
                        description: The interpretation note.
                        type: string
                      paragraphs:
                        description: The paragraphs in the template.
                        items:
                          properties:
                            paragraphname:
                              description: The name of the interpretation paragraph.
                              type: string
                            sentences:
                              description: The sentences in the paragraph.
                              items:
                                properties:
                                  findings:
                                    description: The findings in the sentence
                                    items:
                                      properties:
                                        findingname:
                                          description: The name of the finding.
                                          type: string
                                        findingnote:
                                          description: The note for the finding selected.
                                          type: string
                                        findingtype:
                                          description: Describes the finding - either
                                            NORMAL, ABNORMAL, or NEUTRAL.
                                          type: string
                                        freetext:
                                          description: Freetext that could be associated
                                            with this finding.
                                          type: string
                                        selectedoptions:
                                          description: The option in the finding that
                                            was selected by the user.
                                          items:
                                            type: string
                                          type: array
                                      type: object
                                    type: array
                                  sentencename:
                                    description: The name of the sentence in the paragraph.
                                    type: string
                                  sentencenote:
                                    description: The note that goes along with this
                                      sentence.
                                    type: string
                                type: object
                              type: array
                          type: object
                        type: array
                    type: object
                  isconfidential:
                    description: If true, this result document should not be shown
                      to the patient.
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                  isreviewedbyprovider:
                    description: Whether the lab result has been reviewed by a provider
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                  labresultid:
                    description: The primary key for labresult class of documents
                    type: integer
                  labresultloinc:
                    description: Laboratory code that identifies the overall result.
                    type: string
                  lastmodifieddate:
                    description: Date/time (ISO 8601) the document was last modified
                    type: string
                  lastmodifieddatetime:
                    description: Date/time (ISO 8601) the document was last modified
                    type: string
                  lastmodifieduser:
                    description: The user who last modified this document.
                    type: string
                  notefromlab:
                    description: A note from lab.
                    type: string
                  observationdate:
                    description: Date/time the observation was taken
                    type: string
                  observationdatetime:
                    description: Date/time (ISO 8601) the observation was taken
                    type: string
                  ordertype:
                    description: Order type group name
                    type: string
                  originalfilename:
                    description: The original file name of this document.
                    type: string
                  patientid:
                    description: The athenaNet patient ID.
                    type: integer
                  patientnote:
                    description: External note for the patient.
                    type: string
                  performinglabaddress1:
                    description: This is the address1 field of the performing lab.
                      For point-of-care tests this is the department. Otherwise, it
                      is the clinical provider
                    type: string
                  performinglabaddress2:
                    description: This is the address2 field of the performing lab.
                      For point-of-care tests this is the department. Otherwise, it
                      is the clinical provider
                    type: string
                  performinglabcity:
                    description: This is the city of the performing lab. For point-of-care
                      tests this is the department. Otherwise, it is the clinical
                      provider
                    type: string
                  performinglabname:
                    description: This is the name of the performing lab. For point-of-care
                      tests this is the department. Otherwise, it is the clinical
                      provider
                    type: string
                  performinglabstate:
                    description: This is the state of the performing lab. For point-of-care
                      tests this is the department. Otherwise, it is the clinical
                      provider
                    type: string
                  performinglabzip:
                    description: This is the zip code of the performing lab. For point-of-care
                      tests this is the department. Otherwise, it is the clinical
                      provider
                    type: string
                  portalpublisheddatetime:
                    description: The date the document was published to the portal
                      in format (yyyy-mm-ddThh:mm:ss).
                    type: string
                  priority:
                    description: Document priority, when available. 1 is high, 2 is
                      normal. Some labs use other numbers or characters that are lab-specific.
                    type: string
                  providerid:
                    description: Provider ID for this document
                    type: integer
                  receivedfacilityordercode:
                    description: The code as received from the facility via HL7 in
                      OBR.4.
                    properties:
                      code:
                        description: The code received in OBR.4.1.
                        type: string
                      description:
                        description: The description of the code received in OBR.4.2.
                        type: string
                    type: object
                  reportstatus:
                    description: The status of the report.
                    enum:
                    - ''
                    - final
                    - partial
                    - pending
                    - preliminary
                    - complete
                    - incomplete
                    - Final
                    - Partial
                    - Pending
                    - Preliminary
                    - Complete
                    - Incomplete
                    type: string
                  resultcodifieddata:
                    properties:
                      order:
                        properties:
                          code:
                            description: Order identifier for the result codified
                              data.
                            type: string
                          display:
                            description: Order text for the result codified data.
                            type: string
                          system:
                            description: Order coding system for the result codified
                              data.
                            type: string
                        type: object
                      orderloinc:
                        description: Laboratory code that identifies the result codified
                          data.
                        type: string
                    type: object
                  resultnotes:
                    description: Result note on a document.
                    type: string
                  resultnotes2:
                    description: Secondary result note.
                    type: string
                  resultstatus:
                    description: The status of the result.
                    enum:
                    - ''
                    - Final
                    - Partial
                    - Pending
                    - Preliminary
                    - Corrected
                    - Cancelled
                    type: string
                  status:
                    description: Status of the document
                    type: string
                  subject:
                    description: Subject of the document
                    type: string
                  tietoorderid:
                    description: Order ID of the order this document is tied to, if
                      any
                    type: integer
                type: object
          description: Success
      operationId: getPracticeidPatientsPatientidDocumentsLabresult
      x-scopes: []
      tags:
      - Forms and Documents
      - Document List By Class
    post:
      summary: Add lab result document to patient's chart
      description: Creates a lab result document record of a specific patient
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: patientid
        schema:
          type: integer
        required: true
        description: patientid
      - in: header
        name: Content-Type
        schema:
          type: string
        required: true
        description: Content type of the payload
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                    description: Returns true/false if the operation was successful.
                  labresultid:
                    type: integer
                    description: The document ID of the new or modified document.
                  errormessage:
                    type: string
                    description: If the operation failed, this will contain an error
                      message.
          description: Success
      operationId: postPracticeidPatientsPatientidDocumentsLabresult
      x-scopes: []
      requestBody:
        content:
          multipart/form-data:
            schema:
              properties:
                accessionid:
                  description: A unique identifier given to a document to track it
                    over time.
                  type: string
                analytes:
                  description: This is an array of hashes in JSON. Each entry contains
                    information for a single analyte. See <a href="https://developer.athenahealth.com/docs/read/workflows/documents/Lab_Analytes">https://developer.athenahealth.com/docs/read/workflows/documents/Lab_Analytes</a>
                    for an example.
                  items:
                    properties:
                      abnormalflag:
                        description: The level of normality for this result.
                        enum:
                        - ''
                        - NORMAL
                        - ABNORMAL
                        - LOW
                        - HIGH
                        - CRITICAL ABNORMAL
                        - CRITICAL LOW
                        - CRITICAL HIGH
                        - SIGNIFICANT CHANGE UP
                        - SIGNIFICANT CHANGE DOWN
                        - BETTER
                        - WORSE
                        - OFF-SCALE LOW
                        - OFF-SCALE HIGH
                        - SUSCEPTIBLE
                        - RESISTANT
                        - INTERMEDIATE
                        - MODERATELY SUSCEPTIBLE
                        - VERY SUSCEPTIBLE
                        - POSITIVE
                        - NEGATIVE
                        - DELTA
                        - DELTA LOW
                        - DELTA HIGH
                        type: string
                      analytename:
                        description: The name / identifier text for this analyte.
                        type: string
                      loinc:
                        description: The LOINC code for this analyte
                        type: string
                      note:
                        description: Any additional notes about this analyte.
                        type: string
                      observationidentifier:
                        properties:
                          coding:
                            description: Observation identifier coding
                            items:
                              properties:
                                code:
                                  description: Observation identifier
                                  type: string
                                display:
                                  description: Observation text
                                  type: string
                                system:
                                  description: Observation coding system
                                  type: string
                              type: object
                            type: array
                        type: object
                      observationvalueidentifier:
                        properties:
                          coding:
                            description: Observation value coding
                            items:
                              properties:
                                code:
                                  description: Observation value identifier
                                  type: string
                                display:
                                  description: Observation value text
                                  type: string
                                system:
                                  description: Observation value coding system
                                  type: string
                              type: object
                            type: array
                        type: object
                      referencerange:
                        description: The normal range for this lab analyte.
                        type: string
                      resultstatus:
                        description: Whether this observation is a prelimary, corrected,
                          final, etc result.
                        enum:
                        - ''
                        - Final
                        - Corrected
                        - Pending
                        - Preliminary
                        - Unverified
                        - Deleted
                        - Unsolicited
                        type: string
                      units:
                        description: The units the value is in.
                        type: string
                      value:
