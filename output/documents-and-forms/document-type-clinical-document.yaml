openapi: 3.0.0
info:
  description: Welcome to the API developer portal which gives third parties access
    to our APIs and sandbox to develop integrated solutions that will enhance the
    value and functionality offered by athenaOne®.
  title: athena API collection
  version: '0.1'
components:
  securitySchemes:
    api_auth_preview:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://api.preview.platform.athenahealth.com/oauth2/v1/token
          scopes:
            athena/service/Athenanet.MDP.*: API Preview
    api_auth:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://api.platform.athenahealth.com/oauth2/v1/token
          scopes:
            athena/service/Athenanet.MDP.*: API Production
    bearer_auth:
      type: http
      scheme: bearer
servers:
- url: https://api.preview.platform.athenahealth.com
  description: Preview
- url: https://api.platform.athenahealth.com
  description: Production
paths:
  /v1/{practiceid}/documents/clinicaldocument/{clinicaldocumentid}/actions:
    post:
      summary: Add clinical document action note
      description: Creates an action note for a specific clinical document
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: clinicaldocumentid
        schema:
          type: integer
        required: true
        description: clinicaldocumentid
      - in: header
        name: Content-Type
        schema:
          type: string
        required: true
        description: Content type of the payload
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errormessage:
                    description: If there was an error with this call and SUCCESS
                      is set to false, this field may provide additional information.
                    type: string
                  newdocumentid:
                    description: The document ID of newly created document as a result
                      of action of Deny-New Prescription To Follow (DNTF).
                    type: string
                  success:
                    description: Returns true if the update was a success.
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                  versiontoken:
                    description: A token representing the current state of this document.
                      Will only be set if VERSIONTOKEN was originally sent to the
                      endpoint.
                    type: string
                type: object
          description: Success
      operationId: postPracticeidDocumentsClinicaldocumentClinicaldocumentidActions
      x-scopes: []
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
              - actionnote
              properties:
                actionnote:
                  type: string
                  description: The new action note to add to the document.
        required: true
      tags:
      - Forms and Documents
      - Update Document Actions
    get:
      summary: Get clinical document's action note
      description: Retrieves action note information of a specific clinical document
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: clinicaldocumentid
        schema:
          type: integer
        required: true
        description: clinicaldocumentid
      - in: query
        name: limit
        schema:
          type: integer
        required: false
        description: Number of entries to return (default 1500, max 5000)
      - in: query
        name: offset
        schema:
          type: integer
        required: false
        description: Starting point of entries; 0-indexed
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    description: Status given for this document action.
                  priority:
                    type: integer
                    description: Priority given for this document action.
                  createdby:
                    type: string
                    description: The username of the person that created this document
                      action.
                  patientid:
                    type: integer
                    description: The patient ID this document is tied to.
                  actionnote:
                    type: string
                    description: The action notes that are attached to the document.
                  assignedto:
                    type: string
                    description: This field will describe who was assigned this document
                      during this document action.
                  createddatetime:
                    type: string
                    description: The datetime this action note was created.
          description: Success
      operationId: getPracticeidDocumentsClinicaldocumentClinicaldocumentidActions
      x-scopes: []
      tags:
      - Forms and Documents
      - Update Document Actions
  /v1/{practiceid}/patients/{patientid}/documents/clinicaldocument:
    post:
      summary: Add clinical document to patient's chart
      description: Creates a clinical document record of a specific patient
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: patientid
        schema:
          type: integer
        required: true
        description: patientid
      - in: header
        name: Content-Type
        schema:
          type: string
        required: true
        description: Content type of the payload
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                    description: Returns true/false if the operation was successful.
                  errormessage:
                    type: string
                    description: If the operation failed, this will contain an error
                      message.
                  clinicaldocumentid:
                    type: integer
                    description: The document ID of the new or modified document.
          description: Success
      operationId: postPracticeidPatientsPatientidDocumentsClinicaldocument
      x-scopes: []
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              required:
              - departmentid
              - documentsubclass
              properties:
                entityid:
                  type: string
                  description: Identifier of entity creating the document. entitytype
                    is required while passing entityid.
                priority:
                  enum:
                  - ''
                  - 1
                  - 2
                  type: string
                  description: Priority of this result.  1 is high; 2 is normal.
                autoclose:
                  type: boolean
                  description: Documents will, normally, automatically appear in the
                    clinical inbox for providers to review. In some cases, you might
                    want to force the document to skip the clinical inbox, and go
                    directly to the patient chart with a "closed" status. For that
                    case, set this to true.
                entitytype:
                  enum:
                  - ''
                  - PROVIDER
                  - PATIENT
                  - OTHERS
                  type: string
                  description: Type of entity creating the document. entityid is required
                    while passing entitytype.
                providerid:
                  type: integer
                  description: The ID of the ordering provider.
                departmentid:
                  type: integer
                  description: The athenaNet department ID associated with the uploaded
                    document.
                documentdata:
                  type: string
                  description: Text data stored with document
                internalnote:
                  type: string
                  description: An internal note for the provider or staff. Updating
                    this will append to any previous notes and has a limit of 4000
                    characters.
                attachmenttype:
                  enum:
                  - ''
                  - BMP
                  - GIF
                  - JPG
                  - JPEG
                  - PDF
                  - PNG
                  - TIF
                  - TIFF
                  type: string
                  default: PDF
                  description: The file type of attachment.
                documenttypeid:
                  type: integer
                  description: A specific document type identifier.
                observationdate:
                  type: string
                  description: The date an observation was made (mm/dd/yyyy).
                observationtime:
                  type: string
                  description: The time an observation was made (hh24:mi).  24 hour
                    time.
                documentsubclass:
                  enum:
                  - CLINICALDOCUMENT
                  - ADMISSIONDISCHARGE
                  - CONSULTNOTE
                  - MENTALHEALTH
                  - OPERATIVENOTE
                  - URGENTCARE
                  type: string
                  description: Subclasses for CLINICALDOCUMENT documents
                originalfilename:
                  type: string
                  description: The original file name of this document without the
                    file extension. Filename should not exceed 200 characters.
                attachmentcontents:
                  type: string
                  description: "The file contents that will be attached to this document.\
                    \ File must be Base64 encoded. \n\t\tPlease note encrypted PDFs\
                    \ are not supported with document upload APIs."
                clinicalproviderid:
                  type: integer
                  description: The ID of the external provider/lab/pharmacy associated
                    the document.
        required: true
      tags:
      - Forms and Documents
      - Document List By Class
    get:
      summary: Get list of patient's clinical documents
      description: Retrieves a list of clinical document information of a specific
        patient
      parameters:
      - description: practiceid
        in: path
        name: practiceid
        required: true
        schema:
          type: integer
      - description: patientid
        in: path
        name: patientid
        required: true
        schema:
          type: integer
      - description: The athenaNet department id.
        in: query
        name: departmentid
        required: true
        schema:
          type: integer
      - description: When "true" is passed we will return filetype, filesize and originalfilename
          if applicable
        in: query
        name: showmetadata
        required: false
        schema:
          type: boolean
      - description: Show only documents attached to this encounter.
        in: query
        name: encounterid
        required: false
        schema:
          type: integer
      - description: The status of the task to filter document results.
        in: query
        name: status
        required: false
        schema:
          enum:
          - ADMINISTER
          - CLOSED
          - DATAENTRY
          - DELETED
          - DISPENSE
          - FOLLOWUP
          - HOLD
          - NOTIFY
          - PEND
          - PENDING
          - PENDINGLABEL
          - PERFORM
          - REVIEW
          - SCHEDULE
          - SCHEDULED
          - SUBMIT
          - SUBMITTED
          type: string
          x-enumDescriptions:
          - ADMINISTER
          - CLOSED
          - DATAENTRY
          - DELETED
          - DISPENSE
          - FOLLOWUP
          - HOLD
          - NOTIFY
          - PEND
          - PENDING
          - PENDINGLABEL
          - PERFORM
          - REVIEW
          - SCHEDULE
          - SCHEDULED
          - SUBMIT
          - SUBMITTED
      - description: The document subclass to filter document results.
        in: query
        name: documentsubclass
        required: false
        schema:
          type: string
      - description: "Default false. If set to true, will include CPT codes and COTORDER\
          \ codes associated with the clinical document.\n\t\tPlease enable this toggle\
          \ PSCCDA_6876_INCLUDE_CODES_IN_MDP_CLINICALDOC_API for correct results"
        in: query
        name: includecodes
        required: false
        schema:
          type: boolean
      - description: By default, deleted documents are not listed.  Set to list these.
        in: query
        name: showdeleted
        required: false
        schema:
          type: boolean
      - description: If true, entityid and entitytype will be returned. entityid will
          be populated in createduser attribute.
        in: query
        name: getentityinfo
        required: false
        schema:
          type: boolean
      - description: Number of entries to return (default 1500, max 5000)
        in: query
        name: limit
        required: false
        schema:
          type: integer
      - description: Starting point of entries; 0-indexed
        in: query
        name: offset
        required: false
        schema:
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  assignedto:
                    description: Person the document is assigned to
                    type: string
                  clinicaldocumentid:
                    description: The primary key for the clinical document.
                    type: integer
                  clinicalproviderid:
                    description: The ID of the clinical provider associated with this
                      clinical document. Clinical providers are a master list of providers
                      throughout the country.  These include providers as well as
                      radiology centers, labs and pharmacies.
                    type: integer
                  cotordercodes:
                    description: Array of clinical order type codes (SNOMED, LOINC)
                      associated with this clinical document.
                    items:
                      properties:
                        code:
                          description: The code value.
                          type: string
                        codeset:
                          description: The code set (e.g., SNOMED).
                          type: string
                      type: object
                    type: array
                  cptcodes:
                    description: Array of CPT codes associated with this clinical
                      document.
                    items:
                      properties:
                        code:
                          description: The CPT code.
                          type: string
                        codeset:
                          description: The code set (e.g., CPT).
                          type: string
                      type: object
                    type: array
                  createddate:
                    description: Date the document was created. Please use createddatetime
                      instead.
                    type: string
                  createddatetime:
                    description: Date/Time (ISO 8601) the document was created
                    type: string
                  createduser:
                    description: The user who created this document.
                    type: string
                  departmentid:
                    description: Department for the document
                    type: string
                  documentclass:
                    description: Class of document
                    type: string
                  documentdescription:
                    description: Description of the document type
                    type: string
                  documentroute:
                    description: Explains method by which the document was entered
                      into the AthenaNet (INTERFACE (digital), FAX, etc.)
                    type: string
                  documentsource:
                    description: Explains where this document originated.
                    enum:
                    - ''
                    - PATIENT
                    - CAREGIVER
                    - PARTNER
                    - PHARMACY
                    - LAB
                    - PCP
                    - SPECIALIST
                    - STAFF
                    - HOSPITAL
                    - OTHER
                    - PORTAL
                    - Live Operator
                    type: string
                  documentsubclass:
                    description: Specific type of document
                    type: string
                  documenttypeid:
                    description: The ID of the description for this document
                    type: integer
                  entitytype:
                    description: Type of entity creating the document. Possible values
                      are PROVIDER, PATIENT and OTHERS.
                    type: string
                  externalnote:
                    description: External note for the patient.
                    type: string
                  fileextension:
                    description: The file extension of this document.
                    type: string
                  filesize:
                    description: The file size of this document.
                    type: number
                  internalnote:
                    description: The 'Internal Note' attached to this document
                    type: string
                  lastmodifieddate:
                    type: string
                  lastmodifieddatetime:
                    description: Date/time (ISO 8601) the document was last modified
                    type: string
                  lastmodifieduser:
                    description: The user who last modified this document.
                    type: string
                  observationdate:
                    description: Date of the encounter associated with this document
                    type: string
                  ordertype:
                    description: Order type group name
                    type: string
                  originalfilename:
                    description: The original file name of this document.
                    type: string
                  patientid:
                    description: The athenaNet patient ID.
                    type: integer
                  priority:
                    description: Document priority, when available. 1 is high, 2 is
                      normal. Some labs use other numbers or characters that are lab-specific.
                    type: string
                  providerid:
                    description: Provider ID for this document
                    type: integer
                  providerusername:
                    description: The username of the provider associated with this
                      document.
                    type: string
                  status:
                    description: Status of the document
                    type: string
                  tietoorderid:
                    description: Order ID of the order this document is tied to, if
                      any
                    type: integer
                type: object
          description: Success
      operationId: getPracticeidPatientsPatientidDocumentsClinicaldocument
      x-scopes: []
      tags:
      - Forms and Documents
      - Document List By Class
  /v1/{practiceid}/patients/{patientid}/documents/clinicaldocument/{clinicaldocumentid}:
    get:
      summary: Get patient's clinical document
      description: Retrieves a specific clinical document information
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: patientid
        schema:
          type: integer
        required: true
        description: patientid
      - in: path
        name: clinicaldocumentid
        schema:
          type: integer
        required: true
        description: clinicaldocumentid
      - in: query
        name: showccdaxml
        schema:
          type: boolean
        required: false
        description: Default false. If set to true, will include CCDAXML string.
      - in: query
        name: getentityinfo
        schema:
          type: boolean
        required: false
        description: If true, entityid and entitytype will be returned. entityid will
          be populated in createduser attribute.
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  actionnote:
                    description: The most recent action note for a document
                    type: string
                  assignedto:
                    description: Person the document is assigned to
                    type: string
                  clinicaldocumentid:
                    description: The primary key for the clinical document.
                    type: integer
                  clinicalproviderid:
                    description: The ID of the clinical provider associated with this
                      clinical document. Clinical providers are a master list of providers
                      throughout the country.  These include providers as well as
                      radiology centers, labs and pharmacies.
                    type: integer
                  createddate:
                    description: Date the document was created. Please use createddatetime
                      instead.
                    type: string
                  createddatetime:
                    description: Date/Time (ISO 8601) the document was created
                    type: string
                  createduser:
                    description: The user who created this document.
                    type: string
                  departmentid:
                    description: Department for the document
                    type: string
                  documentclass:
                    description: Class of document
                    type: string
                  documentdata:
                    description: Text data associated with this document.
                    type: string
                  documentdescription:
                    description: Description of the document type
                    type: string
                  documentroute:
                    description: Explains method by which the document was entered
                      into the AthenaNet (INTERFACE (digital), FAX, etc.)
                    type: string
                  documentsource:
                    description: Explains where this document originated.
                    enum:
                    - ''
                    - PATIENT
                    - CAREGIVER
                    - PARTNER
                    - PHARMACY
                    - LAB
                    - PCP
                    - SPECIALIST
                    - STAFF
                    - HOSPITAL
                    - OTHER
                    - PORTAL
                    - Live Operator
                    type: string
                  documentsubclass:
                    description: Specific type of document
                    type: string
                  documenttypeid:
                    description: The ID of the description for this document
                    type: integer
                  entitytype:
                    description: Type of entity creating the document. Possible values
                      are PROVIDER, PATIENT and OTHERS.
                    type: string
                  externalnote:
                    description: External note for the patient.
                    type: string
                  internalnote:
                    description: The 'Internal Note' attached to this document
                    type: string
                  lastmodifieddate:
                    type: string
                  lastmodifieddatetime:
                    description: Date/time (ISO 8601) the document was last modified
                    type: string
                  lastmodifieduser:
                    description: The user who last modified this document.
                    type: string
                  observationdate:
                    description: Date of the encounter associated with this document
                    type: string
                  ordertype:
                    description: Order type group name
                    type: string
                  originaldocument:
                    description: URL and content-type to download the original document.
                      "originaldocument" is returned when document source is FAX or
                      UPLOAD and originally faxed or uploaded file is not split into
                      multiple documents. Please use "pages" to download document
                      pages when "originaldocument" is not available.
                    properties:
                      contenttype:
                        description: The content-type of the original document.
                        type: string
                      href:
                        description: The URL to get the original document.
                        type: string
                    type: object
                  pages:
                    description: An array of image pages associated with this document.
                    items:
                      properties:
                        contenttype:
                          description: The content-type that will be returned by the
                            page image call.
                          type: string
                        href:
                          description: The URL to get the document image.
                          type: string
                        pageid:
                          description: The ID to use in a call to get the page image.
                          type: string
                        pageordering:
                          description: Within this list of pages, the ordering (starting
                            with 1).
                          type: string
                      type: object
                    type: array
                  priority:
                    description: Document priority, when available. 1 is high, 2 is
                      normal. Some labs use other numbers or characters that are lab-specific.
                    type: string
                  providerid:
                    description: Provider ID for this document
                    type: integer
                  providerusername:
                    description: The username of the provider associated with this
                      document.
                    type: string
                  status:
                    description: Status of the document
                    type: string
                  tietoorderid:
                    description: Order ID of the order this document is tied to, if
                      any
                    type: integer
                type: object
          description: Success
      operationId: getPracticeidPatientsPatientidDocumentsClinicaldocumentClinicaldocumentid
      x-scopes: []
      tags:
      - Forms and Documents
      - Document Details
    put:
      summary: Update patient's clinical document
      description: Modifies a specific clinical document information
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: patientid
        schema:
          type: integer
        required: true
        description: patientid
      - in: path
        name: clinicaldocumentid
        schema:
          type: integer
        required: true
        description: clinicaldocumentid
      - in: header
        name: Content-Type
        schema:
          type: string
        required: true
        description: Content type of the payload
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  clinicaldocumentid:
                    description: The document ID of the new or modified document.
                    type: integer
                  errormessage:
                    description: If the operation failed, this will contain an error
                      message.
                    type: string
                  success:
                    description: Returns true/false if the operation was successful.
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                type: object
          description: Success
      operationId: putPracticeidPatientsPatientidDocumentsClinicaldocumentClinicaldocumentid
      x-scopes: []
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                priority:
                  enum:
                  - ''
                  - 1
                  - 2
                  type: string
                  description: Priority of this result.  1 is high; 2 is normal.
                assignedto:
                  type: string
                  description: Username to reassign the document to
                providerid:
                  type: integer
                  description: The ID of the ordering provider.
                internalnote:
                  type: string
                  description: An internal note for the provider or staff. Updating
                    this will append to any previous notes if replaceinternalnote
                    is not set.
                documenttypeid:
                  type: integer
                  description: A specific document type identifier.
                observationdate:
                  type: string
                  description: The date an observation was made (mm/dd/yyyy).
                observationtime:
                  type: string
                  description: The time an observation was made (hh24:mi).  24 hour
                    time.
                clinicalproviderid:
                  type: integer
                  description: The ID of the external provider/lab/pharmacy associated
                    the document.
                replaceinternalnote:
                  type: boolean
                  description: If true, will replace the existing internal note with
                    the new one. If false, will append to the existing note.
        required: true
      tags:
      - Forms and Documents
      - Document Details
    delete:
      summary: Mark patient's clinical document as deleted
      description: Deletes the record of a specified clinical document
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: patientid
        schema:
          type: integer
        required: true
        description: patientid
      - in: path
        name: clinicaldocumentid
        schema:
          type: integer
        required: true
        description: clinicaldocumentid
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  clinicaldocumentid:
                    description: ID for the clinical document.
                    type: integer
                  errormessage:
                    description: A message to help identify an error.
                    type: string
                  success:
                    description: Indicates a successful delete operation.
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                type: object
          description: Success
      operationId: deletePracticeidPatientsPatientidDocumentsClinicaldocumentClinicaldocumentid
      x-scopes: []
      tags:
      - Forms and Documents
      - Document Details
  /v1/{practiceid}/patients/{patientid}/documents/clinicaldocument/{clinicaldocumentid}/pages/{pageid}:
    get:
      summary: Get page from patient's clinical document
      description: Retrieves a specific page from the specific clinical document of
        the patient
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: patientid
        schema:
          type: integer
        required: true
        description: patientid
      - in: path
        name: clinicaldocumentid
        schema:
          type: integer
        required: true
        description: clinicaldocumentid
      - in: path
        name: pageid
        schema:
          type: integer
        required: true
        description: pageid
      - in: query
        name: filesize
        schema:
          enum:
          - SMALL
          - LARGE
          type: string
          x-enumDescriptions:
          - Small
          - Large
        required: false
        description: The file size of the document being requested.
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  attachment:
                    description: The image of the page in png format.
                    type: string
                type: object
          description: Success
      operationId: getPracticeidPatientsPatientidDocumentsClinicaldocumentClinicaldocumentidPagesPageid
      x-scopes: []
      tags:
      - Forms and Documents
      - Document Details
  /v1/{practiceid}/patients/{patientid}/documents/clinicaldocument/{clinicaldocumentid}/originaldocument:
    get:
      summary: Get patient's original clinical document
      description: Retrieves original clinical document of the patient. This is applicable
        when document source is FAX or UPLOAD and originally faxed or uploaded file
        is not split into multiple documents. Please use "Get page from patient's
        clinical document" endpoint to download documentpages when original document
        is not available.
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: patientid
        schema:
          type: integer
        required: true
        description: patientid
      - in: path
        name: clinicaldocumentid
        schema:
          type: integer
        required: true
        description: clinicaldocumentid
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  attachment:
                    description: The original document in uploaded format.
                    type: string
                type: object
          description: Success
      operationId: getPracticeidPatientsPatientidDocumentsClinicaldocumentClinicaldocumentidOriginaldocument
      x-scopes: []
      tags:
      - Forms and Documents
      - Document Download
