openapi: 3.0.0
info:
  description: Welcome to the API developer portal which gives third parties access
    to our APIs and sandbox to develop integrated solutions that will enhance the
    value and functionality offered by athenaOne®.
  title: athena API collection
  version: '0.1'
components:
  securitySchemes:
    api_auth_preview:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://api.preview.platform.athenahealth.com/oauth2/v1/token
          scopes:
            athena/service/Athenanet.MDP.*: API Preview
    api_auth:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://api.platform.athenahealth.com/oauth2/v1/token
          scopes:
            athena/service/Athenanet.MDP.*: API Production
    bearer_auth:
      type: http
      scheme: bearer
servers:
- url: https://api.preview.platform.athenahealth.com
  description: Preview
- url: https://api.platform.athenahealth.com
  description: Production
paths:
  /v1/{practiceid}/patients/{patientid}/medicationhistoryconsentverified:
    post:
      summary: Update patient's medication history consent flag as having been verified
      description: Create a record of the patient's medication history consent details
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: patientid
        schema:
          type: integer
        required: true
        description: patientid
      - in: header
        name: Content-Type
        schema:
          type: string
        required: true
        description: Content type of the payload
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  patientid:
                    description: The athena ID of the patient whose medication history
                      consent was verified or not.
                    type: string
                  success:
                    description: Returns true/false if the operation was successful
                    type: string
                type: object
          description: Success
      operationId: postPracticeidPatientsPatientidMedicationhistoryconsentverified
      x-scopes: []
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
              - signaturedatetime
              - departmentid
              - signaturename
              properties:
                departmentid:
                  type: integer
                  description: The ID of the department where the privacy information
                    was verified.
                signaturename:
                  type: string
                  description: If presenting an e-siganture, the name the signer typed,
                    up to 100 characters
                signaturedatetime:
                  type: string
                  description: If presenting an e-signature, the mm/dd/yyyy hh24:mi:ss
                    formatted time that the signer signed.  This is required if a
                    signature name is provided.
                reasonpatientunabletosign:
                  type: string
                  description: If the patient is unable to sign a reason why.
                medicationauthorityhistory:
                  enum:
                  - ''
                  - N
                  - Y
                  type: string
                  default: Y
                  description: Indicate whether the patient has granted the authority
                    to download the patient's medication history automatically from
                    pharmacy benefit managers (PBMs). If no value is provided, then
                    'YES' is used.
                medicationhistoryconsentby:
                  type: string
                  default: PATIENT
                  description: The person who verified the medication history consent.
                    Accepted values are 'PATIENT' and 'OTHER.'  If no value is provided,
                    then 'PATIENT' is used.
                signerrelationshiptopatientid:
                  type: integer
                  description: If presenting an e-signature, and the signer is signing
                    on behalf of someone else, the relationship of the patient to
                    the signer.  There is a documentation page with details.
        required: true
      tags:
      - Forms and Documents
      - Verify Medication History Consent
metadata: []
security:
- api_auth_preview:
  - athena/service/Athenanet.MDP.*
  api_auth:
  - athena/service/Athenanet.MDP.*
  bearer_auth: []
