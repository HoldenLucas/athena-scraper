openapi: 3.0.0
info:
  description: Welcome to the API developer portal which gives third parties access
    to our APIs and sandbox to develop integrated solutions that will enhance the
    value and functionality offered by athenaOne®.
  title: athena API collection
  version: '0.1'
components:
  securitySchemes:
    api_auth_preview:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://api.preview.platform.athenahealth.com/oauth2/v1/token
          scopes:
            athena/service/Athenanet.MDP.*: API Preview
    api_auth:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://api.platform.athenahealth.com/oauth2/v1/token
          scopes:
            athena/service/Athenanet.MDP.*: API Production
    bearer_auth:
      type: http
      scheme: bearer
servers:
- url: https://api.preview.platform.athenahealth.com
  description: Preview
- url: https://api.platform.athenahealth.com
  description: Production
paths:
  /v1/{practiceid}/documents/medicalrecord/{medicalrecordid}/actions:
    post:
      summary: Add medical record document action note
      description: Creates an action note for a specific medical record document
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: medicalrecordid
        schema:
          type: integer
        required: true
        description: medicalrecordid
      - in: header
        name: Content-Type
        schema:
          type: string
        required: true
        description: Content type of the payload
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errormessage:
                    description: If there was an error with this call and SUCCESS
                      is set to false, this field may provide additional information.
                    type: string
                  newdocumentid:
                    description: The document ID of newly created document as a result
                      of action of Deny-New Prescription To Follow (DNTF).
                    type: string
                  success:
                    description: Returns true if the update was a success.
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                  versiontoken:
                    description: A token representing the current state of this document.
                      Will only be set if VERSIONTOKEN was originally sent to the
                      endpoint.
                    type: string
                type: object
          description: Success
      operationId: postPracticeidDocumentsMedicalrecordMedicalrecordidActions
      x-scopes: []
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
              - actionnote
              properties:
                actionnote:
                  type: string
                  description: The new action note to add to the document.
        required: true
      tags:
      - Forms and Documents
      - Update Document Actions
    get:
      summary: Get medical record document's action note
      description: Retrieves action note information of a specific medical record
        document
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: medicalrecordid
        schema:
          type: integer
        required: true
        description: medicalrecordid
      - in: query
        name: limit
        schema:
          type: integer
        required: false
        description: Number of entries to return (default 1500, max 5000)
      - in: query
        name: offset
        schema:
          type: integer
        required: false
        description: Starting point of entries; 0-indexed
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  actionnote:
                    description: The action notes that are attached to the document.
                    type: string
                  assignedto:
                    description: This field will describe who was assigned this document
                      during this document action.
                    type: string
                  createdby:
                    description: The username of the person that created this document
                      action.
                    type: string
                  createddatetime:
                    description: The datetime this action note was created.
                    type: string
                  patientid:
                    description: The patient ID this document is tied to.
                    type: integer
                  priority:
                    description: Priority given for this document action.
                    type: integer
                  status:
                    description: Status given for this document action.
                    type: string
                type: object
          description: Success
      operationId: getPracticeidDocumentsMedicalrecordMedicalrecordidActions
      x-scopes: []
      tags:
      - Forms and Documents
      - Update Document Actions
  /v1/{practiceid}/patients/{patientid}/documents/medicalrecord:
    post:
      summary: Add medical record document to patient's chart
      description: Creates a medical record document record of a specific patient
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: patientid
        schema:
          type: integer
        required: true
        description: patientid
      - in: header
        name: Content-Type
        schema:
          type: string
        required: true
        description: Content type of the payload
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                    description: Returns true/false if the operation was successful.
                  errormessage:
                    type: string
                    description: If the operation failed, this will contain an error
                      message.
                  medicalrecordid:
                    type: integer
                    description: The document ID of the new or modified document.
          description: Success
      operationId: postPracticeidPatientsPatientidDocumentsMedicalrecord
      x-scopes: []
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              required:
              - departmentid
              - documentsubclass
              properties:
                entityid:
                  type: string
                  description: Identifier of entity creating the document. entitytype
                    is required while passing entityid.
                priority:
                  enum:
                  - ''
                  - 1
                  - 2
                  type: string
                  description: Priority of this result.  1 is high; 2 is normal.
                entitytype:
                  enum:
                  - ''
                  - PROVIDER
                  - PATIENT
                  - OTHERS
                  type: string
                  description: Type of entity creating the document. entityid is required
                    while passing entitytype.
                providerid:
                  type: integer
                  description: The ID of the ordering provider.
                departmentid:
                  type: integer
                  description: The athenaNet department ID associated with the uploaded
                    document.
                documentdata:
                  type: string
                  description: Text data stored with document
                internalnote:
                  type: string
                  description: An internal note for the provider or staff. Updating
                    this will append to any previous notes and has a limit of 4000
                    characters.
                documentsubclass:
                  enum:
                  - CHARTTOABSTRACT
                  - COUMADIN
                  - GROWTHCHART
                  - HISTORICAL
                  - PATIENTDIARY
                  - VACCINATION
                  type: string
                  description: Subclasses for MEDICALRECORD documents
                attachmentcontents:
                  type: string
                  description: The file contents that will be attached to this document.
                    PDFs are recommended. Please note encrypted PDFs are not supported
                    with document upload APIs.
        required: true
      tags:
      - Forms and Documents
      - Document List By Class
    get:
      summary: Get list of patient's medical record documents
      description: Retrieves a list of medical record document information of a specific
        patient
      parameters:
      - description: practiceid
        in: path
        name: practiceid
        required: true
        schema:
          type: integer
      - description: patientid
        in: path
        name: patientid
        required: true
        schema:
          type: integer
      - description: The status of the task to filter document results.
        in: query
        name: status
        required: false
        schema:
          enum:
          - ADMINISTER
          - CLOSED
          - DATAENTRY
          - DELETED
          - DISPENSE
          - FOLLOWUP
          - HOLD
          - NOTIFY
          - PEND
          - PENDING
          - PENDINGLABEL
          - PERFORM
          - REVIEW
          - SCHEDULE
          - SCHEDULED
          - SUBMIT
          - SUBMITTED
          type: string
          x-enumDescriptions:
          - ADMINISTER
          - CLOSED
          - DATAENTRY
          - DELETED
          - DISPENSE
          - FOLLOWUP
          - HOLD
          - NOTIFY
          - PEND
          - PENDING
          - PENDINGLABEL
          - PERFORM
          - REVIEW
          - SCHEDULE
          - SCHEDULED
          - SUBMIT
          - SUBMITTED
      - description: The athenaNet department id.
        in: query
        name: departmentid
        required: true
        schema:
          type: integer
      - description: The document subclass to filter document results.
        in: query
        name: documentsubclass
        required: false
        schema:
          type: string
      - description: By default, deleted documents are not listed.  Set to list these.
        in: query
        name: showdeleted
        required: false
        schema:
          type: boolean
      - description: Show only documents attached to this encounter.
        in: query
        name: encounterid
        required: false
        schema:
          type: integer
      - description: Number of entries to return (default 1500, max 5000)
        in: query
        name: limit
        required: false
        schema:
          type: integer
      - description: Starting point of entries; 0-indexed
        in: query
        name: offset
        required: false
        schema:
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    description: Status of the document
                  subject:
                    type: string
                    description: Subject of the document
                  priority:
                    type: number
                    description: Document priority, when available.
                  patientid:
                    type: number
                    description: The athenaNet patient ID
                  assignedto:
                    type: string
                    description: Person the document is assigned to
                  providerid:
                    type: number
                    description: Provider ID for this document
                  createddate:
                    type: string
                    description: Date the document was created. Please use createddatetime
                      instead.
                  encounterid:
                    type: string
                    description: Encounter ID
                  departmentid:
                    type: string
                    description: Department for the document
                  documenttype:
                    type: string
                    description: The description for this document
                  externalnote:
                    type: string
                    description: External note for the patient
                  internalnote:
                    type: string
                    description: The 'Internal Note' attached to this document
                  receivernote:
                    type: string
                    description: External note sent to the receiving facility
                  tietoorderid:
                    type: number
                    description: Order ID of the order this document is tied to, if
                      any
                  appointmentid:
                    type: number
                    description: The appointment ID for this document.
                  documentclass:
                    type: string
                    description: Class of document
                  documentroute:
                    type: string
                    description: Explains method by which the document was entered
                      into the AthenaNet (INTERFACE (digital), FAX, etc.)
                  declinedreason:
                    type: array
                    items:
                      type: object
                      properties:
                        code:
                          type: string
                          description: The code indicating why the order was not given.
                        codeset:
                          type: string
                          description: The codeset that the code belongs to.
                        description:
                          type: string
                          description: The plaintext description of the reason the
                            order was not given.
                    description: List of codes indicating why the order was not given.
                      If this field is not present, the order was not declined. If
                      the array is empty, no reason has been chosen.
                  documentsource:
                    type: string
                    description: Explains where this document originated (e.g. ENCOUNTER,
                      PORTAL, etc.)
                  documenttypeid:
                    type: number
                    description: The ID of the description for this document
                  createddatetime:
                    type: string
                    description: Date/Time (ISO 8601) the document was created
                  deleteddatetime:
                    type: string
                    description: Date/time (ISO 8601) the document was deleted
                  medicalrecordid:
                    type: number
                    description: The primary key for medicalrecord class of documents
                  documentsubclass:
                    type: string
                    description: Specific type of document
                  lastmodifieduser:
                    type: string
                    description: The user who last modified this document.
                  clinicalproviderid:
                    type: number
                    description: The clinical provider ID of the performing provider
                  declinedreasontext:
                    type: string
                    description: The user-facing description of the reason the order
                      was not given.
                  documentdescription:
                    type: string
                    description: Description of the document type
                  externalaccessionid:
                    type: string
                    description: The external accession ID for this document. Format
                      depends on the system the ID belongs to.
                  internalaccessionid:
                    type: string
                    description: The internal accession ID for this document. Format
                      depends on the system the ID belongs to.
                  observationdatetime:
                    type: string
                    description: Date/time (ISO 8601) the observation was taken
                  lastmodifieddatetime:
                    type: string
                    description: Date/time (ISO 8601) the document was last modified
                  contraindicationreason:
                    type: array
                    items:
                      type: object
                      properties:
                        code:
                          type: string
                          description: The code indicating why the order was contraindicated.
                        codeset:
                          type: string
                          description: The codeset that the code belongs to.
                        description:
                          type: string
                          description: The plaintext description of the contraindication
                            reason.
                    description: List of codes indicating why the order was contraindicated
                      (for vaccines only). If this field is not present, the order
                      does not contain a contraindication reason.
          description: Success
      operationId: getPracticeidPatientsPatientidDocumentsMedicalrecord
      x-scopes: []
      tags:
      - Forms and Documents
      - Document List By Class
  /v1/{practiceid}/patients/{patientid}/documents/medicalrecord/{medicalrecordid}:
    put:
      summary: Update patient's medical record document
      description: Modifies a specific medical record document information
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: patientid
        schema:
          type: integer
        required: true
        description: patientid
      - in: path
        name: medicalrecordid
        schema:
          type: integer
        required: true
        description: medicalrecordid
      - in: header
        name: Content-Type
        schema:
          type: string
        required: true
        description: Content type of the payload
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errormessage:
                    description: If the operation failed, this will contain an error
                      message.
                    type: string
                  medicalrecordid:
                    description: The document ID of the new or modified document.
                    type: integer
                  success:
                    description: Returns true/false if the operation was successful.
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                type: object
          description: Success
      operationId: putPracticeidPatientsPatientidDocumentsMedicalrecordMedicalrecordid
      x-scopes: []
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                priority:
                  enum:
                  - ''
                  - 1
                  - 2
                  type: string
                  description: Priority of this result.  1 is high; 2 is normal.
                assignedto:
                  type: string
                  description: Username to reassign the document to
                providerid:
                  type: integer
                  description: The ID of the ordering provider.
                internalnote:
                  type: string
                  description: An internal note for the provider or staff. Updating
                    this will append to any previous notes and has a limit of 4000
                    characters.
        required: true
      tags:
      - Forms and Documents
      - Document Details
    get:
      summary: Get patient's medical record document
      description: Retrieves a specific medical record document information
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: patientid
        schema:
          type: integer
        required: true
        description: patientid
      - in: path
        name: medicalrecordid
        schema:
          type: integer
        required: true
        description: medicalrecordid
      - in: query
        name: getentityinfo
        schema:
          type: boolean
        required: false
        description: If true, entityid and entitytype will be returned. entityid will
          be populated in createduser attribute.
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  appointmentid:
                    description: The appointment ID for this document
                    type: integer
                  assignedto:
                    description: Person the document is assigned to
                    type: string
                  createddate:
                    description: Date the document was created. Please use createddatetime
                      instead.
                    type: string
                  createddatetime:
                    description: Date/Time (ISO 8601) the document was created
                    type: string
                  createduser:
                    description: The user who created this document.
                    type: string
                  deleteddatetime:
                    description: Date/time (ISO 8601) the document was deleted
                    type: string
                  departmentid:
                    description: Department for the document
                    type: string
                  documentclass:
                    description: Class of document
                    type: string
                  documentdata:
                    description: Text data associated with this document.
                    type: string
                  documentdescription:
                    description: Description of the document type
                    type: string
                  documentroute:
                    description: Explains method by which the document was entered
                      into the AthenaNet (INTERFACE (digital), FAX, etc.)
                    type: string
                  documentsource:
                    description: Explains where this document originated.
                    enum:
                    - ''
                    - PATIENT
                    - CAREGIVER
                    - PARTNER
                    - PHARMACY
                    - LAB
                    - PCP
                    - SPECIALIST
                    - STAFF
                    - HOSPITAL
                    - OTHER
                    - PORTAL
                    - Live Operator
                    type: string
                  documentsubclass:
                    description: Specific type of document
                    type: string
                  documenttypeid:
                    description: A specific document type identifier.
                    type: integer
                  encounterid:
                    description: Encounter ID
                    type: string
                  entitytype:
                    description: Type of entity creating the document. Possible values
                      are PROVIDER, PATIENT and OTHERS.
                    type: string
                  externalaccessionid:
                    description: The external accession ID for this document. Format
                      depends on the system the ID belongs to.
                    type: string
                  externalnote:
                    description: External note for the patient.
                    type: string
                  facilityid:
                    description: The ID of the clinical provider associated with this
                      clinical document. Clinical providers are a master list of providers
                      throughout the country.  These include providers as well as
                      radiology centers, labs and pharmacies.
                    type: integer
                  internalaccessionid:
                    description: The internal accession ID for this document. Format
                      depends on the system the ID belongs to.
                    type: string
                  internalnote:
                    description: The 'Internal Note' attached to this document
                    type: string
                  lastmodifieddatetime:
                    description: Date/time (ISO 8601) the document was last modified
                    type: string
                  lastmodifieduser:
                    description: The user who last modified this document.
                    type: string
                  medicalrecordid:
                    description: The ID for this medical record document.
                    type: integer
                  observationdatetime:
                    description: Date/time the observation was taken
                    type: string
                  originaldocument:
                    description: URL and content-type to download the original document.
                      "originaldocument" is returned when document source is FAX or
                      UPLOAD and originally faxed or uploaded file is not split into
                      multiple documents. Please use "pages" to download document
                      pages when "originaldocument" is not available.
                    properties:
                      contenttype:
                        description: The content-type of the original document.
                        type: string
                      href:
                        description: The URL to get the original document.
                        type: string
                    type: object
                  pages:
                    description: An array of image pages associated with this document.
                    items:
                      properties:
                        contenttype:
                          description: The content-type that will be returned by the
                            page image call.
                          type: string
                        href:
                          description: The URL to get the document image.
                          type: string
                        pageid:
                          description: The ID to use in a call to get the page image.
                          type: string
                        pageordering:
                          description: Within this list of pages, the ordering (starting
                            with 1).
                          type: string
                      type: object
                    type: array
                  priority:
                    description: Document priority, when available. 1 is high, 2 is
                      normal. Some labs use other numbers or characters that are lab-specific.
                    type: string
                  providerid:
                    description: Provider ID for this document
                    type: integer
                  status:
                    description: Status of the document
                    type: string
                  subject:
                    description: Subject of the document
                    type: string
                  tietoorderid:
                    description: Order ID of the order this document is tied to, if
                      any
                    type: integer
                type: object
          description: Success
      operationId: getPracticeidPatientsPatientidDocumentsMedicalrecordMedicalrecordid
      x-scopes: []
      tags:
      - Forms and Documents
      - Document Details
    delete:
      summary: Mark patient's medical record document as deleted
      description: Deletes the record of a specified medical record document
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: patientid
        schema:
          type: integer
        required: true
        description: patientid
      - in: path
        name: medicalrecordid
        schema:
          type: integer
        required: true
        description: medicalrecordid
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errormessage:
                    description: If the operation failed, this will contain an error
                      message.
                    type: string
                  medicalrecordid:
                    description: The document ID of the new or modified document.
                    type: integer
                  success:
                    description: Returns true/false if the operation was successful.
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                type: object
          description: Success
      operationId: deletePracticeidPatientsPatientidDocumentsMedicalrecordMedicalrecordid
      x-scopes: []
      tags:
      - Forms and Documents
      - Document Details
  /v1/{practiceid}/patients/{patientid}/documents/medicalrecord/{medicalrecordid}/pages/{pageid}:
    get:
      summary: Get page from patient's medical record document
      description: Retrieves a specific page from the specific medical record document
        of the patient
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: patientid
        schema:
          type: integer
        required: true
        description: patientid
      - in: path
        name: pageid
        schema:
          type: integer
        required: true
        description: pageid
      - in: path
        name: medicalrecordid
        schema:
          type: integer
        required: true
        description: medicalrecordid
      - in: query
        name: filesize
        schema:
          enum:
          - SMALL
          - LARGE
          type: string
          x-enumDescriptions:
          - Small
          - Large
        required: false
        description: The file size of the document being requested.
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  attachment:
                    description: The image of the page in png format.
                    type: string
                type: object
          description: Success
      operationId: getPracticeidPatientsPatientidDocumentsMedicalrecordMedicalrecordidPagesPageid
      x-scopes: []
      tags:
      - Forms and Documents
      - Document Details
  /v1/{practiceid}/patients/{patientid}/documents/medicalrecord/{medicalrecordid}/originaldocument:
    get:
      summary: Get patient's original medical record document
      description: Retrieves original medical record document of the patient. This
        is applicable when document source is FAX or UPLOAD and originally faxed or
        uploaded file is not split into multiple documents. Please use "Get page from
        patient's medical record document" endpoint to download documentpages when
        original document is not available.
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: patientid
        schema:
          type: integer
        required: true
        description: patientid
      - in: path
        name: medicalrecordid
        schema:
          type: integer
        required: true
        description: medicalrecordid
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  attachment:
                    description: The original document in uploaded format.
                    type: string
                type: object
          description: Success
      operationId: getPracticeidPatientsPatientidDocumentsMedicalrecordMedicalrecordidOriginaldocument
      x-scopes: []
      tags:
      - Forms and Documents
      - Document Download
metadata: []
security:
- api_auth_preview:
  - athena/service/Athenanet.MDP.*
  api_auth:
  - athena/service/Athenanet.MDP.*
  bearer_auth: []
