openapi: 3.0.0
info:
  description: Welcome to the API developer portal which gives third parties access
    to our APIs and sandbox to develop integrated solutions that will enhance the
    value and functionality offered by athenaOne®.
  title: athena API collection
  version: '0.1'
components:
  securitySchemes:
    api_auth_preview:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://api.preview.platform.athenahealth.com/oauth2/v1/token
          scopes:
            athena/service/Athenanet.MDP.*: API Preview
    api_auth:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://api.platform.athenahealth.com/oauth2/v1/token
          scopes:
            athena/service/Athenanet.MDP.*: API Production
    bearer_auth:
      type: http
      scheme: bearer
servers:
- url: https://api.preview.platform.athenahealth.com
  description: Preview
- url: https://api.platform.athenahealth.com
  description: Production
paths:
  /v1/{practiceid}/documents/physicianauth/{physicianauthid}/actions:
    get:
      summary: Get action notes for given physician authorization
      description: Retrieves action notes information for a specific provider authorization
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: physicianauthid
        schema:
          type: integer
        required: true
        description: physicianauthid
      - in: query
        name: limit
        schema:
          type: integer
        required: false
        description: Number of entries to return (default 1500, max 5000)
      - in: query
        name: offset
        schema:
          type: integer
        required: false
        description: Starting point of entries; 0-indexed
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  actionnote:
                    description: The action notes that are attached to the document.
                    type: string
                  assignedto:
                    description: This field will describe who was assigned this document
                      during this document action.
                    type: string
                  createdby:
                    description: The username of the person that created this document
                      action.
                    type: string
                  createddatetime:
                    description: The datetime this action note was created.
                    type: string
                  patientid:
                    description: The patient ID this document is tied to.
                    type: integer
                  priority:
                    description: Priority given for this document action.
                    type: integer
                  status:
                    description: Status given for this document action.
                    type: string
                type: object
          description: Success
      operationId: getPracticeidDocumentsPhysicianauthPhysicianauthidActions
      x-scopes: []
      tags:
      - Forms and Documents
      - Update Document Actions
    post:
      summary: Create new action notes for given physician authorization
      description: Creates an action note for a specific physician authorization
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: physicianauthid
        schema:
          type: integer
        required: true
        description: physicianauthid
      - in: header
        name: Content-Type
        schema:
          type: string
        required: true
        description: Content type of the payload
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errormessage:
                    description: If there was an error with this call and SUCCESS
                      is set to false, this field may provide additional information.
                    type: string
                  newdocumentid:
                    description: The document ID of newly created document as a result
                      of action of Deny-New Prescription To Follow (DNTF).
                    type: string
                  success:
                    description: Returns true if the update was a success.
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                  versiontoken:
                    description: A token representing the current state of this document.
                      Will only be set if VERSIONTOKEN was originally sent to the
                      endpoint.
                    type: string
                type: object
          description: Success
      operationId: postPracticeidDocumentsPhysicianauthPhysicianauthidActions
      x-scopes: []
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
              - actionnote
              properties:
                actionnote:
                  type: string
                  description: The new action note to add to the document.
        required: true
      tags:
      - Forms and Documents
      - Update Document Actions
  /v1/{practiceid}/patients/{patientid}/documents/physicianauth:
    get:
      summary: Get list of physician authorizations for given patient
      description: Retrieves a list of physician authorization document information
        for a specific patient
      parameters:
      - description: practiceid
        in: path
        name: practiceid
        required: true
        schema:
          type: integer
      - description: patientid
        in: path
        name: patientid
        required: true
        schema:
          type: integer
      - description: The status of the task to filter document results.
        in: query
        name: status
        required: false
        schema:
          enum:
          - ADMINISTER
          - CLOSED
          - DATAENTRY
          - DELETED
          - DISPENSE
          - FOLLOWUP
          - HOLD
          - NOTIFY
          - PEND
          - PENDING
          - PENDINGLABEL
          - PERFORM
          - REVIEW
          - SCHEDULE
          - SCHEDULED
          - SUBMIT
          - SUBMITTED
          type: string
          x-enumDescriptions:
          - ADMINISTER
          - CLOSED
          - DATAENTRY
          - DELETED
          - DISPENSE
          - FOLLOWUP
          - HOLD
          - NOTIFY
          - PEND
          - PENDING
          - PENDINGLABEL
          - PERFORM
          - REVIEW
          - SCHEDULE
          - SCHEDULED
          - SUBMIT
          - SUBMITTED
      - description: The athenaNet department id.
        in: query
        name: departmentid
        required: true
        schema:
          type: integer
      - description: The document subclass to filter document results.
        in: query
        name: documentsubclass
        required: false
        schema:
          type: string
      - description: By default, deleted documents are not listed.  Set to list these.
        in: query
        name: showdeleted
        required: false
        schema:
          type: boolean
      - description: Show only documents attached to this encounter.
        in: query
        name: encounterid
        required: false
        schema:
          type: integer
      - description: Number of entries to return (default 1500, max 5000)
        in: query
        name: limit
        required: false
        schema:
          type: integer
      - description: Starting point of entries; 0-indexed
        in: query
        name: offset
        required: false
        schema:
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    description: Status of the document
                  subject:
                    type: string
                    description: Subject of the document
                  priority:
                    type: string
                    description: Document priority, when available. 1 is high, 2 is
                      normal. Some labs use other numbers or characters that are lab-specific.
                  faxnumber:
                    type: string
                    description: The phone number to use to call back the patient.
                  patientid:
                    type: integer
                    description: The athenaNet patient ID.
                  assignedto:
                    type: string
                    description: Person the document is assigned to
                  providerid:
                    type: integer
                    description: Provider ID for this document
                  createddate:
                    type: string
                    description: Date the document was created. Please use createddatetime
                      instead.
                  createduser:
                    type: string
                    description: The user who created this document.
                  encounterid:
                    type: string
                    description: Encounter ID
                  departmentid:
                    type: string
                    description: Department for the document
                  externalnote:
                    type: string
                    description: External note for the patient.
                  internalnote:
                    type: string
                    description: The 'Internal Note' attached to this document
                  tietoorderid:
                    type: integer
                    description: Order ID of the order this document is tied to, if
                      any
                  appointmentid:
                    type: integer
                    description: The appointment ID for this document
                  documentclass:
                    type: string
                    description: Class of document
                  documentroute:
                    type: string
                    description: Explains method by which the document was entered
                      into the AthenaNet (INTERFACE (digital), FAX, etc.)
                  documenttypeid:
                    type: integer
                    description: A specific document type identifier.
                  createddatetime:
                    type: string
                    description: Date/Time (ISO 8601) the document was created
                  deleteddatetime:
                    type: string
                    description: Date/time (ISO 8601) the document was deleted
                  observationdate:
                    type: string
                  physicianauthid:
                    type: integer
                    description: The primary key for physician authorization documents
                  documentsubclass:
                    type: string
                    description: Specific type of document
                  lastmodifieduser:
                    type: string
                    description: The user who last modified this document.
                  clinicalproviderid:
                    type: integer
                    description: The ID of the clinical provider associated with this
                      clinical document. Clinical providers are a master list of providers
                      throughout the country.  These include providers as well as
                      radiology centers, labs and pharmacies.
                  documentdescription:
                    type: string
                    description: Description of the document type
                  externalaccessionid:
                    type: string
                    description: The external accession ID for this document. Format
                      depends on the system the ID belongs to.
                  internalaccessionid:
                    type: string
                    description: The internal accession ID for this document. Format
                      depends on the system the ID belongs to.
                  lastmodifieddatetime:
                    type: string
                    description: Date/time (ISO 8601) the document was last modified
          description: Success
      operationId: getPracticeidPatientsPatientidDocumentsPhysicianauth
      x-scopes: []
      tags:
      - Forms and Documents
      - Document List By Class
    post:
      summary: Add a physician authorization document.
      description: Physician authorization document.
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: patientid
        schema:
          type: integer
        required: true
        description: patientid
      - in: header
        name: Content-Type
        schema:
          type: string
        required: true
        description: Content type of the payload
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                    description: Returns true/false if the operation was successful.
                  errormessage:
                    type: string
                    description: If the operation failed, this will contain an error
                      message.
                  physicianauthid:
                    type: integer
                    description: The document ID of the new or modified document.
          description: Success
      operationId: postPracticeidPatientsPatientidDocumentsPhysicianauth
      x-scopes: []
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              required:
              - departmentid
              - documentsubclass
              properties:
                priority:
                  enum:
                  - ''
                  - 1
                  - 2
                  type: string
                  description: Priority of this result.  1 is high; 2 is normal.
                autoclose:
                  type: boolean
                  description: Documents will, normally, automatically appear in the
                    clinical inbox for providers to review. In some cases, you might
                    want to force the document to skip the clinical inbox, and go
                    directly to the patient chart with a "closed" status. For that
                    case, set this to true.
                faxnumber:
                  type: string
                  description: Fax number of the sending clinical provider.
                providerid:
                  type: integer
                  description: The ID of the ordering provider.
                departmentid:
                  type: integer
                  description: The athenaNet department ID associated with the uploaded
                    document.
                internalnote:
                  type: string
                  description: An internal note for the provider or staff. Updating
                    this will append to any previous notes and has a limit of 4000
                    characters.
                documenttypeid:
                  type: integer
                  description: A specific document type identifier.
                documentsubclass:
                  enum:
                  - PHYSICIANAUTH
                  - CAREPLANOVERSIGHT
                  type: string
                  description: Subclasses for PHYSICIANAUTH documents
                attachmentcontents:
                  type: string
                  description: The file contents that will be attached to this document.
                    PDFs are recommended. Please note encrypted PDFs are not supported
                    with document upload APIs.
                clinicalproviderid:
                  type: integer
                  description: The ID of the external provider/lab/pharmacy associated
                    the document.
        required: true
      tags:
      - Forms and Documents
      - Document List By Class
  /v1/{practiceid}/patients/{patientid}/documents/physicianauth/{physicianauthid}:
    get:
      summary: Get selected physician authorization
      description: Retrieves a physician authorization document record for a specific
        patient
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: patientid
        schema:
          type: integer
        required: true
        description: patientid
      - in: path
        name: physicianauthid
        schema:
          type: integer
        required: true
        description: physicianauthid
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  actionnote:
                    description: The most recent action note for a document
                    type: string
                  appointmentid:
                    description: The appointment ID for this document
                    type: integer
                  assignedto:
                    description: Person the document is assigned to
                    type: string
                  clinicalproviderid:
                    description: The ID of the clinical provider associated with this
                      clinical document. Clinical providers are a master list of providers
                      throughout the country.  These include providers as well as
                      radiology centers, labs and pharmacies.
                    type: integer
                  createddate:
                    description: Date the document was created. Please use createddatetime
                      instead.
                    type: string
                  createddatetime:
                    description: Date/Time (ISO 8601) the document was created
                    type: string
                  createduser:
                    description: The user who created this document.
                    type: string
                  deleteddatetime:
                    description: Date/time (ISO 8601) the document was deleted
                    type: string
                  departmentid:
                    description: Department for the document
                    type: string
                  documentclass:
                    description: Class of document
                    type: string
                  documentdescription:
                    description: Description of the document type
                    type: string
                  documentroute:
                    description: Explains method by which the document was entered
                      into the AthenaNet (INTERFACE (digital), FAX, etc.)
                    type: string
                  documentsource:
                    description: Explains where this document originated.
                    enum:
                    - ''
                    - PATIENT
                    - CAREGIVER
                    - PARTNER
                    - PHARMACY
                    - LAB
                    - PCP
                    - SPECIALIST
                    - STAFF
                    - HOSPITAL
                    - OTHER
                    - PORTAL
                    - Live Operator
                    type: string
                  documentsubclass:
                    description: Specific type of document
                    type: string
                  documenttypeid:
                    description: A specific document type identifier.
                    type: integer
                  encounterid:
                    description: Encounter ID
                    type: string
                  externalaccessionid:
                    description: The external accession ID for this document. Format
                      depends on the system the ID belongs to.
                    type: string
                  externalnote:
                    description: External note for the patient.
                    type: string
                  faxnumber:
                    description: The phone number to use to call back the patient.
                    type: string
                  internalaccessionid:
                    description: The internal accession ID for this document. Format
                      depends on the system the ID belongs to.
                    type: string
                  internalnote:
                    description: The 'Internal Note' attached to this document
                    type: string
                  lastmodifieddatetime:
                    description: Date/time (ISO 8601) the document was last modified
                    type: string
                  lastmodifieduser:
                    description: The user who last modified this document.
                    type: string
                  observationdatetime:
                    description: Date/time the observation was taken
                    type: string
                  pages:
                    description: An array of image pages associated with this document.
                    items:
                      properties:
                        contenttype:
                          description: The content-type that will be returned by the
                            page image call.
                          type: string
                        href:
                          description: The URL to get the document image.
                          type: string
                        pageid:
                          description: The ID to use in a call to get the page image.
                          type: string
                        pageordering:
                          description: Within this list of pages, the ordering (starting
                            with 1).
                          type: string
                      type: object
                    type: array
                  physicianauthid:
                    description: The primary key for physician authorization documents
                    type: integer
                  priority:
                    description: Document priority, when available. 1 is high, 2 is
                      normal. Some labs use other numbers or characters that are lab-specific.
                    type: string
                  providerid:
                    description: Provider ID for this document
                    type: integer
                  status:
                    description: Status of the document
                    type: string
                  subject:
                    description: Subject of the document
                    type: string
                  tietoorderid:
                    description: Order ID of the order this document is tied to, if
                      any
                    type: integer
                type: object
          description: Success
      operationId: getPracticeidPatientsPatientidDocumentsPhysicianauthPhysicianauthid
      x-scopes: []
      tags:
      - Forms and Documents
      - Document Details
    put:
      summary: Update selected physician authorization
      description: Modifies a specific physician authorization document information
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: patientid
        schema:
          type: integer
        required: true
        description: patientid
      - in: path
        name: physicianauthid
        schema:
          type: integer
        required: true
        description: physicianauthid
      - in: header
        name: Content-Type
        schema:
          type: string
        required: true
        description: Content type of the payload
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errormessage:
                    description: If the operation failed, this will contain an error
                      message.
                    type: string
                  physicianauthid:
                    description: The document ID of the new or modified document.
                    type: integer
                  success:
                    description: Returns true/false if the operation was successful.
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                type: object
          description: Success
      operationId: putPracticeidPatientsPatientidDocumentsPhysicianauthPhysicianauthid
      x-scopes: []
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                priority:
                  enum:
                  - ''
                  - 1
                  - 2
                  type: string
                  description: Priority of this result.  1 is high; 2 is normal.
                faxnumber:
                  type: string
                  description: Fax number of the sending clinical provider.
                assignedto:
                  type: string
                  description: Username to reassign the document to
                providerid:
                  type: integer
                  description: The ID of the ordering provider.
                internalnote:
                  type: string
                  description: An internal note for the provider or staff. Updating
                    this will append to any previous notes and has a limit of 4000
                    characters.
                documenttypeid:
                  type: integer
                  description: A specific document type identifier.
                clinicalproviderid:
                  type: integer
                  description: The ID of the external provider/lab/pharmacy associated
                    the document.
        required: true
      tags:
      - Forms and Documents
      - Document Details
    delete:
      summary: Delete selected physician authorization
      description: Deletes the record of a specific physician authorization
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: patientid
        schema:
          type: integer
        required: true
        description: patientid
      - in: path
        name: physicianauthid
        schema:
          type: integer
        required: true
        description: physicianauthid
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errormessage:
                    description: If the operation failed, this will contain an error
                      message.
                    type: string
                  physicianauthid:
                    description: The document ID of the new or modified document.
                    type: integer
                  success:
                    description: Returns true/false if the operation was successful.
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                type: object
          description: Success
      operationId: deletePracticeidPatientsPatientidDocumentsPhysicianauthPhysicianauthid
      x-scopes: []
      tags:
      - Forms and Documents
      - Document Details
  /v1/{practiceid}/patients/{patientid}/documents/physicianauth/{physicianauthid}/pages/{pageid}:
    get:
      summary: Get page from physician authorization document
      description: Retrieves a specific page from the specific physician authorization
        document of the patient
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: patientid
        schema:
          type: integer
        required: true
        description: patientid
      - in: path
        name: physicianauthid
        schema:
          type: integer
        required: true
        description: physicianauthid
      - in: path
        name: pageid
        schema:
          type: integer
        required: true
        description: pageid
      - in: query
        name: filesize
        schema:
          enum:
          - SMALL
          - LARGE
          type: string
          x-enumDescriptions:
          - Small
          - Large
        required: false
        description: The file size of the document being requested.
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  attachment:
                    description: The image of the page in png format.
                    type: string
                type: object
          description: Success
      operationId: getPracticeidPatientsPatientidDocumentsPhysicianauthPhysicianauthidPagesPageid
      x-scopes: []
      tags:
      - Forms and Documents
      - Document Details
metadata: []
security:
- api_auth_preview:
  - athena/service/Athenanet.MDP.*
  api_auth:
  - athena/service/Athenanet.MDP.*
  bearer_auth: []
