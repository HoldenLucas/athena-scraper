openapi: 3.0.0
info:
  description: Welcome to the API developer portal which gives third parties access
    to our APIs and sandbox to develop integrated solutions that will enhance the
    value and functionality offered by athenaOne®.
  title: athena API collection
  version: '0.1'
components:
  securitySchemes:
    api_auth_preview:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://api.preview.platform.athenahealth.com/oauth2/v1/token
          scopes:
            athena/service/Athenanet.MDP.*: API Preview
    api_auth:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://api.platform.athenahealth.com/oauth2/v1/token
          scopes:
            athena/service/Athenanet.MDP.*: API Production
    bearer_auth:
      type: http
      scheme: bearer
servers:
- url: https://api.preview.platform.athenahealth.com
  description: Preview
- url: https://api.platform.athenahealth.com
  description: Production
paths:
  /v1/{practiceid}/documents/order/{orderid}/actions:
    get:
      summary: Get order document's action note
      description: Retrieves action note information of a specific order
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: orderid
        schema:
          type: integer
        required: true
        description: orderid
      - in: query
        name: limit
        schema:
          type: integer
        required: false
        description: Number of entries to return (default 1500, max 5000)
      - in: query
        name: offset
        schema:
          type: integer
        required: false
        description: Starting point of entries; 0-indexed
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    description: Status given for this document action.
                  priority:
                    type: integer
                    description: Priority given for this document action.
                  createdby:
                    type: string
                    description: The username of the person that created this document
                      action.
                  patientid:
                    type: integer
                    description: The patient ID this document is tied to.
                  actionnote:
                    type: string
                    description: The action notes that are attached to the document.
                  assignedto:
                    type: string
                    description: This field will describe who was assigned this document
                      during this document action.
                  createddatetime:
                    type: string
                    description: The datetime this action note was created.
          description: Success
      operationId: getPracticeidDocumentsOrderOrderidActions
      x-scopes: []
      tags:
      - Forms and Documents
      - Update Document Actions
    post:
      summary: Add order document action note
      description: Creates an action note for a specific order
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: orderid
        schema:
          type: integer
        required: true
        description: orderid
      - in: header
        name: Content-Type
        schema:
          type: string
        required: true
        description: Content type of the payload
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errormessage:
                    description: If there was an error with this call and SUCCESS
                      is set to false, this field may provide additional information.
                    type: string
                  newdocumentid:
                    description: The document ID of newly created document as a result
                      of action of Deny-New Prescription To Follow (DNTF).
                    type: string
                  success:
                    description: Returns true if the update was a success.
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                  versiontoken:
                    description: A token representing the current state of this document.
                      Will only be set if VERSIONTOKEN was originally sent to the
                      endpoint.
                    type: string
                type: object
          description: Success
      operationId: postPracticeidDocumentsOrderOrderidActions
      x-scopes: []
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
              - actionnote
              properties:
                actionnote:
                  type: string
                  description: The new action note to add to the document.
        required: true
      tags:
      - Forms and Documents
      - Update Document Actions
  /v1/{practiceid}/orders/outstanding:
    get:
      summary: Get outstanding orders
      description: 'BETA: Retrieves the list of patient''s orders whose dates are
        as of today or earlier.'
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: query
        name: departmentid
        schema:
          type: integer
        required: false
        description: The athenaNet department ID.
      - in: query
        name: encounterid
        schema:
          type: integer
        required: false
        description: The ID for the clinical encounter the outstanding order was created
          in or the ID of the clinical encounter that the order will be performed
          in.
      - in: query
        name: showdeclinedorders
        schema:
          type: boolean
        required: false
        description: If set, include orders that were declined
      - in: query
        name: patientid
        schema:
          type: integer
        required: false
        description: The athena patient ID.
      - in: query
        name: limit
        schema:
          type: integer
        required: false
        description: Number of entries to return (default 1500, max 5000)
      - in: query
        name: offset
        schema:
          type: integer
        required: false
        description: Starting point of entries; 0-indexed
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                    description: Name of the order.
                  class:
                    type: string
                    description: 'The document class of this order: ORDER (for labs,
                      imaging, consult (referral), procedure, and other), SURGERY,
                      DME, and VACCINE.'
                  status:
                    type: string
                    description: The status of the order document. New orders start
                      in REVIEW status and Open Orders include Review, Pending, Administer,
                      Submit, Submitted, Perform, Followup, Dispense, Schedule, Scheduled,
                      and Athena Error.
                  priority:
                    type: integer
                    description: Priority of the order.
                  documentid:
                    type: integer
                    description: The linked document for this order.
                  dateordered:
                    type: string
                    description: The timestamp when the order was created. Returned
                      in mm/dd/yyyy hh:mi AM/PM format
                  description:
                    type: string
                    description: Brief description for this order.
                  encounterid:
                    type: integer
                    description: The ID of the clinical encounter that the order will
                      be performed in.
                  performdate:
                    type: string
                    description: The date when the order was performed.
                  assigneduser:
                    type: string
                    description: The username of the user who this order task is currently
                      assigned to for further processing as needed.
                  departmentid:
                    type: integer
                    description: The athenaNet department ID.
                  declinedreason:
                    type: array
                    items:
                      type: object
                      properties:
                        code:
                          type: string
                          description: The code indicating why the order was not given.
                        codeset:
                          type: string
                          description: The codeset that the code belongs to.
                        description:
                          type: string
                          description: The plaintext description of the reason the
                            order was not given.
                    description: List of codes indicating why the order was not given.
                      If this field is not present, the order was not declined. If
                      the array is empty, no reason has been chosen.
                  classdescription:
                    type: string
                    description: The human-readable description of this document class
                  orderingprovider:
                    type: string
                    description: The username of the ordering provider, which is different
                      than the ordering user - who may be an intake nurse for example.
                  documentationonly:
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                    description: If true, this order is here just as a record, and
                      does not need to actually go out.
                  clinicalproviderid:
                    type: integer
                    description: ID of the recipient for the order.
                  createdencounterid:
                    type: integer
                    description: The ID for the clinical encounter the outstanding
                      order was created in.
                  declinedreasontext:
                    type: string
                    description: The user-facing description of the reason the order
                      was not given.
                  clinicalprovidername:
                    type: string
                    description: Name of the recipient for the order.
                  contraindicationreason:
                    type: array
                    items:
                      type: object
                      properties:
                        code:
                          type: string
                          description: The code indicating why the order was contraindicated.
                        codeset:
                          type: string
                          description: The codeset that the code belongs to.
                        description:
                          type: string
                          description: The plaintext description of the contraindication
                            reason.
                    description: List of codes indicating why the order was contraindicated
                      (for vaccines only). If this field is not present, the order
                      does not contain a contraindication reason.
          description: Success
      operationId: getPracticeidOrdersOutstanding
      x-scopes: []
      tags:
      - Forms and Documents
      - Outstanding Orders
  /v1/{practiceid}/patients/{patientid}/documents/order:
    get:
      summary: Get list of patient's orders
      description: Retrieves a list of order documents for a specific patient
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: patientid
        schema:
          type: integer
        required: true
        description: patientid
      - in: query
        name: departmentid
        schema:
          type: integer
        required: true
        description: The athenaNet department id.
      - in: query
        name: encounterid
        schema:
          type: integer
        required: false
        description: Show only documents attached to this encounter.
      - in: query
        name: enddate
        schema:
          type: string
        required: false
        description: An optional filter to specify the end of the documents search
          date range (MM/DD/YYYY). Inclusive.
      - in: query
        name: status
        schema:
          enum:
          - ADMINISTER
          - CLOSED
          - DATAENTRY
          - DELETED
          - DISPENSE
          - FOLLOWUP
          - HOLD
          - NOTIFY
          - PEND
          - PENDING
          - PENDINGLABEL
          - PERFORM
          - REVIEW
          - SCHEDULE
          - SCHEDULED
          - SUBMIT
          - SUBMITTED
          type: string
          x-enumDescriptions:
          - ADMINISTER
          - CLOSED
          - DATAENTRY
          - DELETED
          - DISPENSE
          - FOLLOWUP
          - HOLD
          - NOTIFY
          - PEND
          - PENDING
          - PENDINGLABEL
          - PERFORM
          - REVIEW
          - SCHEDULE
          - SCHEDULED
          - SUBMIT
          - SUBMITTED
        required: false
        description: The status of the task to filter document results.
      - in: query
        name: documentclass
        schema:
          type: string
        required: false
        description: The class(es) of document(s) comma separated.
      - in: query
        name: documentsubclass
        schema:
          type: string
        required: false
        description: The document subclass to filter document results.
      - in: query
        name: showdeleted
        schema:
          type: boolean
        required: false
        description: By default, deleted documents are not listed.  Set to list these.
      - in: query
        name: showdeclinedorders
        schema:
          type: boolean
        required: false
        description: If set, include orders that were declined
      - in: query
        name: startdate
        schema:
          type: string
        required: false
        description: An optional filter to specify the start of the documents search
          date range (MM/DD/YYYY). Inclusive.
      - in: query
        name: limit
        schema:
          type: integer
        required: false
        description: Number of entries to return (default 1500, max 5000)
      - in: query
        name: offset
        schema:
          type: integer
        required: false
        description: Starting point of entries; 0-indexed
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    description: Status of the document
                  orderid:
                    type: integer
                    description: Order document id
                  subject:
                    type: string
                    description: Subject of the document
                  priority:
                    type: string
                    description: Document priority, when available. 1 is high, 2 is
                      normal. Some labs use other numbers or characters that are lab-specific.
                  ordertype:
                    type: string
                    description: Order type group name
                  patientid:
                    type: integer
                    description: The athenaNet patient ID.
                  assignedto:
                    type: string
                    description: Person the document is assigned to
                  facilityid:
                    type: integer
                    description: The ID of the clinical provider associated with this
                      clinical document. Clinical providers are a master list of providers
                      throughout the country.  These include providers as well as
                      radiology centers, labs and pharmacies.
                  providerid:
                    type: integer
                    description: Provider ID for this document
                  createddate:
                    type: string
                    description: Date the document was created. Please use createddatetime
                      instead.
                  encounterid:
                    type: string
                    description: Encounter ID
                  departmentid:
                    type: string
                    description: Department for the document
                  documentdate:
                    type: string
                    description: Date/time the observation was taken
                  externalnote:
                    type: string
                    description: External note for the patient.
                  internalnote:
                    type: string
                    description: The 'Internal Note' attached to this document
                  tietoorderid:
                    type: integer
                    description: Order ID of the order this document is tied to, if
                      any
                  appointmentid:
                    type: integer
                    description: The appointment ID for this document
                  documentclass:
                    type: string
                    description: Class of document
                  documentroute:
                    type: string
                    description: Explains method by which the document was entered
                      into the AthenaNet (INTERFACE (digital), FAX, etc.)
                  declinedreason:
                    type: array
                    items:
                      type: object
                      properties:
                        code:
                          type: string
                          description: The code indicating why the order was not given.
                        codeset:
                          type: string
                          description: The codeset that the code belongs to.
                        description:
                          type: string
                          description: The plaintext description of the reason the
                            order was not given.
                    description: List of codes indicating why the order was not given.
                      If this field is not present, the order was not declined. If
                      the array is empty, no reason has been chosen.
                  documentsource:
                    enum:
                    - ''
                    - PATIENT
                    - CAREGIVER
                    - PARTNER
                    - PHARMACY
                    - LAB
                    - PCP
                    - SPECIALIST
                    - STAFF
                    - HOSPITAL
                    - OTHER
                    - PORTAL
                    - Live Operator
                    type: string
                    description: Explains where this document originated.
                  documenttypeid:
                    type: integer
                    description: The ID of the description for this document
                  createddatetime:
                    type: string
                    description: Date/Time (ISO 8601) the document was created
                  deleteddatetime:
                    type: string
                    description: Date/time (ISO 8601) the document was deleted
                  documentsubclass:
                    type: string
                    description: Specific type of document
                  lastmodifieduser:
                    type: string
                    description: The user who last modified this document.
                  facilityordercode:
                    type: object
                    properties:
                      code:
                        type: string
                        description: The code in the facility specific vocabulary.
                      description:
                        type: string
                        description: When available, a description of the code from
                          the facility specific vocabulary.
                    description: Facility specific coding for the type of order
                  declinedreasontext:
                    type: string
                    description: The user-facing description of the reason the order
                      was not given.
                  specimensourcename:
                    type: string
                    description: The site (on the patient) where the specimen was
                      taken
                  documentdescription:
                    type: string
                    description: Description of the document type
                  externalaccessionid:
                    type: string
                    description: The external accession ID for this document. Format
                      depends on the system the ID belongs to.
                  internalaccessionid:
                    type: string
                    description: The internal accession ID for this document. Format
                      depends on the system the ID belongs to.
                  lastmodifieddatetime:
                    type: string
                    description: Date/time (ISO 8601) the document was last modified
                  specimendrawlocation:
                    type: string
                    description: Options are ExternalLab, Office, Home, AddOn
          description: Success
      operationId: getPracticeidPatientsPatientidDocumentsOrder
      x-scopes: []
      tags:
      - Forms and Documents
      - Document List By Class
  /v1/{practiceid}/patients/{patientid}/documents/order/{orderid}:
    get:
      summary: Get patient's order document
      description: Retrieves a specific order of the patient
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: patientid
        schema:
          type: integer
        required: true
        description: patientid
      - in: path
        name: orderid
        schema:
          type: integer
        required: true
        description: orderid
      - in: query
        name: showquestions
        schema:
          type: boolean
        required: false
        description: 'BETA FIELD: Some order types like labs and imaging orders have
          additional pertinant information in a question/answer format. Setting this
          will return that data.'
      - in: query
        name: showpreschedulingchecklist
        schema:
          type: boolean
        required: false
        description: Return any pre-scheduling checklist.
      - in: query
        name: showstructuredauthorizationdetails
        schema:
          type: boolean
        required: false
        description: 'BETA FIELD: When set, returns Prior Authorization and insurances
          for some order types, separately and in a structured version than those
          returned in showquestions.'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  pages:
                    type: array
                    items:
                      type: object
                      properties:
                        href:
                          type: string
                          description: The URL to get the document image.
                        pageid:
                          type: string
                          description: The ID to use in a call to get the page image.
                        contenttype:
                          type: string
                          description: The content-type that will be returned by the
                            page image call.
                        pageordering:
                          type: string
                          description: Within this list of pages, the ordering (starting
                            with 1).
                    description: An array of image pages associated with this document.
                  cclist:
                    type: array
                    items:
                      type: object
                      properties:
                        fax:
                          type: string
                          description: The fax number of this clinical provider.
                        zip:
                          type: string
                          description: The zipcode of this clinical provider.
                        city:
                          type: string
                          description: The city of this clinical provider.
                        name:
                          type: string
                          description: The name of this clinical provider.
                        phone:
                          type: string
                          description: The phone number of this clinical provider.
                        state:
                          type: string
                          description: The state of this clinical provider.
                        address:
                          type: string
                          description: The address of this clinical provider.
                    description: The list of order document carbon-copy providers.
                  status:
                    type: string
                    description: Status of the document
                  orderid:
                    type: integer
                    description: Order document id
                  subject:
                    type: string
                    description: Subject of the document
                  priority:
                    type: string
                    description: Document priority, when available. 1 is high, 2 is
                      normal. Some labs use other numbers or characters that are lab-specific.
                  alarmdays:
                    type: string
                    description: The number days until a document will go into followup
                      after being sent to the portal.
                  ordertype:
                    type: string
                    description: Order type group name
                  questions:
                    type: array
                    items:
                      type: object
                      properties:
                        answer:
                          type: string
                          description: The answer
                        question:
                          type: string
                          description: The question
                    description: 'BETA FIELD: The custom list of questions and answers
                      associated with this order. This list will vary by practice.'
                  submitter:
                    type: string
                    description: Submitter of a document.
                  actionnote:
                    type: string
                    description: The most recent action note for a document
                  assignedto:
                    type: string
                    description: Person the document is assigned to
                  facilityid:
                    type: integer
                    description: The ID of the clinical provider associated with this
                      clinical document. Clinical providers are a master list of providers
                      throughout the country.  These include providers as well as
                      radiology centers, labs and pharmacies.
                  insurances:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                          description: Name of the insurance.
                        memberid:
                          type: string
                          description: Member id.
                        sequence:
                          type: integer
                          description: 'Number indicating insurance sequence: 1 -
                            Primary, 2 - Secondary, 3 - Tertiary, 4 - Quaternary.'
                        visitsapproved:
                          type: integer
                          description: The number of visits approved.
                        effectiveenddate:
                          type: string
                          description: Effective end date.
                        effectivestartdate:
                          type: string
                          description: Effective start date.
                        insurancepackageid:
                          type: string
                          description: Insurance package id.
                        patientinsuranceid:
                          type: string
                          description: Patient insurance id.
                        authorizationnumber:
                          type: string
                          description: Authorization number.
                        authorizationstatus:
                          type: string
                          description: The authorization status for this insurance.
                        additionalinformation:
                          type: string
                          description: Additional information note.
                    description: Insurances used in prior authorization of the oder.
                  providerid:
                    type: integer
                    description: Provider ID for this document
                  attachments:
                    type: array
                    items:
                      type: object
                      properties:
                        documentid:
                          type: integer
                          description: ID of the attached document.
                        encounterid:
                          type: integer
                          description: ID of the attached encounter or order group
                        flowsheetid:
                          type: integer
                          description: ID of the attached flowsheet
                        sectionname:
                          type: string
                          description: Section name for the attached document.
                        documentclass:
                          type: string
                          description: Class of the attached document.
                        sectionnamekey:
                          type: string
                          description: Key name of the section of the attached document.
                        documentdescription:
                          type: string
                          description: A description of the attached document
                    description: Set of attachments on an order.
                  createddate:
                    type: string
                    description: Date the document was created. Please use createddatetime
                      instead.
                  createduser:
                    type: string
                    description: The user who created this document.
                  encounterid:
                    type: string
                    description: Encounter ID
                  performdate:
                    type: string
                    description: Date the order was performed.
                  approveddate:
                    type: string
                    description: The date this document was approved
                  departmentid:
                    type: string
                    description: Department for the document
                  documenttype:
                    type: string
                    description: The description for this document
                  externalnote:
                    type: string
                    description: External note for the patient.
                  internalnote:
                    type: string
                    description: The 'Internal Note' attached to this document
                  receivernote:
                    type: string
                    description: The external note sent to the receiving facility
                  tietoorderid:
                    type: integer
                    description: Order ID of the order this document is tied to, if
                      any
                  appointmentid:
                    type: integer
                    description: The appointment ID for this document
                  dateofservice:
                    type: string
                    description: Date of service for this order.
                  diagnosislist:
                    type: array
                    items:
                      type: object
                      properties:
                        diagnosiscode:
                          type: object
                          properties:
                            code:
                              type: string
                            codeset:
                              type: string
                            description:
                              type: string
                        snomedicdcodes:
                          type: array
                          items:
                            type: object
                            properties:
                              code:
                                type: string
                              codeset:
                                type: string
                              description:
                                type: string
                              unstrippeddiagnosiscode:
                                type: string
                        imodiagnosislist:
                          type: array
                          items:
                            type: object
                            properties:
                              id:
                                type: integer
                                description: The athena id of the imo diagnosis
                              imocode:
                                type: object
                                properties:
                                  code:
                                    type: string
                                    description: The IMO code for this diagnosis
                                  codeset:
                                    type: string
                                    description: Codeset for this code (IMO)
                                  laterality:
                                    type: string
                                    description: The laterality for this IMO code
                                  description:
                                    type: string
                                    description: The provider facing description for
                                      this IMO code
                                  needsrefinement:
                                    enum:
                                    - ''
                                    - false
                                    - true
                                    type: string
                                    description: Whether or not the IMO term supports
                                      further refinement
                                description: IMO code details for this diagnosis
                              icdcodes:
                                type: array
                                items:
                                  type: object
                                  properties:
                                    code:
                                      type: string
                                      description: ICD code for this diagnosis
                                    codeset:
                                      type: string
                                      description: Codeset for this code (ICD9 or
                                        ICD10)
                                    description:
                                      type: string
                                      description: Brief description for this code
                                description: List of relevant ICD codes for this IMO
                                  code
                              snomedcodes:
                                type: array
                                items:
                                  type: object
                                  properties:
                                    code:
                                      type: string
                                      description: SNOMED code for this diagnosis
                                    codeset:
                                      type: string
                                      description: Codeset for this code (SNOMED)
                                    description:
                                      type: string
                                      description: Brief description for this code
                                description: List of relevant SNOMED codes for this
                                  IMO code
                              patientfacingdescription:
                                type: string
                                description: The patient facing description for this
                                  IMO code
                              providerfacingdescription:
                                type: string
                                description: The provider facing description for this
                                  IMO code
                          description: List of IMO codes and data for this diagnosis
                            This API attribute is being rolled out and will be Generally
                            Available on or before TBD
                    description: Diagnoses for this document
                  documentclass:
                    type: string
                    description: Class of document
                  documentroute:
                    type: string
                    description: Explains method by which the document was entered
                      into the AthenaNet (INTERFACE (digital), FAX, etc.)
                  patientcaseid:
                    type: string
                    description: The patient case id
                  specimennotes:
                    type: string
                    description: Note included with the specimen
