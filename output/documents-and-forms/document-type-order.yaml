                    enum:
                    - ''
                    - false
                    - true
                    type: string
                  documentid:
                    description: The id of this order.
                    type: integer
                  encounterid:
                    description: The ID of the clinical encounter this order is associated
                      with.
                    type: integer
                  externalnote:
                    description: Note to the provider.
                    type: string
                  localpatientid:
                    description: The local ID of the patient this order is associated
                      with.
                    type: integer
                  ordergenusname:
                    description: It represents a class of vaccine.
                    type: string
                  orderingprovider:
                    description: The username of the provider who created the order.
                    type: string
                  outofnetworkreason:
                    description: Out of network reason
                    type: string
                  patientid:
                    description: The ID of the patient this order is associated with.
                    type: integer
                  status:
                    description: Current status of the order.
                    type: string
                type: object
          description: Success
