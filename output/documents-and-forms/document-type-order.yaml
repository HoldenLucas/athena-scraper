                    type: string
                  deniedtimestamp:
                    description: The timestamp when this order was denied. Blank if
                      the order has not been denied.
                    type: string
                  departmentid:
                    description: The ID of the department this order is associated
                      with.
                    type: integer
                  description:
                    description: A description of this document.
                    type: string
                  documentationonly:
                    description: A boolean field describing if this order is documentation
