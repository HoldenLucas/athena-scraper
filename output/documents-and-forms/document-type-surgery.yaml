openapi: 3.0.0
info:
  description: Welcome to the API developer portal which gives third parties access
    to our APIs and sandbox to develop integrated solutions that will enhance the
    value and functionality offered by athenaOne®.
  title: athena API collection
  version: '0.1'
components:
  securitySchemes:
    api_auth_preview:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://api.preview.platform.athenahealth.com/oauth2/v1/token
          scopes:
            athena/service/Athenanet.MDP.*: API Preview
    api_auth:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://api.platform.athenahealth.com/oauth2/v1/token
          scopes:
            athena/service/Athenanet.MDP.*: API Production
    bearer_auth:
      type: http
      scheme: bearer
servers:
- url: https://api.preview.platform.athenahealth.com
  description: Preview
- url: https://api.platform.athenahealth.com
  description: Production
paths:
  /v1/{practiceid}/patients/{patientid}/documents/surgery:
    get:
      summary: Get list of surgery documents
      description: Retrieves a list of surgery documents of a specific patient
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: patientid
        schema:
          type: integer
        required: true
        description: patientid
      - in: query
        name: departmentid
        schema:
          type: integer
        required: true
        description: The athenaNet department id.
      - in: query
        name: encounterid
        schema:
          type: integer
        required: false
        description: Show only documents attached to this encounter.
      - in: query
        name: enddate
        schema:
          type: string
        required: false
        description: An optional filter to specify the end of the documents search
          date range (MM/DD/YYYY). Inclusive.
      - in: query
        name: status
        schema:
          enum:
          - ADMINISTER
          - CLOSED
          - DATAENTRY
          - DELETED
          - DISPENSE
          - FOLLOWUP
          - HOLD
          - NOTIFY
          - PEND
          - PENDING
          - PENDINGLABEL
          - PERFORM
          - REVIEW
          - SCHEDULE
          - SCHEDULED
          - SUBMIT
          - SUBMITTED
          type: string
          x-enumDescriptions:
          - ADMINISTER
          - CLOSED
          - DATAENTRY
          - DELETED
          - DISPENSE
          - FOLLOWUP
          - HOLD
          - NOTIFY
          - PEND
          - PENDING
          - PENDINGLABEL
          - PERFORM
          - REVIEW
          - SCHEDULE
          - SCHEDULED
          - SUBMIT
          - SUBMITTED
        required: false
        description: The status of the task to filter document results.
      - in: query
        name: documentclass
        schema:
          type: string
        required: false
        description: The class(es) of document(s) comma separated.
      - in: query
        name: documentsubclass
        schema:
          type: string
        required: false
        description: The document subclass to filter document results.
      - in: query
        name: showdeleted
        schema:
          type: boolean
        required: false
        description: By default, deleted documents are not listed.  Set to list these.
      - in: query
        name: showdeclinedorders
        schema:
          type: boolean
        required: false
        description: If set, include orders that were declined
      - in: query
        name: startdate
        schema:
          type: string
        required: false
        description: An optional filter to specify the start of the documents search
          date range (MM/DD/YYYY). Inclusive.
      - in: query
        name: limit
        schema:
          type: integer
        required: false
        description: Number of entries to return (default 1500, max 5000)
      - in: query
        name: offset
        schema:
          type: integer
        required: false
        description: Starting point of entries; 0-indexed
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  cclist:
                    type: array
                    items:
                      type: object
                      properties:
                        fax:
                          type: string
                          description: The fax number of this clinical provider.
                        zip:
                          type: string
                          description: The zipcode of this clinical provider.
                        city:
                          type: string
                          description: The city of this clinical provider.
                        name:
                          type: string
                          description: The name of this clinical provider.
                        phone:
                          type: string
                          description: The phone number of this clinical provider.
                        state:
                          type: string
                          description: The state of this clinical provider.
                        address:
                          type: string
                          description: The address of this clinical provider.
                    description: The list of order document carbon-copy providers.
                  status:
                    type: string
                    description: Status of the document
                  subject:
                    type: string
                    description: Subject of the document
                  priority:
                    type: string
                    description: Document priority, when available. 1 is high, 2 is
                      normal. Some labs use other numbers or characters that are lab-specific.
                  ordertype:
                    type: string
                    description: Order type group name
                  patientid:
                    type: integer
                    description: The athenaNet patient ID.
                  surgeryid:
                    type: integer
                    description: ID of a surgery document
                  assignedto:
                    type: string
                    description: Person the document is assigned to
                  providerid:
                    type: integer
                    description: Provider ID for this document
                  createddate:
                    type: string
                    description: Date the document was created. Please use createddatetime
                      instead.
                  encounterid:
                    type: string
                    description: Encounter ID
                  patientnote:
                    type: string
                    description: External note for the patient.
                  departmentid:
                    type: string
                    description: Department for the document
                  internalnote:
                    type: string
                    description: The 'Internal Note' attached to this document
                  receivernote:
                    type: string
                    description: The external note sent to the receiving facility
                  tietoorderid:
                    type: integer
                    description: Order ID of the order this document is tied to, if
                      any
                  appointmentid:
                    type: integer
                    description: The appointment ID for this document
                  documentclass:
                    type: string
                    description: Class of document
                  documentroute:
                    type: string
                    description: Explains method by which the document was entered
                      into the AthenaNet (INTERFACE (digital), FAX, etc.)
                  declinedreason:
                    type: array
                    items:
                      type: object
                      properties:
                        code:
                          type: string
                          description: The code indicating why the order was not given.
                        codeset:
                          type: string
                          description: The codeset that the code belongs to.
                        description:
                          type: string
                          description: The plaintext description of the reason the
                            order was not given.
                    description: List of codes indicating why the order was not given.
                      If this field is not present, the order was not declined. If
                      the array is empty, no reason has been chosen.
                  documentsource:
                    enum:
                    - ''
                    - PATIENT
                    - CAREGIVER
                    - PARTNER
                    - PHARMACY
                    - LAB
                    - PCP
                    - SPECIALIST
                    - STAFF
                    - HOSPITAL
                    - OTHER
                    - PORTAL
                    - Live Operator
                    type: string
                    description: Explains where this document originated.
                  documenttypeid:
                    type: integer
                    description: The ID of the description for this document
                  createddatetime:
                    type: string
                    description: Date/Time (ISO 8601) the document was created
                  deleteddatetime:
                    type: string
                    description: Date/time (ISO 8601) the document was deleted
                  documentsubclass:
                    type: string
                    description: Specific type of document
                  futuresubmitdate:
                    type: string
                    description: The future submit date in the format mm/dd/yyyy.
                  lastmodifieduser:
                    type: string
                    description: The user who last modified this document.
                  clinicalproviderid:
                    type: integer
                    description: The ID of the clinical provider associated with this
                      clinical document. Clinical providers are a master list of providers
                      throughout the country.  These include providers as well as
                      radiology centers, labs and pharmacies.
                  declinedreasontext:
                    type: string
                    description: The user-facing description of the reason the order
                      was not given.
                  documentdescription:
                    type: string
                    description: Description of the document type
                  externalaccessionid:
                    type: string
                    description: The external accession ID for this document. Format
                      depends on the system the ID belongs to.
                  internalaccessionid:
                    type: string
                    description: The internal accession ID for this document. Format
                      depends on the system the ID belongs to.
                  observationdatetime:
                    type: string
                    description: Date/time (ISO 8601) the observation was taken
                  lastmodifieddatetime:
                    type: string
                    description: Date/time (ISO 8601) the document was last modified
          description: Success
      operationId: getPracticeidPatientsPatientidDocumentsSurgery
      x-scopes: []
      tags:
      - Forms and Documents
      - Document List By Class
  /v1/{practiceid}/patients/{patientid}/documents/surgery/{surgeryid}:
    get:
      summary: Get specific surgery document
      description: Retrieves information for a specific surgery document
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: surgeryid
        schema:
          type: integer
        required: true
        description: surgeryid
      - in: path
        name: patientid
        schema:
          type: integer
        required: true
        description: patientid
      - in: query
        name: showquestions
        schema:
          type: boolean
        required: false
        description: Some order types like labs and imaging orders have additional
          pertinant information in a question/answer format. Setting this will return
          that data.
      - in: query
        name: showpreschedulingchecklist
        schema:
          type: boolean
        required: false
        description: Return any pre-scheduling checklist.
      - in: query
        name: showstructuredauthorizationdetails
        schema:
          type: boolean
        required: false
        description: When set, returns Prior Authorization and insurances for some
          order types, separately and in a structured version than those returned
          in showquestions.
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  actionnote:
                    description: The most recent action note for a document
                    type: string
                  alarmdays:
                    description: The number days until a document will go into followup
                      after being sent to the portal.
                    type: string
                  appointmentid:
                    description: The appointment ID for this document
                    type: integer
                  approveddate:
                    description: The date this document was approved
                    type: string
                  assignedto:
                    description: Person the document is assigned to
                    type: string
                  attachments:
                    description: Set of attachments on an order.
                    items:
                      properties:
                        documentclass:
                          description: Class of the attached document.
                          type: string
                        documentdescription:
                          description: A description of the attached document
                          type: string
                        documentid:
                          description: ID of the attached document.
                          type: integer
                        encounterid:
                          description: ID of the attached encounter or order group
                          type: integer
                        flowsheetid:
                          description: ID of the attached flowsheet
                          type: integer
                        sectionname:
                          description: Section name for the attached document.
                          type: string
                        sectionnamekey:
                          description: Key name of the section of the attached document.
                          type: string
                      type: object
                    type: array
                  cclist:
                    description: The list of order document carbon-copy providers.
                    items:
                      properties:
                        address:
                          description: The address of this clinical provider.
                          type: string
                        city:
                          description: The city of this clinical provider.
                          type: string
                        fax:
                          description: The fax number of this clinical provider.
                          type: string
                        name:
                          description: The name of this clinical provider.
                          type: string
                        phone:
                          description: The phone number of this clinical provider.
                          type: string
                        state:
                          description: The state of this clinical provider.
                          type: string
                        zip:
                          description: The zipcode of this clinical provider.
                          type: string
                      type: object
                    type: array
                  createddate:
                    description: Date the document was created. Please use createddatetime
                      instead.
                    type: string
                  createddatetime:
                    description: Date/Time (ISO 8601) the document was created
                    type: string
                  createduser:
                    description: The user who created this document.
                    type: string
                  dateofservice:
                    description: Date of service for this order.
                    type: string
                  declinedreason:
                    description: List of codes indicating why the order was not given.
                      If this field is not present, the order was not declined. If
                      the array is empty, no reason has been chosen.
                    items:
                      properties:
                        code:
                          description: The code indicating why the order was not given.
                          type: string
                        codeset:
                          description: The codeset that the code belongs to.
                          type: string
                        description:
                          description: The plaintext description of the reason the
                            order was not given.
                          type: string
                      type: object
                    type: array
                  declinedreasontext:
                    description: The user-facing description of the reason the order
                      was not given.
                    type: string
                  deleteddatetime:
                    description: Date/time (ISO 8601) the document was deleted
                    type: string
                  departmentid:
                    description: Department for the document
                    type: string
                  diagnosislist:
                    description: Diagnoses for this document
                    items:
                      properties:
                        diagnosiscode:
                          properties:
                            code:
                              type: string
                            codeset:
                              type: string
                            description:
                              type: string
                          type: object
                        imodiagnosislist:
                          description: List of IMO codes and data for this diagnosis
                            This API attribute is being rolled out and will be Generally
                            Available on or before TBD
                          items:
                            properties:
                              icdcodes:
                                description: List of relevant ICD codes for this IMO
                                  code
                                items:
                                  properties:
                                    code:
                                      description: ICD code for this diagnosis
                                      type: string
                                    codeset:
                                      description: Codeset for this code (ICD9 or
                                        ICD10)
                                      type: string
                                    description:
                                      description: Brief description for this code
                                      type: string
                                  type: object
                                type: array
                              id:
                                description: The athena id of the imo diagnosis
                                type: integer
                              imocode:
                                description: IMO code details for this diagnosis
                                properties:
                                  code:
                                    description: The IMO code for this diagnosis
                                    type: string
                                  codeset:
                                    description: Codeset for this code (IMO)
                                    type: string
                                  description:
                                    description: The provider facing description for
                                      this IMO code
                                    type: string
                                  laterality:
                                    description: The laterality for this IMO code
                                    type: string
                                  needsrefinement:
                                    description: Whether or not the IMO term supports
                                      further refinement
                                    enum:
                                    - ''
                                    - false
                                    - true
                                    type: string
                                type: object
                              patientfacingdescription:
                                description: The patient facing description for this
                                  IMO code
                                type: string
                              providerfacingdescription:
                                description: The provider facing description for this
                                  IMO code
                                type: string
                              snomedcodes:
                                description: List of relevant SNOMED codes for this
                                  IMO code
                                items:
                                  properties:
                                    code:
                                      description: SNOMED code for this diagnosis
                                      type: string
                                    codeset:
                                      description: Codeset for this code (SNOMED)
                                      type: string
                                    description:
                                      description: Brief description for this code
                                      type: string
                                  type: object
                                type: array
                            type: object
                          type: array
                        snomedicdcodes:
                          items:
                            properties:
                              code:
                                type: string
                              codeset:
                                type: string
                              description:
                                type: string
                              unstrippeddiagnosiscode:
                                type: string
                            type: object
                          type: array
                      type: object
                    type: array
                  documentclass:
                    description: Class of document
                    type: string
                  documentdescription:
                    description: Description of the document type
                    type: string
                  documentroute:
                    description: Explains method by which the document was entered
                      into the AthenaNet (INTERFACE (digital), FAX, etc.)
                    type: string
                  documentsource:
                    description: Explains where this document originated.
                    enum:
                    - ''
                    - PATIENT
                    - CAREGIVER
                    - PARTNER
                    - PHARMACY
                    - LAB
                    - PCP
                    - SPECIALIST
                    - STAFF
                    - HOSPITAL
                    - OTHER
                    - PORTAL
                    - Live Operator
                    type: string
                  documentsubclass:
                    description: Specific type of document
                    type: string
                  documenttype:
                    description: The description for this document
                    type: string
                  documenttypeid:
                    description: The ID of the description for this document
                    type: integer
                  encounterid:
                    description: Encounter ID
                    type: string
                  externalaccessionid:
                    description: The external accession ID for this document. Format
                      depends on the system the ID belongs to.
                    type: string
                  externalnote:
                    description: External note for the patient.
                    type: string
                  facilityid:
                    description: The ID of the clinical provider associated with this
                      clinical document. Clinical providers are a master list of providers
                      throughout the country.  These include providers as well as
                      radiology centers, labs and pharmacies.
                    type: integer
                  hassummarycare:
                    description: If true, document has a summary care record.
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                  insurances:
                    description: Insurances used in prior authorization of the oder.
                    items:
                      properties:
                        additionalinformation:
                          description: Additional information note.
                          type: string
                        authorizationnumber:
                          description: Authorization number.
                          type: string
                        authorizationstatus:
                          description: The authorization status for this insurance.
                          type: string
                        effectiveenddate:
                          description: Effective end date.
                          type: string
                        effectivestartdate:
                          description: Effective start date.
                          type: string
                        insurancepackageid:
                          description: Insurance package id.
                          type: string
                        memberid:
                          description: Member id.
                          type: string
                        name:
                          description: Name of the insurance.
                          type: string
                        patientinsuranceid:
                          description: Patient insurance id.
                          type: string
                        sequence:
                          description: 'Number indicating insurance sequence: 1 -
                            Primary, 2 - Secondary, 3 - Tertiary, 4 - Quaternary.'
                          type: integer
                        visitsapproved:
                          description: The number of visits approved.
                          type: integer
                      type: object
                    type: array
                  internalaccessionid:
                    description: The internal accession ID for this document. Format
                      depends on the system the ID belongs to.
                    type: string
                  internalnote:
                    description: The 'Internal Note' attached to this document
                    type: string
                  lastmodifieddatetime:
                    description: Date/time (ISO 8601) the document was last modified
                    type: string
                  lastmodifieduser:
                    description: The user who last modified this document.
                    type: string
                  observationdate:
                    type: string
                  observationdatetime:
                    description: Date/time (ISO 8601) the observation was taken
                    type: string
                  orderid:
                    description: Order document id
                    type: integer
                  ordertype:
                    description: Order type group name
                    type: string
                  outofnetworkreferralreasonid:
                    description: ID of the out of network referral reason.
                    type: integer
                  pages:
                    description: An array of image pages associated with this document.
                    items:
                      properties:
                        contenttype:
                          description: The content-type that will be returned by the
                            page image call.
                          type: string
                        href:
                          description: The URL to get the document image.
                          type: string
                        pageid:
                          description: The ID to use in a call to get the page image.
                          type: string
                        pageordering:
                          description: Within this list of pages, the ordering (starting
                            with 1).
                          type: string
                      type: object
                    type: array
                  patientcaseid:
                    description: The patient case id
                    type: string
                  performdate:
                    description: Date the order was performed.
                    type: string
                  performingprovider:
                    description: The performing provider of the order.
                    type: string
                  placeofservice:
                    description: CMS Place of Service name.
                    type: string
                  placeofserviceid:
                    description: CMS Place of Service code.
                    type: string
                  preschedulingchecklist:
                    description: The custom list of questions and answers associated
                      with this order. This list will vary by practice.
                    items:
                      properties:
                        notes:
                          description: Checklist note.
                          type: string
                        status:
                          description: 'Checklist status: INCOMPLETE, COMPLETE, N/A'
                          type: string
                        task:
                          description: Checklist task name
                          type: string
                      type: object
                    type: array
                  priority:
                    description: Document priority, when available. 1 is high, 2 is
                      normal. Some labs use other numbers or characters that are lab-specific.
                    type: string
                  procedurecodes:
                    description: CPT codes associated with this order.
                    type: array
                  providerid:
                    description: Provider ID for this document
                    type: integer
                  questions:
                    description: 'BETA FIELD: The custom list of questions and answers
                      associated with this order. This list will vary by practice.'
                    items:
                      properties:
                        answer:
                          description: The answer
                          type: string
                        question:
                          description: The question
                          type: string
                      type: object
                    type: array
                  receivernote:
                    description: The external note sent to the receiving facility
                    type: string
                  requestedvisits:
                    description: The number of requested visits.
                    type: integer
                  specimencollectedby:
                    description: The username of the individual who took the specimen
                    type: string
                  specimencollectiondatetime:
                    description: Date/time (ISO 8601) of the specimen collection
                    type: string
                  specimencollectionsite:
                    description: Options are ExternalLab, Office, Home, AddOn
                    type: string
                  specimennotes:
                    description: Note included with the specimen
                    type: string
                  specimensourceid:
                    description: "The internal ID of the site (on the patient) where\
                      \ the specimen was taken. Deprecated.\tUse SPECIMENSOURCENAME"
                    type: integer
                  specimensourcename:
                    description: The site (on the patient) where the specimen was
                      taken
                    type: string
                  standingorderdurationdays:
                    description: Duration of the standing order
                    type: integer
                  standingorderfrequencydays:
                    description: Frequency at which the order repeats
                    type: integer
                  standingorderstartdate:
                    description: Start date of the standing order
                    type: string
                  status:
                    description: Status of the document
                    type: string
                  subject:
                    description: Subject of the document
                    type: string
                  submitter:
                    description: Submitter of a document.
                    type: string
                  summarycaredocumentid:
                    description: ID of the summary care document.
                    type: integer
                  tiedtodocuments:
                    description: All documents that are tied to this order
                    items:
                      properties:
                        documentclass:
                          description: The document class.
                          type: string
                        documentid:
                          description: The document id.
                          type: integer
                        documentsubclass:
                          description: The document subclass.
                          type: string
                      type: object
                    type: array
                  tietoorderid:
                    description: Order ID of the order this document is tied to, if
                      any
                    type: integer
                type: object
          description: Success
      operationId: getPracticeidPatientsPatientidDocumentsSurgerySurgeryid
      x-scopes: []
      tags:
      - Forms and Documents
      - Document Details
