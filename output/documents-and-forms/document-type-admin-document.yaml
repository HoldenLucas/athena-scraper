openapi: 3.0.0
info:
  description: Welcome to the API developer portal which gives third parties access
    to our APIs and sandbox to develop integrated solutions that will enhance the
    value and functionality offered by athenaOne®.
  title: athena API collection
  version: '0.1'
components:
  securitySchemes:
    api_auth_preview:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://api.preview.platform.athenahealth.com/oauth2/v1/token
          scopes:
            athena/service/Athenanet.MDP.*: API Preview
    api_auth:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://api.platform.athenahealth.com/oauth2/v1/token
          scopes:
            athena/service/Athenanet.MDP.*: API Production
    bearer_auth:
      type: http
      scheme: bearer
servers:
- url: https://api.preview.platform.athenahealth.com
  description: Preview
- url: https://api.platform.athenahealth.com
  description: Production
paths:
  /v1/{practiceid}/documents/admin:
    post:
      summary: Add admin document without linking to a patient
      description: Create and record a admin document not specific to a patient
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: header
        name: Content-Type
        schema:
          type: string
        required: true
        description: Content type of the payload
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  adminid:
                    type: integer
                    description: The document ID of the new or modified document.
                  success:
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                    description: Returns true/false if the operation was successful.
                  errormessage:
                    type: string
                    description: If the operation failed, this will contain an error
                      message.
          description: Success
      operationId: postPracticeidDocumentsAdmin
      x-scopes: []
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              required:
              - departmentid
              - documentsubclass
              properties:
                priority:
                  enum:
                  - ''
                  - 1
                  - 2
                  type: string
                  description: Priority of this result.  1 is high; 2 is normal.
                autoclose:
                  type: boolean
                  description: Documents will, normally, automatically appear in the
                    clinical inbox for providers to review. In some cases, you might
                    want to force the document to skip the clinical inbox, and go
                    directly to the patient chart with a "closed" status. For that
                    case, set this to true.
                providerid:
                  type: integer
                  description: The ID of the ordering provider.
                departmentid:
                  type: integer
                  description: The athenaNet department ID associated with the uploaded
                    document.
                documentdata:
                  type: string
                  description: Text data stored with document
                documentdate:
                  type: string
                  description: The date an observation was made (mm/dd/yyyy).
                internalnote:
                  type: string
                  description: An internal note for the provider or staff. Updating
                    this will append to any previous notes and has a limit of 4000
                    characters.
                attachmenttype:
                  enum:
                  - ''
                  - BMP
                  - GIF
                  - JPG
                  - JPEG
                  - PDF
                  - PNG
                  - TIF
                  - TIFF
                  type: string
                  default: PDF
                  description: The file type of the attachment.
                documenttypeid:
                  type: integer
                  description: A specific document type identifier.
                documentsubclass:
                  enum:
                  - ADMIN
                  - BILLING
                  - REFERRAL
                  type: string
                  description: Subclasses for ADMIN documents
                originalfilename:
                  type: string
                  description: The original file name of this document without the
                    file extension. Filename should not exceed 200 characters.
                attachmentcontents:
                  type: string
                  description: The file contents that will be attached to this document.
                    PDFs are recommended. Please note encrypted PDFs are not supported
                    with document upload APIs.
        required: true
      tags:
      - Forms and Documents
      - Document List By Class
    get:
      summary: Get list of admin documents not linked to a patient
      description: Retrieve list of admin documents
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: query
        name: departmentid
        schema:
          type: integer
        required: true
        description: The athenaNet department ID associated with the uploaded document.
      - in: query
        name: providerid
        schema:
          type: integer
        required: false
        description: The ID of the ordering provider.
      - in: query
        name: showclosed
        schema:
          type: boolean
        required: false
        description: Allow documents in the CLOSED status to be returned.
      - in: query
        name: enddate
        schema:
          type: string
        required: true
        description: The end date in a range (mm/dd/yyyy).
      - in: query
        name: status
        schema:
          enum:
          - ADMINISTER
          - CLOSED
          - DATAENTRY
          - DELETED
          - DISPENSE
          - FOLLOWUP
          - HOLD
          - NOTIFY
          - PEND
          - PENDING
          - PENDINGLABEL
          - PERFORM
          - REVIEW
          - SCHEDULE
          - SCHEDULED
          - SUBMIT
          - SUBMITTED
          type: string
          x-enumDescriptions:
          - Administer
          - Closed
          - Dataentry
          - Deleted
          - Dispense
          - Followup
          - Hold
          - Notify
          - Pend
          - Pending
          - Pendinglabel
          - Perform
          - Review
          - Schedule
          - Scheduled
          - Submit
          - Submitted
        required: false
        description: Show only documents of this status.  CLOSED will also set SHOWCLOSED
          to true.  DELETED will set SHOWDELETED to true.
      - in: query
        name: showdocumentswithpatientid
        schema:
          type: boolean
        required: false
        description: Allow documents with patient IDs assigned to be returned.
      - in: query
        name: documentsubclass
        schema:
          type: string
        required: true
        description: The subclass of the documents being processed.
      - in: query
        name: showdeleted
        schema:
          type: boolean
        required: false
        description: Allow documents that have been deleted to be returned.
      - in: query
        name: startdate
        schema:
          type: string
        required: true
        description: The start date in a range (mm/dd/yyyy).
      - in: query
        name: limit
        schema:
          type: integer
        required: false
        description: Number of entries to return (default 1000, max 1000)Please note
          that this endpoint has a different default and max than normal.
      - in: query
        name: offset
        schema:
          type: integer
        required: false
        description: Starting point of entries; 0-indexed
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  adminid:
                    description: The primary key for administrative class of documents
                    type: integer
                  appointmentid:
                    description: The appointment ID for this document
                    type: integer
                  assignedto:
                    description: Person the document is assigned to
                    type: string
                  clinicalproviderid:
                    description: The ID of the clinical provider associated with this
                      clinical document. Clinical providers are a master list of providers
                      throughout the country.  These include providers as well as
                      radiology centers, labs and pharmacies.
                    type: integer
                  createddate:
                    description: Date the document was created. Please use createddatetime
                      instead.
                    type: string
                  createddatetime:
                    description: Date/Time (ISO 8601) the document was created
                    type: string
                  createduser:
                    description: The user who created this document.
                    type: string
                  deleteddatetime:
                    description: Date/time (ISO 8601) the document was deleted
                    type: string
                  departmentid:
                    description: Department for the document
                    type: string
                  description:
                    description: Description of the document type
                    type: string
                  documentclass:
                    description: Class of document
                    type: string
                  documentdate:
                    description: Date/time the observation was taken
                    type: string
                  documentroute:
                    description: Explains method by which the document was entered
                      into the AthenaNet (INTERFACE (digital), FAX, etc.)
                    type: string
                  documentsource:
                    description: Explains where this document originated.
                    enum:
                    - ''
                    - PATIENT
                    - CAREGIVER
                    - PARTNER
                    - PHARMACY
                    - LAB
                    - PCP
                    - SPECIALIST
                    - STAFF
                    - HOSPITAL
                    - OTHER
                    - PORTAL
                    - Live Operator
                    type: string
                  documentsubclass:
                    description: Specific type of document
                    type: string
                  documenttypeid:
                    description: A specific document type identifier.
                    type: integer
                  encounterid:
                    description: Encounter ID
                    type: string
                  entitytype:
                    description: Type of entity creating the document. Possible values
                      are PROVIDER, PATIENT and OTHERS.
                    type: string
                  externalaccessionid:
                    description: The external accession ID for this document. Format
                      depends on the system the ID belongs to.
                    type: string
                  externalnote:
                    description: External note for the patient.
                    type: string
                  fileextension:
                    description: The file extension of this document.
                    type: string
                  filesize:
                    description: The file size of this document.
                    type: number
                  internalaccessionid:
                    description: The internal accession ID for this document. Format
                      depends on the system the ID belongs to.
                    type: string
                  internalnote:
                    description: The 'Internal Note' attached to this document
                    type: string
                  lastmodifieddate:
                    description: Date/time (ISO 8601) the document was last modified
                    type: string
                  lastmodifieddatetime:
                    description: Date/time (ISO 8601) the document was last modified
                    type: string
                  lastmodifieduser:
                    description: The user who last modified this document.
                    type: string
                  originalfilename:
                    description: The original file name of this document.
                    type: string
                  patientid:
                    description: The athenaNet patient ID.
                    type: integer
                  priority:
                    description: Document priority, when available. 1 is high, 2 is
                      normal. Some labs use other numbers or characters that are lab-specific.
                    type: string
                  providerid:
                    description: Provider ID for this document
                    type: integer
                  providerusername:
                    description: The username of the provider associated with this
                      document.
                    type: string
                  status:
                    description: Status of the document
                    type: string
                  subject:
                    description: Subject of the document
                    type: string
                  tietoorderid:
                    description: Order ID of the order this document is tied to, if
                      any
                    type: integer
                type: object
          description: Success
      operationId: getPracticeidDocumentsAdmin
      x-scopes: []
      tags:
      - Forms and Documents
      - Document List By Class
  /v1/{practiceid}/documents/admin/{adminid}:
    get:
      summary: Get specific admin document without specifying patient ID
      description: Retrieve an admin document specific to the admin ID
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: adminid
        schema:
          type: integer
        required: true
        description: adminid
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  actionnote:
                    description: The most recent action note for a document
                    type: string
                  adminid:
                    description: The primary key for administrative class of documents
                    type: integer
                  appointmentid:
                    description: The appointment ID for this document
                    type: integer
                  assignedto:
                    description: Person the document is assigned to
                    type: string
                  clinicalproviderid:
                    description: The ID of the clinical provider associated with this
                      clinical document. Clinical providers are a master list of providers
                      throughout the country.  These include providers as well as
                      radiology centers, labs and pharmacies.
                    type: integer
                  createddate:
                    description: Date the document was created. Please use createddatetime
                      instead.
                    type: string
                  createddatetime:
                    description: Date/Time (ISO 8601) the document was created
                    type: string
                  createduser:
                    description: The user who created this document.
                    type: string
                  deleteddatetime:
                    description: Date/time (ISO 8601) the document was deleted
                    type: string
                  departmentid:
                    description: Department for the document
                    type: string
                  description:
                    description: Description of the document type
                    type: string
                  documentclass:
                    description: Class of document
                    type: string
                  documentdata:
                    description: Text data associated with this document.
                    type: string
                  documentdate:
                    description: Date/time the observation was taken
                    type: string
                  documentroute:
                    description: Explains method by which the document was entered
                      into the AthenaNet (INTERFACE (digital), FAX, etc.)
                    type: string
                  documentsource:
                    description: Explains where this document originated.
                    enum:
                    - ''
                    - PATIENT
                    - CAREGIVER
                    - PARTNER
                    - PHARMACY
                    - LAB
                    - PCP
                    - SPECIALIST
                    - STAFF
                    - HOSPITAL
                    - OTHER
                    - PORTAL
                    - Live Operator
                    type: string
                  documentsubclass:
                    description: Specific type of document
                    type: string
                  documenttypeid:
                    description: A specific document type identifier.
                    type: integer
                  encounterid:
                    description: Encounter ID
                    type: string
                  entitytype:
                    description: Type of entity creating the document. Possible values
                      are PROVIDER, PATIENT and OTHERS.
                    type: string
                  externalaccessionid:
                    description: The external accession ID for this document. Format
                      depends on the system the ID belongs to.
                    type: string
                  externalnote:
                    description: External note for the patient.
                    type: string
                  internalaccessionid:
                    description: The internal accession ID for this document. Format
                      depends on the system the ID belongs to.
                    type: string
                  internalnote:
                    description: The 'Internal Note' attached to this document
                    type: string
                  lastmodifieddate:
                    description: Date/time (ISO 8601) the document was last modified
                    type: string
                  lastmodifieddatetime:
                    description: Date/time (ISO 8601) the document was last modified
                    type: string
                  lastmodifieduser:
                    description: The user who last modified this document.
                    type: string
                  originaldocument:
                    description: URL and content-type to download the original document.
                      "originaldocument" is returned when document source is FAX or
                      UPLOAD and originally faxed or uploaded file is not split into
                      multiple documents. Please use "pages" to download document
                      pages when "originaldocument" is not available.
                    properties:
                      contenttype:
                        description: The content-type of the original document.
                        type: string
                      href:
                        description: The URL to get the original document.
                        type: string
                    type: object
                  pages:
                    description: An array of image pages associated with this document.
                    items:
                      properties:
                        contenttype:
                          description: The content-type that will be returned by the
                            page image call.
                          type: string
                        href:
                          description: The URL to get the document image.
                          type: string
                        pageid:
                          description: The ID to use in a call to get the page image.
                          type: string
                        pageordering:
                          description: Within this list of pages, the ordering (starting
                            with 1).
                          type: string
                      type: object
                    type: array
                  patientid:
                    description: The athenaNet patient ID.
                    type: integer
                  priority:
                    description: Document priority, when available. 1 is high, 2 is
                      normal. Some labs use other numbers or characters that are lab-specific.
                    type: string
                  providerid:
                    description: Provider ID for this document
                    type: integer
                  providerusername:
                    description: The username of the provider associated with this
                      document.
                    type: string
                  status:
                    description: Status of the document
                    type: string
                  subject:
                    description: Subject of the document
                    type: string
                  tiedtoprocedureorsurgery:
                    description: Link to retrieve the tied to surgery/procedure document.
                    type: string
                  tietoorderid:
                    description: Order ID of the order this document is tied to, if
                      any
                    type: integer
                type: object
          description: Success
      operationId: getPracticeidDocumentsAdminAdminid
      x-scopes: []
      tags:
      - Forms and Documents
      - Document List By Class
    put:
      summary: Update admin document  without specifying patient ID
      description: Modify an admin document specific to the admin ID
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: adminid
        schema:
          type: integer
        required: true
        description: adminid
      - in: header
        name: Content-Type
        schema:
          type: string
        required: true
        description: Content type of the payload
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  adminid:
                    description: The document ID of the new or modified document.
                    type: integer
                  errormessage:
                    description: If the operation failed, this will contain an error
                      message.
                    type: string
                  success:
                    description: Returns true/false if the operation was successful.
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                type: object
          description: Success
      operationId: putPracticeidDocumentsAdminAdminid
      x-scopes: []
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                adminid:
                  type: integer
                  description: The document ID of the edited document.
                priority:
                  enum:
                  - ''
                  - 1
                  - 2
                  type: string
                  description: Priority of this result.  1 is high; 2 is normal.
                assignedto:
                  type: string
                  description: Username to reassign the document to
                providerid:
                  type: integer
                  description: The ID of the ordering provider.
                documentdate:
                  type: string
                  description: The date an observation was made (mm/dd/yyyy).
                internalnote:
                  type: string
                  description: An internal note for the provider or staff. Updating
                    this will append to any previous notes and has a limit of 4000
                    characters.
                documenttypeid:
                  type: integer
                  description: A specific document type identifier.
        required: true
      tags:
      - Forms and Documents
      - Document List By Class
  /v1/{practiceid}/documents/admin/{adminid}/actions:
    get:
      summary: Get admin document's action notes
      description: Retrieve a list of all action notes on a specific admin document
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: adminid
        schema:
          type: integer
        required: true
        description: adminid
      - in: query
        name: limit
        schema:
          type: integer
        required: false
        description: Number of entries to return (default 1500, max 5000)
      - in: query
        name: offset
        schema:
          type: integer
        required: false
        description: Starting point of entries; 0-indexed
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  actionnote:
                    description: The action notes that are attached to the document.
                    type: string
                  assignedto:
                    description: This field will describe who was assigned this document
                      during this document action.
                    type: string
                  createdby:
                    description: The username of the person that created this document
                      action.
                    type: string
                  createddatetime:
                    description: The datetime this action note was created.
                    type: string
                  patientid:
                    description: The patient ID this document is tied to.
                    type: integer
                  priority:
                    description: Priority given for this document action.
                    type: integer
                  status:
                    description: Status given for this document action.
                    type: string
                type: object
          description: Success
      operationId: getPracticeidDocumentsAdminAdminidActions
      x-scopes: []
      tags:
      - Forms and Documents
      - Update Document Actions
    post:
      summary: Add admin document action note
      description: Create a record of an action note on a specific admin document
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: adminid
        schema:
          type: integer
        required: true
        description: adminid
      - in: header
        name: Content-Type
        schema:
          type: string
        required: true
        description: Content type of the payload
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errormessage:
                    description: If there was an error with this call and SUCCESS
                      is set to false, this field may provide additional information.
                    type: string
                  newdocumentid:
                    description: The document ID of newly created document as a result
                      of action of Deny-New Prescription To Follow (DNTF).
                    type: string
                  success:
                    description: Returns true if the update was a success.
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                  versiontoken:
                    description: A token representing the current state of this document.
                      Will only be set if VERSIONTOKEN was originally sent to the
                      endpoint.
                    type: string
                type: object
          description: Success
      operationId: postPracticeidDocumentsAdminAdminidActions
      x-scopes: []
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
              - actionnote
              properties:
                actionnote:
                  type: string
                  description: The new action note to add to the document.
        required: true
      tags:
      - Forms and Documents
      - Update Document Actions
  /v1/{practiceid}/documents/admin/{adminid}/pages/{pageid}:
    get:
      summary: Get page from admin document
      description: Retrieves a single page from a admin document that does not have
        a patientid
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: adminid
        schema:
          type: integer
        required: true
        description: adminid
      - in: path
        name: pageid
        schema:
          type: integer
        required: true
        description: pageid
      - in: query
        name: filesize
        schema:
          enum:
          - SMALL
          - LARGE
          type: string
          x-enumDescriptions:
          - Small
          - Large
        required: false
        description: The file size of the document being requested.
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  attachment:
                    description: The image of the page in png format.
                    type: string
                type: object
          description: Success
      operationId: getPracticeidDocumentsAdminAdminidPagesPageid
      x-scopes: []
      tags:
      - Forms and Documents
      - Document List By Class
  /v1/{practiceid}/patients/{patientid}/documents/admin:
