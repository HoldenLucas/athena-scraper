          type: integer
        required: true
        description: practiceid
      - in: path
        name: patientid
        schema:
          type: integer
        required: true
        description: patientid
      - in: header
        name: Content-Type
        schema:
          type: string
        required: true
        description: Content type of the payload
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  adminid:
                    type: integer
                    description: The document ID of the new or modified document.
                  success:
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                    description: Returns true/false if the operation was successful.
