openapi: 3.0.0
info:
  description: Welcome to the API developer portal which gives third parties access
    to our APIs and sandbox to develop integrated solutions that will enhance the
    value and functionality offered by athenaOne®.
  title: athena API collection
  version: '0.1'
components:
  securitySchemes:
    api_auth_preview:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://api.preview.platform.athenahealth.com/oauth2/v1/token
          scopes:
            athena/service/Athenanet.MDP.*: API Preview
    api_auth:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://api.platform.athenahealth.com/oauth2/v1/token
          scopes:
            athena/service/Athenanet.MDP.*: API Production
    bearer_auth:
      type: http
      scheme: bearer
servers:
- url: https://api.preview.platform.athenahealth.com
  description: Preview
- url: https://api.platform.athenahealth.com
  description: Production
paths:
  /v1/{practiceid}/patients/clientforms:
    get:
      summary: Get list of client forms
      description: Retrieves a list of client forms
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: query
        name: departmentid
        schema:
          type: integer
        required: true
        description: The department id
      - in: query
        name: hidepdfs
        schema:
          type: boolean
        required: false
        description: Hides PDF forms if set
      - in: query
        name: limit
        schema:
          type: integer
        required: false
        description: Number of entries to return (default 100, max 1000)Please note
          that this endpoint has a different default and max than normal.
      - in: query
        name: offset
        schema:
          type: integer
        required: false
        description: Starting point of entries; 0-indexed
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  clientformid:
                    description: Client form ID
                    type: string
                  clientformname:
                    description: Name of the client form
                    type: string
                type: object
          description: Success
      operationId: getPracticeidPatientsClientforms
      x-scopes: []
      tags:
      - Patients
      - Patient Authorizations
metadata: []
security:
- api_auth_preview:
  - athena/service/Athenanet.MDP.*
  api_auth:
  - athena/service/Athenanet.MDP.*
  bearer_auth: []
