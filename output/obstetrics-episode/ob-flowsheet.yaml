      description: 'BETA: Retrieves the valid fields for a prenatal flowsheet in an
        OB Episode'
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: patientid
        schema:
          type: integer
        required: true
        description: patientid
      - in: path
        name: obepisodeid
        schema:
          type: integer
        required: true
        description: obepisodeid
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  name:
                    description: The name of the field.
                    type: string
                  parentfield:
                    description: The name of the field that this field is nested under,
                      if this field should be nested in an object.
                    type: string
                  units:
                    description: Contains which units are currently configured if
                      the field can be configured to use specific units.
                    type: string
                  validoptions:
                    description: The list of valid inputs if this field only accepts
                      certain values.
                    items:
                      properties:
                        description:
                          description: The displayed description of the value.
                          type: string
                        value:
                          description: The underlying value for the option.
                          type: string
                      type: object
                    type: array
                type: object
          description: Success
