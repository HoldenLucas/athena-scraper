                              type: string
                          type: object
                        type: array
                    type: object
                  prenatalflowsheet:
                    description: Information from each encounter that has been captured
                      in the prenatal flowsheet.
                    items:
                      properties:
                        albumin:
                          description: 'Observations of patient''s albumin.  Options
                            for albumin values are: None, Trace, 1+,2+,3+,4+'
                          type: string
                        bishopscore:
                          description: Observations of a score that assists in predicting
                            the likelihood that labor will need to be induced.
                          type: string
                        blood:
                          description: Observations of patient's blood values (neg,Trace,1+,2+,3+)
                          type: string
                        bloodpressure:
                          description: Information about the patient's blood pressure
                          items:
                            properties:
                              diastolic:
                                description: Diastolic component of the patient's
                                  blood pressure
                                type: string
                              locationtested:
                                description: Location where patient's blood pressure
                                  was measured
                                type: string
                              refused:
                                description: If patient refused to have their blood
                                  pressure measured
                                type: string
                              refusedreason:
                                description: 'Reason for refusal of patient''s blood
