                                  patient refused'
                                type: string
                              systolic:
                                description: Systolic component of the patient's blood
                                  pressure
                                type: string
                              type:
                                description: 'Type of observation of patient''s blood
                                  pressure. Options include: sitting, standing, supine,
                                  lying on side, prone'
                                type: string
                            type: object
                          type: array
                        cervixexam:
                          description: Information about cervix exams.
                          properties:
                            dilation:
                              description: Options range from 0 to 10 cms
                              type: string
                            effacement:
                              description: Options range from 0% to 100% with increments
                                of 10%
                              type: string
                            station:
                              description: Options range from -4 to +4 with increments
                                of 1
                              type: string
                          type: object
                        comments:
                          description: Comments for the encounter
                          type: string
                        edema:
                          description: Options for patient's edema values (none, trace,
                            1+,2+,3+,4+)
                          type: string
                        estimatedfetalweight:
                          description: Observations of the estimated weight of fetus.
                          type: string
                        fetalheartrate:
                          description: Observations of information about the fetal
                            heart rate.
                          items:
                            properties:
                              fetus:
                                description: In a multiple fetus pregnancy, this will
                                  be unique to a specific fetus.
                                type: string
                              present:
                                description: Options are 'Present' or 'Absent'
                                type: string
                              rate:
                                description: The fetal heart rate in beats per minute
                                type: string
                            type: object
                          type: array
                        fetalmovement:
                          description: 'Observations of fetal movement. Options include:
                            Yes,No,Decreased,Increased'
                          items:
                            properties:
                              fetus:
                                description: In a multiple fetus pregnancy, this will
                                  be unique to a specific fetus.
                                type: string
