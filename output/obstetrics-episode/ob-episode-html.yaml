openapi: 3.0.0
info:
  description: Welcome to the API developer portal which gives third parties access
    to our APIs and sandbox to develop integrated solutions that will enhance the
    value and functionality offered by athenaOne®.
  title: athena API collection
  version: '0.1'
components:
  securitySchemes:
    api_auth_preview:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://api.preview.platform.athenahealth.com/oauth2/v1/token
          scopes:
            athena/service/Athenanet.MDP.*: API Preview
    api_auth:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://api.platform.athenahealth.com/oauth2/v1/token
          scopes:
            athena/service/Athenanet.MDP.*: API Production
    bearer_auth:
      type: http
      scheme: bearer
servers:
- url: https://api.preview.platform.athenahealth.com
  description: Preview
- url: https://api.platform.athenahealth.com
  description: Production
paths:
  /v1/{practiceid}/chart/{patientid}/obepisodes/{obepisodeid}/html:
    get:
      summary: Get specific OB episode details in HTML format
      description: 'BETA: Retrieves specific OB episode information in a HTML format'
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: patientid
        schema:
          type: integer
        required: true
        description: patientid
      - in: path
        name: obepisodeid
        schema:
          type: integer
        required: true
        description: obepisodeid
      - in: query
        name: showhiddenproblems
        schema:
          type: boolean
        required: false
        description: Designates whether we will also show hidden problems. The default
          value is false.
      - in: query
        name: includewrapper
        schema:
          type: boolean
        required: false
        description: If true, will include a wrapper with standard HTML tags
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  html:
                    description: American College of Obstetrics and Gynecology (ACOG)
                      form in HTML format
                    type: string
                type: object
          description: Success
      operationId: getPracticeidChartPatientidObepisodesObepisodeidHtml
      x-scopes: []
      tags:
      - Chart
      - OB Episodes
metadata: []
security:
- api_auth_preview:
  - athena/service/Athenanet.MDP.*
  api_auth:
  - athena/service/Athenanet.MDP.*
  bearer_auth: []
