openapi: 3.0.0
info:
  description: Welcome to the API developer portal which gives third parties access
    to our APIs and sandbox to develop integrated solutions that will enhance the
    value and functionality offered by athenaOne®.
  title: athena API collection
  version: '0.1'
components:
  securitySchemes:
    api_auth_preview:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://api.preview.platform.athenahealth.com/oauth2/v1/token
          scopes:
            athena/service/Athenanet.MDP.*: API Preview
    api_auth:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://api.platform.athenahealth.com/oauth2/v1/token
          scopes:
            athena/service/Athenanet.MDP.*: API Production
    bearer_auth:
      type: http
      scheme: bearer
servers:
- url: https://api.preview.platform.athenahealth.com
  description: Preview
- url: https://api.platform.athenahealth.com
  description: Production
paths:
  /v1/{practiceid}/chart/encounter/{encounterid}/orders/patientinfo:
    post:
      summary: Create new patient-info order for given encounter
      description: Adds a new patient info order for a given encounter
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: encounterid
        schema:
          type: integer
        required: true
        description: encounterid
      - in: header
        name: Content-Type
        schema:
          type: string
        required: true
        description: Content type of the payload
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  documentid:
                    description: The ID of the document created.
                    type: integer
                  errormessage:
                    description: If the operation failed, this will contain any error
                      messages.
                    type: string
                  success:
                    description: Whether the operation was successful.
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                type: object
          description: Success
      operationId: postPracticeidChartEncounterEncounteridOrdersPatientinfo
      x-scopes: []
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
              - diagnosissnomedcode
              - ordertypeid
              properties:
                ordertypeid:
                  type: integer
                  description: The athena ID of the patient information to order.
                    Get the IDs using /reference/order/patientinfo.
                externalnote:
                  type: string
                  description: An external note for the patient.
                providernote:
                  type: string
                  description: An internal note for the provider or staff.
                diagnosissnomedcode:
                  type: integer
                  description: The SNOMED code for diagnosis this order is for.
        required: true
      tags:
      - Encounter
      - Order Patient Info
  /v1/{practiceid}/reference/order/patientinfo:
    get:
      summary: Get list of patient information handouts
      description: Retrieves a list of patient info or care information configured
        in the system
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: query
        name: searchvalue
        schema:
          type: string
        required: true
        description: A term to search for. Must be at least 2 characters
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  name:
                    description: The name of the order
                    type: string
                  ordertypeid:
                    description: The athena ID of the type of order
                    type: integer
                type: object
          description: Success
      operationId: getPracticeidReferenceOrderPatientinfo
      x-scopes: []
      tags:
      - Encounter
      - Order Patient Info
metadata: []
security:
- api_auth_preview:
  - athena/service/Athenanet.MDP.*
  api_auth:
  - athena/service/Athenanet.MDP.*
  bearer_auth: []
