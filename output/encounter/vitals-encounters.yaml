openapi: 3.0.0
info:
  description: Welcome to the API developer portal which gives third parties access
    to our APIs and sandbox to develop integrated solutions that will enhance the
    value and functionality offered by athenaOne®.
  title: athena API collection
  version: '0.1'
components:
  securitySchemes:
    api_auth_preview:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://api.preview.platform.athenahealth.com/oauth2/v1/token
          scopes:
            athena/service/Athenanet.MDP.*: API Preview
    api_auth:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://api.platform.athenahealth.com/oauth2/v1/token
          scopes:
            athena/service/Athenanet.MDP.*: API Production
    bearer_auth:
      type: http
      scheme: bearer
servers:
- url: https://api.preview.platform.athenahealth.com
  description: Preview
- url: https://api.platform.athenahealth.com
  description: Production
paths:
  /v1/{practiceid}/chart/encounter/{encounterid}/vitals:
    post:
      summary: Add new vital information for given encounter
      description: Create a record of vital readings for a patient for a specific
        encounter
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: encounterid
        schema:
          type: integer
        required: true
        description: encounterid
      - in: header
        name: Content-Type
        schema:
          type: string
        required: true
        description: Content type of the payload
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errormessage:
                    description: If the operation failed, this will contain any error
                      messages.
                    type: string
                  success:
                    description: Whether the operation was successful or not.
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                type: object
          description: Success
      operationId: postPracticeidChartEncounterEncounteridVitals
      x-scopes: []
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
              - vitals
              properties:
                vitals:
                  type: array
                  items:
                    type: array
                  description: This is an array of arrays in JSON.  Each subarray
                    contains a group of related readings, like systolic and diastolic
                    blood pressure. They will be assigned the same readingID
        required: true
      tags:
      - Encounter
      - Vitals
    get:
      summary: Get list of vitals for given encounter
      description: Retrieves a patient's vitals reading for a specific encounter
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: encounterid
        schema:
          type: integer
        required: true
        description: encounterid
      - in: query
        name: enddate
        schema:
          type: string
        required: false
        description: Only retrieve vitals that were taking on or before this date
      - in: query
        name: showemptyvitals
        schema:
          type: boolean
        required: false
        description: Show configured vitals that have no readings for this patient.
      - in: query
        name: startdate
        schema:
          type: string
        required: false
        description: Only retrieve vitals that were taking on or after this date
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  abbreviation:
                    description: Short human-readable string for this vital group.
                      E.g., Ht.
                    type: string
                  key:
                    description: Key for this vital group. E.g., HEIGHT.
                    type: string
                  ordering:
                    description: Configured order for this vital group
                    type: integer
                  readings:
                    description: List of vital attribute readings. One entry per attribute
                      (so the temperature and where the temperature was taken are
                      two different readings, tied together by the readingid
                    items:
                      properties:
                        clinicalelementid:
                          description: Key used to identify this particular vital
                            attribute
                          type: string
                        code:
                          description: Code indentifier for the reading.
                          type: string
                        codedescription:
                          description: Description of the code identifier.
                          type: string
                        codeset:
                          description: Codeset of the code.
                          type: string
                        createdby:
                          description: The athenaNet username of the person who entered
                            the vital.
                          type: string
                        createddate:
                          description: The date this vital was entered into the chart.
                            Returned in mm/dd/yyyy hh24:mi:ss format.
                          type: string
                        isgraphable:
                          description: Flag indicating if this vital is graphable.
                          enum:
                          - ''
                          - false
                          - true
                          type: string
                        lastmodifiedby:
                          description: The athenaNet username of the user that last
                            modified the reading.
                          type: string
                        lastmodifieddate:
                          description: The date this vital was last modified. Returned
                            in mm/dd/yyyy hh24:mi:ss format.
                          type: string
                        percentilespec:
                          properties:
                            high:
                              description: The highest value the y value could be.
                              type: integer
                            highordinal:
                              description: Ordinal of the high value.
                              type: string
                            low:
                              description: The lowest value that y could be.
                              type: integer
                            lowordinal:
                              description: Ordinal of the lowest value.
                              type: string
                            prefix:
                              description: 'Indicator of less than or greater. Possible
                                values: (>,<)'
                              type: string
                          type: object
                        readingid:
                          description: Numeric key used to tie related and distinguish
                            separate readings. So the diastolic and systolic blood
                            pressure should have the same readingid.
                          type: integer
                        readingtaken:
                          description: Date that the reading was taken.
                          type: string
                        source:
                          description: The source of this reading.
                          type: string
                        sourceid:
                          description: External key to source.
                          type: integer
                        unit:
                          description: Unit that describes this vital's value.
                          type: string
                        value:
                          description: 'The value of this reading. NOTE: for numeric
                            values, the units are always in the ''native'' units per
                            the configuration.'
                          type: string
                        vitalid:
                          description: Unique ID for this vital attribute reading.
                            Used to update/delete this reading.
                          type: integer
                      type: object
                    type: array
                type: object
          description: Success
      operationId: getPracticeidChartEncounterEncounteridVitals
      x-scopes: []
      tags:
      - Encounter
      - Vitals
  /v1/{practiceid}/chart/encounter/{encounterid}/vitals/{vitalid}:
    put:
      summary: Update vital information for given encounter
      description: Modifies a patient's vitals reading for a specific encounter
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: vitalid
        schema:
          type: integer
        required: true
        description: vitalid
      - in: path
        name: encounterid
        schema:
          type: integer
        required: true
        description: encounterid
      - in: header
        name: Content-Type
        schema:
          type: string
        required: true
        description: Content type of the payload
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errormessage:
                    description: If the operation failed, this will contain any error
                      messages.
                    type: string
                  success:
                    description: Whether the operation was successful or not.
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                type: object
          description: Success
      operationId: putPracticeidChartEncounterEncounteridVitalsVitalid
      x-scopes: []
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
              - value
              properties:
                value:
                  type: string
                  description: The reading value. See the configuration for the proper
                    units.
        required: true
      tags:
      - Encounter
      - Vitals
    delete:
      summary: Delete vital information for given encounter
      description: Deletes the record of a specific vitals reading of the patient
        for a specific encounter
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: vitalid
        schema:
          type: integer
        required: true
        description: vitalid
      - in: path
        name: encounterid
        schema:
          type: integer
        required: true
        description: encounterid
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errormessage:
                    description: If the operation failed, this will contain any error
                      messages.
                    type: string
                  success:
                    description: Whether the operation was successful or not.
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                type: object
          description: Success
      operationId: deletePracticeidChartEncounterEncounteridVitalsVitalid
      x-scopes: []
      tags:
      - Encounter
      - Vitals
metadata: []
security:
- api_auth_preview:
  - athena/service/Athenanet.MDP.*
  api_auth:
  - athena/service/Athenanet.MDP.*
  bearer_auth: []
