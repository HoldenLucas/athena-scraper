openapi: 3.0.0
info:
  description: Welcome to the API developer portal which gives third parties access
    to our APIs and sandbox to develop integrated solutions that will enhance the
    value and functionality offered by athenaOne®.
  title: athena API collection
  version: '0.1'
components:
  securitySchemes:
    api_auth_preview:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://api.preview.platform.athenahealth.com/oauth2/v1/token
          scopes:
            athena/service/Athenanet.MDP.*: API Preview
    api_auth:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://api.platform.athenahealth.com/oauth2/v1/token
          scopes:
            athena/service/Athenanet.MDP.*: API Production
    bearer_auth:
      type: http
      scheme: bearer
servers:
- url: https://api.preview.platform.athenahealth.com
  description: Preview
- url: https://api.platform.athenahealth.com
  description: Production
paths:
  /v1/{practiceid}/chart/encounter/{encounterid}/documentsreview:
    get:
      summary: Get list of documents for review in given encounter
      description: Retrieves a list of document which are in Review status for a specific
        encounter
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: encounterid
        schema:
          type: integer
        required: true
        description: encounterid
      - in: query
        name: limit
        schema:
          type: integer
        required: false
        description: Number of entries to return (default 1500, max 5000)
      - in: query
        name: offset
        schema:
          type: integer
        required: false
        description: Starting point of entries; 0-indexed
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    description: The status of the document.
                  documentid:
                    type: integer
                    description: The document ID.
                  createddate:
                    type: string
                    description: The date that the document was marked as discussed.
                      Not returned if the document is not marked as discussed.
                  documentname:
                    type: string
                    description: The name of the document.
                  providernote:
                    type: string
                    description: Note that the provider took on the document during
                      the encounter. In the "Classic" view of athenaNet, this is just
                      shown as a note.   In "Streamlined", it is shown as an internal
                      note.
                  discusseddate:
                    type: string
                    description: The date that the document was marked as discussed.
                      Not returned if the document is not marked as discussed.
                  discusseduser:
                    type: string
                    description: The user who discussed the document. Not returned
                      if the document is not marked as discussed.
                  documentclass:
                    type: string
                    description: The name of the document class of the document being
                      returned.
          description: Success
      operationId: getPracticeidChartEncounterEncounteridDocumentsreview
      x-scopes: []
      tags:
      - Encounter
      - Documents in Review
metadata: []
security:
- api_auth_preview:
  - athena/service/Athenanet.MDP.*
  api_auth:
  - athena/service/Athenanet.MDP.*
  bearer_auth: []
