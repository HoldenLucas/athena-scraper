openapi: 3.0.0
info:
  description: Welcome to the API developer portal which gives third parties access
    to our APIs and sandbox to develop integrated solutions that will enhance the
    value and functionality offered by athenaOne®.
  title: athena API collection
  version: '0.1'
components:
  securitySchemes:
    api_auth_preview:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://api.preview.platform.athenahealth.com/oauth2/v1/token
          scopes:
            athena/service/Athenanet.MDP.*: API Preview
    api_auth:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://api.platform.athenahealth.com/oauth2/v1/token
          scopes:
            athena/service/Athenanet.MDP.*: API Production
    bearer_auth:
      type: http
      scheme: bearer
servers:
- url: https://api.preview.platform.athenahealth.com
  description: Preview
- url: https://api.platform.athenahealth.com
  description: Production
paths:
  /v1/{practiceid}/chart/encounter/{encounterid}/dictationstatus:
    get:
      summary: Get dictation status for given encounter
      description: Retrieves the current status on whether or not an encounter is
        waiting for more transcription messages
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: encounterid
        schema:
          type: integer
        required: true
        description: encounterid
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  closedencounter:
                    description: Boolean field indicating if the encounter has already
                      been closed.  A closed encounter cannot receive dictations.
                      This field and ISWAITINGFORTRANSCRIPTION will never both be
                      true at the same time.
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                  iswaitingfortranscription:
                    description: Boolean field that describes whether the encounter
                      is locked and waiting for more transcription messages.
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                  receivedtranscriptioncount:
                    description: The number of received transcriptions. No more transcriptions
                      will be accepted when this number reaches the totalmessagecount
                      that was included with the first transcription.
                    type: integer
                  receivedtranscriptions:
                    description: An array containing information about the transcriptions
                      that have already been processed.
                    items:
                      properties:
                        createdby:
                          description: The user that created this transcription.
                          type: string
                        encountersection:
                          description: The encounter section that this transcription
                            was for.
                          type: string
                        field:
                          description: The field in the encounter section that this
                            transcription was for.
                          type: string
                        receiveddatetime:
                          description: 'The time that this transcription was received.
                            Note: this time is only returned to the nearest minute.'
                          type: string
                      type: object
                    type: array
                type: object
          description: Success
      operationId: getPracticeidChartEncounterEncounteridDictationstatus
      x-scopes: []
      tags:
      - Encounter
      - Dictations
  /v1/{practiceid}/chart/encounter/{encounterid}/dictatablesections:
    get:
      summary: Get list of dictatable sections for given encounter
      description: Retrieve a list of sections available for dictation for a specific
        encounter
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: encounterid
        schema:
          type: integer
        required: true
        description: encounterid
      - in: query
        name: limit
        schema:
          type: integer
        required: false
        description: Number of entries to return (default 1500, max 5000)
      - in: query
        name: offset
        schema:
          type: integer
        required: false
        description: Starting point of entries; 0-indexed
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  name:
                    description: The name of the section.
                    type: string
                type: object
          description: Success
      operationId: getPracticeidChartEncounterEncounteridDictatablesections
      x-scopes: []
      tags:
      - Encounter
      - Dictations
metadata: []
security:
- api_auth_preview:
  - athena/service/Athenanet.MDP.*
  api_auth:
  - athena/service/Athenanet.MDP.*
  bearer_auth: []
