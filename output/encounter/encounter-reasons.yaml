openapi: 3.0.0
info:
  description: Welcome to the API developer portal which gives third parties access
    to our APIs and sandbox to develop integrated solutions that will enhance the
    value and functionality offered by athenaOne®.
  title: athena API collection
  version: '0.1'
components:
  securitySchemes:
    api_auth_preview:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://api.preview.platform.athenahealth.com/oauth2/v1/token
          scopes:
            athena/service/Athenanet.MDP.*: API Preview
    api_auth:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://api.platform.athenahealth.com/oauth2/v1/token
          scopes:
            athena/service/Athenanet.MDP.*: API Production
    bearer_auth:
      type: http
      scheme: bearer
servers:
- url: https://api.preview.platform.athenahealth.com
  description: Preview
- url: https://api.platform.athenahealth.com
  description: Production
paths:
  /v1/{practiceid}/chart/encounter/{encounterid}/encounterreasons:
    get:
      summary: Get list of reasons for given encounter
      description: Retrieves the list of reasons or present illness documented during
        the specific encounter visit
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: encounterid
        schema:
          type: integer
        required: true
        description: encounterid
      - in: query
        name: limit
        schema:
          type: integer
        required: false
        description: Number of entries to return (default 1000, max 10000)Please note
          that this endpoint has a different default and max than normal.
      - in: query
        name: offset
        schema:
          type: integer
        required: false
        description: Starting point of entries; 0-indexed
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  encounterreasonnote:
                    description: The reason for visit note associated with the encounter.
                    type: string
                  encounterreasons:
                    description: The text and ID of the encounter reason
                    items:
                      properties:
                        encounterreasonid:
                          description: The ID of the encounter reason.
                          type: integer
                        encounterreasontext:
                          description: The text of the Encounter Reason / Chief Complaint
                            section. Not all practices use this. Some use it extensively
                            with HTML templates.
                          type: string
                        lastmodifieddatetime:
                          description: The date and time that the encounter reason
                            was last modified.
                          type: string
                        lastmodifieduser:
                          description: The username of the user that last modified
                            the encounter reason.
                          type: string
                      type: object
                    type: array
                  notelastmodifieddatetime:
                    description: Date and time when encounter reason note was last
                      modified.
                    type: string
                  notelastmodifieduser:
                    description: Username of the user who last modified encounter
                      reason note.
                    type: string
                type: object
          description: Success
      operationId: getPracticeidChartEncounterEncounteridEncounterreasons
      x-scopes: []
      tags:
      - Encounter
      - Encounter Reasons
    delete:
      summary: Delete an encounter reason from the given encounter
      description: Deletes an encounter reason from the encounter instance
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: encounterid
        schema:
          type: integer
        required: true
        description: encounterid
      - in: query
        name: encounterreasonid
        schema:
          type: integer
        required: true
        description: Encounter reason ID. Must be from the list returned by /configuration/encounterreason
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  encounterreasonid:
                    description: The ID of the encounter reason
                    type: integer
                  errormessage:
                    description: If not successful, will contain an error message.
                    type: string
                  success:
                    description: Whether the operation succeeded.
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                type: object
          description: Success
      operationId: deletePracticeidChartEncounterEncounteridEncounterreasons
      x-scopes: []
      tags:
      - Encounter
      - Encounter Reasons
    post:
      summary: Add an encounter reason to the given encounter
      description: Adds or updates an encounter reason in the specific encounter instance
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: encounterid
        schema:
          type: integer
        required: true
        description: encounterid
      - in: header
        name: Content-Type
        schema:
          type: string
        required: true
        description: Content type of the payload
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  encounterreasonid:
                    description: The ID of the encounter reason
                    type: integer
                  errormessage:
                    description: If not successful, will contain an error message.
                    type: string
                  success:
                    description: Whether the operation succeeded.
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                type: object
          description: Success
      operationId: postPracticeidChartEncounterEncounteridEncounterreasons
      x-scopes: []
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
              - encounterreasonid
              properties:
                laterality:
                  enum:
                  - ''
                  - LEFT
                  - RIGHT
                  - BILATERAL
                  - NONE
                  type: string
                  description: Optional laterality value (left or right)
                encounterreasonid:
                  type: integer
                  description: Encounter reason ID. Must be from the list returned
                    by /configuration/encounterreason
        required: true
      tags:
      - Encounter
      - Encounter Reasons
  /v1/{practiceid}/chart/encounter/{encounterid}/encounterreasonnote:
    post:
      summary: Set the freetext encounter reason note for the encounter
      description: Sets the freetext encounter reason note for the specific encounter.
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: encounterid
        schema:
          type: integer
        required: true
        description: encounterid
      - in: header
        name: Content-Type
        schema:
          type: string
        required: true
        description: Content type of the payload
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errormessage:
                    description: If not successful, will contain an error message.
                    type: string
                  note:
                    description: The complete note that was saved.
                    type: string
                  success:
                    description: Whether the operation succeeded.
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                type: object
          description: Success
      operationId: postPracticeidChartEncounterEncounteridEncounterreasonnote
      x-scopes: []
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                notetext:
                  type: string
                  description: The text to set as or append to the note
                appendtext:
                  type: boolean
                  description: If true, note text will be appended to the existing
                    note.  If false (default), the existing note text will be completely
                    replaced by the new note text.
        required: true
      tags:
      - Encounter
      - Encounter Reasons
  /v1/{practiceid}/configuration/encounterreasons:
    get:
      summary: Get the list of configured encounter reasons
      description: Encounter Reason
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: query
        name: limit
        schema:
          type: integer
        required: false
        description: Number of entries to return (default 1000, max 10000)Please note
          that this endpoint has a different default and max than normal.
      - in: query
        name: offset
        schema:
          type: integer
        required: false
        description: Starting point of entries; 0-indexed
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  encounterreasonid:
                    description: The ID of the encounter reason
                    type: integer
                  lateralityflag:
                    description: 'One of "Y" or "N": whether the reason has laterality'
                    type: string
                  name:
                    description: The display name of the encounter reason
                    type: string
                type: object
          description: Success
      operationId: getPracticeidConfigurationEncounterreasons
      x-scopes: []
      tags:
      - Encounter
      - Encounter Reason Configuration
metadata: []
security:
- api_auth_preview:
  - athena/service/Athenanet.MDP.*
  api_auth:
  - athena/service/Athenanet.MDP.*
  bearer_auth: []
