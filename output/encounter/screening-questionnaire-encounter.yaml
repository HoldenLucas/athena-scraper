                    - ''
                    - false
                    - true
                    type: string
                type: object
          description: Success
      operationId: putPracticeidChartEncounterEncounteridQuestionnairescreenersScoreonly
      x-scopes: []
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
              - documentids
              - questionnaireid
              properties:
                note:
                  type: string
                  description: The note for the questionnaire screener.
                score:
                  type: string
                  description: The score for the questionnaire screener. Screeners
                    that have one or more scores should be entered in the NOTE field.
                documentids:
                  type: array
                  items:
                    type: integer
                  description: 'A comma delimited array of document IDs to attach
                    to the questionnaire. Ex: [4,5]. Currently this is only officially
                    supported for documents with the subclass ENCOUNTERDOCUMENT_PATIENTHISTORY.'
                metaquestions:
                  type: array
                  items:
                    type: object
                  description: Not yet implemented. Any meta questions related to
                    this questionnaire. E.g., should this be considered generally
                    as positive or negative?
                declinedreason:
                  type: object
                  description: Not yet implemented. Reason the questionnaire is declined
                questionnaireid:
                  type: integer
                  description: The questionnaire ID to be updated. If the questionnaireid
                    does not exist in the GET /chart/encounter/{encounterid}/questionnairescreeners
                    API, please activate it via the POST API.
        required: true
      tags:
      - Encounter
      - Questionnaire Screeners
  /v1/{practiceid}/chart/questionnairescreeners:
    get:
      summary: Get list of questionnaire screeners
      description: Retrieves a list of questionnaire screeners
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: query
        name: showoutofoffice
        schema:
          type: boolean
        required: false
        description: Filters the screeners in the response by their office status
          to only show screeners that are 'Out of Office'
      - in: query
        name: showinoffice
        schema:
          type: boolean
        required: false
        description: Filters the screeners in the response by their office status
          to only show screeners that are 'In Office'
      - in: query
        name: limit
        schema:
          type: integer
        required: false
        description: Number of entries to return (default 1000, max 10000)Please note
          that this endpoint has a different default and max than normal.
      - in: query
        name: offset
        schema:
          type: integer
        required: false
        description: Starting point of entries; 0-indexed
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  name:
                    description: The questionnaire name
                    type: string
                  officestatus:
                    description: Whether the questionnaire can be used in-office and/or
                      out-out-office for patient facing applications if applicable
                    type: string
                  screenercodes:
                    description: List of screener codes attached to this questionnaire
                    items:
                      properties:
                        code:
                          description: The screener code of this questionnaire
                          type: string
                        codeset:
                          description: The screener codeset of this questionnaire
                          type: string
                      type: object
                    type: array
                  templateid:
                    description: The template ID of the questionnaire. Required to
                      activate a questionnaire for a given encounter.
                    type: integer
                  templatetype:
                    description: Boolean to flag whether the questionnaire is score
                      only or not.
                    type: string
                type: object
          description: Success
      operationId: getPracticeidChartQuestionnairescreeners
      x-scopes: []
      tags:
      - Encounter
      - Questionnaire Screeners
  /v1/{practiceid}/chart/configuration/questionnairescreeners:
    get:
      summary: Get list of questionnaire screeners given an appointment-ID or encounter-ID
      description: Retrieve a list of possible questionnaire screeners for a given
        appointment ID or encounter ID
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: query
        name: showoutofoffice
        schema:
          type: boolean
        required: false
        description: Filters the screeners in the response by their office status
          to only show screeners that are 'Out of Office'
      - in: query
        name: appointmentid
        schema:
          type: integer
        required: false
        description: The appointment ID. It is used solely to determine the specialty
          ID to determine possible questionnaires. If an encounter ID is passed in,
          it will take priority over the appointment ID.
      - in: query
        name: departmentid
        schema:
          type: integer
        required: true
        description: The department ID.
      - in: query
        name: encounterid
        schema:
          type: integer
        required: false
        description: The encounter ID. It is used solely to determine the specialty
          ID to determine the possible questionnaires.
      - in: query
        name: showonlylatestversion
        schema:
          type: boolean
        required: false
        description: If true, filters the returned screeners to only retrieve the
          latest version.
      - in: query
        name: patientid
        schema:
          type: integer
        required: true
        description: The patient ID.
      - in: query
        name: showinoffice
        schema:
          type: boolean
        required: false
        description: Filters the screeners in the response by their office status
          to only show screeners that are 'In Office'
      - in: query
        name: limit
        schema:
          type: integer
        required: false
        description: Number of entries to return (default 100, max 1000)Please note
          that this endpoint has a different default and max than normal.
      - in: query
        name: offset
        schema:
          type: integer
        required: false
        description: Starting point of entries; 0-indexed
      responses:
