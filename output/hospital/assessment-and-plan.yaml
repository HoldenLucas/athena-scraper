openapi: 3.0.0
info:
  description: Welcome to the API developer portal which gives third parties access
    to our APIs and sandbox to develop integrated solutions that will enhance the
    value and functionality offered by athenaOne®.
  title: athena API collection
  version: '0.1'
components:
  securitySchemes:
    api_auth_preview:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://api.preview.platform.athenahealth.com/oauth2/v1/token
          scopes:
            athena/service/Athenanet.MDP.*: API Preview
    api_auth:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://api.platform.athenahealth.com/oauth2/v1/token
          scopes:
            athena/service/Athenanet.MDP.*: API Production
    bearer_auth:
      type: http
      scheme: bearer
servers:
- url: https://api.preview.platform.athenahealth.com
  description: Preview
- url: https://api.platform.athenahealth.com
  description: Production
paths:
  /v1/{practiceid}/stays/{stayid}/assessments:
    get:
      summary: Get list of assessments for a specific stay
      description: Retrieves assessment and plan of treatment information for a patient
        from the admission H&P and enhanced progress notes for a specific stay.
      parameters:
      - in: path
        name: stayid
        schema:
          type: integer
        required: true
        description: stayid
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: query
        name: limit
        schema:
          type: integer
        required: false
        description: Number of entries to return (default 1500, max 5000)
      - in: query
        name: offset
        schema:
          type: integer
        required: false
        description: Starting point of entries; 0-indexed
      - in: query
        name: THIRDPARTYUSERNAME
        schema:
          type: string
        required: false
        description: User name of the patient in the third party application.
      - in: query
        name: PATIENTFACINGCALL
        schema:
          type: boolean
        required: false
        description: When 'true' is passed we will collect relevant data and store
          in our database.
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  assessmenttext:
                    description: The assessment and plan section of text contained
                      in the Admission H&P or Enhanced Progress note.
                    type: string
                  createdby:
                    description: The athenaNet username of the individual who entered
                      the note.
                    type: string
                  createddatetime:
                    description: The date and time the note was entered in athenaNet.
                      Returned in mm/dd/yyyy hh24:mi:ss format.
                    type: string
                  departmentid:
                    description: The ID of the department where the patient's stay
                      is currently located.
                    type: integer
                  notetype:
                    description: Type of note (Admission H&P or Enhanced Progress)
                      that contains the assessment and plan.
                    type: string
                  patientid:
                    description: Please remember to never disclose this ID to patients
                      since it may result in inadvertent disclosure that a patient
                      exists in a practice already.
                    type: integer
                  providerid:
                    description: The athenaNet provider ID for the provider responsible
                      for the clinical information in the note.
                    type: integer
                  signedby:
                    description: The athenaNet username of the provider who signed
                      the note.
                    type: string
                  signeddatetime:
                    description: The date and time when the note containing the assessment
                      and plan was signed. Returned in mm/dd/yyyy hh24:mi:ss format.
                    type: string
                type: object
          description: Success
      operationId: getPracticeidStaysStayidAssessments
      x-scopes: []
      tags:
      - Inpatient
      - Inpatient Assessment & Plan
metadata: []
security:
- api_auth_preview:
  - athena/service/Athenanet.MDP.*
  api_auth:
  - athena/service/Athenanet.MDP.*
  bearer_auth: []
