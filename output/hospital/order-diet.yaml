        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: query
        name: ordertypeid
        schema:
          type: integer
        required: true
        description: The athena ID for the type of order being placed. Get the IDs
          using /stays/configuration/orders/diet.
      - in: query
        name: statusgroup
