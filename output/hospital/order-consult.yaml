        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: query
        name: ordertypeid
        schema:
          type: integer
        required: true
        description: The athena ID for the type of order being placed. Get the IDs
          using /stays/configuration/orders/consult.
      - in: query
        name: statusgroup
        schema:
          enum:
          - active
          - signed
          - unsigned
          type: string
          x-enumDescriptions:
          - ACTIVE
          - SIGNED
          - UNSIGNED
        required: false
        description: 'Active: Orders that are not yet completed. Signed orders: Orders
          that are signed by a doctor. Unsigned orders: Orders that have not yet been
          signed.'
      - in: query
        name: limit
        schema:
          type: integer
        required: false
        description: Number of entries to return (default 1500, max 5000)
      - in: query
        name: offset
        schema:
          type: integer
        required: false
        description: Starting point of entries; 0-indexed
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  activateddate:
                    description: The date the order was entered. Returned in mm/dd/yyyy
                      hh24:mi:ss format.
                    type: string
                  activateduser:
                    description: The user who placed the order.
                    type: string
                  approveddate:
                    description: The date the order was signed by a doctor. Returned
