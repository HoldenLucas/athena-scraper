                    type: string
                  approveduser:
                    description: The user who signed the placed order.
                    type: string
                  completeddate:
                    description: The date the order was completed. Returned in mm/dd/yyyy
                      hh24:mi:ss format.
                    type: string
                  completedreason:
                    description: The reason a user entered for why the order was marked
                      completed.
                    type: string
                  completeduser:
                    description: The user who marked the order as completed via OrderView
                      (means no work left).
                    type: string
                  createddate:
                    description: The date the order was queued up to be placed in
                      order entry. Returned in mm/dd/yyyy hh24:mi:ss format.
                    type: string
                  createduser:
                    description: The user who queued up the order to be placed
                    type: string
                  departmentid:
                    description: The ID of the department from where the order was
                      placed.
                    type: integer
                  discontinueddate:
                    description: The date the order was discontinued. Returned in
                      mm/dd/yyyy hh24:mi:ss format.
                    type: string
                  discontinuedreason:
                    description: The reason a user entered for why the order was discontinued.
                    type: string
                  discontinueduser:
                    description: The user who discontinued the order.
                    type: string
                  discontinueorderingmethodname:
                    description: The method through which the doctor instructed the
                      order to be discontinued (Verbal, Written, Fax, Phone).
                    type: string
                  discontinueorderingproviderid:
                    description: The ID of the doctor who instructed the order to
                      be discontinued.
                    type: integer
                  discontinueorderingprovidername:
                    description: The name of the doctor who instructed the order to
                      be discontinued.
                    type: string
                  discontinuereferringproviderid:
                    description: The ID of the doctor who instructed the order to
                      be discontinued from outside the practice.
                    type: integer
                  discontinuesigneddate:
                    description: The date the discontinue order was signed by a doctor.
                      Returned in mm/dd/yyyy hh24:mi:ss format.
                    type: string
                  discontinuesigneduser:
                    description: The doctor who signed the discontinue order.
                    type: string
                  name:
                    description: The name of the order.
                    type: string
                  note:
                    description: Free text comments field.
                    type: string
                  orderid:
                    description: The unique athena ID of this instance of the order.
                    type: integer
                  orderingmethodname:
                    description: The method through which the doctor instructed the
                      order to be placed (Verbal, Written, Fax, Phone).
                    type: string
                  orderingproviderid:
                    description: The ID of the ordering doctor, which could be different
                      than the user who placed the order (for example, an intake nurse).
                    type: integer
                  orderingprovidername:
                    description: The name of the doctor who is placing the order.
                    type: string
                  orderingproviderphone:
                    description: The phone number for the ordering doctor.
                    type: string
                  ordertypeid:
                    description: The athena ID for the type of order being placed.
                    type: integer
                  priority:
                    description: 'The urgency of the order to be performed: Now or
                      Routine.'
                    type: string
                  reason:
                    description: The reason why an order was placed.
                    type: string
                  referringproviderid:
                    description: The ID of the referring doctor, which may be a doctor
                      outside of the practice who placed an order getting fulfilled
                      in the hospital.
                    type: integer
                  startdate:
                    description: The date the order is scheduled to begin. Returned
                      in mm/dd/yyyy hh24:mi:ss format.
                    type: string
                  status:
                    description: The status the order is in.
                    type: string
                  stayid:
                    description: The ID of the hospital stay where the order was placed
                      from.
                    type: integer
                type: object
          description: Success
      operationId: getPracticeidStaysActiveOrdersConsult
      x-scopes: []
      tags:
      - Inpatient
      - Inpatient Consult Orders
  /v1/{practiceid}/stays/configuration/orders/consult:
    get:
      summary: Get reference list of consult orders
      description: 'BETA: Retrieves a list of consult orders configured in the system.'
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: query
        name: searchvalue
        schema:
          type: string
        required: true
        description: A term to search for. Must be at least 2 characters
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  name:
                    description: The name of the order
                    type: string
                  ordertypeid:
                    description: The athena ID of the type of order
                    type: integer
                type: object
          description: Success
      operationId: getPracticeidStaysConfigurationOrdersConsult
      x-scopes: []
      tags:
      - Inpatient
      - Inpatient Consult Orders
metadata: []
security:
- api_auth_preview:
  - athena/service/Athenanet.MDP.*
  api_auth:
  - athena/service/Athenanet.MDP.*
  bearer_auth: []
