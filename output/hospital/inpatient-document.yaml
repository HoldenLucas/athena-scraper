  /v1/{practiceid}/inpatient/configuration/documentlabels:
    get:
      summary: Get reference list of document labels for inpatient documents
      description: 'BETA: Retrieve the configured list of document labels that can
        be attached to unpatient documents.'
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: query
        name: documentclass
        schema:
          enum:
          - INPTADMIN
          - INPTCLINICALDOCUMENT
          type: string
          x-enumDescriptions:
          - Inpatient Admin
          - Inpatient Clinical Document
        required: true
        description: The document class to get the label for.
      - in: query
        name: searchvalue
        schema:
          type: string
        required: true
        description: Search by the name of the document label, at least 3 characters
          are required.
      - in: query
        name: limit
        schema:
          type: integer
        required: false
        description: Number of entries to return (default 1500, max 5000)
      - in: query
        name: offset
        schema:
          type: integer
        required: false
        description: Starting point of entries; 0-indexed
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  documentlabelid:
                    description: The ID of the document label.
                    type: integer
                  name:
                    description: The name of the document label.
                    type: string
                type: object
          description: Success
      operationId: getPracticeidInpatientConfigurationDocumentlabels
      x-scopes: []
      tags:
      - Inpatient
      - Inpatient Document Labels
