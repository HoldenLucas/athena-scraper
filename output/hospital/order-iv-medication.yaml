openapi: 3.0.0
info:
  description: Welcome to the API developer portal which gives third parties access
    to our APIs and sandbox to develop integrated solutions that will enhance the
    value and functionality offered by athenaOne®.
  title: athena API collection
  version: '0.1'
components:
  securitySchemes:
    api_auth_preview:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://api.preview.platform.athenahealth.com/oauth2/v1/token
          scopes:
            athena/service/Athenanet.MDP.*: API Preview
    api_auth:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://api.platform.athenahealth.com/oauth2/v1/token
          scopes:
            athena/service/Athenanet.MDP.*: API Production
    bearer_auth:
      type: http
      scheme: bearer
servers:
- url: https://api.preview.platform.athenahealth.com
  description: Preview
- url: https://api.platform.athenahealth.com
  description: Production
paths:
  /v1/{practiceid}/stays/{stayid}/orders/ivmedication:
    get:
      summary: Get list of IV medication orders for a stay
      description: 'BETA: Retrieves a list of IV medication orders for a specific
        patient stay in the hospital.'
      parameters:
      - in: path
        name: stayid
        schema:
          type: integer
        required: true
        description: stayid
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: query
        name: statusgroup
        schema:
          enum:
          - active
          - signed
          - unsigned
          type: string
          x-enumDescriptions:
          - ACTIVE
          - SIGNED
          - UNSIGNED
        required: false
        description: 'Active: Orders that are not yet completed. Signed orders: Orders
          that are signed by a doctor. Unsigned orders: Orders that have not yet been
          signed.'
      - in: query
        name: limit
        schema:
          type: integer
        required: false
        description: Number of entries to return (default 1500, max 5000)
      - in: query
        name: offset
        schema:
          type: integer
        required: false
        description: Starting point of entries; 0-indexed
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  activateddate:
                    description: The date the order was entered. Returned in mm/dd/yyyy
                      hh24:mi:ss format.
                    type: string
                  activateduser:
                    description: The user who placed the order.
                    type: string
                  approveddate:
                    description: The date the order was signed by a doctor. Returned
                      in mm/dd/yyyy hh24:mi:ss format.
                    type: string
                  approveduser:
                    description: The user who signed the placed order.
                    type: string
                  completeddate:
                    description: The date the order was completed. Returned in mm/dd/yyyy
                      hh24:mi:ss format.
                    type: string
                  completeduser:
                    description: The user who marked the order as completed via OrderView
                      (means no work left).
                    type: string
                  createddate:
                    description: The date the order was queued up to be placed in
                      order entry. Returned in mm/dd/yyyy hh24:mi:ss format.
                    type: string
                  createduser:
                    description: The user who queued up the order to be placed.
                    type: string
                  departmentid:
                    description: The ID of the department from where the order was
                      placed.
                    type: integer
                  diluentdoseamount:
                    description: The dose amount of the Diluent.
                    type: integer
                  diluentdoseunit:
                    description: The name of the unit of the Dose for the additive
                      (Like 'mL').
                    type: string
                  diluentingredientname:
                    description: The name of the ingredient the infusion is being
                      diluted in. This name correlates to the description of the HIC_SEQN.
                    type: string
                  discontinueddate:
                    description: The date the order was discontinued. Returned in
                      mm/dd/yyyy hh24:mi:ss format.
                    type: string
                  discontinuedreason:
                    description: The reason a user entered for why the order was discontinued.
                    type: string
                  discontinueduser:
                    description: The user who discontinued the order.
                    type: string
                  discontinueorderingmethodname:
                    description: The method through which the doctor instructed the
                      order to be discontinued (Verbal, Written, Fax, Phone).
                    type: string
                  discontinueorderingproviderid:
                    description: The doctor who instructed the order to be discontinued.
                    type: integer
                  discontinueorderingprovidername:
                    description: The name of the doctor who instructed the order to
                      be discontinued.
                    type: string
                  discontinuereferringproviderid:
                    description: The doctor who instructed the order to be discontinued
                      from outside the practice.
                    type: integer
                  discontinuesigneddate:
                    description: The date the discontinue order was signed by a doctor.
                      Returned in mm/dd/yyyy hh24:mi:ss format.
                    type: string
                  discontinuesigneduser:
                    description: The doctor who signed the discontinue order.
                    type: string
                  doseamount:
                    description: The quantity of the IV medication ordered.
                    type: string
                  doseunit:
                    description: The unit attribution of the dose amount. E.g., mg,mcg
                    type: string
                  duration:
                    description: How long the order should be repeated for. For instance
                      should it be done for 1 day, 2 days or until discontinued.
                    type: string
                  durationamount:
                    description: The number of units that the order will repeat for.
                      Such as '4' days.
                    type: integer
                  durationunit:
                    description: The unit the duration amount corresponds to (days,
                      hours, minutes, weeks, doses).
                    type: string
                  frequency:
                    description: The frequency the order will be performed (every
                      day, once).
                    type: string
                  infusionadministrationmethod:
                    description: 'The method this infusion is going to be administered.
                      1 of these values: push : The Medication is given via Push (syringe).
                      infusionwithdiluent : The medication is being administered via
                      an Infusion over time and being diluted in a diluent. infusionwithoutdiluent
                      : The medication is being administered via an Infusion over
                      time, but not being diluted in a diluent.'
                    type: string
                  infusionrateamount:
                    description: The rate (always assumed to be ml/hr) that the order
                      is to be infused.
                    type: integer
                  inpatientslidingscale:
                    description: The name of the locally defined sliding scale configuration.
                    type: string
                  isprn:
                    default: false
                    description: Whether or not the order was ordered as "pro re nata",
                      or "as needed".
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                  isslidingscalesig:
                    default: false
                    description: Describes if the medication is using sliding scale
                      configuration.
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                  ivadditives:
                    description: An array of medications also attached to the order.
                      They are only used with IV orders.'
                    properties:
                      dosemount:
                        description: The dose of the additive with relation to the
                          main medication.
                        type: integer
                      doseunit:
                        description: The name of the unit of the dose of the additive
                          (like 'mg').
                        type: string
                      name:
                        description: This contains the 'Name' of the additive or the
                          description of the additive.
                        type: string
                      ordertypeid:
                        description: The athena ID for the type of order being placed.
                        type: integer
                    type: object
                  name:
                    description: The name of the order.
                    type: string
                  note:
                    description: Free text comments field.
                    type: string
                  orderid:
                    description: The unique athena ID of this instance of the order.
                    type: integer
                  orderingmethodname:
                    description: The method through which the doctor instructed the
                      order to be placed (Verbal, Written, Fax, Phone).
                    type: string
                  orderingproviderid:
                    description: The ID of the ordering doctor, which could be different
                      than the user who placed the order (for example, an intake nurse).
                    type: integer
                  orderingprovidername:
                    description: The name of the doctor who is placing the order.
                    type: string
                  orderingproviderphone:
                    description: The phone number for the ordering doctor.
                    type: string
                  ordertypeid:
                    description: The athena ID for the type of order being placed.
                    type: integer
                  pharmacistverifieddate:
                    description: The date the order was verified by the pharmacy.
                      Returned in mm/dd/yyyy hh24:mi:ss format.
                    type: string
                  pharmacistverifieduser:
                    description: The name of the user who verified the order.
                    type: string
                  priority:
                    description: The urgency of the order to be performed. Options
                      are STAT/Now/Routine/Scheduled.
                    type: string
                  prnnote:
                    description: 'If the order was ordered as PRN, the note will describe
                      what symptoms the medication should be given for. Example: as
                      needed for pain.'
                    type: string
                  referringproviderid:
                    description: The ID of the referring doctor, which may be a doctor
                      outside of the practice who placed an order getting fulfilled
                      in the hospital.
                    type: integer
                  startdate:
                    description: The date the order is scheduled to begin. Returned
                      in mm/dd/yyyy hh24:mi:ss format.
                    type: string
                  status:
                    description: The status the order is in.
                    type: string
                  stayid:
                    description: The ID of the hospital stay where the order was placed
                      from.
                    type: integer
                  stopdate:
                    description: The date the order is scheduled to end. Returned
                      in mm/dd/yyyy hh24:mi:ss format.
                    type: string
                  unstructuredsig:
                    description: Order details entered through a free text, rather
                      than structured, order workflow.
                    type: string
                type: object
          description: Success
      operationId: getPracticeidStaysStayidOrdersIvmedication
      x-scopes: []
      tags:
      - Inpatient
      - Inpatient IV Med Orders
