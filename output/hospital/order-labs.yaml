  /v1/{practiceid}/stays/configuration/orders/lab:
    get:
      summary: Get reference list of orderable labs
      description: 'BETA: Retrieves the configured list of lab orders based on the
        seach criteria.'
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: query
        name: searchvalue
        schema:
          type: string
        required: true
        description: A term to search for. Must be at least 2 characters
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  name:
                    description: The name of the order
                    type: string
                  ordertypeid:
                    description: The athena ID of the type of order
                    type: integer
                type: object
          description: Success
      operationId: getPracticeidStaysConfigurationOrdersLab
