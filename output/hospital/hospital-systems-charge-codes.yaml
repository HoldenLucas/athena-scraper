openapi: 3.0.0
info:
  description: Welcome to the API developer portal which gives third parties access
    to our APIs and sandbox to develop integrated solutions that will enhance the
    value and functionality offered by athenaOne®.
  title: athena API collection
  version: '0.1'
components:
  securitySchemes:
    api_auth_preview:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://api.preview.platform.athenahealth.com/oauth2/v1/token
          scopes:
            athena/service/Athenanet.MDP.*: API Preview
    api_auth:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://api.platform.athenahealth.com/oauth2/v1/token
          scopes:
            athena/service/Athenanet.MDP.*: API Production
    bearer_auth:
      type: http
      scheme: bearer
servers:
- url: https://api.preview.platform.athenahealth.com
  description: Preview
- url: https://api.platform.athenahealth.com
  description: Production
paths:
  /v1/{practiceid}/chargecodes:
    get:
      summary: Get list of hospital charge codes
      description: Retrieves a list of hospital charge codes
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: query
        name: exactchargecodesonly
        schema:
          type: string
        required: false
        description: '- If true, returns only charge codes that are exact matches
          of those searched for.'
      - in: query
        name: departmentid
        schema:
          type: integer
        required: false
        description: '- The department ID to associate the chargecode.'
      - in: query
        name: effectivedate
        schema:
          type: string
        required: false
        description: '- Must be passed in with EXPIRATIONDATE. Formatted as MM/DD/YYYY.'
      - in: query
        name: torevcode
        schema:
          type: string
        required: false
        description: '- For range search of'
      - in: query
        name: description
        schema:
          type: string
        required: false
        description: '- The description of charge codes'
      - in: query
        name: fromrevcode
        schema:
          type: string
        required: false
        description: '- For range search of revenuecodes'
      - in: query
        name: chargecodes
        schema:
          type: array
          items:
            type: string
        required: false
        description: '- An array of charge codes.'
      - in: query
        name: procedurecodes
        schema:
          type: array
          items:
            type: string
        required: false
        description: '- The procedure codes associated with the chargecode'
      - in: query
        name: filterdate
        schema:
          type: string
        required: false
        description: '- The filter on date. Formatted as MM/DD/YYYY.'
      - in: query
        name: expirationdate
        schema:
          type: string
        required: false
        description: '- Must be passed in with EFFECTIVEDATE. Formatted as MM/DD/YYYY.'
      - in: query
        name: revenuecodes
        schema:
          type: array
          items:
            type: string
        required: false
        description: '- The revenue code associated with the chargecode'
      - in: query
        name: chargecode
        schema:
          type: string
        required: false
        description: '- charge code.'
      - in: query
        name: showduplicates
        schema:
          type: string
        required: false
        description: '- Include duplicate chargecodes for a given date'
      - in: query
        name: ignorechargemastercodeids
        schema:
          type: array
          items:
            type: string
        required: false
        description: '- IDs of charge master codes to ignore.'
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  amount:
                    description: '- The amount of the charge code.'
                    type: string
                  chargecode:
                    description: '- The charge code.'
                    type: string
                  chargemasterchargeid:
                    description: '- The charge master ID.'
                    type: string
                  departmentname:
                    description: '- The name of department associated with the charge
                      code.'
                    type: string
                  description:
                    description: '- Description of the charge code.'
                    type: string
                  effectivedate:
                    description: '- EFFECTIVE DATE of the charge code.'
                    type: string
                  expirationdate:
                    description: '- EXPIRATIONDATE of the charge code.'
                    type: string
                  fractionalbilling:
                    description: '- The boolean to indicate the FRACTIONALBILLING
                      of the charge code.'
                    type: string
                  procedurecode:
                    description: '- The procecdure code associated with the charge
                      code.'
                    type: string
                  revenuecode:
                    description: '- The revenue code associated with the charge code.'
                    type: string
                type: object
          description: Success
      operationId: getPracticeidChargecodes
      x-scopes: []
      tags:
      - Inpatient
      - Hospital Systems Charge Codes
    post:
      summary: Create hospital charge code
      description: Creates a new charge code for a hospital visit
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: header
        name: Content-Type
        schema:
          type: string
        required: true
        description: Content type of the payload
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  chargecode:
                    description: If the operation succeeded, this will contain the
                      CHARGECODE of any charges that were created.
                    type: string
                  errormessage:
                    description: If the operation failed, this will contain any error
                      messages.
                    type: string
                  success:
                    description: Whether the operation was successful.
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                type: object
          description: Success
      operationId: postPracticeidChargecodes
      x-scopes: []
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
              - effectivedate
              - departmentid
              - description
              - revenuecode
              - chargecode
              properties:
                price:
                  type: number
                  description: The amount charged for what this chargecode specifies.
                minprice:
                  type: number
                  description: The minimum price for fractional billing.
                softcode:
                  type: boolean
                  description: Is hcpcs entered at charge entry.
                username:
                  type: string
                  description: The username to add as.
                chargecode:
                  type: string
                  description: The chargecode to create.
                description:
                  type: string
                  description: The description of what the chargecode specifies.
                revenuecode:
                  type: string
                  description: The revenue code associated with this chargecode.
                departmentid:
                  type: integer
                  description: The department id to associate this chargecode with.
                effectivedate:
                  type: string
                  description: The date that this chargecode becomes valid. Formatted
                    as MM/DD/YYYY.
                procedurecode:
                  type: string
                  description: The procedure code associated with this chargecode.
                dynamicpricing:
                  type: boolean
                  description: Is Price set at charge entry.
                expirationdate:
                  type: string
                  description: Date that this chargecode expires. Formatted as MM/DD/YYYY.
                fractionalbilling:
                  type: boolean
                  description: True if the chargecode can be fractionally billed.
        required: true
      tags:
      - Inpatient
      - Hospital Systems Charge Codes
  /v1/{practiceid}/chargecodes/changed:
    get:
      summary: Get list of changes in hospital charge codes based on subscribed events
      description: Retrieves the list of changes in hospital charge codes
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: query
        name: leaveunprocessed
        schema:
          type: boolean
        required: false
        description: For testing purposes, do not mark records as processed.
      - in: query
        name: showprocessedstartdatetime
        schema:
          type: string
        required: false
        description: Show already processed changes.  This will show changes that
          you previously retrieved at some point after this datetime mm/dd/yyyy hh24:mi:ss
          (Eastern). Can be used to refetch data if there was an error, such as a
          timeout, and records are marked as already retrieved. This is intended to
          be used with showprocessedenddatetime and for a short period of time only.
          Also note that all messages will eventually be deleted.
      - in: query
        name: showprocessedenddatetime
        schema:
          type: string
        required: false
        description: See showprocessedstartdatetime.
      - in: query
        name: limit
        schema:
          type: integer
        required: false
        description: Number of entries to return (default 1000, max 10000)Please note
          that this endpoint has a different default and max than normal.
      - in: query
        name: offset
        schema:
          type: integer
        required: false
        description: Starting point of entries; 0-indexed
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  chargecode:
                    description: The charge code that was created.
                    type: string
                  foreignsystem:
                    description: The name of foreign system that created the intial
                      request
                    type: string
                  foreignsystemid:
                    description: The foreign system ID.
                    type: string
                  rejected:
                    description: Whether or not the charge was rejected.
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                type: object
          description: Success
      operationId: getPracticeidChargecodesChanged
      x-scopes: []
      tags:
      - Inpatient
      - Hospital Systems Charge Codes
  /v1/{practiceid}/chargecodes/changed/subscription/events:
    get:
      summary: Get list of hospital charge codes change events to which you can subscribe
      description: Retrieves the list of events you can subscribe to for when hospital
        charge codes are updated
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  departmentids:
                    description: List of Departmentids subscribed
                    items:
                      type: integer
                    type: array
                  status:
                    description: 'Will return one of following statuses: ACTIVE, INACTIVE,
                      or PARTIAL. The PARTIAL status means that not all events are
                      subscribed to. In the event of a problem, UNKNOWN may be returned.'
                    type: string
                  subscriptions:
                    description: List of events you are subscribed to.
                    items:
                      properties:
                        eventname:
                          description: Name of event
                          type: string
                      type: object
                    type: array
                type: object
          description: Success
      operationId: getPracticeidChargecodesChangedSubscriptionEvents
      x-scopes: []
      tags:
      - Inpatient
      - Hospital Systems Charge Codes
  /v1/{practiceid}/chargecodes/changed/subscription:
    post:
      summary: Subscribe to all/specific change events for hospital charge codes
      description: Subscribes for change events for hospital charge codes
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: header
        name: Content-Type
        schema:
          type: string
        required: true
        description: Content type of the payload
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  success:
                    description: Returns if the call to manipulate subscriptions for
                      charge code was successful.
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                type: object
          description: Success
      operationId: postPracticeidChargecodesChangedSubscription
      x-scopes: []
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                eventname:
                  type: string
                  description: By default, you are subscribed to all possible events.  If
                    you only wish to subscribe to an individual event, pass the event
                    name with this argument.
        required: true
      tags:
      - Inpatient
      - Hospital Systems Charge Codes
    get:
      summary: Get list of subscribed events for changes in hospital charge codes
      description: Retrieves list of events applicable for hospital charge codes changes
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  departmentids:
                    description: List of Departmentids subscribed
                    items:
                      type: integer
                    type: array
                  status:
                    description: 'Will return one of following statuses: ACTIVE, INACTIVE,
                      or PARTIAL. The PARTIAL status means that not all events are
                      subscribed to. In the event of a problem, UNKNOWN may be returned.'
                    type: string
                  subscriptions:
                    description: List of events you are subscribed to.
                    items:
                      properties:
                        eventname:
                          description: Name of event
                          type: string
                      type: object
                    type: array
                type: object
          description: Success
      operationId: getPracticeidChargecodesChangedSubscription
      x-scopes: []
      tags:
      - Inpatient
      - Hospital Systems Charge Codes
    delete:
      summary: Unsubscribe to all/specific change events for hospital charge codes
      description: Delete a specific event which is no longer required
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: query
        name: eventname
        schema:
          type: string
        required: false
        description: By default, you are unsubscribed from all possible events.  If
          you only wish to unsubscribe from an individual event, pass the event name
          with this argument.
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  success:
                    description: Returns if the call to manipulate subscriptions for
                      charge code was successful.
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                type: object
          description: Success
      operationId: deletePracticeidChargecodesChangedSubscription
      x-scopes: []
      tags:
      - Inpatient
      - Hospital Systems Charge Codes
metadata: []
security:
- api_auth_preview:
  - athena/service/Athenanet.MDP.*
  api_auth:
  - athena/service/Athenanet.MDP.*
  bearer_auth: []
