  /v1/{practiceid}/patientsecuremessage/providers/departmentsmapping:
    get:
      summary: Get department mapping information for patient-messaging
      description: Retrieves the department mapping information for patient messaging
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: query
        name: providergroupids
        schema:
          type: array
          items:
            type: integer
        required: false
        description: One or more ID's of the ProviderGroup
      - in: query
        name: providerids
        schema:
          type: array
          items:
            type: integer
        required: false
        description: One or more ID's of the Provider
      - in: query
        name: departmentids
        schema:
          type: array
          items:
            type: integer
        required: false
        description: One or more ID's of the Department
      - in: query
        name: communicatorbrandid
        schema:
          type: integer
        required: false
        description: ID of the Brand
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
          description: Success
      operationId: getPracticeidPatientsecuremessageProvidersDepartmentsmapping
      x-scopes: []
      tags:
