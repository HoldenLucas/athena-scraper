      - Patient secure messages
  /v1/{practiceid}/patients/{patientid}/patientsecuremessage/marklabresultread/{messagethreadid}:
    post:
      summary: mark labresult as Read
      description: updates the specified LabResult has been read by the patient or
        a family member on the patient portal
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: patientid
        schema:
          type: integer
        required: true
        description: patientid
      - in: path
        name: messagethreadid
        schema:
          type: integer
        required: true
        description: messagethreadid
      - in: header
        name: Content-Type
        schema:
          type: string
        required: true
        description: Content type of the payload
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  success:
                    description: Returns true if operation was a success.
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                type: object
          description: Success
      operationId: postPracticeidPatientsPatientidPatientsecuremessageMarklabresultreadMessagethreadid
