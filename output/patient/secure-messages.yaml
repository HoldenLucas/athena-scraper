      - Patient's Secure Messaging with attachments
  /v1/{practiceid}/patients/{patientid}/securemessage/topractice:
    post:
      summary: This API endpoint sends a Secure Message to a provider on behalf of
        a patient.
      description: This API endpoint sends a Secure Message to a patient or provider.
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: patientid
        schema:
          type: integer
        required: true
        description: patientid
      - in: header
        name: Content-Type
        schema:
          type: string
        required: true
        description: Content type of the payload
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  messagethreadid:
                    description: The ID of the message thread that was just created.
                    type: integer
                type: object
          description: Success
      operationId: postPracticeidPatientsPatientidSecuremessageTopractice
      x-scopes: []
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
              - departmentid
              - text
              - messagetype
              properties:
                text:
                  type: string
                  description: The content of the message that we are sending.
                subject:
                  type: string
                  description: The subject of the message that is being sent.
                dayofweek:
                  type: string
                  description: This is used to set a preferred day of week when making
                    an appointment request via the portal. It should be a comma seperated
                    string of 0-6 where Monday is 0 and Sunday is 6.
                timeofday:
                  enum:
                  - ''
                  - AM
                  - PM
                  - EV
                  type: string
                  description: This should be a string of either AM for the morning,
                    PM for the afternoon, or EV for the evening.
