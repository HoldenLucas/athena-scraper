      - Patient secure messages
  /v1/{practiceid}/patientsecuremessage/getavailablemessagetypes:
    get:
      summary: This API endpoint gets the available message types for a given practice.
      description: Get a list of active message types for a practice
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: query
        name: portalthirdpartyuserid
        schema:
          type: integer
        required: false
        description: If a user is authenticated for the portal, this should be the
          ID of the authenticated Portal User.
      - in: query
        name: communicatorbrandid
        schema:
          type: integer
        required: false
        description: ID of the communicatorbrand that we want to know message settings
          for.
      - in: query
        name: patientid
        schema:
          type: integer
        required: false
        description: ID of the patient that we are sending a message to or from.
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  order:
                    description: The preferred order in which to display the message
                      types
                    type: integer
                  text:
                    description: Patient friendly display text for message types
                    type: string
                  value:
                    description: Internal value of the message types. This is what
                      you would pass in as DOCUMENTSUBCLASS to SendMessage
                    type: string
                type: object
          description: Success
      operationId: getPracticeidPatientsecuremessageGetavailablemessagetypes
      x-scopes: []
      tags:
      - Patient Secure Messaging
      - Get patient secure message metadata
