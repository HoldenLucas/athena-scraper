openapi: 3.0.0
info:
  description: Welcome to the API developer portal which gives third parties access
    to our APIs and sandbox to develop integrated solutions that will enhance the
    value and functionality offered by athenaOne®.
  title: athena API collection
  version: '0.1'
components:
  securitySchemes:
    api_auth_preview:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://api.preview.platform.athenahealth.com/oauth2/v1/token
          scopes:
            athena/service/Athenanet.MDP.*: API Preview
    api_auth:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://api.platform.athenahealth.com/oauth2/v1/token
          scopes:
            athena/service/Athenanet.MDP.*: API Production
    bearer_auth:
      type: http
      scheme: bearer
servers:
- url: https://api.preview.platform.athenahealth.com
  description: Preview
- url: https://api.platform.athenahealth.com
  description: Production
paths:
  /v1/{practiceid}/patients/{patientid}/securemessage/{messagethreadid}:
    get:
      summary: Get all messages from patient's specific message-thread
      description: Retrieves messages associated to a specific message-thread for
        a specific patient
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: patientid
        schema:
          type: integer
        required: true
        description: patientid
      - in: path
        name: messagethreadid
        schema:
          type: integer
        required: true
        description: messagethreadid
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  brandid:
                    description: Brandid of the message
                    type: integer
                  documentid:
                    description: ID of the document
                    type: integer
                  enterpriseid:
                    description: ID of the patient
                    type: integer
                  messagelist:
                    description: Internal value of the messages
                    items:
                      properties:
                        displaydate:
                          description: Fetch date from documentaction table which
                            calculates time accoding to timezone
                          type: string
                        from:
                          description: Source from which the message received (provider
                            or practice)
                          properties:
                            displayname:
                              description: Practice or provider name
                              type: string
                            providerid:
                              description: ID of the provider
                              type: integer
                            username:
                              type: string
                          type: object
                        isreply:
                          description: Boolean. Whether or not this message is a reply
                          enum:
                          - ''
                          - false
                          - true
                          type: string
                        text:
                          description: Content of the message
                          type: string
                        timestamp:
                          description: Timestamp of the created message
                          type: integer
                        to:
                          description: Destination where the message has to be delivered
                          properties:
                            displayname:
                              description: Patient name or user name
                              type: string
                            providerid:
                              description: ID of the provider
                              type: integer
                            username:
                              description: PORTAL by default
                              type: string
                          type: object
                        unread:
                          description: Boolean. Whether or not the message is unread
                          enum:
                          - ''
                          - false
                          - true
                          type: string
                      type: object
                    type: array
                  messagetype:
                    description: Messagetype of the document
                    type: string
                  subject:
                    description: Subject of the message
                    type: string
                type: object
          description: Success
      operationId: getPracticeidPatientsPatientidSecuremessageMessagethreadid
      x-scopes: []
      tags:
      - Patient Secure Messaging
      - Patient secure messages
  /v1/{practiceid}/patients/{patientid}/securemessage/{messagethreadid}/CanPatientReplyToMessage:
    get:
      summary: Get patient's reply-access rights for specific message thread
      description: Retrieves information on the access right for a patient to respond
        to the specific message
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: patientid
        schema:
          type: integer
        required: true
        description: patientid
      - in: path
        name: messagethreadid
        schema:
          type: integer
        required: true
        description: messagethreadid
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
          description: Success
      operationId: getPracticeidPatientsPatientidSecuremessageMessagethreadidCanPatientReplyToMessage
      x-scopes: []
      tags:
      - Patient Secure Messaging
      - Patient secure messages
  /v1/{practiceid}/patients/{patientid}/securemessage/{messagethreadid}/reply:
    post:
      summary: Submit new reply to a specific message-thread
      description: Sends a reply to a specific message-thread
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: patientid
        schema:
          type: integer
        required: true
        description: patientid
      - in: path
        name: messagethreadid
        schema:
          type: integer
        required: true
        description: messagethreadid
      - in: header
        name: Content-Type
        schema:
          type: string
        required: true
        description: Content type of the payload
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  error:
                    description: Can be 0 for no error or a string containing an error
                      message.
                    type: string
                  message:
                    description: Get messages for a patientid
                    properties:
                      brandid:
                        description: Brandid of the message
                        type: integer
                      documentid:
                        description: ID of the document
                        type: integer
                      enterpriseid:
                        description: ID of the patient
                        type: integer
                      messagelist:
                        description: Internal value of the messages
                        items:
                          properties:
                            displaydate:
                              description: Fetch date from documentaction table which
                                calculates time accoding to timezone
                              type: string
                            from:
                              description: Source from which the message received
                                (provider or practice)
                              properties:
                                displayname:
                                  description: Practice or provider name
                                  type: string
                                providerid:
                                  description: ID of the provider
                                  type: integer
                                username:
                                  type: string
                              type: object
                            isreply:
                              description: Boolean. Whether or not this message is
                                a reply
                              enum:
                              - ''
                              - false
                              - true
                              type: string
                            text:
                              description: Content of the message
                              type: string
                            timestamp:
                              description: Timestamp of the created message
                              type: integer
                            to:
                              description: Destination where the message has to be
                                delivered
                              properties:
                                displayname:
                                  description: Patient name or user name
                                  type: string
                                providerid:
                                  description: ID of the provider
                                  type: integer
                                username:
                                  description: PORTAL by default
                                  type: string
                              type: object
                            unread:
                              description: Boolean. Whether or not the message is
                                unread
                              enum:
                              - ''
                              - false
                              - true
                              type: string
                          type: object
                        type: array
                      messagetype:
                        description: Messagetype of the document
                        type: string
                      subject:
                        description: Subject of the message
                        type: string
                    type: object
                type: object
          description: Success
      operationId: postPracticeidPatientsPatientidSecuremessageMessagethreadidReply
      x-scopes: []
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
              - text
              properties:
                text:
                  type: string
                  description: The body of the reply to send
        required: true
      tags:
      - Patient Secure Messaging
      - Patient secure messages
  /v1/{practiceid}/patients/{patientid}/securemessage/archivedmessages:
    get:
      summary: Get list of archived messages
      description: Retrieves a list of messages archieved by specific patient
