openapi: 3.0.0
info:
  description: Welcome to the API developer portal which gives third parties access
    to our APIs and sandbox to develop integrated solutions that will enhance the
    value and functionality offered by athenaOne®.
  title: athena API collection
  version: '0.1'
components:
  securitySchemes:
    api_auth_preview:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://api.preview.platform.athenahealth.com/oauth2/v1/token
          scopes:
            athena/service/Athenanet.MDP.*: API Preview
    api_auth:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://api.platform.athenahealth.com/oauth2/v1/token
          scopes:
            athena/service/Athenanet.MDP.*: API Production
    bearer_auth:
      type: http
      scheme: bearer
servers:
- url: https://api.preview.platform.athenahealth.com
  description: Preview
- url: https://api.platform.athenahealth.com
  description: Production
paths:
  /v1/{practiceid}/chart/{patientid}/pharmacies/default:
    get:
      summary: Get patient's default pharmacy
      description: Retrieves the patient's default pharmacy information
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: patientid
        schema:
          type: integer
        required: true
        description: patientid
      - in: query
        name: departmentid
        schema:
          type: integer
        required: true
        description: The athenaNet department id.
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  acceptfax:
                    description: Flag representing if the pharmacy accepts fax
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                  address1:
                    description: Address line 1 of the pharmacy
                    type: string
                  address2:
                    description: Address line 2 of the pharmacy
                    type: string
                  city:
                    description: City of the pharmacy
                    type: string
                  clinicalproviderid:
                    description: The athenaNet clinical provider ID.
                    type: integer
                  clinicalprovidername:
                    description: The pharmacy name
                    type: string
                  defaultpharmacy:
                    description: If flagged true, this is the default pharmacy for
                      the patient
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                  faxnumber:
                    description: Fax number of the pharmacy
                    type: string
                  pharmacytype:
                    description: Type of pharmacy (retail, mailorder)
                    type: string
                  phonenumber:
                    description: Phone number of the pharmacy
                    type: string
                  receivertype:
                    description: Receiver type
                    type: string
                  state:
                    description: State of the pharmacy
                    type: string
                  zip:
                    description: Zip code of the pharmacy
                    type: string
                type: object
          description: Success
      operationId: getPracticeidChartPatientidPharmaciesDefault
      x-scopes: []
      tags:
      - Chart
      - Preferred Pharmacies
    put:
      summary: Update patient's default pharmacy
      description: Modifies patient's default pharmacy information
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: patientid
        schema:
          type: integer
        required: true
        description: patientid
      - in: header
        name: Content-Type
        schema:
          type: string
        required: true
        description: Content type of the payload
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errormessage:
                    description: If the operation failed, this will contain any error
                      messages.
                    type: string
                  success:
                    description: Whether the operation was successful.
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                type: object
          description: Success
      operationId: putPracticeidChartPatientidPharmaciesDefault
      x-scopes: []
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
              - departmentid
              properties:
                ncpdpid:
                  type: string
                  description: The <a href="http://www.ncpdp.org">NCPDP</a> ID of
                    the clinical provider. Can be used instead of clinicalproviderid.
                    Only one can be used. The NCPDPID is a string that only accepts
                    numeric input and is defined as a string to support leading zeroes.
                departmentid:
                  type: integer
                  description: The athenaNet department id.
                clinicalproviderid:
                  type: integer
                  description: The clinical provider ID that you wish to set as the
                    default pharmacy or add as a preferred pharmacy. This or the NCPDPID
                    must be provided.
        required: true
      tags:
      - Chart
      - Preferred Pharmacies
metadata: []
security:
- api_auth_preview:
  - athena/service/Athenanet.MDP.*
  api_auth:
  - athena/service/Athenanet.MDP.*
  bearer_auth: []
