  /v1/{practiceid}/chart/encounters/{encounterid}/summary:
    get:
      summary: Get encounter-specific encounter summary content
      description: Retrieves information about an appointment specific encounter along
        with diagnoses data.
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: encounterid
