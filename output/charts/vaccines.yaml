                    description: Description of the route by which this vaccine was
                      administered
                    type: string
                  administersite:
                    description: Site where the vaccine was administered
                    type: string
                  amount:
                    description: Quantity of the vaccine that was administered
                    type: number
                  approvedby:
                    description: The username of the user who approved this vaccine
                      order, if clinical
                    type: string
                  approveddate:
                    description: Date when this vaccine order was approved, if clinical
                    type: string
                  chartsharinggroupid:
                    description: ID of the chart sharing group that the vaccine is
                      associated with. This can be used to determine what department
                      a vaccine belongs with.
                    type: integer
                  clinicalorderclasses:
                    description: The various Clinical Order Classes associated with
                      this Vaccine
                    items:
                      properties:
                        clinicalorderclassid:
                          description: The clinical order class id
                          type: number
                        name:
                          description: The name for this clinical order class
                          type: string
                      type: object
                    type: array
                  contraindicationreason:
                    description: List of codes indicating why the order was contraindicated
                      (for vaccines only). If this field is not present, the order
                      does not contain a contraindication reason.
                    items:
                      properties:
                        code:
                          description: The code indicating why the order was contraindicated.
                          type: string
                        codeset:
                          description: The codeset that the code belongs to.
                          type: string
                        description:
                          description: The plaintext description of the contraindication
                            reason.
                          type: string
                      type: object
                    type: array
                  cvx:
                    description: Vaccine Administered Code
                    type: integer
                  declinedreason:
                    description: List of codes indicating why the order was not given.
                      If this field is not present, the order was not declined. If
                      the array is empty, no reason has been chosen.
                    items:
                      properties:
                        code:
                          description: The code indicating why the order was not given.
                          type: string
                        codeset:
                          description: The codeset that the code belongs to.
                          type: string
                        description:
                          description: The plaintext description of the reason the
                            order was not given.
                          type: string
                      type: object
                    type: array
                  declinedreasontext:
                    description: The user-facing description of the reason the order
                      was not given.
                    type: string
                  deleteddate:
                    description: Date when this vaccine was deleted (if deleted)
                    type: string
                  description:
                    description: Vaccine description
                    type: string
                  enteredby:
                    description: The username of the user who entered the historic
                      vaccine information into the chart
                    type: string
                  entereddate:
                    description: Date when the vaccine information was entered into
                      the chart
                    type: string
                  expirationdate:
                    description: Date to administer vaccine by
                    type: string
                  genusname:
                    description: The name of the vaccine that appears in the UI of
                      the chart
                    type: string
                  lotnumber:
                    description: The lot number of the vaccine that was administered.
                      This is an identifier assigned to a batch of medications by
                      the manufacturer.
                    type: string
                  mvx:
                    description: Manufacturer code
                    type: string
                  ndc:
                    description: The National Drug Code for the administered vaccine.
                    type: string
                  orderedby:
                    description: The username of the user who ordered the vaccine
                    type: string
                  ordereddate:
                    description: Date the vaccine was ordered
                    type: string
                  partiallyadministered:
                    description: Whether this vaccine was partially administered or
                      not.
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                  patientid:
                    description: ID of the patient that the vaccine is associated
                      with.
                    type: integer
                  prescribeddate:
                    description: Date when this vaccine was prescribed (if prescribed)
                    type: string
                  refuseddate:
                    description: Date when this vaccine was refused (if refused)
                    type: string
                  refusednote:
                    description: Note associated with refusal, if available
                    type: string
                  refusedreason:
                    description: Reason for refusal, if available
                    type: string
                  status:
                    description: 'Status of this vaccine (one of: ADMINISTERED, REFUSED,
                      PRESCRIBED but not adminstered yet)'
                    type: string
                  submitdate:
                    description: Date when this vaccine order was submitted, if clinical
                    type: string
                  units:
                    description: Units corresponding to the above quantity
                    type: string
                  vaccinator:
                    description: Individual who has administered the vaccine
                    type: string
                  vaccineid:
                    description: Athena ID for this vaccine (prefix of H for historical,
                      C for clinical)
                    type: string
                  vaccineinformationstatements:
                    description: The Vaccine Information Statements (VIS) that were
                      given to the patient, grouped by Clinical Order Class
                    items:
                      properties:
                        clinicalorderclassid:
                          description: The clinical order class id
                          type: number
                        dateonvis:
                          description: The VIS date associated with this vaccine and
                            clinical order class id
                          type: string
                      type: object
                    type: array
                  vaccinetype:
                    description: Type of vaccine (either CLINICAL - ordered/administered
                      by the practice, or HISTORICAL - from patient's previous medical
                      history or alternative source)
                    type: string
                  visgivendate:
                    description: Date when the Vaccine Information Statement was given
                      to the patient
                    type: string
                type: object
          description: Success
      operationId: getPracticeidChartHealthhistoryVaccineChanged
      x-scopes: []
      tags:
      - Chart
      - Historical Vaccine Changed Subscription
metadata: []
security:
- api_auth_preview:
  - athena/service/Athenanet.MDP.*
  api_auth:
  - athena/service/Athenanet.MDP.*
  bearer_auth: []
