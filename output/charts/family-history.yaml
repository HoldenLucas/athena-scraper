openapi: 3.0.0
info:
  description: Welcome to the API developer portal which gives third parties access
    to our APIs and sandbox to develop integrated solutions that will enhance the
    value and functionality offered by athenaOne®.
  title: athena API collection
  version: '0.1'
components:
  securitySchemes:
    api_auth_preview:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://api.preview.platform.athenahealth.com/oauth2/v1/token
          scopes:
            athena/service/Athenanet.MDP.*: API Preview
    api_auth:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://api.platform.athenahealth.com/oauth2/v1/token
          scopes:
            athena/service/Athenanet.MDP.*: API Production
    bearer_auth:
      type: http
      scheme: bearer
servers:
- url: https://api.preview.platform.athenahealth.com
  description: Preview
- url: https://api.platform.athenahealth.com
  description: Production
paths:
  /v1/{practiceid}/chart/{patientid}/familyhistory:
    get:
      summary: Get patient's family history
      description: Retrieves the family history for a specific patient
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: patientid
        schema:
          type: integer
        required: true
        description: patientid
      - in: query
        name: departmentid
        schema:
          type: integer
        required: true
        description: The athenaNet department id.
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  historyunknown:
                    description: Whether or not the family history is unknown.
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                  historyunknownlastmodifiedby:
                    description: Username of the user who last modified the unknown
                      status.
                    type: string
                  historyunknownlastmodifieddatetime:
                    description: Date and time when the unknown status was last modified.
                    type: string
                  relatives:
                    description: List of relatives for this patient
                    items:
                      properties:
                        problems:
                          description: Summary of problems for this family member
                          items:
                            properties:
                              description:
                                description: Brief description for this code/problem
                                type: string
                              diedofage:
                                description: Age when the patient died, if this problem
                                  was the cause
                                type: number
                              lastmodifiedby:
                                description: The username of the provider who last
                                  modified the problem.
                                type: string
                              lastmodifieddatetime:
                                description: The date and time the problem was last
                                  modified.
                                type: string
                              note:
                                description: Additional note for this problem
                                type: string
                              onsetage:
                                description: Age when this problem first occured
                                type: number
                              problemid:
                                description: Athena ID for this problem
                                type: number
                              resolvedage:
                                description: Age when the problem was resolved, if
                                  applicable
                                type: number
                              snomedcode:
                                description: SNOMED code for this diagnosis
                                type: number
                            type: object
                          type: array
                        relation:
                          description: Relationship to the patient
                          type: string
                        relationkeyid:
                          description: ID of the relationship (for example, having
                            2 brothers, one would have ID of 1, another would have
                            ID of 2)
                          type: number
                      type: object
                    type: array
                  sectionnote:
                    description: Additional note for the entire family history section,
                      if any
                    type: string
                  sectionnotelastmodifiedby:
                    description: The username of the provider who last modified the
                      note.
                    type: string
                  sectionnotelastmodifieddatetime:
                    description: The date and time the note was last modified.
                    type: string
                type: object
          description: Success
      operationId: getPracticeidChartPatientidFamilyhistory
      x-scopes: []
      tags:
      - Chart
      - Family History Problems
    put:
      summary: Update patient's family history
      description: Modifies the family history for a specific patient
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: patientid
        schema:
          type: integer
        required: true
        description: patientid
      - in: header
        name: Content-Type
        schema:
          type: string
        required: true
        description: Content type of the payload
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errormessage:
                    description: If the operation failed, this will contain any error
                      messages.
                    type: string
                  problemids:
                    description: List of existing family member problem IDs that map
                      back to this patient's family history.
                    type: array
                  success:
                    description: Whether the operation was successful.
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                type: object
          description: Success
      operationId: putPracticeidChartPatientidFamilyhistory
      x-scopes: []
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
              - departmentid
              properties:
                relatives:
                  type: array
                  items:
                    type: object
                    properties:
                      delete:
                        type: boolean
                        description: Remove this family member
                      problems:
                        type: array
                        items:
                          type: object
                          properties:
                            note:
                              type: string
                              description: Additional notes for this problem
                            delete:
                              type: boolean
                              description: Remove this problem
                            onsetage:
                              type: number
                              description: Age when this problem first occured
                            diedofage:
                              type: number
                              description: If this problem caused patient death, age
                                when the death occured (omit otherwise)
                            problemid:
                              type: number
                              description: "Athena ID from this problem (if you omit\
                                \ the ID, a new problem will be added, \notherwise\
                                \ problem with that ID will be updated)\n"
                            snomedcode:
                              type: integer
                              description: Code for this diagnosis
                            resolvedage:
                              type: number
                              description: If this problem was resolved, age when
                                the resolution occured (omit otherwise)
                      relation:
                        type: string
                        description: Relationship to the patient
                      relationkeyid:
                        type: number
                        description: ID of the relationship (for example, having 2
                          brothers, one would have ID of 1, another would have ID
                          of 2)
                  required:
                  - relationkeyid
                  - relation
                  description: A JSON array of relatives, mimicking <a href="https://developer.athenahealth.com/docs/read/chart/Family_History">the
                    output format</a> of the GET call.
                sectionnote:
                  type: string
                  description: Any additional section notes
                departmentid:
                  type: integer
                  description: The athenaNet department id.
                userelationkey:
                  type: boolean
                  description: Accept Relation key instead of label
        required: true
      tags:
      - Chart
      - Family History Problems
  /v1/{practiceid}/chart/healthhistory/familyhistory/changed/subscription/events:
    get:
      summary: Get list of family history change events to which you can subscribe
      description: Retrieve the list of events that can be input for this subscription
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  departmentids:
                    description: List of Departmentids subscribed
                    items:
                      type: integer
                    type: array
                  status:
                    description: 'Will return one of following statuses: ACTIVE, INACTIVE,
                      or PARTIAL. The PARTIAL status means that not all events are
                      subscribed to. In the event of a problem, UNKNOWN may be returned.'
                    type: string
                  subscriptions:
                    description: List of events you are subscribed to.
                    items:
                      properties:
                        eventname:
                          description: Name of event
                          type: string
                      type: object
                    type: array
                type: object
          description: Success
      operationId: getPracticeidChartHealthhistoryFamilyhistoryChangedSubscriptionEvents
      x-scopes: []
      tags:
      - Chart
      - Family History Subscription
  /v1/{practiceid}/chart/healthhistory/familyhistory/changed/subscription:
    post:
      summary: Subscribe to all/specific change events for family history
      description: Subscribes for changed familyhistory events
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: header
        name: Content-Type
        schema:
          type: string
        required: true
        description: Content type of the payload
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  success:
                    description: Returns if the call to manipulate subscriptions for
                      familyhistory was successful.
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                type: object
          description: Success
      operationId: postPracticeidChartHealthhistoryFamilyhistoryChangedSubscription
      x-scopes: []
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                eventname:
                  type: string
                  description: By default, you are subscribed to all possible events.  If
                    you only wish to subscribe to an individual event, pass the event
                    name with this argument.
        required: true
      tags:
      - Chart
      - Family History Subscription
    get:
      summary: Get list of family history change subscription(s)
      description: Retrieves list of events applicable for family history
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  departmentids:
                    description: List of Departmentids subscribed
                    items:
                      type: integer
                    type: array
                  status:
                    description: 'Will return one of following statuses: ACTIVE, INACTIVE,
                      or PARTIAL. The PARTIAL status means that not all events are
                      subscribed to. In the event of a problem, UNKNOWN may be returned.'
                    type: string
                  subscriptions:
                    description: List of events you are subscribed to.
                    items:
                      properties:
                        eventname:
                          description: Name of event
                          type: string
                      type: object
                    type: array
                type: object
          description: Success
      operationId: getPracticeidChartHealthhistoryFamilyhistoryChangedSubscription
      x-scopes: []
      tags:
      - Chart
      - Family History Subscription
    delete:
      summary: Unsubscribe to all/specific change events for family history
      description: Delete an specific event which is no longer required
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: query
        name: eventname
        schema:
          type: string
        required: false
        description: By default, you are unsubscribed from all possible events.  If
          you only wish to unsubscribe from an individual event, pass the event name
          with this argument.
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  success:
                    description: Returns if the call to manipulate subscriptions for
                      familyhistory was successful.
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                type: object
          description: Success
      operationId: deletePracticeidChartHealthhistoryFamilyhistoryChangedSubscription
      x-scopes: []
      tags:
      - Chart
      - Family History Subscription
  /v1/{practiceid}/chart/healthhistory/familyhistory/changed:
    get:
      summary: Get list of changes in family history based on subscribed events
      description: Retrieves list of records of modified family history data
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: query
        name: leaveunprocessed
        schema:
          type: boolean
        required: false
        description: For testing purposes, do not mark records as processed
      - in: query
        name: showprocessedstartdatetime
        schema:
          type: string
        required: false
        description: Show already processed changes.  This will show changes that
          you previously retrieved at some point after this datetime mm/dd/yyyy hh24:mi:ss
          (Eastern). Can be used to refetch data if there was an error, such as a
          timeout, and records are marked as already retrieved. This is intended to
          be used with showprocessedenddatetime and for a short period of time only.
          Also note that all messages will eventually be deleted.
      - in: query
        name: showprocessedenddatetime
        schema:
          type: string
        required: false
        description: See showprocessedstartdatetime
      - in: query
        name: limit
        schema:
          type: integer
        required: false
        description: Number of entries to return (default 1500, max 5000)
      - in: query
        name: offset
        schema:
          type: integer
        required: false
        description: Starting point of entries; 0-indexed
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  description:
                    description: Brief description for this code/problem
                    type: string
                  diedofage:
                    description: Age when the patient died, if this problem was the
                      cause
                    type: integer
                  note:
                    description: Additional note for this problem
                    type: string
                  onsetage:
                    description: Age when this problem first occured
                    type: integer
                  patientid:
                    description: The athenanet patient ID associated with this family
                      problem.
                    type: integer
                  problemid:
                    description: Athena ID for this problem
                    type: integer
                  relation:
                    description: Relationship to the patient
                    type: string
                  relationkeyid:
                    description: ID of the relationship (for example, having 2 brothers,
                      one would have ID of 1, another would have ID of 2)
                    type: integer
                  resolvedage:
                    description: Age when the problem was resolved, if applicable
                    type: integer
                  snomedcode:
                    description: SNOMED code for this diagnosis
                    type: integer
                type: object
          description: Success
      operationId: getPracticeidChartHealthhistoryFamilyhistoryChanged
      x-scopes: []
      tags:
      - Chart
      - Family History Subscription
metadata: []
security:
- api_auth_preview:
  - athena/service/Athenanet.MDP.*
  api_auth:
  - athena/service/Athenanet.MDP.*
  bearer_auth: []
