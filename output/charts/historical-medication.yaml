openapi: 3.0.0
info:
  description: Welcome to the API developer portal which gives third parties access
    to our APIs and sandbox to develop integrated solutions that will enhance the
    value and functionality offered by athenaOne®.
  title: athena API collection
  version: '0.1'
components:
  securitySchemes:
    api_auth_preview:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://api.preview.platform.athenahealth.com/oauth2/v1/token
          scopes:
            athena/service/Athenanet.MDP.*: API Preview
    api_auth:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://api.platform.athenahealth.com/oauth2/v1/token
          scopes:
            athena/service/Athenanet.MDP.*: API Production
    bearer_auth:
      type: http
      scheme: bearer
servers:
- url: https://api.preview.platform.athenahealth.com
  description: Preview
- url: https://api.platform.athenahealth.com
  description: Production
paths:
  /v1/{practiceid}/chart/healthhistory/medication/changed/subscription/events:
    get:
      summary: Get list of medication list change events to which you can subscribe
      description: Retrieves the list of events that can be input for the Historical
        Medications changed subscription
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  departmentids:
                    description: List of Departmentids subscribed
                    items:
                      type: integer
                    type: array
                  status:
                    description: 'Will return one of following statuses: ACTIVE, INACTIVE,
                      or PARTIAL. The PARTIAL status means that not all events are
                      subscribed to. In the event of a problem, UNKNOWN may be returned.'
                    type: string
                  subscriptions:
                    description: List of events you are subscribed to.
                    items:
                      properties:
                        eventname:
                          description: Name of event
                          type: string
                      type: object
                    type: array
                type: object
          description: Success
      operationId: getPracticeidChartHealthhistoryMedicationChangedSubscriptionEvents
      x-scopes: []
      tags:
      - Chart
      - Historical Medications Changed Subscription
  /v1/{practiceid}/chart/healthhistory/medication/changed/subscription:
    post:
      summary: Subscribe to all/specific change events for medication list
      description: Subscribe for changed historical medications events
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: header
        name: Content-Type
        schema:
          type: string
        required: true
        description: Content type of the payload
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  success:
                    description: Returns if the call to manipulate subscriptions for
                      historical medications was successful.
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                type: object
          description: Success
      operationId: postPracticeidChartHealthhistoryMedicationChangedSubscription
      x-scopes: []
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                eventname:
                  type: string
                  description: By default, you are subscribed to all possible events.  If
                    you only wish to subscribe to an individual event, pass the event
                    name with this argument.
                departmentids:
                  type: array
                  items:
                    type: integer
                  description: 'For every New/Update Subscriptions complete list of
                    departmentids should be passed. NOTE: Without DepartmentIDs entire
                    Context/Practice will be subscribed.'
        required: true
      tags:
      - Chart
      - Historical Medications Changed Subscription
    get:
      summary: Get list of medication list change subscription(s)
      description: Retrieves list of events for Historical Medications
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  departmentids:
                    description: List of Departmentids subscribed
                    items:
                      type: integer
                    type: array
                  status:
                    description: 'Will return one of following statuses: ACTIVE, INACTIVE,
                      or PARTIAL. The PARTIAL status means that not all events are
                      subscribed to. In the event of a problem, UNKNOWN may be returned.'
                    type: string
                  subscriptions:
                    description: List of events you are subscribed to.
                    items:
                      properties:
                        eventname:
                          description: Name of event
                          type: string
                      type: object
                    type: array
                type: object
          description: Success
      operationId: getPracticeidChartHealthhistoryMedicationChangedSubscription
      x-scopes: []
      tags:
      - Chart
      - Historical Medications Changed Subscription
    delete:
      summary: Unsubscribe to all/specific change events for medication list
      description: Delete an specific event which is no longer required
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: query
        name: eventname
        schema:
          type: string
        required: false
        description: By default, you are unsubscribed from all possible events.  If
          you only wish to unsubscribe from an individual event, pass the event name
          with this argument.
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  success:
                    description: Returns if the call to manipulate subscriptions for
                      historical medications was successful.
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                type: object
          description: Success
      operationId: deletePracticeidChartHealthhistoryMedicationChangedSubscription
      x-scopes: []
      tags:
      - Chart
      - Historical Medications Changed Subscription
  /v1/{practiceid}/chart/healthhistory/medication/changed:
    get:
      summary: Get list of changes in medication list based on subscribed events
      description: Retrieves list of  modified historical medications
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: query
        name: leaveunprocessed
        schema:
          type: boolean
        required: false
        description: For testing purposes, do not mark records as processed
      - in: query
        name: showprocessedstartdatetime
        schema:
          type: string
        required: false
        description: Show already processed changes.  This will show changes that
          you previously retrieved at some point after this datetime mm/dd/yyyy hh24:mi:ss
          (Eastern). Can be used to refetch data if there was an error, such as a
          timeout, and records are marked as already retrieved. This is intended to
          be used with showprocessedenddatetime and for a short period of time only.
          Also note that all messages will eventually be deleted.
      - in: query
        name: patientid
        schema:
          type: array
          items:
            type: integer
        required: false
        description: Patient ID. Multiple Patient IDs are allowed, either comma separated
          or with multiple values.
      - in: query
        name: showprocessedenddatetime
        schema:
          type: string
        required: false
        description: See showprocessedstartdatetime
      - in: query
        name: limit
        schema:
          type: integer
        required: false
        description: Number of entries to return (default 1000, max 5000)Please note
          that this endpoint has a different default than normal.
      - in: query
        name: offset
        schema:
          type: integer
        required: false
        description: Starting point of entries; 0-indexed
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  approvedby:
                    description: For clinical prescriptions, the athenaNet username
                      of the person who approved this prescription.
                    type: string
                  billingndc:
                    description: The billing NDC code for this medication.
                    type: string
                  chartsharinggroupid:
                    description: The chart charing group for this medication. For
                      more information on chart sharing groups see /configuration/chartsharinggroups.
                    type: integer
                  createdby:
                    description: The athenaNet username of the person who entered
                      or ordered the medication. Downloaded medications have INTERFACE
                      for this field.
                    type: string
                  createddate:
                    description: The date when this medication was created.
                    type: string
                  deletedby:
                    description: The athenaNet username of the person who deleted
                      the medication.
                    type: string
                  deleteddate:
                    description: The date when this medication was deleted.
                    type: string
                  earliestfilldate:
                    description: The earliest date a prescription may be filled, in
                      the format mm/dd/yyyy.
                    type: string
                  encounterid:
                    description: If this was a prescription, this contains the ID
                      of the encounter where it was ordered or administered
                    type: integer
                  events:
                    description: The list of events for this medication. Can be START,
                      END, ORDER, ENTER, FILL, or HIDE.
                    items:
                      properties:
                        eventdate:
                          description: The date this event occurred
                          type: string
                        type:
                          description: The event type. Can be START, END, ORDER, ENTER,
                            FILL, DELETED, or HIDE.
                          type: string
                        userdisplayname:
                          description: The display name for the user most relevant
                            for this event.  May be null.
                          type: string
                      type: object
                    type: array
                  filldate:
                    description: The date of the fill event if the most recent event
                      was a fill event. Otherwise this field will not be populated
                    type: string
                  futuresubmitdate:
                    description: The date a medication will be submitted. Included
                      if the medication is in PEND status and attached to a approved
                      future order.
                    type: string
                  isdiscontinued:
                    description: Whether or not the given medication is discontinued
                      and cannot be ordered anymore
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                  issafetorenew:
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                  isstructuredsig:
                    description: Whether the sig for this entry is structured.
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                  lastmodifiedby:
                    description: The username of the user who last modified the medication.
                    type: string
                  lastmodifieddate:
                    description: The date when last modification was made.
                    type: string
                  medication:
                    description: The name of the medication.
                    type: string
                  medicationentryid:
                    description: Primary ID for this medication entry. Those starting
                      with C are clinical prescriptions, and those starting with H
                      are historical (entered, downloaded, etc).
                    type: string
                  medicationid:
                    description: Athena ID for this medication.
                    type: integer
                  ndcoptions:
                    description: The list of NDC numbers that correspond to this medication.
                    items:
                      properties:
                        ndcoption:
                          description: An NDC number that corresponds to this medication
                          type: string
                      type: object
                    type: array
                  newindicator:
                    description: Whether a medication is new since the last encounter
                      close date for the provided department (added/stopped automatically
                      by the system or entered by a user ["AUTOADD" | "AUTOSTOP" |
                      "MANUALADD"]) or "NOTNEW".
                    type: string
                  orderingmode:
                    description: The ordering mode for prescriptions. Can be PRESCRIBE,
                      DISPENSE, or ADMINISTER.
                    type: string
                  organclass:
                    description: The organ class for this medication. This is equivalent
                      to a medication class.
                    type: string
                  patientid:
                    description: The patient that this medication was prescribed to.
                    type: integer
                  patientnote:
                    description: Patient-facing note for this prescription. Labeled
                      "note" in the UI.
                    type: string
                  pharmacy:
                    description: The name of the pharmacy where this medication was
                      filled.
                    type: string
                  pharmacyncpdpid:
                    description: The NCPDP ID of the pharmacy for this medication..  See
                      http://www.ncpdp.org/ for details.
                    type: string
                  prescribedby:
                    description: The user who prescribed this medication.
                    type: string
                  providernote:
                    description: Non-patient facing note for ths prescription. Labeled
                      "internal note" in the UI.
                    type: string
                  refillsallowed:
                    description: The number of refills allowed when this medication
                      was ordered.
                    type: integer
                  route:
                    description: The route for the prescription.
                    type: string
                  rxnorm:
                    description: 'The list of RxNorm Identifiers that correspond to
                      this medication. This list may contain both branded and generic
                      identifiers. Note: Not All medications would include RX Norm.'
                    items:
                      properties:
                        rxnormidentifier:
                          description: An RxNorm Identifier that corresponds to this
                            medication
                          type: string
                      type: object
                    type: array
                  source:
                    description: How this medication was entered. This can be the
                      ordering provider, "surescripts" or "Med Fill History" (which
                      means it was from med history download), "ATHENA" (which means
                      it was entered manually), etc.
                    type: string
                  status:
                    description: The status of this medication. Medications in PEND
                      status are associated with approved future orders and have not
                      yet been submitted.
                    type: string
                  stopreason:
                    description: The reason why this medication was stopped.
                    type: string
                  structuredsig:
                    description: Components of the structured sig.
                    items:
                      properties:
                        dosageaction:
                          description: How the medication is taken. Examples are Chew,
                            Take, Inhale, etc.
                          type: string
                        dosageadditionalinstructions:
                          description: 'Additional instructions. Example: with meals'
                          type: string
                        dosagedurationunit:
                          description: 'The unit of the duration. Example: days. So
                            take this for <duration> days.'
                          type: string
                        dosagedurationvalue:
                          description: How many duration time units this medication
                            should be taken for.
                          type: integer
                        dosagefrequencydescription:
                          description: 'A standardized patient-friendly frequency.
                            Example: 6 per day becomes "every 4 hours".'
                          type: string
                        dosagefrequencyunit:
                          description: 'The unit of the frequency. Example: per day,
                            per week.'
                          type: string
                        dosagefrequencyvalue:
                          description: How many times (in the given time unit) this
                            should be taken.
                          type: number
                        dosagequantityunit:
                          description: 'The unit of the quantity. Example: tablets,
                            sprays, etc.'
                          type: string
                        dosagequantityvalue:
                          description: How many of this med is taken.
                          type: number
                        dosageroute:
                          description: 'How this medication is taken. Example: oral,
                            inhalation, intranasal, etc.'
                          type: string
                      type: object
                    type: array
                  therapeuticclass:
                    description: The therapeutic class for this medication. This is
                      equivalent to a medication subclass.
                    type: string
                  unstructuredsig:
                    description: The unstructured sig for this medication, if any.
                      If there is a structured sig, this will contain the formatted
                      version of that sig.
                    type: string
                type: object
          description: Success
      operationId: getPracticeidChartHealthhistoryMedicationChanged
      x-scopes: []
      tags:
      - Chart
      - Historical Medications Changed Subscription
metadata: []
security:
- api_auth_preview:
  - athena/service/Athenanet.MDP.*
  api_auth:
  - athena/service/Athenanet.MDP.*
  bearer_auth: []
