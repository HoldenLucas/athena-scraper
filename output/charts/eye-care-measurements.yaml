  /v1/{practiceid}/chart/encounter/{encounterid}/eyecare/intraocularpressure:
    get:
      summary: Intraocular Pressure measurements entered for a specific encounter.
      description: Retrieves intraocular pressure measurements associated with a given
        encounter.
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: encounterid
        schema:
          type: integer
        required: true
        description: encounterid
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  measurements:
                    description: an array of right and left intraocular pressure measurements
                    items:
                      properties:
                        leftintraocularpressure:
                          description: A JSON hash of Measurements
                          properties:
                            lastmodifiedby:
                              description: The username of whoever last modified this
                                field.
                              type: string
                            lastmodifieddatetime:
                              description: 'The latest date and time that this field
                                got modified; Provided in the format: MM/DD/YYYY HH24::MM::SS
                                in Eastern time.'
                              type: string
                            method:
                              description: The method used to take the measurements
                                ("Goldmann", "TonoPen", "ICare", "Non-contact", or
                                "Palpation").
                              type: string
                            value:
                              description: The findings of the measurements.
                              type: string
                          type: object
                        rightintraocularpressure:
                          description: A JSON hash of Measurements
                          properties:
                            lastmodifiedby:
                              description: The username of whoever last modified this
                                field.
                              type: string
                            lastmodifieddatetime:
                              description: 'The latest date and time that this field
                                got modified; Provided in the format: MM/DD/YYYY HH24::MM::SS
                                in Eastern time.'
                              type: string
                            method:
                              description: The method used to take the measurements
                                ("Goldmann", "TonoPen", "ICare", "Non-contact", or
                                "Palpation").
                              type: string
                            value:
                              description: The findings of the measurements.
                              type: string
                          type: object
                      type: object
                    type: array
                  note:
                    description: The note associated with Intraocular Pressure.
                    type: string
                  notelastmodifiedby:
                    description: The username of whoever last modified this field.
                    type: string
                  notelastmodifieddatetime:
                    description: 'The latest date and time that this field got modified;
                      Provided in the format: MM/DD/YYYY HH24::MM::SS in Eastern time.'
                    type: string
                type: object
          description: Success
      operationId: getPracticeidChartEncounterEncounteridEyecareIntraocularpressure
      x-scopes: []
      tags:
      - Encounter
      - Intraocular Pressure
