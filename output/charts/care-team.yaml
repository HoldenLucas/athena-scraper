      - Care Team
    delete:
      summary: Delete member from patient's care team
      description: Remove care team member for a given patient in a particular department
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: patientid
        schema:
          type: integer
        required: true
        description: patientid
      - in: query
        name: departmentid
        schema:
          type: integer
        required: true
        description: The athenaNet department ID.
      - in: query
        name: memberid
        schema:
          type: integer
        required: true
        description: The member ID of the care team.
      - in: query
        name: THIRDPARTYUSERNAME
        schema:
          type: string
        required: false
        description: User name of the patient in the third party application.
      - in: query
        name: PATIENTFACINGCALL
        schema:
