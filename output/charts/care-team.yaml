  /v1/{practiceid}/chart/configuration/recipientclasses:
    get:
      summary: Get list of care team recipient classes
      description: List of recipient specialties accepted for a patient's Care Team
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: query
        name: limit
        schema:
          type: integer
        required: false
        description: Number of entries to return (default 1500, max 5000)
      - in: query
        name: offset
        schema:
          type: integer
        required: false
        description: Starting point of entries; 0-indexed
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  code:
                    description: The recipient class ID code.
                    type: number
                  description:
                    description: A string describing the care team member's organization.
                    type: string
                type: object
          description: Success
      operationId: getPracticeidChartConfigurationRecipientclasses
      x-scopes: []
      tags:
      - Chart
      - Care Team
