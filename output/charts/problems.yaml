openapi: 3.0.0
info:
  description: Welcome to the API developer portal which gives third parties access
    to our APIs and sandbox to develop integrated solutions that will enhance the
    value and functionality offered by athenaOne®.
  title: athena API collection
  version: '0.1'
components:
  securitySchemes:
    api_auth_preview:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://api.preview.platform.athenahealth.com/oauth2/v1/token
          scopes:
            athena/service/Athenanet.MDP.*: API Preview
    api_auth:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://api.platform.athenahealth.com/oauth2/v1/token
          scopes:
            athena/service/Athenanet.MDP.*: API Production
    bearer_auth:
      type: http
      scheme: bearer
servers:
- url: https://api.preview.platform.athenahealth.com
  description: Preview
- url: https://api.platform.athenahealth.com
  description: Production
paths:
  /v1/{practiceid}/chart/{patientid}/problems:
    post:
      summary: Add problem to patient's problem list
      description: Records a problem in the patient's active problem list
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: patientid
        schema:
          type: integer
        required: true
        description: patientid
      - in: header
        name: Content-Type
        schema:
          type: string
        required: true
        description: Content type of the payload
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errormessage:
                    description: If the operation failed, this will contain any error
                      messages.
                    type: string
                  problemid:
                    description: If successful, the athena ID of the newly created
                      problem
                    type: integer
                  success:
                    description: Whether the operation was successful or not.
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                type: object
          description: Success
      operationId: postPracticeidChartPatientidProblems
      x-scopes: []
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
              - snomedcode
              - departmentid
              properties:
                note:
                  type: string
                  description: The note to be attached to this problem.
                status:
                  enum:
                  - ''
                  - CHRONIC
                  - ACUTE
                  type: string
                  description: Whether the problem is chronic or acute.
                startdate:
                  type: string
                  description: The onset date to be updated for this problem in MM/DD/YYYY
                    format.
                laterality:
                  enum:
                  - ''
                  - LEFT
                  - RIGHT
                  - BILATERAL
                  type: string
                  description: Update the laterality of this problem. Can be null,
                    LEFT, RIGHT, or BILATERAL.
                snomedcode:
                  type: integer
                  description: The <a href="http://www.nlm.nih.gov/research/umls/Snomed/snomed_browsers.html">SNOMED
                    code</a> of the problem you are adding.
                departmentid:
                  type: integer
                  description: The athenaNet department id.
                PATIENTFACINGCALL:
                  type: boolean
                  description: When 'true' is passed we will collect relevant data
                    and store in our database.
                THIRDPARTYUSERNAME:
                  type: string
                  description: User name of the patient in the third party application.
        required: true
      tags:
      - Chart
      - Problems
    get:
      summary: Get patient's problem list
      description: Retrieves patient's active problems list
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: patientid
        schema:
          type: integer
        required: true
        description: patientid
      - in: query
        name: departmentid
        schema:
          type: integer
        required: true
        description: The athenaNet department id.
      - in: query
        name: showinactive
        schema:
          type: boolean
        required: false
        description: Also show inactive (but not soft deleted) problems.
      - in: query
        name: showdiagnosisinfo
        schema:
          type: boolean
        required: false
        description: If true, will include every encounter and associated diagnosis
          with each problem. Also fills the bestmatchicd10code field with the best
          conversion from the problem SNOMED code to ICD10 code if there is no user-selected
          ICD10 code in an encounter diagnosis event. Please note that the bestmatchicd10code
          may not always be accurate.
      - in: query
        name: THIRDPARTYUSERNAME
        schema:
          type: string
        required: false
        description: User name of the patient in the third party application.
      - in: query
        name: PATIENTFACINGCALL
        schema:
          type: boolean
        required: false
        description: When 'true' is passed we will collect relevant data and store
          in our database.
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  lastmodifiedby:
                    description: The username of the user who last modified the note,
                      no known problems checkbox, or problems.
                    type: string
                  lastmodifieddatetime:
                    description: The date and time the note, no known problems checkbox,
                      or problems were last updated.
                    type: string
                  lastupdated:
                    description: Deprecated, used LASTMODIFIEDDATETIME instead. The
                      last date any of the problems in the returned list were updated.
                      Does not include no known problems or the section note, and
                      is date precision.
                    type: string
                  noknownproblems:
                    description: Whether the no known problems checkbox is checked.
                      This is an explicit statement separate from a patient who has
                      no documented problems so far.
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                  notelastmodifiedby:
                    description: The username of the user who last modified the note.
                    type: string
                  notelastmodifieddatetime:
                    description: The date and time the section note was last updated.
                    type: string
                  problems:
                    description: List of problems, grouped by problem code
                    items:
                      properties:
                        bestmatchicd10code:
                          description: If this was added from the chart or from an
                            encounter without a selected ICD10 code, and if the primary
                            codeset is SNOMED, then this contains the best matching
                            ICD10 code mapped. Because SNOMED to ICD10 is a many to
                            many map, this will tend to give the most generic diagnosis.
                          type: string
                        code:
                          description: Problem code
                          type: string
                        codeset:
                          description: Problem codeset (SNOMED, ICD9, ICD10, etc)
                          type: string
                        deactivateddate:
                          description: Date of problem deactivation.
                          type: string
                        deactivateduser:
                          description: The name of the user who deactivated the problem.
                          type: string
                        events:
                          description: List of start and stop events for this problem,
                            which can occur multiple times.
                          items:
                            properties:
                              createdby:
                                description: The name of the user who entered this
                                  problem.
                                type: string
                              createddate:
                                description: The date that the user entered this problem.
                                type: string
                              diagnoses:
                                description: List of encounter diagnoses that triggered
                                  this problem.
                                items:
                                  properties:
                                    code:
                                      description: Diagnosis code
                                      type: string
                                    codeset:
                                      description: Diagnosis codeset (SNOMED, ICD9,
                                        ICD10, etc)
                                      type: string
                                    name:
                                      description: Diagnosis name. Might be different
                                        than problem name.
                                      type: string
                                  type: object
                                type: array
                              encounterdate:
                                description: The date of the encounter where a diagnosis
                                  matching this problem was used.
                                type: string
                              enddate:
                                description: The date this problem event ended or
                                  was hidden
                                type: string
                              eventtype:
                                description: 'The type of this event: START, END,
                                  HIDDEN, REACTIVATED, or ENCOUNTER'
                                type: string
                              imoeventlist:
                                description: List of IMO Events.
                                items:
                                  properties:
                                    enddate:
                                      description: The date this problem IMO event
                                        ended.
                                      type: string
                                    icd10codes:
                                      description: List of ICD-10 Codes for the IMO
                                        code
                                      items:
                                        properties:
                                          code:
                                            description: ICD code
                                            type: string
                                          codeset:
                                            description: Codeset (ICD10)
                                            type: string
                                          name:
                                            description: ICD-10 description.
                                            type: string
                                        type: object
                                      type: array
                                    imocode:
                                      type: object
                                    patientfacingdescription:
                                      description: The patient facing description
                                        for the IMO code.
                                      type: string
                                    providerfacingdescription:
                                      description: The provider facing description
                                        for the IMO code.
                                      type: string
                                    snomedcodes:
                                      description: List of SNOMED Codes for the IMO
                                        code
                                      items:
                                        properties:
                                          code:
                                            description: SNOMED code
                                            type: string
                                          codeset:
                                            description: Codeset (SNOMED)
                                            type: string
                                          name:
                                            description: SNOMED description.
                                            type: string
                                        type: object
                                      type: array
                                    startdate:
                                      description: The date this problem IMO event
                                        started or was restarted.
                                      type: string
                                  type: object
                                type: array
                              laterality:
                                description: The laterality of this problem. Can be
                                  null, LEFT, RIGHT, or BILATERAL.
                                type: string
                              note:
                                description: The note attached to this event.
                                type: string
                              onsetdate:
                                description: The specified onset date for this problem,
                                  as entered by the practice. If available this is
                                  more accurate than the start date.
                                type: string
                              source:
                                description: 'The source of this event: ENCOUNTER
                                  or HISTORY'
                                type: string
                              startdate:
                                description: The date this problem event started or
                                  was restarted. Uses the onsetdate if available,
                                  otherwise uses the date the problem was entered
                                  into the system.
                                type: string
                              status:
                                description: 'The status of this problem event: CHRONIC
                                  or ACUTE'
                                type: string
                            type: object
                          type: array
                        lastmodifiedby:
                          description: The username of the user who last modified
                            this problem.
                          type: string
                        lastmodifieddatetime:
                          description: The date the problem was last modified. Currently
                            only date precision.
                          type: string
                        mostrecentdiagnosisnote:
                          description: The data will be displayed when the showdiagnosisinfo
                            flag is set to true
                          type: string
                        name:
                          description: Problem name
                          type: string
                        problemid:
                          description: Athena ID for this problem
                          type: integer
                      type: object
                    type: array
                  sectionnote:
                    description: The problem section note
                    type: string
                  totalcount:
                    description: Total number of problems
                    type: integer
                type: object
          description: Success
      operationId: getPracticeidChartPatientidProblems
      x-scopes: []
      tags:
      - Chart
      - Problems
    put:
      summary: Update patient's problem list
      description: 'BETA: Modifies the section-note and noknownproblems fields for
        the patient problem'
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: patientid
        schema:
          type: integer
        required: true
        description: patientid
      - in: header
        name: Content-Type
        schema:
          type: string
        required: true
        description: Content type of the payload
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errormessage:
                    description: If the operation failed, this will contain any error
                      messages.
                    type: string
                  success:
                    description: Whether the operation was successful.
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                type: object
          description: Success
      operationId: putPracticeidChartPatientidProblems
      x-scopes: []
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
              - departmentid
              properties:
                replacenote:
                  type: boolean
                  description: If set, will replace the section note (removing existing
                    data) instead of appending data. Use with caution.
                sectionnote:
                  type: string
                  description: The note to be attached to this problem. Will be appended
                    to the existing note by default, unless replacenote is true.
                departmentid:
                  type: integer
                  description: The department ID.
                PATIENTFACINGCALL:
                  type: boolean
                  description: When 'true' is passed we will collect relevant data
                    and store in our database.
                THIRDPARTYUSERNAME:
                  type: string
                  description: User name of the patient in the third party application.
        required: true
      tags:
      - Chart
      - Problems
  /v1/{practiceid}/chart/{patientid}/problems/{problemid}:
    put:
      summary: Update patient's problem details
      description: Modify the information of a specific patient's problem
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: patientid
        schema:
          type: integer
        required: true
        description: patientid
      - in: path
        name: problemid
        schema:
          type: integer
        required: true
        description: problemid
      - in: header
        name: Content-Type
        schema:
          type: string
        required: true
        description: Content type of the payload
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errormessage:
                    description: If the operation failed, this will contain any error
                      messages.
                    type: string
                  success:
                    description: Whether the operation was successful.
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                type: object
          description: Success
      operationId: putPracticeidChartPatientidProblemsProblemid
      x-scopes: []
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
              - departmentid
              properties:
                note:
                  type: string
                  description: The note to be attached to this problem.
                status:
                  enum:
                  - ''
                  - CHRONIC
                  - ACUTE
                  type: string
                  description: Whether the problem is chronic or acute.
                startdate:
                  type: string
                  description: The onset date to be updated for this problem in MM/DD/YYYY
                    format.
                laterality:
                  enum:
                  - ''
                  - LEFT
                  - RIGHT
                  - BILATERAL
                  type: string
                  description: Update the laterality of this problem. Can be null,
                    LEFT, RIGHT, or BILATERAL.
                departmentid:
                  type: integer
                  description: The athenaNet department id.
        required: true
      tags:
      - Chart
      - Problems
    delete:
      summary: Remove a problem from patient's problem list
      description: Delete an problem from the patient's active problem list
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: patientid
        schema:
          type: integer
        required: true
        description: patientid
      - in: path
        name: problemid
        schema:
          type: integer
        required: true
        description: problemid
      - in: query
        name: remove
        schema:
          type: boolean
        required: false
        description: Set this to true if a problem was added in error. It will remove
          the problem from the chart permanently.
      - in: query
        name: departmentid
        schema:
          type: integer
        required: true
        description: The athenaNet department id.
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  errormessage:
                    description: If the operation failed, this will contain any error
                      messages.
                    type: string
                  success:
                    description: Whether the operation was successful.
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                type: object
          description: Success
      operationId: deletePracticeidChartPatientidProblemsProblemid
      x-scopes: []
      tags:
      - Chart
      - Problems
  /v1/{practiceid}/chart/healthhistory/problems/changed/subscription/events:
    get:
      summary: Get list of problems change events to which you can subscribe
      description: Retrieves the list of events that can be input for the Problems
        Changed subscription
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  departmentids:
                    description: List of Departmentids subscribed
                    items:
                      type: integer
                    type: array
                  status:
                    description: 'Will return one of following statuses: ACTIVE, INACTIVE,
                      or PARTIAL. The PARTIAL status means that not all events are
                      subscribed to. In the event of a problem, UNKNOWN may be returned.'
                    type: string
                  subscriptions:
                    description: List of events you are subscribed to.
                    items:
                      properties:
                        eventname:
                          description: Name of event
                          type: string
                      type: object
                    type: array
                type: object
          description: Success
      operationId: getPracticeidChartHealthhistoryProblemsChangedSubscriptionEvents
      x-scopes: []
      tags:
      - Chart
      - Problems Changed Subscription
  /v1/{practiceid}/chart/healthhistory/problems/changed/subscription:
    post:
      summary: Subscribe to all/specific change events for problems
      description: Subscribe for changed problem events
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: header
        name: Content-Type
        schema:
          type: string
        required: true
        description: Content type of the payload
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  success:
                    description: Returns if the call to manipulate subscriptions for
                      problem was successful.
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                type: object
          description: Success
      operationId: postPracticeidChartHealthhistoryProblemsChangedSubscription
      x-scopes: []
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                eventname:
                  type: string
                  description: By default, you are subscribed to all possible events.  If
                    you only wish to subscribe to an individual event, pass the event
                    name with this argument.
                departmentids:
                  type: array
                  items:
                    type: integer
                  description: 'For every New/Update Subscriptions complete list of
                    departmentids should be passed. NOTE: Without DepartmentIDs entire
                    Context/Practice will be subscribed.'
        required: true
      tags:
      - Chart
      - Problems Changed Subscription
    get:
      summary: Get list of problems change subscription(s)
      description: Retrieves list of events for Problems
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  departmentids:
                    description: List of Departmentids subscribed
                    items:
                      type: integer
                    type: array
                  status:
                    description: 'Will return one of following statuses: ACTIVE, INACTIVE,
                      or PARTIAL. The PARTIAL status means that not all events are
                      subscribed to. In the event of a problem, UNKNOWN may be returned.'
                    type: string
                  subscriptions:
                    description: List of events you are subscribed to.
                    items:
                      properties:
                        eventname:
                          description: Name of event
                          type: string
                      type: object
                    type: array
                type: object
          description: Success
      operationId: getPracticeidChartHealthhistoryProblemsChangedSubscription
      x-scopes: []
      tags:
      - Chart
      - Problems Changed Subscription
    delete:
      summary: Unsubscribe to all/specific change events for problems
      description: Delete an specific event which is no longer required
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: query
        name: eventname
        schema:
          type: string
        required: false
        description: By default, you are unsubscribed from all possible events.  If
          you only wish to unsubscribe from an individual event, pass the event name
          with this argument.
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  success:
                    description: Returns if the call to manipulate subscriptions for
                      problem was successful.
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                type: object
          description: Success
      operationId: deletePracticeidChartHealthhistoryProblemsChangedSubscription
      x-scopes: []
      tags:
      - Chart
      - Problems Changed Subscription
  /v1/{practiceid}/chart/healthhistory/problems/changed:
    get:
      summary: Get list of changes in problems based on subscribed events
      description: Retrieves list of modified problems for a patient
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: query
        name: leaveunprocessed
        schema:
          type: boolean
        required: false
        description: For testing purposes, do not mark records as processed
      - in: query
        name: showprocessedstartdatetime
        schema:
          type: string
        required: false
        description: Show already processed changes.  This will show changes that
          you previously retrieved at some point after this datetime mm/dd/yyyy hh24:mi:ss
          (Eastern). Can be used to refetch data if there was an error, such as a
          timeout, and records are marked as already retrieved. This is intended to
          be used with showprocessedenddatetime and for a short period of time only.
          Also note that all messages will eventually be deleted.
      - in: query
        name: patientid
        schema:
          type: array
          items:
            type: integer
        required: false
        description: Patient ID. Multiple Patient IDs are allowed, either comma separated
          or with multiple values.
      - in: query
        name: showprocessedenddatetime
        schema:
          type: string
        required: false
        description: See showprocessedstartdatetime
      - in: query
        name: limit
        schema:
          type: integer
        required: false
        description: Number of entries to return (default 1500, max 5000)
      - in: query
        name: offset
        schema:
          type: integer
        required: false
        description: Starting point of entries; 0-indexed
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  code:
                    description: Problem code
                    type: string
                  codeset:
                    description: Problem codeset (SNOMED, ICD9, ICD10, etc)
                    type: string
                  events:
                    description: List of start and stop events for this problem, which
                      can occur multiple times.
                    items:
                      properties:
                        diagnoses:
                          description: List of encounter diagnoses that triggered
                            this problem.
                          items:
                            properties:
                              code:
                                description: Diagnosis code
                                type: string
                              codeset:
                                description: Diagnosis codeset (SNOMED, ICD9, ICD10,
                                  etc)
                                type: string
                              name:
                                description: Diagnosis name. Might be different than
                                  problem name.
                                type: string
                            type: object
                          type: array
                        enddate:
                          description: The date this problem event ended or was hidden
                          type: string
                        eventtype:
                          description: 'The type of this event: START, END, HIDDEN,
                            or REACTIVATED'
                          type: string
                        laterality:
                          description: The laterality of this problem. Can be null,
                            LEFT, RIGHT, or BILATERAL.
                          type: string
                        note:
                          description: The note attached to this event.
                          type: string
                        source:
                          description: 'The source of this event: ENCOUNTER or HISTORY'
                          type: string
                        startdate:
                          description: The date this problem event started or was
                            restarted
                          type: string
                        status:
                          description: 'The status of this problem event: CHRONIC
                            or ACUTE'
                          type: string
                      type: object
                    type: array
                  name:
                    description: Problem name
                    type: string
                  patientid:
                    description: Patient ID associated with this problem.
                    type: integer
                  problemid:
                    description: Athena ID for this problem
                    type: integer
                type: object
          description: Success
      operationId: getPracticeidChartHealthhistoryProblemsChanged
      x-scopes: []
      tags:
      - Chart
      - Problems Changed Subscription
metadata: []
security:
- api_auth_preview:
  - athena/service/Athenanet.MDP.*
  api_auth:
  - athena/service/Athenanet.MDP.*
  bearer_auth: []
