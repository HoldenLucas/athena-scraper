openapi: 3.0.0
info:
  description: Welcome to the API developer portal which gives third parties access
    to our APIs and sandbox to develop integrated solutions that will enhance the
    value and functionality offered by athenaOne®.
  title: athena API collection
  version: '0.1'
components:
  securitySchemes:
    api_auth_preview:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://api.preview.platform.athenahealth.com/oauth2/v1/token
          scopes:
            athena/service/Athenanet.MDP.*: API Preview
    api_auth:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://api.platform.athenahealth.com/oauth2/v1/token
          scopes:
            athena/service/Athenanet.MDP.*: API Production
    bearer_auth:
      type: http
      scheme: bearer
servers:
- url: https://api.preview.platform.athenahealth.com
  description: Preview
- url: https://api.platform.athenahealth.com
  description: Production
paths:
  /v1/{practiceid}/patients/{patientid}/collectpayment/storedcard:
    post:
      summary: Upload new patient's credit-card details
      description: Add a new credit card details of a patient in the system
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: patientid
        schema:
          type: integer
        required: true
        description: patientid
      - in: header
        name: Content-Type
        schema:
          type: string
        required: true
        description: Content type of the payload
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  epaymentid:
                    description: "\n\t\t\t\t\tAfter a successful payment, this ID\
                      \ can be used to retrieve\n\t\t\t\t\tthe receipt.\n\t\t\t\t"
                    type: integer
                  errortext:
                    description: The error text returned by the credit card processor.
                    type: string
                  storedcardid:
                    type: integer
                  success:
                    description: true for success.  false for an error.
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                type: object
          description: Success
      operationId: postPracticeidPatientsPatientidCollectpaymentStoredcard
      x-scopes: []
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
              - departmentid
              - billingzip
              - billingaddress
              properties:
                trackdata:
                  type: string
                  description: The track data obtained from the credit card swipe.
                    This can be track1 and/or track2 data. In either case, please
                    including the start and end sentinels. ("%" and "?" for track1
                    and ";" and "?" for track2.)
                billingzip:
                  type: string
                  description: The billing zipcode for the credit card.
                nameoncard:
                  type: string
                  description: 'The name on the credit card.  (Required if trackdata
                    is not supplied; track 2 does NOT supply name.)  Please truncate
                    at 30 characters. (Max length: 30)'
                claimpayment:
                  type: array
                  items:
                    type: object
                  description: 'A JSON representation of claim ID and payment combinations.  For
                    example, ''[ { "1":"1.00"}, { "2":"5.00"} ].''  This indicates
                    a payment of $1 for claim ID #1 and a payment of $5 for claim
                    ID #2.'
                departmentid:
                  type: integer
                  description: The ID of the department where the payment or contract
                    is being collected.
                todayservice:
                  type: boolean
                  description: Apply the other amount value to today's service.
                accountnumber:
                  type: string
                  description: The account number of the credit card.  (Required if
                    trackdata is not supplied.)
                appointmentid:
                  type: integer
                  description: The ID of the appointment where the copay should be
                    applied.
                ecommercemode:
                  type: boolean
                  description: Use ECommerce credit card mode (e.g. for telemedicine).
                    trackdata may NOT be used if this mode is true.
                billingaddress:
                  type: string
                  description: 'The billing address for the credit card. (Max length:
                    20)'
                cardsecuritycode:
                  type: integer
                  description: 'The CVV2: the 3 (or 4 for Amex) digit value normally
                    found on the back (or front for Amex) of the credit card.  When
                    creating contracts, this is required if using accountnumber instead
                    of track data.'
                expirationmonthmm:
                  type: integer
                  description: The month the credit card expires (MM).  (Required
                    if trackdata is not supplied.)
                expirationyearyyyy:
                  type: integer
                  description: The year the credit card expires (YYYY).  (Required
                    if trackdata is not supplied.)
                allowduplicatepayments:
                  type: boolean
                  description: Allows duplicate payments.
        required: true
      tags:
      - Insurance/Financial
      - Stored Card Contracts
    get:
      summary: Get list of patient's credit-card information
      description: Retrieve the list of patients stored credit card information in
        the system
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: patientid
        schema:
          type: integer
        required: true
        description: patientid
      - in: query
        name: departmentid
        schema:
          type: integer
        required: false
        description: The ID of the department where the payment or contract is being
          collected. This parameter is currently not formally required. However, it
          will be in a future patch so it is highly recommended that this parameter
          is used.
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  billingaddress:
                    description: The billing address associated with the card.
                    type: string
                  billingcity:
                    description: The billing city associated with the card. This may
                      be absent for some cards.
                    type: string
                  billingstate:
                    description: The billing state associated with the card (two letter
                      abbreviation). This may be absent for some cards.
                    type: string
                  billingzip:
                    description: The billing zip associated with the card (two letter
                      abbreviation).
                    type: string
                  cardexpirationmmyyyy:
                    description: The expiration month and year of the card (MM/YYYY).
                    type: string
                  cardnumberlast4digits:
                    description: The last four digits of the card number.
                    type: string
                  cardtype:
                    description: The type of the card. Example - VISA, Mastercard,
                      etc..
                    type: string
                  nameoncard:
                    description: The name on the card.
                    type: string
                  preferredcard:
                    description: A flag to denote the preferred card of a patient.
                      This is true for at most one of the cards returned.
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                  status:
                    description: The status of the card.
                    type: string
                  storedcardid:
                    description: The ID of the stored credit card.
                    type: number
                type: object
          description: Success
      operationId: getPracticeidPatientsPatientidCollectpaymentStoredcard
      x-scopes: []
      tags:
      - Insurance/Financial
      - Stored Card Contracts
  /v1/{practiceid}/patients/{patientid}/collectpayment/storedcard/{storedcardid}:
    post:
      summary: Create new patient's specific credit-card
      description: Add a new credit card information to the patient file
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: storedcardid
        schema:
          type: integer
        required: true
        description: storedcardid
      - in: path
        name: patientid
        schema:
          type: integer
        required: true
        description: patientid
      - in: header
        name: Content-Type
        schema:
          type: string
        required: true
        description: Content type of the payload
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  epaymentid:
                    description: "\n\t\t\t\t\tAfter a successful payment, this ID\
                      \ can be used to retrieve\n\t\t\t\t\tthe receipt.\n\t\t\t\t"
                    type: integer
                  errortext:
                    description: The error text returned by the credit card processor.
                    type: string
                  success:
                    description: true for success.  false for an error.
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                type: object
          description: Success
      operationId: postPracticeidPatientsPatientidCollectpaymentStoredcardStoredcardid
      x-scopes: []
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
              - departmentid
              properties:
                amount:
                  type: string
                  description: 'DEPRECATED: Please use "otheramount".'
                trackdata:
                  type: string
                  description: The track data obtained from the credit card swipe.
                    This can be track1 and/or track2 data. In either case, please
                    including the start and end sentinels. ("%" and "?" for track1
                    and ";" and "?" for track2.)
                billingzip:
                  type: string
                  description: The billing zipcode for the credit card.  (Required
                    if track data is not supplied.)
                nameoncard:
                  type: string
                  description: 'The name on the credit card.  (Required if trackdata
                    is not supplied; track 2 does NOT supply name.)  Please truncate
                    at 30 characters. (Max length: 30)'
                copayamount:
                  type: string
                  description: The amount associated with a particular appointment
                    for a copay.
                otheramount:
                  type: string
                  description: The amount being collected that is not associated with
                    individual appointment. This money goes into the "unapplied" bucket.
                    In the future, these payments will be able to be broken down by
                    individual claim level. Co-pay amounts should be in "copayamount".
                claimpayment:
                  type: array
                  items:
                    type: object
                  description: 'A JSON representation of claim ID and payment combinations.  For
                    example, ''[ { "1":"1.00"}, { "2":"5.00"} ].''  This indicates
                    a payment of $1 for claim ID #1 and a payment of $5 for claim
                    ID #2.'
                departmentid:
                  type: integer
                  description: The ID of the department where the payment or contract
                    is being collected.
                todayservice:
                  type: boolean
                  description: Apply the other amount value to today's service.
                accountnumber:
                  type: string
                  description: The account number of the credit card.  (Required if
                    trackdata is not supplied.)
                appointmentid:
                  type: integer
                  description: The ID of the appointment where the copay should be
                    applied.
                ecommercemode:
                  type: boolean
                  description: Use ECommerce credit card mode (e.g. for telemedicine).
                    trackdata may NOT be used if this mode is true.
                billingaddress:
                  type: string
                  description: 'The billing address for the credit card.  (Required
                    if track data is not supplied.)  If more than 20 characters, please
                    truncate. (Max length: 20)'
                cardsecuritycode:
                  type: integer
                  description: 'The CVV2: the 3 (or 4 for Amex) digit value normally
                    found on the back (or front for Amex) of the credit card. This
                    is required for ecommerce mode payments.'
                expirationmonthmm:
                  type: integer
                  description: The month the credit card expires (MM).  (Required
                    if trackdata is not supplied.)
                expirationyearyyyy:
                  type: integer
                  description: The year the credit card expires (YYYY).  (Required
                    if trackdata is not supplied.)
                allowduplicatepayments:
                  type: boolean
                  description: Allows duplicate payments.
        required: true
      tags:
      - Insurance/Financial
      - Stored Card Contracts
    put:
      summary: Update patient's specific credit-card information
      description: Modifies existing credit card information for a patient
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: storedcardid
        schema:
          type: integer
        required: true
        description: storedcardid
      - in: path
        name: patientid
        schema:
          type: integer
        required: true
        description: patientid
      - in: header
        name: Content-Type
        schema:
          type: string
        required: true
        description: Content type of the payload
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  epaymentid:
                    description: "\n\t\t\t\t\tAfter a successful payment, this ID\
                      \ can be used to retrieve\n\t\t\t\t\tthe receipt.\n\t\t\t\t"
                    type: integer
                  errortext:
                    description: The error text returned by the credit card processor.
                    type: string
                  success:
                    description: true for success.  false for an error.
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                type: object
          description: Success
      operationId: putPracticeidPatientsPatientidCollectpaymentStoredcardStoredcardid
      x-scopes: []
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
              - preferredcard
              properties:
                departmentid:
                  type: integer
                  description: The ID of the department where the payment or contract
                    is being collected.
                preferredcard:
                  type: boolean
                  description: Flag to make a STOREDCARD contract the default one
                    for the patient
        required: true
      tags:
      - Insurance/Financial
      - Stored Card Contracts
    delete:
      summary: Delete patient's specific credit-card information
      description: Delete the record of a specific credit card of the patient
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: storedcardid
        schema:
          type: integer
        required: true
        description: storedcardid
      - in: path
        name: patientid
        schema:
          type: integer
        required: true
        description: patientid
      - in: query
        name: departmentid
        schema:
          type: integer
        required: false
        description: The ID of the department where the payment or contract is being
          collected.
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  epaymentid:
                    description: "\n\t\t\t\t\tAfter a successful payment, this ID\
                      \ can be used to retrieve\n\t\t\t\t\tthe receipt.\n\t\t\t\t"
                    type: integer
                  errortext:
                    description: The error text returned by the credit card processor.
                    type: string
                  success:
                    description: true for success.  false for an error.
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                type: object
          description: Success
      operationId: deletePracticeidPatientsPatientidCollectpaymentStoredcardStoredcardid
      x-scopes: []
      tags:
      - Insurance/Financial
      - Stored Card Contracts
metadata: []
security:
- api_auth_preview:
  - athena/service/Athenanet.MDP.*
  api_auth:
  - athena/service/Athenanet.MDP.*
  bearer_auth: []
