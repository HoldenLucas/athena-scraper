openapi: 3.0.0
info:
  description: Welcome to the API developer portal which gives third parties access
    to our APIs and sandbox to develop integrated solutions that will enhance the
    value and functionality offered by athenaOne®.
  title: athena API collection
  version: '0.1'
components:
  securitySchemes:
    api_auth_preview:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://api.preview.platform.athenahealth.com/oauth2/v1/token
          scopes:
            athena/service/Athenanet.MDP.*: API Preview
    api_auth:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://api.platform.athenahealth.com/oauth2/v1/token
          scopes:
            athena/service/Athenanet.MDP.*: API Production
    bearer_auth:
      type: http
      scheme: bearer
servers:
- url: https://api.preview.platform.athenahealth.com
  description: Preview
- url: https://api.platform.athenahealth.com
  description: Production
paths:
  /v1/{practiceid}/generalledger/inventory/consumption:
    post:
      summary: Record consumption of inventory in the general ledger
      description: Create a recordin the general ledger on the consumption of inventory
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: header
        name: Content-Type
        schema:
          type: string
        required: true
        description: Content type of the payload
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  message:
                    description: A message of what happened during testing.
                    type: string
                  success:
                    description: Whether the operation was successful.
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                type: object
          description: Success
      operationId: postPracticeidGeneralledgerInventoryConsumption
      x-scopes: []
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
              - inventory
              - datecreated
              properties:
                inventory:
                  type: array
                  items:
                    type: object
                    properties:
                      memo:
                        type: string
                        description: A memo to appear on the line item general ledger
                          entries.
                      amount:
                        type: string
                        description: The amount the consumed inventory was worth.
                      decreaseaccount:
                        type: string
                        description: The GL account that is going to be decreased.
                      increaseaccount:
                        type: string
                        description: The GL account that is going to be increased.
                      decreasedepartment:
                        type: string
                        description: The ID of the department the decrease belongs
                          to.
                      increasedepartment:
                        type: string
                        description: The ID of the department the increase belongs
                          to.
                  required:
                  - amount
                  - increaseaccount
                  description: An array of inventory that has been consumed.
                datecreated:
                  type: string
                  description: Date of the consumption. Formatted as MM/DD/YYYY.
        required: true
      tags:
      - Inpatient
      - General Ledger Integration
metadata: []
security:
- api_auth_preview:
  - athena/service/Athenanet.MDP.*
  api_auth:
  - athena/service/Athenanet.MDP.*
  bearer_auth: []
