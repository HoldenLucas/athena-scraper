openapi: 3.0.0
info:
  description: Welcome to the API developer portal which gives third parties access
    to our APIs and sandbox to develop integrated solutions that will enhance the
    value and functionality offered by athenaOne®.
  title: athena API collection
  version: '0.1'
components:
  securitySchemes:
    api_auth_preview:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://api.preview.platform.athenahealth.com/oauth2/v1/token
          scopes:
            athena/service/Athenanet.MDP.*: API Preview
    api_auth:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://api.platform.athenahealth.com/oauth2/v1/token
          scopes:
            athena/service/Athenanet.MDP.*: API Production
    bearer_auth:
      type: http
      scheme: bearer
servers:
- url: https://api.preview.platform.athenahealth.com
  description: Preview
- url: https://api.platform.athenahealth.com
  description: Production
paths:
  /v1/{practiceid}/patients/{patientid}/insurances/{insuranceid}/image:
    post:
      summary: Upload patient's insurance-card image
      description: Uploads the patient's insurance card image
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: patientid
        schema:
          type: integer
        required: true
        description: patientid
      - in: path
        name: insuranceid
        schema:
          type: integer
        required: true
        description: insuranceid
      - in: header
        name: Content-Type
        schema:
          type: string
        required: true
        description: Content type of the payload
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  success:
                    description: Indicates whether the submission was successful.
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                type: object
          description: Success
      operationId: postPracticeidPatientsPatientidInsurancesInsuranceidImage
      x-scopes: []
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              required:
              - image
              properties:
                image:
                  type: string
                  description: Base64 encoded image, or, if multipart/form-data, unencoded
                    image. This image may be scaled down after submission. PUT is
                    not recommended when using multipart/form-data. Since POST and
                    PUT have identical functionality, POST is recommended.
                departmentid:
                  type: string
                  description: The department ID associated with this upload.
        required: true
      tags:
      - Insurance/Financial
      - Insurance Card Image
    get:
      summary: Get patient's insurance-card image
      description: Retrieve the patient's insurance card image
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: patientid
        schema:
          type: integer
        required: true
        description: patientid
      - in: path
        name: insuranceid
        schema:
          type: integer
        required: true
        description: insuranceid
      - in: query
        name: jpegoutput
        schema:
          enum:
          - false
          - true
          type: string
          x-enumDescriptions:
          - false
          - true
        required: false
        description: If set to true, or if Accept header is image/jpeg, returns the
          image directly.  (The image may be scaled.)
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  image:
                    description: Base64 encoded image.
                    type: string
                type: object
          description: Success
      operationId: getPracticeidPatientsPatientidInsurancesInsuranceidImage
      x-scopes: []
      tags:
      - Insurance/Financial
      - Insurance Card Image
    put:
      summary: Update existing patient's insurance-card image
      description: Modifies existing patient's insurance-card image
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: patientid
        schema:
          type: integer
        required: true
        description: patientid
      - in: path
        name: insuranceid
        schema:
          type: integer
        required: true
        description: insuranceid
      - in: header
        name: Content-Type
        schema:
          type: string
        required: true
        description: Content type of the payload
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  success:
                    description: Indicates whether the submission was successful.
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                type: object
          description: Success
      operationId: putPracticeidPatientsPatientidInsurancesInsuranceidImage
      x-scopes: []
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              required:
              - image
              properties:
                image:
                  type: string
                  description: Base64 encoded image, or, if multipart/form-data, unencoded
                    image. This image may be scaled down after submission. PUT is
                    not recommended when using multipart/form-data. Since POST and
                    PUT have identical functionality, POST is recommended.
                departmentid:
                  type: string
                  description: The department ID associated with this upload.
        required: true
      tags:
      - Insurance/Financial
      - Insurance Card Image
    delete:
      summary: Delete patient's insurance-card image
      description: Delete the record of the patient's insurance card image
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: patientid
        schema:
          type: integer
        required: true
        description: patientid
      - in: path
        name: insuranceid
        schema:
          type: integer
        required: true
        description: insuranceid
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  success:
                    description: Indicates whether the submission was successful.
                    enum:
                    - false
                    - true
                    type: string
                type: object
          description: Success
      operationId: deletePracticeidPatientsPatientidInsurancesInsuranceidImage
      x-scopes: []
      tags:
      - Insurance/Financial
      - Insurance Card Image
metadata: []
security:
- api_auth_preview:
  - athena/service/Athenanet.MDP.*
  api_auth:
  - athena/service/Athenanet.MDP.*
  bearer_auth: []
