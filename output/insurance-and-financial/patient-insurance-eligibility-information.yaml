openapi: 3.0.0
info:
  description: Welcome to the API developer portal which gives third parties access
    to our APIs and sandbox to develop integrated solutions that will enhance the
    value and functionality offered by athenaOne®.
  title: athena API collection
  version: '0.1'
components:
  securitySchemes:
    api_auth_preview:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://api.preview.platform.athenahealth.com/oauth2/v1/token
          scopes:
            athena/service/Athenanet.MDP.*: API Preview
    api_auth:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://api.platform.athenahealth.com/oauth2/v1/token
          scopes:
            athena/service/Athenanet.MDP.*: API Production
    bearer_auth:
      type: http
      scheme: bearer
servers:
- url: https://api.preview.platform.athenahealth.com
  description: Preview
- url: https://api.platform.athenahealth.com
  description: Production
paths:
  /v1/{practiceid}/patients/{patientid}/insurances/{insuranceid}/benefitdetails:
    get:
      summary: Get patient's insurance benefit-details
      description: Retrieves eligibility information for a specific insurance
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: patientid
        schema:
          type: integer
        required: true
        description: patientid
      - in: path
        name: insuranceid
        schema:
          type: integer
        required: true
        description: insuranceid
      - in: query
        name: servicetypecode
        schema:
          type: string
        required: false
        description: STC Code for which we are checking the eligibility
      - in: query
        name: dateofservice
        schema:
          type: string
        required: false
        description: Fetches the eligibility on that specific date.
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  ansi271:
                    description: 271 data from the payer.
                    type: string
                  dateofservice:
                    description: Date on which eligibility was checked.
                    type: string
                  lastcheckdate:
                    description: The last time we did an eligibilty check for this
                      patient.
                    type: string
                type: object
          description: Success
      operationId: getPracticeidPatientsPatientidInsurancesInsuranceidBenefitdetails
      x-scopes: []
      tags:
      - Insurance/Financial
      - Patient Insurance Eligibility Information
    post:
      summary: Create patient's insurance benefit-details
      description: Send eligibility check for a specific insurance
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: patientid
        schema:
          type: integer
        required: true
        description: patientid
      - in: path
        name: insuranceid
        schema:
          type: integer
        required: true
        description: insuranceid
      - in: header
        name: Content-Type
        schema:
          type: string
        required: true
        description: Content type of the payload
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  message:
                    description: If success/error message with more detail.
                    type: string
                  success:
                    description: True if operation was sucessful, false otherwise.
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                type: object
          description: Success
      operationId: postPracticeidPatientsPatientidInsurancesInsuranceidBenefitdetails
      x-scopes: []
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                dateofservice:
                  type: string
                  description: Checks the eligibility on that specific date.
                servicetypecode:
                  type: string
                  description: STC Code for which we are checking the eligibility
        required: true
      tags:
      - Insurance/Financial
      - Patient Insurance Eligibility Information
metadata: []
security:
- api_auth_preview:
  - athena/service/Athenanet.MDP.*
  api_auth:
  - athena/service/Athenanet.MDP.*
  bearer_auth: []
