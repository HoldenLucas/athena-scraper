        '200':
          content:
            application/json:
              schema:
                properties:
                  customfields:
                    description: Number of custom fields updated.
                    type: integer
                  success:
                    description: Whether the operation was successful.
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                  transactions:
                    description: Number of transactions with allowables information
