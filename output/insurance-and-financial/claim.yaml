    get:
      summary: Get list of claim details
      description: Retrieves a list of claims filtered by combination of date range,
        appointmentID ProviderID, and DepartmentID
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: query
        name: appointmentid
        schema:
          type: array
          items:
            type: integer
        required: false
        description: One or more appointment IDs.
      - in: query
        name: departmentid
        schema:
          type: integer
        required: false
        description: The department ID of the service department for the claims being
          searched for.
      - in: query
        name: providerid
        schema:
          type: integer
        required: false
        description: Will match either the provider or the supervising provider.
      - in: query
        name: claimfilters
        schema:
          type: array
          items:
            enum:
            - OPEN
            - INSURANCEBALANCE
            - PATIENTBALANCE
            type: string
            x-enumDescriptions:
            - Open
            - InsuranceBalance
            - PatientBalance
        required: false
        description: Array, pass one or more options to filter claims.
      - in: query
        name: servicedatesort
        schema:
          enum:
          - ASC
          - DESC
          type: string
          x-enumDescriptions:
          - ASC
          - DESC
        required: false
        description: sort for service date.
      - in: query
        name: payerid
        schema:
          type: integer
        required: false
        description: The Payer ID associated with the claims to search for
      - in: query
        name: patientid
        schema:
          type: integer
        required: false
        description: The patient ID associated with the claims to search for
      - in: query
        name: providerids
        schema:
          type: array
          items:
            type: integer
        required: false
        description: One or more provider IDs.
      - in: query
        name: showlocalpatientid
        schema:
          type: boolean
        required: false
        description: Include local patient ID for the claim if set to 1 in request.
      - in: query
        name: procedurecodes
        schema:
          type: array
          items:
            type: string
        required: false
        description: One or more procedure codes
      - in: query
        name: servicestartdate
        schema:
          type: string
        required: false
        description: The service date, start of range, inclusive.
      - in: query
        name: createdenddate
        schema:
          type: string
        required: false
        description: The claim creation date, end of range, inclusive.
      - in: query
        name: createdstartdate
        schema:
          type: string
        required: false
        description: The claim creation date, start of range, inclusive.
      - in: query
        name: showsupervisingprovider
        schema:
          type: boolean
        required: false
        description: Include supervising provider ID and name for the claim.
      - in: query
        name: serviceenddate
        schema:
          type: string
        required: false
        description: The service date, end of range, inclusive.
      - in: query
        name: showcustomfields
        schema:
          type: boolean
        required: false
        description: Include custom fields for the claims.
      - in: query
        name: showservicetypeaddons
        schema:
          type: boolean
        required: false
        description: Include service type add-ons for the claim.
      - in: query
        name: limit
        schema:
          type: integer
        required: false
        description: Number of entries to return (default 1500, max 5000)
      - in: query
        name: offset
        schema:
          type: integer
        required: false
        description: Starting point of entries; 0-indexed
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  acceptassignmentyn1:
                    description: Primary accepts assignment.
                    type: string
                  acceptassignmentyn2:
                    description: Secondary accepts assignment.
                    type: string
                  appointmentid:
                    description: The appointment ID associated with this claim.
                    type: string
                  billedproviderid:
                    description: The provider ID of the billing provider for this
                      claim.
                    type: integer
                  billedservicedate:
                    description: The billed date of service.
                    type: string
                  chargeamount:
                    description: The total amount billed for all services from this
                      claim.
                    type: string
                  claimcreateddate:
                    description: The date the claim was created.
                    type: string
                  claimid:
                    description: athenaNet's internal ID for this claim, specific
                      to the practice.
                    type: string
                  currentillnessdate:
                    description: Current illness date.
                    type: string
                  customfields:
                    description: 'The claim custom field values may or may not be
                      the same between departments. '
                    items:
                      properties:
                        customfieldid:
                          description: Corresponds to the /customfields customfieldid.
                          type: string
                        customfieldvalue:
                          description: For a non-select custom field, the value.
                          type: string
                        optionid:
                          description: For a select custom field, the selectid value
                            (from /customfield's selectlist).
                          type: string
                      type: object
                    type: array
                  departmentid:
                    description: The department ID associated with this claim.
                    type: integer
                  diagnoses:
                    description: '<p>Diagnoses is an array of all diagnoses.   Each
                      entry in the array is a hash with several fields.  /ccda is
                      a better clinical representation.  These fields are:</p>

                      '
                    properties:
                      deleteddiagnosis:
                        description: In certain cases, diagnoses may be added and
                          then removed from a particular claim.  In normal circumstances,
                          this will be false.  However, if a diagnosis was removed,
                          this will be true.
                        type: string
                      diagnosiscategory:
                        description: The category for this diagnosis.
                        type: string
                      diagnosiscodeset:
                        description: Either ICD9 or ICD10.
                        type: string
                      diagnosisdescription:
                        description: A description of this diagnosis.
                        type: string
                      diagnosisid:
                        description: A unique ID related to this diagnosis.
                        type: string
                      diagnosisrawcode:
                        description: The raw ICD-9 code.  This will migrate to ICD-10
                          in the future.
                        type: string
                    type: object
                  fromunabletoworkdate:
                    description: Patient unable to work from date.
                    type: string
                  lastmodified:
                    description: Last modified date.
                    type: string
                  lastmodifiedby:
                    description: Last modified by user.
                    type: string
                  localpatientid:
                    description: The local patient ID associated with this claim.
                    type: integer
                  medicaidresubmissioncode:
                    description: Resubmission, Code.
                    type: string
                  medicaidresubmissionorigrefno:
                    description: Resubmission Original Ref No.
                    type: string
                  medicaresecondaryqualifier:
                    description: Medicare as a Secondary Payer qualifier selection
                      name.
                    type: string
                  medicaresecondaryqualifierid:
                    description: Medicare as a Secondary Payer qualifier selection
                      Id.
                    type: string
                  patientid:
                    description: The patient ID associated with this claim.
                    type: integer
                  patientpayer:
                    description: The status and notes of a responsible payer.  This
                      payer is the patient.
                    properties:
                      balance:
                        description: Outstanding balance from patient for this claim.
                        type: paymentamount
                      note:
                        description: The note that is attached to this status.
                        type: string
                      status:
                        description: The status associated with this responsible payer.
                        type: string
                    type: object
                  primaryinsurancepayer:
                    description: The status and notes of a responsible payer.  This
                      payer is the primary insurace.
                    properties:
                      balance:
                        description: Outstanding balance from primary insurance for
                          this claim.
                        type: paymentamount
                      note:
                        description: The note that is attached to this status.
                        type: string
                      primaryinsurancepackageid:
                        description: The primary insurance Package id associated with
                          this claim.
                        type: integer
                      primarypatientinsuranceid:
                        description: The primary insurance id associated with this
                          claim.
                        type: integer
                      status:
                        description: The status associated with this responsible payer.
                        type: string
                    type: object
                  procedures:
                    description: '<p>Procedures is an array of all procedures.  /ccda
                      is a better clinical representation.   These fields are:</p>

                      '
                    properties:
                      allowableamount:
                        description: The total amount expected from payer for all
                          services from this procedure.
                        type: string
                      allowablemax:
                        description: The maximum amount expected from payer for all
                          services from this procedure.
                        type: string
                      allowablemin:
                        description: The minimum amount expected from payer for all
                          services from this procedure.
                        type: string
                      chargeamount:
                        description: The amount charged for this procedure.
                        type: string
                      procedurecategory:
                        description: The category name associated with this procedure.
                        type: string
                      procedurecode:
                        description: The CPT code associated with this procedure.
                        type: string
                      proceduredescription:
                        description: A description of this procedure.
                        type: string
                      servicetypeaddons:
                        description: Array of service type add-ons (STAOs) for the
                          charge.
                        items:
                          properties:
                            fields:
                              items:
                                properties:
                                  fieldname:
                                    description: Service type add-on field name.
                                    type: string
                                  fieldvalues:
                                    items:
                                      type: string
                                    type: array
                                type: object
                              type: array
                            identifier:
                              description: Service type add-on identifier.
                              type: string
                          type: object
                        type: array
                      transactionid:
                        description: The ID of the last transaction associated with
                          the claim.
                        type: string
                    type: object
                  referralauthid:
                    description: The referral authorization ID for this claim.
                    type: integer
                  referringproviderid:
                    description: The referring provider ID for this claim.  See /referringproviders.  This
                      is not the same as the ID from the /providers call.
                    type: integer
                  relatedtoautoaccidentyn:
                    description: Patient's condition related to accident.
                    type: string
                  relatedtoemploymentyn:
                    description: Patient's condition related to employment.
                    type: string
                  relatedtootheraccidentyn:
                    description: Patient's condition related to other accident.
                    type: string
                  renderingproviderid:
                    description: Rendering provider.
                    type: string
                  reserved10d:
                    description: Reserved (10d) (remarks).
                    type: string
                  reserved19:
                    description: The text in the Reserved 19 field.
                    type: string
                  schedulingproviderid:
                    description: Scheduling provider.
                    type: string
