                    type: integer
                type: object
          description: Success
      operationId: putPracticeidClaimsClaimid
      x-scopes: []
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                claimcharges:
                  type: array
                  items:
                    type: object
                    properties:
                      allowablemax:
                        type: number
                        description: The total maximum allowable amount for this charge.
                          If passed, will override the amount that would be calculated
                          from the usual practice allowable schedule. Will default
                          to 105% of the ALLOWABLEAMOUNT.
                      allowablemin:
                        type: number
                        description: The total minimum allowable amount for this charge.
                          If passed, will override the amount that would be calculated
                          from the usual practice allowable schedule. Will default
                          to 95% of the ALLOWABLEAMOUNT
                      transactionid:
                        type: integer
                        description: The athena transaction ID for this charge.
                      allowableamount:
                        type: number
                        description: The total expected allowable amount for this
                          charge.  If passed, will override the amount that would
                          be calculated from the usual practice allowable schedule.
                      servicetypeaddons:
                        type: array
                        items:
                          type: object
                          properties:
                            fields:
                              type: array
                              items:
                                type: object
                                properties:
                                  fieldname:
                                    type: string
                                    description: Service type add-on field name.
                                  fieldvalues:
                                    type: array
                                    items:
                                      type: string
                            identifier:
                              type: string
                              description: Service type add-on identifier.
                        description: Array of service type add-ons (STAOs) for the
                          charge. Charge level STAOs only support multiple values
                          for non-numeric fields. Passing in multiple values for a
                          numeric charge level STAO field will result in the charge
                          level STAOs not being saved at all, but the claim will be
                          still be created.
                  required:
                  - transactionid
                  description: List of charges for this claim whose allowable values
                    should be updated. This should be a JSON string representing an
                    array of charge objects.
                customfields:
                  type: array
                  items:
                    type: object
                    properties:
                      optionid:
                        type: integer
                        description: Claim custom field Option ID
                      customfieldid:
                        type: integer
                        description: Claim custom field ID
                      customfieldvalue:
                        type: string
                        description: Claim custom field Value
                  required:
                  - customfieldid
                  description: A list of custom field JSON objects to populate on
                    creation of a claim.
                referralauthid:
                  type: integer
                  description: The referral authorization ID to associate with this
                    claim.
                claimsimplefields:
                  type: object
                  properties:
                    manualdropyn:
                      type: string
                      description: Flag to decide if force drop to paper for primary
                        payor is available
                    manualdropyn2:
                      type: string
                      description: Flag to decide if force drop to paper for secondary
                        payor is available
                    manualdropreasonid:
                      type: string
                      description: Force Drop to Paper reason for primary payor
                    manualdropreasonid2:
                      type: string
                      description: Force Drop to Paper reason for secondary payor
                    printzerodollarchargesyn1:
                      type: string
                      description: Flag to decide if zero dollar charges for primary
                        payor needs to be displayed
                  description: Simple fields that are specific to claim
                servicetypeaddons:
                  type: array
                  items:
                    type: object
                    properties:
                      fields:
                        type: array
                        items:
                          type: object
                          properties:
                            fieldname:
                              type: string
                              description: Service type add-on field name.
                            fieldvalues:
                              type: array
                              items:
                                type: string
                      identifier:
                        type: string
                        description: Service type add-on identifier.
                  description: Array of service type add-ons (STAOs) for the claim.
                    Some claim level STAO fields do not support multiple values. These
                    fields will save only the first value if more than one is passed
                    in.
                orderingproviderid:
                  type: integer
                  description: The ordering provider ID. 'Ordering Provider' service
                    type add-on must be enabled. Default is no ordering provider ID.
                    Any entry in this field will override any ordering provider ID
                    in the service type add-ons field.
                referringproviderid:
                  type: integer
                  description: The referring provider ID (not the same from /providers)
                    associated with this claim.
        required: true
      tags:
      - Insurance/Financial
      - Claims
