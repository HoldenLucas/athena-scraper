                    - false
                    - true
                    type: string
                    description: Whether the operation was successful.
                  claimids:
                    type: array
                    items:
                      type: integer
                    description: If the operation succeeded, this will contain the
                      IDs of any claims that were created.
                  errormessage:
                    type: string
                    description: If the operation failed, this will contain any error
                      messages.
          description: Success
      operationId: postPracticeidClaims
      x-scopes: []
      requestBody:
