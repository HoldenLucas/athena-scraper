openapi: 3.0.0
info:
  description: Welcome to the API developer portal which gives third parties access
    to our APIs and sandbox to develop integrated solutions that will enhance the
    value and functionality offered by athenaOne®.
  title: athena API collection
  version: '0.1'
components:
  securitySchemes:
    api_auth_preview:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://api.preview.platform.athenahealth.com/oauth2/v1/token
          scopes:
            athena/service/Athenanet.MDP.*: API Preview
    api_auth:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://api.platform.athenahealth.com/oauth2/v1/token
          scopes:
            athena/service/Athenanet.MDP.*: API Production
    bearer_auth:
      type: http
      scheme: bearer
servers:
- url: https://api.preview.platform.athenahealth.com
  description: Preview
- url: https://api.platform.athenahealth.com
  description: Production
paths:
  /v1/{practiceid}/appointments/{appointmentid}/claim:
    post:
      summary: Create claim for an appointment
      description: Create a new claim record for an appointment
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: appointmentid
        schema:
          type: integer
        required: true
        description: appointmentid
      - in: header
        name: Content-Type
        schema:
          type: string
        required: true
        description: Content type of the payload
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                    description: Whether the operation was successful.
                  claimids:
                    type: array
                    items:
                      type: integer
                    description: If the operation succeeded, this will contain the
                      IDs of any claims that were created.
                  errormessage:
                    type: string
                    description: If the operation failed, this will contain any error
                      messages.
          description: Success
      operationId: postPracticeidAppointmentsAppointmentidClaim
      x-scopes: []
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              properties:
                claimcharges:
                  description: List of charges for this claim. This should be a JSON
                    string representing an array of charge objects. A primary ICD-10
                    code (e.g. ICD10CODE1) is required.  ICD-9 codes may also be passed,
                    in the rare case that the payer for the claim still needs that
                    information. The /feeschedules/checkprocedure call may be used
                    to verify a particular PROCEDURECODE is valid for a practice before
                    attempting claim creation.  Claims can only be created for appointments
                    that do not already have a claim, are not already in status 4,
                    and have already been checked in.
                  items:
                    properties:
                      allowableamount:
                        description: The total expected allowable amount for this
                          charge.  If passed, will override the amount that would
                          be calculated from the usual practice allowable schedule.
                        type: number
                      allowablemax:
                        description: The total maximum allowable amount for this charge.  If
                          passed, will override the amount that would be calculated
                          from the usual practice allowable schedule.
                        type: number
                      allowablemin:
                        description: The total minimum allowable amount for this charge.  If
                          passed, will override the amount that would be calculated
                          from the usual practice allowable schedule.
                        type: number
                      allowablescheduleid:
                        description: The ID of the athenaNet allowable schedule to
                          associated with this charge.  If passed, will override the
                          usual practice allowable schedule.
                        type: integer
                      fromdate:
                        description: 'A date string that corresponds with the first
                          date of this charge. The date must be today or in the past
                          and must be on or before the to date. Either all charges
                          must have an explicit from date and to date, or no charges
                          have any from dates or to dates. By default we will use
                          the service date. This field is available starting 24.11
                          release. Note: certain fields are not supported in conjunction
                          with fromdate (allowableamount overrides, unitamount overrides,
                          servicetypeaddons).'
                        type: string
                      icd10code1:
                        description: Primary ICD-10 diagnosis for this charge.
                        type: string
                      icd10code2:
                        description: Secondary ICD-10 diagnosis for this charge.
                        type: string
                      icd10code3:
                        description: Tertiary ICD-10 diagnosis for this charge.
                        type: string
                      icd10code4:
                        description: Quaternary ICD-10 diagnosis for this charge.
                        type: string
                      icd9code1:
                        description: Primary ICD-9 diagnosis for this charge.
                        type: string
                      icd9code2:
                        description: Secondary ICD-9 diagnosis for this charge.
                        type: string
                      icd9code3:
                        description: Tertiary ICD-9 diagnosis for this charge.
                        type: string
                      icd9code4:
                        description: Quaternary ICD-9 diagnosis for this charge.
                        type: string
                      linenote:
                        description: Optional line note for this charge.  Any value
                          for this field will be truncated to 80 characters.
                        type: string
                      placeofserviceoverride:
                        description: Override for the default Place of Service code
                          for this charge. Value must be either 0 or exactly 2 characters
                          long.
                        type: string
                      procedurecode:
                        description: CPT code for this procedure, including any modifiers
                          (e.g. 99213,26,59).
                        type: string
                      servicetypeaddons:
                        description: Array of service type add-ons (STAOs) for the
                          charge. Charge level STAOs only support multiple values
                          for non-numeric fields. Passing in multiple values for a
                          numeric charge level STAO field will result in the charge
                          level STAOs not being saved at all, but the claim will be
                          still be created.
                        items:
                          properties:
                            fields:
                              items:
                                properties:
                                  fieldname:
                                    description: Service type add-on field name.
                                    type: string
                                  fieldvalues:
                                    items:
                                      type: string
                                    type: array
                                type: object
                              type: array
                            identifier:
                              description: Service type add-on identifier.
                              type: string
                          type: object
                        type: array
                      todate:
                        description: 'A date string that corresponds with the last
                          date of this charge. The date must be today or in the past
                          and must be on or after the from date. Either all charges
                          must have an explicit from date and to date, or no charges
                          have any from dates or to dates. By default we will use
                          the service date. This field is available starting 24.11
                          release. Note: certain fields are not supported in conjunction
                          with todate (allowableamount overrides, unitamount overrides,
                          servicetypeaddons).'
                        type: string
                      unitamount:
                        description: The per-unit amount for this charge.  If passed,
                          will overwrite the amount defined in the practice fee schedule.
                        type: number
                      units:
                        description: The number of units to bill for this charge.  If
                          not specified, defaults to 1.
                        type: integer
                    type: object
                  required:
                  - procedurecode
                  type: array
                servicetypeaddons:
                  description: Array of service type add-ons (STAOs) for the claim.
                    Some claim level STAO fields do not support multiple values. These
                    fields will save only the first value if more than one is passed
                    in.
                  items:
                    properties:
                      fields:
                        items:
                          properties:
                            fieldname:
                              description: Service type add-on field name.
                              type: string
                            fieldvalues:
                              items:
                                type: string
                              type: array
                          type: object
                        type: array
                      identifier:
                        description: Service type add-on identifier.
                        type: string
                    type: object
                  type: array
                supervisingproviderid:
                  description: The supervising provider ID.  Defaults to the supervising
                    provider of the appointment.
                  type: integer
              required:
              - claimcharges
              type: object
        required: true
      tags:
      - Insurance/Financial
      - Appointment Claims
  /v1/{practiceid}/claims:
    post:
      summary: Create new financial claim
      description: Create a new claim
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: header
        name: Content-Type
        schema:
          type: string
        required: true
        description: Content type of the payload
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    enum:
