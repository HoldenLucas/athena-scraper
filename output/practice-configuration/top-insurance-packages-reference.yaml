openapi: 3.0.0
info:
  description: Welcome to the API developer portal which gives third parties access
    to our APIs and sandbox to develop integrated solutions that will enhance the
    value and functionality offered by athenaOne®.
  title: athena API collection
  version: '0.1'
components:
  securitySchemes:
    api_auth_preview:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://api.preview.platform.athenahealth.com/oauth2/v1/token
          scopes:
            athena/service/Athenanet.MDP.*: API Preview
    api_auth:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://api.platform.athenahealth.com/oauth2/v1/token
          scopes:
            athena/service/Athenanet.MDP.*: API Production
    bearer_auth:
      type: http
      scheme: bearer
servers:
- url: https://api.preview.platform.athenahealth.com
  description: Preview
- url: https://api.platform.athenahealth.com
  description: Production
paths:
  /v1/{practiceid}/misc/topinsurancepackages:
    get:
      summary: Get list of top insurance packages
      description: Retrieves the list of top athenaNet insurance packages used by
        the practice
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: query
        name: departmentid
        schema:
          type: integer
        required: false
        description: Only look at patients who are associated with this department's
          provider group in determining which insurance packages to list. Note that
          insurance packages do not "belong" to a department and thus department ID
          is not returned in the output. The same insurance packages will (and often
          do) appear across multiple departments.
      - in: query
        name: limit
        schema:
          type: integer
        required: false
        description: Number of entries to return (default 1500, max 5000)
      - in: query
        name: offset
        schema:
          type: integer
        required: false
        description: Starting point of entries; 0-indexed
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  address:
                    description: The first address line associated with this insurance
                      package, often on the insurance card itself as a place to send
                      claims.
                    type: string
                  address2:
                    description: The second address line associated with this insurance
                      package.
                    type: string
                  city:
                    description: The city associated with this insurance package.
                    type: string
                  insurancepackageid:
                    description: The athenaNet-wide insurance package (also know in
                      the industry as an "insurance product") id.
                    type: string
                  insuranceproducttypename:
                    description: The type of product (e.g. PPO, HMO, etc.)
                    type: string
                  name:
                    description: The name of the insurance package.
                    type: string
                  percentage:
                    description: The percentage of insurance packages in this practice
                      (or department, if a departmentid is specified in the input)
                      that use this insurance package.
                    type: string
                  phone:
                    description: The phone number associated with this insurance package.
                    type: string
                  ranking:
                    description: The ranking of how often this package is used by
                      this practice (or department, if a departmentid is specified
                      in the input).
                    type: string
                  state:
                    description: The state associated with this insurance package.
                    type: string
                  zip:
                    description: The zip code associated with this insurance package.
                    type: string
                type: object
          description: Success
      operationId: getPracticeidMiscTopinsurancepackages
      x-scopes: []
      tags:
      - Administrative
      - Top insurance packages (practice/department)
metadata: []
security:
- api_auth_preview:
  - athena/service/Athenanet.MDP.*
  api_auth:
  - athena/service/Athenanet.MDP.*
  bearer_auth: []
