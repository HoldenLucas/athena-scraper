openapi: 3.0.0
info:
  description: Welcome to the API developer portal which gives third parties access
    to our APIs and sandbox to develop integrated solutions that will enhance the
    value and functionality offered by athenaOne®.
  title: athena API collection
  version: '0.1'
components:
  securitySchemes:
    api_auth_preview:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://api.preview.platform.athenahealth.com/oauth2/v1/token
          scopes:
            athena/service/Athenanet.MDP.*: API Preview
    api_auth:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://api.platform.athenahealth.com/oauth2/v1/token
          scopes:
            athena/service/Athenanet.MDP.*: API Production
    bearer_auth:
      type: http
      scheme: bearer
servers:
- url: https://api.preview.platform.athenahealth.com
  description: Preview
- url: https://api.platform.athenahealth.com
  description: Production
paths:
  /v1/{practiceid}/communicatorbrands/{communicatorbrandid}:
    get:
      summary: Get specific communicator brand information
      description: Retrieves information of a specific communicator brand
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: communicatorbrandid
        schema:
          type: integer
        required: true
        description: communicatorbrandid
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  communicatorbrandid:
                    description: communicatorbrandid
                    type: integer
                  fromemail:
                    description: The email address that we mask the from email with.
                    type: string
                  haspatientinfocenteryn:
                    description: If true, the Communicator Brand has a PIC (limited
                      portal)
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                  hasportalyn:
                    description: If true, the Communicator Brand has a web portal.
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                  name:
                    description: Patient facing name for the Communicator Brand
                    type: string
                type: object
          description: Success
      operationId: getPracticeidCommunicatorbrandsCommunicatorbrandid
      x-scopes: []
      tags:
      - Administrative
      - Communicator brands
  /v1/{practiceid}/communicatorbrands:
    get:
      summary: Get practice's list of communicator brands
      description: Retrieves practice's list of communicator brands
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: query
        name: limit
        schema:
          type: integer
        required: false
        description: Number of entries to return (default 1500, max 5000)
      - in: query
        name: offset
        schema:
          type: integer
        required: false
        description: Starting point of entries; 0-indexed
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  communicatorbrandid:
                    description: communicatorbrandid
                    type: integer
                  fromemail:
                    description: The email address that we mask the from email with.
                    type: string
                  haspatientinfocenteryn:
                    description: If true, the Communicator Brand has a PIC (limited
                      portal)
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                  hasportalyn:
                    description: If true, the Communicator Brand has a web portal.
                    enum:
                    - ''
                    - false
                    - true
                    type: string
                  name:
                    description: Patient facing name for the Communicator Brand
                    type: string
                type: object
          description: Success
      operationId: getPracticeidCommunicatorbrands
      x-scopes: []
      tags:
      - Administrative
      - Communicator brands
metadata: []
security:
- api_auth_preview:
  - athena/service/Athenanet.MDP.*
  api_auth:
  - athena/service/Athenanet.MDP.*
  bearer_auth: []
