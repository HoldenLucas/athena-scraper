    delete:
      summary: Delete a subscription
      description: Unsubscribe from a topic by soft-deleting the subscription.
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
        description: Unique identifier of the subscription to delete
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                required:
                - resourceType
                properties:
                  resourceType:
                    type: string
                    description: OperationOutcome
