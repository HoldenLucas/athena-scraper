                          description: http://hl7.org/fhir/uv/subscriptions-backport/StructureDefinition/backport-subscription
                        description: Profile URL for backport subscription
                    description: Metadata about the resource
                  reason:
                    type: string
                    description: Brief description of the business purpose for which
                      the subscription was created
                  status:
                    enum:
                    - requested
                    - active
                    - error
                    - 'off'
                    type: string
                    description: Subscription status
                  channel:
                    type: object
                    properties:
                      type:
                        enum:
                        - rest-hook
                        type: string
                        description: Channel type
                      header:
                        type: array
                        items:
                          type: string
                        description: Optional array of custom HTTP headers
                      payload:
                        enum:
                        - application/fhir+json
                        type: string
                        description: MIME type of the payload
                      _payload:
                        type: object
                        properties:
                          extension:
                            type: array
                            items:
                              type: object
                              properties:
                                url:
                                  type: string
                                  description: http://hl7.org/fhir/uv/subscriptions-backport/StructureDefinition/backport-payload-content
                                valueCode:
                                  enum:
                                  - id-only
                                  type: string
                                  description: Payload content type
                            description: Payload configuration
                        description: Payload content extensions
                      endpoint:
                        type: string
                        description: HTTPS URL of your webhook endpoint
                    description: The channel on which to send notifications
                  criteria:
                    type: string
                    description: URL of the SubscriptionTopic (e.g., https://api.platform.athenahealth.com/fhir/r4/SubscriptionTopic/Patient.update)
                  _criteria:
                    type: object
                    properties:
                      extension:
                        type: array
                        items:
