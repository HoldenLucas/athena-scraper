            same reason used in the original appointment will be used. Note: when
            getting open appointment slots, a special reason of -1 will return appointment
            slots for any reason.  This is not recommended, however, because actual
            availability does depend on a real reason.  In addition, appointment availability
            when using -1 does not account for the ability to not allow appointments
            to be scheduled too close to the current time (because that limit is set
            on a per appointment reason basis).'
        patientid:
          type: integer
