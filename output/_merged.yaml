openapi: 3.0.0
info:
  title: athena API collection (merged)
  version: '0.1'
paths:
  /v1/{practiceid}/appointments/{appointmentid}/accidentdata:
    get:
      summary: Get appointment accident data
      description: Retrieves the data for a specific appointment caused due to an
        accident
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: appointmentid
        schema:
          type: integer
        required: true
        description: appointmentid
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccidentdataResponse'
          description: Success
      operationId: getPracticeidAppointmentsAppointmentidAccidentdata
      x-scopes: []
      tags:
      - Appointments
      - Appointment Accident Data
    put:
      summary: Update appointment accident data
      description: Modifies the data for a specific appointment caused due to an accident
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: appointmentid
        schema:
          type: integer
        required: true
        description: appointmentid
      - in: header
        name: Content-Type
        schema:
          type: string
        required: true
        description: Content type of the payload
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccidentdataResponse2'
          description: Success
      operationId: putPracticeidAppointmentsAppointmentidAccidentdata
      x-scopes: []
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AccidentdataRequest'
        required: true
      tags:
      - Appointments
      - Appointment Accident Data
  /v1/{practiceid}/appointments/booked/{appointmentid}:
    put:
      summary: Update booked appointment
      description: Modifies the department, provider or appointment type of a booked
        appointment
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: path
        name: appointmentid
        schema:
          type: integer
        required: true
        description: appointmentid
      - in: header
        name: Content-Type
        schema:
          type: string
        required: true
        description: Content type of the payload
