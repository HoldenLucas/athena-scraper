        in: query
        name: startlastmodified
        required: false
        schema:
          type: string
      - description: Match the appointment provider id to an NPI Canonical Id
        in: query
        name: useprovidernpimatching
        required: false
        schema:
          type: boolean
      - description: Include patient insurance information. Shows insurance packages
          for the appointment if any are selected, and all patient packages otherwise.
        in: query
        name: showinsurance
        required: false
        schema:
          type: boolean
      - description: Start of the appointment scheduled search date range (mm/dd/yyyy).  Inclusive.
        in: query
        name: scheduledstartdate
        required: false
        schema:
          type: string
      - description: Include all remindercall related results, if available, associated
          with an appointment.
        in: query
        name: showremindercalldetail
        required: false
        schema:
          type: boolean
      - description: 'Identify appointments modified prior to this date/time (mm/dd/yyyy
          hh:mi:ss).  Inclusive. Note: This can only be used if a startlastmodified
          value is supplied as well.'
        in: query
        name: endlastmodified
        required: false
        schema:
          type: string
      - description: End of the appointment search date range (mm/dd/yyyy).  Inclusive.
        in: query
        name: enddate
        required: true
        schema:
          type: string
      - description: Show the expetcted procedurecodes.
        in: query
        name: showexpectedprocedurecodes
        required: false
        schema:
          type: boolean
      - description: Include claim information, if available, associated with an appointment.
        in: query
        name: showclaimdetail
        required: false
        schema:
          type: boolean
      - description: By default, the expected co-pay is returned. For performance
          purposes, you can set this to false and copay will not be populated.
        in: query
        name: showcopay
        required: false
        schema:
          type: boolean
      - description: End of the appointment scheduled search date range (mm/dd/yyyy).  Inclusive.
        in: query
        name: scheduledenddate
        required: false
        schema:
          type: string
      - description: Include appointments that have been cancelled.
        in: query
        name: showcancelled
        required: false
        schema:
          type: boolean
      - description: Start of the appointment search date range (mm/dd/yyyy).  Inclusive.
        in: query
        name: startdate
        required: true
        schema:
          type: string
      - description: Number of entries to return (default 1000, max 10000)Please note
