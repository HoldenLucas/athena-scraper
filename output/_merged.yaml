components:
  schemas:
    AccidentdataResponse:
      properties:
        anotherpartyresponsible:
          description: A boolean field describing whether this appointment is created
            because of an accident caused by another party.
          enum:
          - ''
          - false
          - true
          type: string
        appointmentid:
          description: The athenaNet appointment ID.
          type: integer
        autoaccidentstate:
          description: The two letter state abbreviation. This field is only valid
            if the relatedtoautoaccident field is set (or is being set) to true.
          type: string
        relatedtoautoaccident:
          description: A boolean field describing whether this appointment is created
            because of an automobile accident.
          enum:
          - ''
          - false
          - true
          type: string
        relatedtoemployment:
          description: A boolean field describing whether this appointment is created
            because of an accident related to the patient's employment.
          enum:
          - ''
          - false
          - true
          type: string
        relatedtootheraccident:
          description: A boolean field describing whether this appointment is created
            because of an accident other than those listed above. This is mutually
            exclusive with the automobile accident field.
          enum:
          - ''
          - false
          - true
          type: string
      type: object
    AccidentdataRequest:
      type: object
      properties:
        autoaccidentstate:
          type: string
          description: The two letter state abbreviation. This field is only valid
            if the relatedtoautoaccident field is set (or is being set) to true. If
            this field is set and relatedtoautoaccident is subsequently set to false,
            this field will be cleared.
        relatedtoemployment:
          type: boolean
          description: A boolean field describing whether this appointment is created
            because of an accident related to the patient's employment.
        relatedtoautoaccident:
          type: boolean
          description: A boolean field describing whether this appointment is created
            because of an automobile accident. Mutually exclusive with the relatedtootheraccident
            field.
        relatedtootheraccident:
          type: boolean
          description: A boolean field describing whether this appointment is created
            because of an accident other than those listed above. This is mutually
            exclusive with the automobile accident field.
        anotherpartyresponsible:
          type: boolean
          description: A boolean field describing whether this appointment is created
            because of an accident caused by another party.
    AccidentdataResponse2:
      properties:
        success:
          description: Whether the operation was successful.
          enum:
          - ''
          - false
          - true
          type: string
      type: object
    BookedRequest:
      type: object
      properties:
        providerid:
          type: integer
          description: New rendering provider for this appointment.
        departmentid:
          type: integer
          description: New department ID for this appointment.
        appointmenttypeid:
          type: integer
          description: New appointment type ID for this appointment.
        schedulingproviderid:
          type: integer
          description: New scheduling provider ID for this appointment.
        supervisingproviderid:
          type: integer
          description: New supervisingprovider ID for this appointment.
    BookedResponse:
      properties:
        status:
          description: This subroutine will return 1 on success, and will otherwise
            return an error message.
          type: string
      type: object
    AppointmentcancelreasonResponse:
      properties:
        appointmentcancelreasonid:
          description: The cancel reason ID.
          type: integer
        name:
          description: The reason for cancellation.
          type: string
        noshow:
          description: The patient was a no-show.
          enum:
          - ''
          - false
          - true
          type: string
        patientrescheduled:
          description: The patient rescheduled this appointment.
          enum:
          - ''
          - false
          - true
          type: string
        providerunavailable:
          description: The provider is unavailable for this appointment.
          enum:
          - ''
          - false
          - true
          type: string
        slotavailable:
          description: If true, using this cancel reason will create a new appointment
            slot at the same time as the original appointment.
          enum:
          - ''
          - false
          - true
          type: string
      type: object
    ChargeentrynotrequiredRequest:
      type: object
      required:
      - chargeentrynotrequiredreason
      - athenausername
      properties:
        athenausername:
          type: string
          description: athenaNet username of the person marking this appointment as
            not requiring charge entry.
        chargeentrynotrequiredreason:
          type: string
          description: Reason that this appointment is being marked as not requiring
            charge entry. This reason is specific to each practice and must be configured
            by that practice in athenaNet. The reasons, with descriptions, can be
            listed with the /configuration/appointments/chargeentrynotrequiredreasons
            endpoint.
    ChargeentrynotrequiredResponse:
      properties:
        errormessage:
          description: If success is false this is a field that may provide additional
            details.
          type: string
        success:
          description: Notes successfully marking the appointment as not requiring
            charge entry.
          enum:
          - ''
          - false
          - true
          type: string
      type: object
    ChargeentrynotrequiredreasonResponse:
      properties:
        description:
          description: A more verbose name that may provide a little more detail.
          type: string
        reason:
          description: Reason to mark appointment as charge entry not required.
          type: string
      type: object
    CheckinResponse:
      properties:
        message:
          description: Shows which section caused the check-in to fail.
          type: string
        success:
          description: Indicates whether the check-in was successful.
          enum:
          - ''
          - false
          - true
          type: string
      type: object
    Field:
      properties:
        error:
          description: If the demographic field failed validate, this contains the
            error why (empty or failed validation).
          type: string
        field:
          description: Name of the required or validated demographic field
          type: string
        formname:
          description: Name of the health history or privacy form
          type: string
        status:
          description: Check in status (Before or During Check In), the Privacy Form
            status (Complete or Incomplete), or the percent complete of the health
            history form.
          type: string
        valid:
          description: Whether the required demographic field was valid.
          enum:
          - ''
          - false
          - true
          type: string
      type: object
    CheckinResponse2:
      properties:
        complete:
          description: Whether the requirements for this section have been successfully
            completed.
          enum:
          - ''
          - false
          - true
          type: string
        fields:
          description: Detailed information about the requirements for each section
            and their status.
          items:
            $ref: '#/components/schemas/Field'
          type: array
        name:
          description: Name of the group of requirements. Can be Demographics, Insurance,
            Privacy Forms, Check In, and Health History Forms. The Check In section
            just gives you the current status.
          type: string
        required:
          description: Whether this section is required to be completed before check
            in will be allowed.
          enum:
          - ''
          - false
          - true
          type: string
      type: object
    ConfirmationstatuResponse:
      properties:
        confirmationname:
          description: Description of appointment confirmation status.
          type: string
        shortname:
          description: If defined then the status is a positive confirmation.
          type: string
      type: object
    ConfirmationstatuRequest:
      type: object
      required:
      - appointmentconfirmationid
      properties:
        appointmentconfirmationid:
          type: integer
          description: The appointment's confirmation status.
    AppointmentconfirmationstatuResponse:
      properties:
        name:
          description: Appointment Confirmation Status.
          type: string
        statusid:
          description: Status Id
          type: integer
      type: object
    CustomfieldRequest:
      type: object
      required:
      - customfields
      properties:
        customfields:
          type: array
          description: A JSON representation of any updates to custom fields. The
            contents of this should match the custom fields output with /appointments/customfields
            of course, any updates. Validation should happen based on the structure
            given in the /customfields/ call; this means that the values submitted
            in a select list should be a proper option ID, that number fields are
            restricted to numbers, and date fields restricted to dates (mm/dd/yyyy).
          items: {}
    CustomfieldResponse:
      properties:
        disallowedcount:
          description: The number of fields not updated because the field is not allowed
            to be updated.
          type: integer
        success:
          description: Indicates that this call was successful.
          enum:
          - ''
          - false
          - true
          type: string
        updatedcount:
          description: The number of fields updated.
          type: integer
      type: object
    Selectlist:
      properties:
        optionid:
          description: The ID that is used to identify this option.
          type: integer
        optionvalue:
          description: The value to be displayed.
          type: string
        ordering:
          description: The ordering in which this field is displayed.
          type: integer
      type: object
    CustomfieldResponse2:
      properties:
        casesensitiveyn:
          description: Is this field case sensitive?
          enum:
          - ''
          - false
          - true
          type: string
        copyonappointmentreschedyn:
          description: Decides whether we copy data when we reschedule an appointment.
          type: string
        customfieldid:
          description: The custom field ID.
          type: integer
        disallowupdateyn:
          description: Can this field be updated?
          enum:
          - ''
          - false
          - true
          type: string
        length:
          description: Maximum length of this field.
          type: integer
        name:
          description: The name of this custom field.
          type: string
        ordering:
          description: The ordering in which this field is displayed.
          type: integer
        searchableyn:
          description: If true will allow it to be searchable from the search box
            in the main page.
          enum:
          - ''
          - false
          - true
          type: string
        selectlist:
          description: An array of options, each one containing selectid and a selectvalue.
          items:
            $ref: '#/components/schemas/Selectlist'
          type: array
        selectyn:
          description: Is this field a select list (and thus should have a "selectlist"
            as well).
          enum:
          - ''
          - false
          - true
          type: string
        type:
          description: One of "TEXT", "DATE", "NUMBER", or "REFERRINGPROVIDER".
          type: string
      type: object
    ExpeditedRequest:
      type: object
      required:
      - appointmenttypeid
      - departmentid
      - providerid
      - patientid
      properties:
        patientid:
          type: integer
          description: The patient for the appointment.
        providerid:
          type: integer
          description: The provider to associate with the appointment.
        departmentid:
          type: integer
          description: The department in which the appointment will take place.
        deferinsurance:
          type: boolean
          description: If set to true, a patient does not have to have insurance on
            file to complete check-in. Note, if the practice setting "Expedited Encounters
            and Deferred Insurance" is set to "ENCOUNTERSONLY" then you cannot defer
            insurance.
        appointmenttypeid:
          type: integer
          description: The ID of the appointment type that will be used for the new
            appointment.
    ExpeditedResponse:
      properties:
        appointmentcopay:
          description: 'Detailed information about the copay for this appointment.  Gives
            more detail than the COPAY field.  Note: this information is not yet available
            in all practices, we are rolling this out slowly.'
          type: string
        appointmentid:
          description: Appointment ID of the booked appointment
          type: string
        appointmentstatus:
          description: The athenaNet appointment status. There are several possible
            statuses.  x=cancelled. f=filled. (It can include appointments where were
            never checked in, even if the appointment date is in the past. It is up
            to a practice to cancel appointments as a no show when appropriate to
            do so.)  o=open. 2=checked in. 3=checked out. 4=charge entered (i.e. a
            past appointment).
          type: string
        appointmenttype:
          description: The practice-friendly (not patient friendly) name for this
            appointment type.  Note that this may <strong>not</strong> be the same
            as the booked appointment because of "generic" slots.
          type: string
        appointmenttypeid:
          description: This is the ID for the appointment type.   Note that this may
            <strong>not</strong> be the same as the booked appointment because of
            "generic" slots.
          type: string
        chargeentrynotrequired:
          description: This field will tell if an appointment has been marked as not
            requiring change entry.
          enum:
          - ''
          - false
          - true
          type: string
        chargeentrynotrequiredreason:
          description: This field will give the reason that an appointment has been
            marked as not requiring charge entry.
          type: string
        copay:
          description: Expected copay for this appointment. Based on the appointment
            type, the patient's primary insurance, and any copays collected.  To see
            the amounts used in this calculated value, see the APPOINTMENTCOPAY fields.
          type: string
        date:
          description: The appointment date.
          type: string
        departmentid:
          type: string
        duration:
          description: In minutes
          type: integer
        encounterid:
          description: The encounter id associated with this appointment, useful for
            certain other calls.  Only present for appointments with Clinicals that
            have been checked in.
          type: string
        encounterstatus:
          description: The status of this patient in the encounter (READYFORSTAFF,
            WITHSTAFF, READFORPROVIDER, CHECKEDOUT).  Only present for appointments
            with Clinicals that have been checked in.
          type: string
        frozenyn:
          description: If true, this appointment slot is frozen
          type: string
        hl7providerid:
          description: This is the raw provider ID that should be used ONLY if using
            this appointment in conjunction with an HL7 message and with athenahealth's
            prior guidance. It is only available in some situations.
          type: integer
        patientappointmenttypename:
          description: The patient-friendly name for this appointment type.  Note
            that this may <strong>not</strong> be the same as the booked appointment
            because of "generic" slots.
          type: string
        patientid:
          description: The athenaNet patient ID for this appointment
          type: string
        patientlocationid:
          description: The location of the patient. See /patientlocation for practice
            list. Only present for appointments with Clinicals that have been checked
            in.
          type: string
        providerid:
          type: string
        referringproviderid:
          description: The referring provider ID.
          type: string
        renderingproviderid:
          description: The rendering provider ID.
          type: string
        rescheduledappointmentid:
          description: When an appointment is rescheduled, this is the ID of the replacement
            appointment.
          type: string
        startcheckin:
          description: The timestamp when the appointment started the check in process.
            If this is set while an appointment is still in status 'f', it means that
            the check-in process has begun but is not yet completed.
