  /fhir/r4/Subscription:
    post:
      summary: Create a new subscription
      description: Create a new subscription to a topic. You need to create a separate
        subscription per topic. The request must conform to the FHIR R5 Backport Subscription
        profile. Only one subscription is allowed per topic so if you want to subscribe
        across multiple practices you will need to specify multiple practice IDs in
        the ah-practice filter.
      parameters:
      - in: header
        name: Content-Type
        schema:
          type: string
          default: application/fhir+json
        required: true
        description: Content type of the payload
      - in: header
        name: X-Hub-Secret
        schema:
          type: string
        required: true
        description: Shared secret for HMAC signature generation.  Use this to verify
          authenticity of notification messages.
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionResponse2'
          description: Created
      operationId: postSubscription
      x-scopes:
      - system/Subscription.write
      requestBody:
        content:
          application/fhir+json:
            schema:
              $ref: '#/components/schemas/SubscriptionRequest3'
        required: true
      tags:
      - Eventing
      - Subscription Management
    get:
      summary: List all subscriptions
      description: Retrieve all subscriptions created by the authenticated application.
        Returns a searchset Bundle containing all Subscription resources.
      parameters:
      - in: query
        name: status
        schema:
          enum:
          - requested
          - active
          - error
          - 'off'
          type: string
        required: false
        description: The current state of the subscription
      - in: query
        name: criteria
        schema:
          type: string
        required: false
        description: The topic that was subscribed to
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionResponse3'
          description: Success
      operationId: getSubscription
      x-scopes:
      - system/Subscription.read
      tags:
      - Eventing
      - Subscription Management
