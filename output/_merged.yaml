      - Appointments
      - Appointment Types
    get:
      summary: Get list of appointment types
      description: Retrieves list of the type of appointment available in the practice
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: query
        name: hidegeneric
        schema:
          type: boolean
        required: false
        description: By default, we show both generic and non-generic types. Setting
          this to true will hide the generic types (and show only non-generic types).
      - in: query
        name: showappointmenttypeclasses
        schema:
          type: boolean
        required: false
        description: If set to true, returns the appointment type class ID and name
          for each appointment type.
      - in: query
        name: providerids
        schema:
          type: array
          items:
            type: integer
        required: false
        description: A list of providerids which when passed will filter the appointmenttypes
          having said providers. This is used along with departmentids to fetch department/provider
          specific appointmenttypes.
      - in: query
        name: hidetemplatetypeonly
        schema:
          type: boolean
        required: false
        description: By default, we show both "template only" and not-template only
          types. Setting this to true, the results will omit template only types.
          ("Template only" is a setting that makes the type appear in schedules, but
          forces users to select a non-template type upon booking.)
      - in: query
        name: departmentids
        schema:
          type: array
          items:
            type: integer
        required: false
        description: A list of departmentids which when passed will filter the appointmenttypes
          having said departments. This is used along with providerids to fetch department/provider
          specific appointmenttypes.
      - in: query
        name: hidenonpatient
        schema:
          type: boolean
        required: false
        description: This defaults to true if not specified, and thus will hide non-patient
          facing types.  Setting this to false would thus show non-patient facing
          types.
      - in: query
        name: hidenongeneric
        schema:
          type: boolean
        required: false
        description: By default, we show both generic and non-generic types. Setting
          this to true will hide non-generic types (and show only generic types).
      - in: query
        name: limit
        schema:
          type: integer
        required: false
        description: Number of entries to return (default 1500, max 5000)
      - in: query
        name: offset
        schema:
          type: integer
        required: false
        description: Starting point of entries; 0-indexed
      responses:
        '200':
          content:
            application/json:
