    OneyearRequest:
      type: object
      required:
      - departmentid
      - billingzip
      - email
      - billingaddress
      properties:
        email:
          type: string
          description: The email address of the patient. This is the email that the
            notification that the charge is about to happen and the receipt afterwards
            will be emailed to.
        maxamount:
          type: integer
          description: The maximum amount that will be charged when remittance information
            is received.
        trackdata:
          type: string
          description: The track data obtained from the credit card swipe. This can
            be track1 and/or track2 data. In either case, please including the start
            and end sentinels. ("%" and "?" for track1 and ";" and "?" for track2.)
        billingzip:
          type: string
          description: The billing zipcode for the credit card.
        nameoncard:
          type: string
          description: 'The name on the credit card.  (Required if trackdata is not
            supplied; track 2 does NOT supply name.)  Please truncate at 30 characters.
            (Max length: 30)'
        claimpayment:
          type: array
          items:
            type: object
          description: 'A JSON representation of claim ID and payment combinations.  For
            example, ''[ { "1":"1.00"}, { "2":"5.00"} ].''  This indicates a payment
            of $1 for claim ID #1 and a payment of $5 for claim ID #2.'
        departmentid:
          type: integer
          description: The ID of the department where the payment or contract is being
            collected.
        todayservice:
          type: boolean
          description: Apply the other amount value to today's service.
        accountnumber:
          type: string
          description: The account number of the credit card.  (Required if trackdata
            is not supplied.)
        ecommercemode:
          type: boolean
          description: Use ECommerce credit card mode (e.g. for telemedicine). trackdata
            may NOT be used if this mode is true.
        billingaddress:
          type: string
          description: 'The billing address for the credit card. (Max length: 20)'
        cardsecuritycode:
          type: integer
          description: 'The CVV2: the 3 (or 4 for Amex) digit value normally found
            on the back (or front for Amex) of the credit card.  When creating contracts,
            this is required if using accountnumber instead of track data.'
        expirationmonthmm:
          type: integer
          description: The month the credit card expires (MM).  (Required if trackdata
            is not supplied.)
        expirationyearyyyy:
          type: integer
          description: The year the credit card expires (YYYY).  (Required if trackdata
            is not supplied.)
        allowduplicatepayments:
          type: boolean
          description: Allows duplicate payments.
