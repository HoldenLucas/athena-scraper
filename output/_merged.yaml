      description: Retrieves the list of changes in appointments or appointment slots
      parameters:
      - in: path
        name: practiceid
        schema:
          type: integer
        required: true
        description: practiceid
      - in: query
        name: departmentid
        schema:
          type: array
          items:
            type: integer
        required: false
        description: Department ID. Multiple departments are allowed, either comma
          separated or with multiple values.
      - in: query
        name: providerid
        schema:
          type: array
          items:
            type: integer
        required: false
        description: Provider ID.  Multiple providers are allowed using comma separated
          values.
      - in: query
        name: showremindercalldetail
        schema:
          type: boolean
        required: false
        description: Include all remindercall related results, if available, associated
          with an appointment.
      - in: query
        name: showprocessedstartdatetime
        schema:
          type: string
        required: false
        description: Show already processed changes.  This will show changes that
          you previously retrieved at some point after this datetime mm/dd/yyyy hh24:mi:ss
          (Eastern). Can be used to refetch data if there was an error, such as a
          timeout, and records are marked as already retrieved. This is intended to
          be used with showprocessedenddatetime and for a short period of time only.
          Also note that all messages will eventually be deleted.
      - in: query
        name: showpatientdetail
        schema:
          type: boolean
        required: false
        description: Include patient information for each patient associated with
          an appointment.
      - in: query
        name: confidentialitycode
        schema:
          type: array
          items:
            type: string
        required: false
        description: 'A comma separated list of confidentiality codes to filter patients
          by. If not set defaults to include all confidentiality codes. Supported
          codes: ''N'' and ''R''.'
      - in: query
        name: patientid
        schema:
          type: array
          items:
            type: integer
        required: false
        description: Patient ID. Multiple Patient IDs are allowed, either comma separated
          or with multiple values.
      - in: query
        name: showexpectedprocedurecodes
        schema:
          type: boolean
        required: false
        description: Show the expected procedurecodes.
      - in: query
        name: showclaimdetail
        schema:
          type: boolean
        required: false
        description: Include claim information, if available, associated with an appointment.
      - in: query
        name: showinsurance
        schema:
          type: boolean
        required: false
        description: Include patient insurance information. Shows insurance packages
          for the appointment if any are selected, and all patient packages otherwise.
      - in: query
        name: showcopay
        schema:
          type: boolean
        required: false
        description: Return copay information with the appointment data.
      - in: query
        name: leaveunprocessed
        schema:
          type: boolean
        required: false
        description: For testing purposes, do not mark records as processed.
      - in: query
        name: showprocessedenddatetime
        schema:
          type: string
        required: false
        description: See showprocessedstartdatetime.
      - in: query
        name: limit
        schema:
          type: integer
        required: false
        description: Number of entries to return (default 1000, max 10000)Please note
          that this endpoint has a different default and max than normal.
      - in: query
        name: offset
        schema:
          type: integer
        required: false
        description: Starting point of entries; 0-indexed
      responses:
