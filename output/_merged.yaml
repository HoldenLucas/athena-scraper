    PrivacyinformationverifiedRequest:
      type: object
      required:
      - signaturedatetime
      - departmentid
      - signaturename
      properties:
        departmentid:
          type: integer
          description: The ID of the department where the privacy information was
            verified.
        privacynotice:
          type: boolean
          description: If set, this flag sets the Privacy Notice privacy checkbox.
        signaturename:
          type: string
          description: If presenting an e-siganture, the name the signer typed, up
            to 100 characters.
        expirationdate:
          type: string
          description: The date this approval expires (for release of billing information
            and assignment of benefits).
        insuredsignature:
          type: boolean
          description: If set, this flag sets the Assignment of Benefits privacy checkbox.
        patientsignature:
          type: boolean
          description: If set, this flag sets the Release of Billing Information privacy
            checkbox.
        signaturedatetime:
          type: string
          description: If presenting an e-signature, the mm/dd/yyyy hh24:mi:ss formatted
            time that the signer signed. This is required if a signature name is provided.
        reasonpatientunabletosign:
          type: string
          description: If the patient is unable to sign a reason why.
        signerrelationshiptopatientid:
          type: string
          description: If presenting an e-signature, and the signer is signing on
            behalf of someone else, the relationship of the patient to the signer.
            There is a documentation page with details.
