          enum:
          - N
          - P
          - Y
          type: string
          x-enumDescriptions:
          - (null)
          - 'No'
          - Patient Declined
          - 'Yes'
        required: false
        description: Used to identify this patient as an agricultural worker. Only
          settable if client has Social Determinant fields turned on.
      - in: query
        name: guarantorcountrycode3166
        schema:
          type: string
        required: false
        description: 'Guarantor''s country code (ISO 3166-1) (Max length: 20)'
      - in: query
        name: mobilecarrierid
        schema:
          type: string
        required: false
        description: The ID of the mobile carrier, from /mobilecarriers or the list
