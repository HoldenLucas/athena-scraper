        name: confidentialitycode
        required: false
        schema:
          items:
            type: string
          type: array
      - description: The athenaNet patient ID.  If operating in a Provider Group Enterprise
          practice, this should be the enterprise patient ID.
        in: query
        name: patientid
        required: false
        schema:
          type: integer
      - description: Identify appointments modified after this date/time (mm/dd/yyyy
