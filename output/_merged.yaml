            appointment. Use GET /appointmentcancelreasons to retrieve a list of cancel
            reasons.
        ignoreschedulablepermission:
          type: boolean
          description: By default, we allow booking of appointments marked as schedulable
            via the web.  This flag allows you to bypass that restriction for booking.
