          description: "List of questions and existing answers (if any) for this section.\
            \ All of the fields in here must be returned as is, except the values\
            \ within 'fields'.\n\t\t\t\t\t\tThose can be set per the specified 'inputtype'.\
            \ For the FAMILY history section, the 'question' => 'fields' section is\
            \ an array and not a hash.\n\t\t\t\t\t\tEach element of the array contains\
            \ a hash of the specified 'fielddate' ('default', 'diedofage', 'onsetage',\
            \ 'relationkeyid' (required), and 'relation' (required)).\n\t\t\t\t\t\t\
            To create new relations of a given type, specify a different numerical\
            \ relationkeyid.\n\t\t\t\t\t\tFor the SOCIAL history section, questions\
            \ with inputtype: \"DROPDOWN\" will have an array of \"dropdownvalues\"\
            .\n\t\t\t\t\t\tEach item in \"dropdownvalues\" is an array containing\
            \ a key and a value together, representing a dropdown option.\n\t\t\t\t\
            \t\tYou should always display the value and save/return the key (\"fields[default]\"\
            \ should be a dropdown key).\n\t\t\t\t\t\tFor all SOCIAL history section\
            \ questions, a property of \"deprecated\" with a value of 1 indicates\
            \ that the question has been deprecated.\n\t\t\t\t\t\tA deprecated question\
            \ is a question that was previously supported, and is now considered obsolete\
            \ for any number of reasons;\n\t\t\t\t\t\tit could've been replaced with\
            \ another question, the nature of the question is no longer relevant,\
            \ etc. While these questions\n\t\t\t\t\t\tmay still be answered, the use\
            \ of them is not recommended, and the question will display as \"deleted\"\
